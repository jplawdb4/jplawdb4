  </div>

  <div class="tag-filter" id="tagFilter"></div>

</div>

<script>
const DATA = [
  {
    id: 'cfc_senpa_assetswap_v3_20260301',
    title: 'CFC合算所得計算（本邦法令基準）v3：特定船舶修繕準備金・特定資産買換え圧縮記帳の損金算入可否',
    date: '2026-03-01',
    tags: ['CFC税制', '本邦法令基準', '特別修繕準備金', '圧縮記帳', '特定資産買換え', '措法57条の8', '措法65条の7', '措令39条の15', '明細書添付'],
    laws: ['措法66条の6', '措法57条の8', '措法65条の7', '措令39条の15'],
    summary: '本邦法令基準では、特別修繕準備金と特定資産買換え圧縮記帳（表第4号、船舶→船舶）は原則損金算入対象。要件充足と明細書添付（措令39条の15第8項）が前提。',
    file: 'html/cfc_senpa_assetswap_v3_20260301.html'
  },
  {
    id: 'cfc_junbi_atsu_20260301',
    title: 'CFC合算所得計算における特別修繕準備金・圧縮記帳の損金算入可否（本邦法令基準）',
    date: '2026-03-01',
    tags: ['CFC合算課税', '本邦法令基準', '特別修繕準備金', '圧縮記帳', '措法57条の8', '措法65条の7', '措令39条の15'],
    laws: ['措法66条の6', '措令39条の15', '措法57条の8', '措法65条の7'],
    summary: '本邦法令基準下での特別修繕準備金・圧縮記帳の損金算入可否。準備金は可、圧縮記帳は第4号（船舶→船舶）のみ可。明細書添付要件あり（措令39条の15第8項）。',
    file: 'html/cfc_junbi_atsu_20260301.html'
  },
  {
    id: "cfc_senpa_assetswap_v2_20260301",
    title: "CFC合算所得計算（本邦法令基準）v2：特定船舶特別修繕準備金・圧縮記帳の損金算入判定",
    date: "2026-03-01",
    tags: ["CFC税制", "本邦法令基準", "特別修繕準備金", "圧縮記帳", "条文ベース", "措令39条の15"],
    laws: ["措法66条の6", "措令39条の15", "措法57条の8", "措法65条の7"],
    summary: "本邦法令基準でのCFC合算所得計算について、特定船舶特別修繕準備金（措法57条の8）と特定資産買換え圧縮記帳（措法65条の7第1項表第4号）の損金算入可否を条文直結で再整理。両者とも原則損金算入可だが、措令39条の15第8項の明細書添付要件と要件不充足時の益金算入戻しを明示。",
    file: "html/cfc_senpa_assetswap_v2_20260301.html"
  },
  {
    id: "cfc_gensen_zei_20260301",
    title: "CFC合算課税（本邦法令基準）：特定外国関係会社の日本銀行預金源泉所得税の取扱いと別表調製",
    date: "2026-03-01",
    tags: ["CFC税制", "本邦法令基準", "源泉所得税", "控除対象所得税額等相当額", "別表17(3)", "措法66条の7"],
    laws: ["措法66条の6", "措法66条の7", "措令39条の15"],
    summary: "特定外国関係会社（パナマ）が日本の銀行預金から受ける利息500に係る源泉所得税100の本邦法令基準計算。基準所得金額500→適用対象金額500→課税対象金額500。外国税額控除は第4項（控除対象所得税額等相当額100）適用・第6項グロスアップ。別表17(3)・別表6(5の2)調製を含む。",
    file: "html/cfc_gensen_zei_20260301.html"
  },
  {
    id: "cfc_senpa_assetswap_20260301",
    title: "CFC合算所得計算（本邦法令基準）：特定船舶特別修繕準備金・圧縮記帳の損金算入可否",
    date: "2026-03-01",
    tags: ["CFC税制", "本邦法令基準", "特別修繕準備金", "圧縮記帳", "損金算入", "措置法"],
    laws: ["措令39条の15", "措法57条の8", "措法65条の7①4号"],
    summary: "外国関係会社の合算所得計算（本邦法令基準）において、特定船舶の特別修繕準備金（措法57の8）と特定資産の買換えの圧縮記帳（措法65の7①4号）はいずれも限定列挙14規定に含まれ損金算入可。ただし船舶安全法・日本船舶要件は業法要件修正（本国相当法読替）が必要で、かつ申告書明細書添付（措令39条の15第8項）が必須条件。",
    file: "html/cfc_senpa_assetswap_20260301.html"
  }
];

let activeTag = null;

// タグ一覧を生成
const allTags = [...new Set(DATA.flatMap(d => d.tags))];
const tagFilter = document.getElementById('tagFilter');
allTags.forEach(tag => {
  const el = document.createElement('span');
  el.className = 'tag';
  el.textContent = tag;
  el.onclick = () => {
    activeTag = (activeTag === tag) ? null : tag;
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    if (activeTag) el.classList.add('active');
    render();
  };
  tagFilter.appendChild(el);
});

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = DATA.filter(d => {
    const text = [d.title, ...d.tags, ...d.laws, d.summary].join(' ').toLowerCase();
    const matchQ = !q || text.includes(q);
    const matchTag = !activeTag || d.tags.includes(activeTag);
    return matchQ && matchTag;
  });

  document.getElementById('totalText').textContent = `${filtered.length} 件`;

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">該当なし</div>';
    return;
  }

  list.innerHTML = filtered.map(d => `
    <div class="card">
      <div class="card-title"><a href="${d.file}">${d.title}</a></div>
      <div class="card-meta">
        <span class="card-date">${d.date}</span>
        ${d.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
      </div>
      <div class="card-laws">📋 ${d.laws.join(' / ')}</div>
      <div class="card-summary">${d.summary}</div>
    </div>
  `).join('');
}

render();
</script>
</body>
</html>
