let activeTag = null;

// タグ一覧を生成
const allTags = [...new Set(DATA.flatMap(d => d.tags))];
const tagFilter = document.getElementById('tagFilter');
allTags.forEach(tag => {
  const el = document.createElement('span');
  el.className = 'tag';
  el.textContent = tag;
  el.onclick = () => {
    activeTag = (activeTag === tag) ? null : tag;
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    if (activeTag) el.classList.add('active');
    render();
  };
  tagFilter.appendChild(el);
});

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = DATA.filter(d => {
    const text = [d.title, ...d.tags, ...d.laws, d.summary].join(' ').toLowerCase();
    const matchQ = !q || text.includes(q);
    const matchTag = !activeTag || d.tags.includes(activeTag);
    return matchQ && matchTag;
  });

  document.getElementById('totalText').textContent = `${filtered.length} 件`;

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">該当なし</div>';
    return;
  }

  list.innerHTML = filtered.map(d => `
    <div class="card">
      <div class="card-title"><a href="${d.file}">${d.title}</a></div>
      <div class="card-meta">
        <span class="card-date">${d.date}</span>
        ${d.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
      </div>
      <div class="card-laws">📋 ${d.laws.join(' / ')}</div>
      <div class="card-summary">${d.summary}</div>
    </div>
  `).join('');
}

render();
</script>
