<!-- ===== A: タイトル ===== -->
<rect x="8" y="8" width="1084" height="46" rx="4" fill="#14141c" stroke="#2a2a3c" stroke-width="1"/>
<text x="550" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">外国税額控除（FTC）条文マップ（再設計版）</text>
<text x="550" y="44" text-anchor="middle" fill="#64748b" font-size="9.5">法法69条・23条の2・69条の2 ／ 法令142条〜 ／ 措法66の7・66の9の3 ／ 所法95条　国際二重課税排除の全体像</text>
<line x1="550" y1="54" x2="550" y2="62" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-p)"/>

<!-- ===== B: 前提要件・対象税目 ===== -->
<rect x="8" y="62" width="1084" height="18" rx="3" fill="#120a1a" stroke="#a78bfa" stroke-width="1.5"/>
<text x="550" y="75" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">前提要件・対象税目　外国法人税の定義（法令141条）・納付要件（法法69条①）・控除対象外税目（法法69条⑦）</text>

<a href="https://lawzilla.jp/law/340AC0000000036?n=ln141&amp;mode=only" target="_blank">
  <rect x="8" y="82" width="356" height="70" rx="4" fill="#1a1a30" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="186" y="100" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">外国法人税の定義　法令141条</text>
  <text x="186" y="116" text-anchor="middle" fill="#c4b5fd" font-size="9.5">外国の法令に基づき外国に納付する税</text>
  <text x="186" y="131" text-anchor="middle" fill="#64748b" font-size="9">所得・収益等を課税標準とするものに限定</text>
  <text x="186" y="144" text-anchor="middle" fill="#64748b" font-size="9">間接税・財産税・関税等は対象外</text>
</a>
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">
  <rect x="372" y="82" width="356" height="70" rx="4" fill="#1a1a30" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="550" y="100" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">外国法人税の納付　法法69条①</text>
  <text x="550" y="116" text-anchor="middle" fill="#c4b5fd" font-size="9.5">外国法人税を実際に納付したことが大前提</text>
  <text x="550" y="131" text-anchor="middle" fill="#64748b" font-size="9">申告・賦課・源泉徴収で確定した税額</text>
  <text x="550" y="144" text-anchor="middle" fill="#64748b" font-size="9">未確定額・争訟中の額は当期控除不可</text>
</a>
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">
  <rect x="736" y="82" width="356" height="70" rx="4" fill="#1a0d20" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="914" y="100" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">特定外国法人税（控除対象外）法法69条⑦</text>
  <text x="914" y="116" text-anchor="middle" fill="#c4b5fd" font-size="9.5">税率が著しく高い外国法人税</text>
  <text x="914" y="131" text-anchor="middle" fill="#64748b" font-size="9">条約により免除された外国法人税</text>
  <text x="914" y="144" text-anchor="middle" fill="#64748b" font-size="9">過大税額・否認額等は控除不可</text>
</a>
<line x1="550" y1="152" x2="550" y2="162" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-p)"/>

<!-- ===== C: 制度の棲み分け（FTC vs 益金不算入） ===== -->
<rect x="8" y="162" width="1084" height="18" rx="3" fill="#120a1a" stroke="#a78bfa" stroke-width="1.5"/>
<text x="550" y="175" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">制度の棲み分け　外国税額控除（直接控除）vs 外国子会社配当益金不算入　法法69条①・23条の2</text>

<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">
  <rect x="8" y="182" width="536" height="70" rx="4" fill="#1a1a30" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="272" y="200" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">外国税額控除（FTC）　法法69条①</text>
  <text x="272" y="216" text-anchor="middle" fill="#c4b5fd" font-size="9.5">国外所得に課された外国法人税を法人税額から直接控除</text>
  <text x="272" y="231" text-anchor="middle" fill="#64748b" font-size="9">PE所得・国外配当・使用料・利子等の外国税に適用</text>
  <text x="272" y="244" text-anchor="middle" fill="#64748b" font-size="9">控除限度額あり → 超過分は3年繰越可（法法69条③）</text>
</a>
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln23_2&amp;mode=only" target="_blank">
  <rect x="552" y="182" width="540" height="70" rx="4" fill="#0d1a2e" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="822" y="200" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">外国子会社配当益金不算入　法法23条の2</text>
  <text x="822" y="216" text-anchor="middle" fill="#93c5fd" font-size="9.5">持株25%以上・6ヶ月継続保有の外国子会社が要件</text>
  <text x="822" y="231" text-anchor="middle" fill="#64748b" font-size="9">受取配当の95%を課税ベースから除外（益金不算入）</text>
  <text x="822" y="244" text-anchor="middle" fill="#64748b" font-size="9">H21年度改正で間接FTC廃止と同時に導入（二制度の棲み分け）</text>
</a>
<line x1="550" y1="252" x2="550" y2="262" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-y)"/>

<!-- ===== D: 控除限度額の計算【核心】 ===== -->
<rect x="8" y="262" width="1084" height="26" rx="3" fill="#1a1400" stroke="#fbbf24" stroke-width="1.5"/>
<text x="550" y="275" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="bold">控除限度額の計算【制度の核心】　法法69条②　法令142条・142条の2</text>
<text x="550" y="287" text-anchor="middle" fill="#b45309" font-size="9">控除限度額 ＝ 当期法人税額 × （調整国外所得金額 ÷ 当期所得金額）　→ 国別限度額・全世界限度額の二段階で上限管理</text>

<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">
  <rect x="8" y="292" width="356" height="70" rx="4" fill="#1a1400" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="186" y="310" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="bold">全世界一括限度額　法法69条②</text>
  <text x="186" y="326" text-anchor="middle" fill="#fde68a" font-size="9.5">法人税額 × (調整国外所得 / 当期所得)</text>
  <text x="186" y="341" text-anchor="middle" fill="#64748b" font-size="9">全ての国外所得を合算して計算</text>
  <text x="186" y="354" text-anchor="middle" fill="#64748b" font-size="9">控除額の総合上限として機能</text>
</a>
<a href="https://lawzilla.jp/law/340AC0000000036?n=ln142&amp;mode=only" target="_blank">
  <rect x="372" y="292" width="356" height="70" rx="4" fill="#1a1400" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="550" y="310" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="bold">国別控除限度額　法令142条の2</text>
  <text x="550" y="326" text-anchor="middle" fill="#fde68a" font-size="9.5">各国・地域ごとに個別計算</text>
  <text x="550" y="341" text-anchor="middle" fill="#64748b" font-size="9">A国余裕枠でB国超過税額を相殺不可</text>
  <text x="550" y="354" text-anchor="middle" fill="#64748b" font-size="9">実務における原則的方式（所得の分離）</text>
</a>
<a href="https://lawzilla.jp/law/340AC0000000036?n=ln142&amp;mode=only" target="_blank">
  <rect x="736" y="292" width="356" height="70" rx="4" fill="#1a1400" stroke="#d97706" stroke-width="1"/>
  <text x="914" y="310" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="bold">調整国外所得金額　法令142条</text>
  <text x="914" y="326" text-anchor="middle" fill="#fde68a" font-size="9.5">国外源泉所得から損失等を調整</text>
  <text x="914" y="341" text-anchor="middle" fill="#64748b" font-size="9">PE帰属所得・配当・使用料・利子等</text>
  <text x="914" y="354" text-anchor="middle" fill="#64748b" font-size="9">国内費用配賦・損失通算後の純額</text>
</a>
<line x1="550" y1="362" x2="550" y2="372" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-t)"/>

<!-- ===== E: 繰越控除・みなし外国税額 ===== -->
<rect x="8" y="372" width="1084" height="18" rx="3" fill="#062020" stroke="#34d399" stroke-width="1.5"/>
<text x="550" y="385" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">繰越控除・みなし外国税額控除　法法69条③④⑧　超過額の3年繰越とtax sparing</text>

<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">
  <rect x="8" y="392" width="356" height="70" rx="4" fill="#0d2010" stroke="#34d399" stroke-width="1.5"/>
  <text x="186" y="410" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">控除限度超過額の繰越　法法69条③</text>
  <text x="186" y="426" text-anchor="middle" fill="#6ee7b7" font-size="9.5">外国税額 ＞ 控除限度額 → 差額を3年繰越</text>
  <text x="186" y="441" text-anchor="middle" fill="#64748b" font-size="9">翌年以降の余裕限度額で順次控除（FIFO）</text>
  <text x="186" y="454" text-anchor="middle" fill="#64748b" font-size="9">高税率国（超過分が生じやすい）で発生</text>
</a>
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">
  <rect x="372" y="392" width="356" height="70" rx="4" fill="#0d2010" stroke="#34d399" stroke-width="1.5"/>
  <text x="550" y="410" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">税額超過額の繰越　法法69条④</text>
  <text x="550" y="426" text-anchor="middle" fill="#6ee7b7" font-size="9.5">控除限度額 ＞ 外国税額 → 差額を3年繰越</text>
  <text x="550" y="441" text-anchor="middle" fill="#64748b" font-size="9">翌年の超過税額を吸収する余裕枠として活用</text>
  <text x="550" y="454" text-anchor="middle" fill="#64748b" font-size="9">低税率国（余裕が生じやすい）で発生</text>
</a>
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">
  <rect x="736" y="392" width="356" height="70" rx="4" fill="#0a1a10" stroke="#16a34a" stroke-width="1"/>
  <text x="914" y="410" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">みなし外国税額控除（tax sparing）法法69条⑧</text>
  <text x="914" y="426" text-anchor="middle" fill="#6ee7b7" font-size="9.5">条約で免除された外国税をみなし納付として控除</text>
  <text x="914" y="441" text-anchor="middle" fill="#64748b" font-size="9">開発途上国への投資促進目的</text>
  <text x="914" y="454" text-anchor="middle" fill="#64748b" font-size="9">日マレーシア・日タイ・日インドネシア等条約</text>
</a>
<line x1="550" y1="462" x2="550" y2="472" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-g)"/>

<!-- ===== F: 益金不算入・損金不算入 ===== -->
<rect x="8" y="472" width="1084" height="18" rx="3" fill="#0a1a0a" stroke="#4ade80" stroke-width="1.5"/>
<text x="550" y="485" text-anchor="middle" fill="#86efac" font-size="11" font-weight="bold">益金不算入・損金不算入　法法23条の2・69条の2　二重メリット防止の対応規定</text>

<a href="https://lawzilla.jp/law/340AC0000000034?n=ln23_2&amp;mode=only" target="_blank">
  <rect x="8" y="492" width="536" height="68" rx="4" fill="#0d1f0d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="272" y="510" text-anchor="middle" fill="#86efac" font-size="11" font-weight="bold">外国子会社配当95%益金不算入　法法23条の2</text>
  <text x="272" y="526" text-anchor="middle" fill="#86efac" font-size="9.5">持株25%以上・6ヶ月継続保有が要件</text>
  <text x="272" y="541" text-anchor="middle" fill="#64748b" font-size="9">CFC課税対象外国関係会社には適用除外（措法66の6等）</text>
  <text x="272" y="554" text-anchor="middle" fill="#64748b" font-size="9">間接持株含む25%判定・租税回避否認規定（法令22の4）</text>
</a>
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69_2&amp;mode=only" target="_blank">
  <rect x="552" y="492" width="540" height="68" rx="4" fill="#0d1f0d" stroke="#22c55e" stroke-width="1"/>
  <text x="822" y="510" text-anchor="middle" fill="#86efac" font-size="11" font-weight="bold">外国源泉税等の損金不算入　法法69条の2</text>
  <text x="822" y="526" text-anchor="middle" fill="#86efac" font-size="9.5">益金不算入配当に対応する外国源泉税を損金不算入</text>
  <text x="822" y="541" text-anchor="middle" fill="#64748b" font-size="9">益金除外＋損金算入の二重メリット防止</text>
  <text x="822" y="554" text-anchor="middle" fill="#64748b" font-size="9">損金不算入額 ＝ 外国源泉税 × 益金不算入割合（95%）</text>
</a>
<line x1="550" y1="560" x2="550" y2="570" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-r)"/>

<!-- ===== G: CFC合算後の二重課税排除 ===== -->
<rect x="8" y="570" width="1084" height="18" rx="3" fill="#1a0a0a" stroke="#f87171" stroke-width="1.5"/>
<text x="550" y="583" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">CFC合算後の二重課税排除　措法66条の7・66条の9の3　合算課税と外国税の二重負担解消</text>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_7&amp;mode=only" target="_blank">
  <rect x="8" y="590" width="536" height="68" rx="4" fill="#2a1520" stroke="#f87171" stroke-width="1.5"/>
  <text x="272" y="608" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">CFC全所得合算後のFTC　措法66条の7</text>
  <text x="272" y="624" text-anchor="middle" fill="#fca5a5" font-size="9.5">合算割合に応じ外国関係会社の外国法人税を控除</text>
  <text x="272" y="639" text-anchor="middle" fill="#64748b" font-size="9">持株割合で按分・法人税から控除（措令39の17）</text>
  <text x="272" y="652" text-anchor="middle" fill="#64748b" font-size="9">全所得合算制度（措法66の6）と連動</text>
</a>
<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_9_3&amp;mode=only" target="_blank">
  <rect x="552" y="590" width="540" height="68" rx="4" fill="#2a1520" stroke="#dc2626" stroke-width="1"/>
  <text x="822" y="608" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">部分合算後のFTC　措法66条の9の3</text>
  <text x="822" y="624" text-anchor="middle" fill="#fca5a5" font-size="9.5">部分対象外国関係会社の特定所得（受動的所得）</text>
  <text x="822" y="639" text-anchor="middle" fill="#64748b" font-size="9">部分合算に対応する外国法人税を控除（措令39の18）</text>
  <text x="822" y="652" text-anchor="middle" fill="#64748b" font-size="9">部分合算制度（措法66の9の2）と連動</text>
</a>
<line x1="550" y1="658" x2="550" y2="668" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-t)"/>

<!-- ===== H: 個人版外国税額控除 ===== -->
<rect x="8" y="668" width="1084" height="18" rx="3" fill="#062020" stroke="#34d399" stroke-width="1.5"/>
<text x="550" y="681" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">個人版外国税額控除　所法95条・措法40条の10　法人版と同様の仕組みを居住者に適用</text>

<a href="https://lawzilla.jp/law/340AC0000000033?n=ln95&amp;mode=only" target="_blank">
  <rect x="8" y="688" width="536" height="60" rx="4" fill="#0d2010" stroke="#34d399" stroke-width="1.5"/>
  <text x="272" y="706" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">個人外国税額控除　所法95条</text>
  <text x="272" y="722" text-anchor="middle" fill="#6ee7b7" font-size="9.5">居住者が外国所得税を納付した場合に所得税から控除</text>
  <text x="272" y="737" text-anchor="middle" fill="#64748b" font-size="9">控除限度額 ＝ 所得税額 × (国外所得 / 全所得)　繰越3年</text>
</a>
<a href="https://lawzilla.jp/law/332AC0000000026?n=ln40_10&amp;mode=only" target="_blank">
  <rect x="552" y="688" width="540" height="60" rx="4" fill="#0d2010" stroke="#16a34a" stroke-width="1"/>
  <text x="822" y="706" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">個人CFC合算後のFTC　措法40条の10</text>
  <text x="822" y="722" text-anchor="middle" fill="#6ee7b7" font-size="9.5">個人株主（措法40の4等）のCFC合算後の二重課税排除</text>

<text x="111" y="867" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="bold">1965年（S40）　創設</text>
<text x="111" y="881" text-anchor="middle" fill="#64748b" font-size="8.5">直接・間接FTC制度の導入</text>
<text x="111" y="893" text-anchor="middle" fill="#475569" font-size="8">法法69条の原型</text>

<text x="325" y="881" text-anchor="middle" fill="#64748b" font-size="8.5">間接FTC廃止・益金不算入導入</text>
<text x="325" y="893" text-anchor="middle" fill="#475569" font-size="8">法法23条の2創設（H21.4.1〜）</text>

<rect x="436" y="850" width="206" height="46" rx="4" fill="#131320" stroke="#475569" stroke-width="1"/>

<text x="539" y="881" text-anchor="middle" fill="#64748b" font-size="8.5">外国源泉税の損金不算入整備</text>
<text x="539" y="893" text-anchor="middle" fill="#475569" font-size="8">法法69条の2新設</text>

<rect x="650" y="850" width="206" height="46" rx="4" fill="#131320" stroke="#475569" stroke-width="1"/>

<text x="753" y="893" text-anchor="middle" fill="#475569" font-size="8">措法66の9の3・40の10整備</text>

<rect x="864" y="850" width="228" height="46" rx="4" fill="#131320" stroke="#475569" stroke-width="1"/>
<text x="978" y="867" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-weight="bold">現行　BEPS/Pillar 2対応</text>
<text x="978" y="881" text-anchor="middle" fill="#64748b" font-size="8.5">IIR・QDMTT導入に伴う調整</text>
<text x="978" y="893" text-anchor="middle" fill="#475569" font-size="8">Pillar 2最低税率との整合</text>
