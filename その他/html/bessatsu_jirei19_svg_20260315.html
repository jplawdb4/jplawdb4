    <div style="font-size:7px;color:#dc2626;">配賦後一般管理費 = 10 × 15/(15+5) = <b>8</b></div>
    <div style="font-size:6.5px;color:#94a3b8;padding-left:8px;">※ 仕入高比（45対480）は関連者間取引の対価を含むため不適当</div>
    <div style="border-top:2px solid #b45309;margin:4px 0;"></div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:#b45309;font-weight:700;"><span>Ｓ社の国外関連取引に係る営業利益</span><span>37</span></div>
  </div>
</foreignObject>

<rect x="25" y="848" width="280" height="82" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>

<foreignObject x="25" y="870" width="280" height="60">

    <span style="font-size:7px;color:#475569;">売上原価や一部の販管費は可能な限り</span>
    <span style="font-size:7px;color:#475569;">個々に区分して計算する</span>
    <span style="font-size:6.5px;color:#94a3b8;">例: 製品Ａ販売費15、部品ａ販売費2</span>
  </div>
</foreignObject>

<rect x="315" y="848" width="280" height="82" rx="7" fill="#fff" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>

<foreignObject x="315" y="870" width="280" height="60">

    <span style="font-size:7px;color:#475569;">使用してはならない</span>
    <span style="font-size:6.5px;color:#dc2626;font-weight:600;">NG例: P社のR&amp;D費配賦に部品ａ売上35を使用</span>
  </div>
