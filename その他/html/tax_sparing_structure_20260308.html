<text x="60" y="210" fill="#1a365d" font-size="20" font-weight="700">第1層 ── 日本国憲法（最高法規）</text>
<line x1="60" y1="218" x2="380" y2="218" stroke="#c05621" stroke-width="3"/>

<rect x="60" y="235" width="400" height="105" rx="8" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
<rect x="60" y="235" width="400" height="34" rx="8" fill="url(#kenpoGrad)"/>
<rect x="60" y="261" width="400" height="8" fill="#1a365d"/>
<text x="260" y="258" text-anchor="middle" fill="white" font-size="13" font-weight="700">憲法30条（納税義務）</text>
<text x="80" y="290" fill="#4a5568" font-size="11">「国民は、法律の定めるところにより、</text>
<text x="80" y="306" fill="#4a5568" font-size="11">　納税の義務を負ふ」</text>
<text x="80" y="328" fill="#718096" font-size="10">→ 課税には法律上の根拠が必要</text>

<rect x="500" y="235" width="400" height="105" rx="8" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
<rect x="500" y="235" width="400" height="34" rx="8" fill="url(#kenpoGrad)"/>
<rect x="500" y="261" width="400" height="8" fill="#1a365d"/>
<text x="700" y="258" text-anchor="middle" fill="white" font-size="13" font-weight="700">憲法84条（租税法律主義）</text>
<text x="520" y="290" fill="#4a5568" font-size="11">「あらたに租税を課し、又は現行の租税を</text>
<text x="520" y="306" fill="#4a5568" font-size="11">　変更するには、法律又は法律の定める</text>
<text x="520" y="322" fill="#4a5568" font-size="11">　条件によることを必要とする」</text>

<rect x="940" y="235" width="400" height="105" rx="8" fill="#fff5f5" stroke="#fc8181" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="940" y="235" width="400" height="34" rx="8" fill="url(#kenpoGrad)"/>
<rect x="940" y="261" width="400" height="8" fill="#1a365d"/>
<text x="1140" y="258" text-anchor="middle" fill="white" font-size="13" font-weight="700">★ 憲法98条2項（条約遵守義務）</text>
<text x="960" y="290" fill="#4a5568" font-size="11">「日本国が締結した条約及び確立された</text>
<text x="960" y="306" fill="#4a5568" font-size="11">　国際法規は、これを誠実に遵守する</text>
<text x="960" y="322" fill="#4a5568" font-size="11">　ことを必要とする」</text>
<text x="960" y="338" fill="#c53030" font-size="10" font-weight="700">→ 条約の国内法的効力＝自動執行力の根拠</text>

<text x="920" y="385" fill="#c05621" font-size="11" font-weight="700">条約に国内法的効力を付与</text>

<rect x="500" y="445" width="460" height="130" rx="8" fill="#fffaf0" stroke="#ed8936" stroke-width="2.5" filter="url(#shadow)"/>

<text x="520" y="500" fill="#4a5568" font-size="11">使用料について：</text>
<text x="520" y="520" fill="#7b341e" font-size="13" font-weight="700">「20%の税率で租税が課されたものとみなす」</text>

<text x="80" y="696" fill="#4a5568" font-size="12" font-weight="700">第3条3項</text>
<text x="200" y="696" fill="#4a5568" font-size="11">非居住者企業の中国源泉所得（特許権使用料含む）に課税</text>

<text x="200" y="720" fill="#4a5568" font-size="11">法定税率</text>

<text x="340" y="722" text-anchor="middle" fill="#c53030" font-size="14" font-weight="800">20%</text>

<text x="200" y="776" fill="#c53030" font-size="12" font-weight="700">実効税率を一律10%に軽減（减按10%征收）</text>

<text x="200" y="832" fill="#4a5568" font-size="11">源泉徴収義務（支払者＝扣缴义务人）</text>

<text x="760" y="746" fill="#9b2c2c" font-size="12" font-weight="700">　先進技術の専有技術使用料：</text>

<text x="770" y="880" fill="#742a2a" font-size="11">中国が20%→10%に減免 or 免税にしても、日本で</text>
<text x="770" y="896" fill="#742a2a" font-size="11">「20%納付したとみなす」ことで優遇効果を維持</text>

<text x="80" y="1170" fill="#4a5568" font-size="12">「内国法人が各事業年度において外国法人税を<tspan fill="#1a365d" font-weight="700">納付する</tspan>こととなる場合には…</text>
