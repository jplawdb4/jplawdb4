<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>移転価格ガイドブック 体系マップ</title>
<style>
body { margin: 0; padding: 20px; background: #f5f5f5; display: flex; justify-content: center; }
.container { max-width: 1400px; width: 100%; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div class="container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 2200" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#283593;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffebee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcdd2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2dfdb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e65100"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6a1b9a"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="2200" fill="#f5f5f5" rx="0"/>

  <!-- Title Banner -->
  <rect x="0" y="0" width="1400" height="90" fill="url(#headerGrad)" rx="0"/>
  <text x="700" y="38" text-anchor="middle" fill="white" font-size="28" font-weight="bold">移転価格税制の全体構造</text>
  <text x="700" y="68" text-anchor="middle" fill="#b3c6ff" font-size="16">NTA Transfer Pricing System — 体系マップ（国税庁 移転価格ガイドブック 2017年版 準拠）</text>

  <!-- ============================================ -->
  <!-- SECTION 1: 制度の基本構造 (Top) -->
  <!-- ============================================ -->
  <rect x="30" y="110" width="1340" height="340" rx="12" fill="white" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="110" width="1340" height="42" rx="12" fill="#1565c0"/>
  <rect x="30" y="132" width="1340" height="20" fill="#1565c0"/>
  <text x="700" y="138" text-anchor="middle" fill="white" font-size="18" font-weight="bold">❶ 移転価格税制の基本構造（昭和61年/1986年導入）</text>

  <!-- 目的 -->
  <rect x="60" y="168" width="300" height="120" rx="8" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.5"/>
  <text x="210" y="192" text-anchor="middle" fill="#0d47a1" font-size="15" font-weight="bold">目的</text>
  <text x="210" y="216" text-anchor="middle" fill="#1a237e" font-size="12">国外関連取引を通じた</text>
  <text x="210" y="234" text-anchor="middle" fill="#1a237e" font-size="12">所得の海外移転に対処し</text>
  <text x="210" y="252" text-anchor="middle" fill="#1a237e" font-size="12">適正な国際課税を実現</text>
  <text x="210" y="276" text-anchor="middle" fill="#555" font-size="10">（措置法 第66条の4 第1項）</text>

  <!-- 仕組み図 -->
  <rect x="390" y="168" width="580" height="265" rx="8" fill="#f8f9ff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="680" y="192" text-anchor="middle" fill="#0d47a1" font-size="15" font-weight="bold">独立企業間価格（Arm's Length Price）の仕組み</text>

  <!-- 国外関連取引 -->
  <rect x="410" y="208" width="250" height="100" rx="6" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1"/>
  <text x="535" y="226" text-anchor="middle" fill="#0d47a1" font-size="11" font-weight="bold">【国外関連取引（移転価格）】</text>
  <rect x="420" y="236" width="80" height="30" rx="4" fill="white" stroke="#90caf9"/>
  <text x="460" y="255" text-anchor="middle" fill="#333" font-size="10">対象法人</text>
  <text x="520" y="260" text-anchor="middle" fill="#c62828" font-size="11" font-weight="bold">110円→</text>
  <rect x="540" y="236" width="80" height="30" rx="4" fill="white" stroke="#90caf9"/>
  <text x="580" y="255" text-anchor="middle" fill="#333" font-size="10">国外関連者</text>
  <text x="535" y="300" text-anchor="middle" fill="#333" font-size="10">利益: 10円 ／ 利益: 40円</text>

  <!-- 第三者間取引 -->
  <rect x="690" y="208" width="260" height="100" rx="6" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1"/>
  <text x="820" y="226" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="bold">【第三者間取引（独立企業間価格）】</text>
  <rect x="700" y="236" width="90" height="30" rx="4" fill="white" stroke="#a5d6a7"/>
  <text x="745" y="255" text-anchor="middle" fill="#333" font-size="10">比較対象法人</text>
  <text x="810" y="260" text-anchor="middle" fill="#2e7d32" font-size="11" font-weight="bold">120円→</text>
  <rect x="830" y="236" width="80" height="30" rx="4" fill="white" stroke="#a5d6a7"/>
  <text x="870" y="255" text-anchor="middle" fill="#333" font-size="10">第三者</text>
  <text x="820" y="300" text-anchor="middle" fill="#333" font-size="10">利益: 20円 ／ 利益: 30円</text>

  <!-- 差額説明 -->
  <rect x="430" y="318" width="520" height="50" rx="6" fill="#fff8e1" stroke="#ffa000" stroke-width="1.5"/>
  <text x="690" y="338" text-anchor="middle" fill="#e65100" font-size="12" font-weight="bold">移転価格課税: 独立企業間価格(120円)と移転価格(110円)の差額 = 10円を所得に加算</text>
  <text x="690" y="356" text-anchor="middle" fill="#795548" font-size="10">→ 対象法人の利益を10円→20円に修正 ＝ 適正な国際課税の実現</text>

  <!-- 矢印: 国外関連取引 → 差額 -->
  <line x1="535" y1="308" x2="535" y2="318" stroke="#e65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="820" y1="308" x2="820" y2="318" stroke="#e65100" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- 国外関連者定義 -->
  <rect x="1000" y="168" width="340" height="120" rx="8" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.5"/>
  <text x="1170" y="192" text-anchor="middle" fill="#0d47a1" font-size="15" font-weight="bold">国外関連者</text>
  <text x="1170" y="216" text-anchor="middle" fill="#1a237e" font-size="12">50%以上の株式保有関係等の</text>
  <text x="1170" y="234" text-anchor="middle" fill="#1a237e" font-size="12">特殊の関係のある外国法人</text>
  <line x1="1170" y1="248" x2="1170" y2="248" stroke="#1565c0"/>
  <text x="1170" y="268" text-anchor="middle" fill="#555" font-size="11">OECD移転価格ガイドラインに</text>
  <text x="1170" y="284" text-anchor="middle" fill="#555" font-size="11">沿った算定方法を採用</text>

  <!-- BEPS背景 -->
  <rect x="1000" y="300" width="340" height="130" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="1170" y="324" text-anchor="middle" fill="#bf360c" font-size="14" font-weight="bold">BEPS プロジェクト</text>
  <text x="1170" y="346" text-anchor="middle" fill="#4e342e" font-size="11">2012年 OECD/G20 立上げ</text>
  <text x="1170" y="364" text-anchor="middle" fill="#4e342e" font-size="11">2015年 最終報告書公表</text>
  <text x="1170" y="382" text-anchor="middle" fill="#4e342e" font-size="11">→ 移転価格文書化制度を勧告</text>
  <text x="1170" y="400" text-anchor="middle" fill="#4e342e" font-size="11">→ 各国への透明性向上要請</text>
  <text x="1170" y="420" text-anchor="middle" fill="#999" font-size="10">行動13: 文書化 ／ 行動8-10: 価値創造</text>

  <!-- ============================================ -->
  <!-- SECTION 2: 文書化制度（三層構造） -->
  <!-- ============================================ -->
  <rect x="30" y="470" width="1340" height="360" rx="12" fill="white" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="470" width="1340" height="42" rx="12" fill="#2e7d32"/>
  <rect x="30" y="492" width="1340" height="20" fill="#2e7d32"/>
  <text x="700" y="498" text-anchor="middle" fill="white" font-size="18" font-weight="bold">❷ 移転価格文書化制度 — 三層構造（平成28年度税制改正 / 2016年）</text>

  <!-- ローカルファイル -->
  <rect x="60" y="530" width="400" height="280" rx="10" fill="url(#greenGrad)" stroke="#2e7d32" stroke-width="2"/>
  <rect x="60" y="530" width="400" height="36" rx="10" fill="#43a047"/>
  <rect x="60" y="548" width="400" height="18" fill="#43a047"/>
  <text x="260" y="554" text-anchor="middle" fill="white" font-size="15" font-weight="bold">イ ローカルファイル（Local File）</text>

  <text x="80" y="590" fill="#1b5e20" font-size="12" font-weight="bold">■ 内容</text>
  <text x="80" y="608" fill="#333" font-size="11">・独立企業間価格算定のための詳細情報</text>
  <text x="80" y="626" fill="#333" font-size="11">・取引内容、機能・リスク分析、損益明細</text>
  <text x="80" y="644" fill="#333" font-size="11">・算定方法の選定理由、比較対象取引</text>

  <text x="80" y="672" fill="#1b5e20" font-size="12" font-weight="bold">■ 同時文書化義務の基準</text>
  <rect x="80" y="680" width="360" height="44" rx="4" fill="white" stroke="#66bb6a"/>
  <text x="260" y="698" text-anchor="middle" fill="#c62828" font-size="12" font-weight="bold">国外関連取引合計額 50億円以上</text>
  <text x="260" y="716" text-anchor="middle" fill="#c62828" font-size="12" font-weight="bold">又は 無形資産取引合計額 3億円以上</text>

  <text x="80" y="744" fill="#1b5e20" font-size="12" font-weight="bold">■ 期限</text>
  <text x="80" y="762" fill="#333" font-size="11">確定申告書の提出期限までに作成・取得・保存</text>

  <text x="80" y="786" fill="#1b5e20" font-size="12" font-weight="bold">■ 適用開始</text>
  <text x="80" y="804" fill="#333" font-size="11">平成29(2017)年4月1日以後開始事業年度～</text>

  <!-- CbCレポート -->
  <rect x="500" y="530" width="400" height="280" rx="10" fill="url(#orangeGrad)" stroke="#e65100" stroke-width="2"/>
  <rect x="500" y="530" width="400" height="36" rx="10" fill="#ef6c00"/>
  <rect x="500" y="548" width="400" height="18" fill="#ef6c00"/>
  <text x="700" y="554" text-anchor="middle" fill="white" font-size="15" font-weight="bold">ロ CbCレポート（国別報告事項）</text>

  <text x="520" y="590" fill="#bf360c" font-size="12" font-weight="bold">■ 内容</text>
  <text x="520" y="608" fill="#333" font-size="11">・国/地域ごとの収入金額</text>
  <text x="520" y="626" fill="#333" font-size="11">・税引前当期利益、納付税額</text>
  <text x="520" y="644" fill="#333" font-size="11">・多国籍企業Gの国ごとの活動状況</text>

  <text x="520" y="672" fill="#bf360c" font-size="12" font-weight="bold">■ 対象基準</text>
  <rect x="520" y="680" width="360" height="30" rx="4" fill="white" stroke="#ffab40"/>
  <text x="700" y="700" text-anchor="middle" fill="#c62828" font-size="12" font-weight="bold">連結総収入金額 1,000億円以上</text>

  <text x="520" y="730" fill="#bf360c" font-size="12" font-weight="bold">■ 提供方法・期限</text>
  <text x="520" y="748" fill="#333" font-size="11">e-Taxにより所轄税務署長に提供</text>
  <text x="520" y="766" fill="#333" font-size="11">会計年度終了の翌日から1年以内</text>

  <text x="520" y="794" fill="#bf360c" font-size="12" font-weight="bold">■ 使用制限</text>
  <text x="520" y="812" fill="#555" font-size="10">所得配分方式の基礎に使用してはならない</text>

  <!-- マスターファイル -->
  <rect x="940" y="530" width="400" height="280" rx="10" fill="url(#purpleGrad)" stroke="#6a1b9a" stroke-width="2"/>
  <rect x="940" y="530" width="400" height="36" rx="10" fill="#7b1fa2"/>
  <rect x="940" y="548" width="400" height="18" fill="#7b1fa2"/>
  <text x="1140" y="554" text-anchor="middle" fill="white" font-size="15" font-weight="bold">ハ マスターファイル（事業概況報告事項）</text>

  <text x="960" y="590" fill="#4a148c" font-size="12" font-weight="bold">■ 内容</text>
  <text x="960" y="608" fill="#333" font-size="11">・多国籍企業Gの組織構造</text>
  <text x="960" y="626" fill="#333" font-size="11">・事業の概要、財務状況</text>
  <text x="960" y="644" fill="#333" font-size="11">・グローバルな活動の全体像</text>

  <text x="960" y="672" fill="#4a148c" font-size="12" font-weight="bold">■ 対象基準</text>
  <rect x="960" y="680" width="360" height="30" rx="4" fill="white" stroke="#ce93d8"/>
  <text x="1140" y="700" text-anchor="middle" fill="#c62828" font-size="12" font-weight="bold">連結総収入金額 1,000億円以上</text>

  <text x="960" y="730" fill="#4a148c" font-size="12" font-weight="bold">■ 提供方法・期限</text>
  <text x="960" y="748" fill="#333" font-size="11">e-Taxにより所轄税務署長に提供</text>
  <text x="960" y="766" fill="#333" font-size="11">会計年度終了の翌日から1年以内</text>

  <text x="960" y="794" fill="#4a148c" font-size="12" font-weight="bold">■ 適用開始</text>
  <text x="960" y="812" fill="#333" font-size="11">平成28(2016)年4月1日以後開始会計年度～</text>

  <!-- ============================================ -->
  <!-- SECTION 3: 執行体制 -->
  <!-- ============================================ -->
  <rect x="30" y="850" width="650" height="340" rx="12" fill="white" stroke="#546e7a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="850" width="650" height="42" rx="12" fill="#455a64"/>
  <rect x="30" y="872" width="650" height="20" fill="#455a64"/>
  <text x="355" y="878" text-anchor="middle" fill="white" font-size="18" font-weight="bold">❸ 移転価格税制の執行体制</text>

  <!-- 国税庁 -->
  <rect x="230" y="908" width="200" height="36" rx="6" fill="#37474f" stroke="#263238" stroke-width="1.5"/>
  <text x="330" y="931" text-anchor="middle" fill="white" font-size="14" font-weight="bold">国税庁本庁</text>

  <!-- 矢印 国税庁→国税局 -->
  <line x1="330" y1="944" x2="330" y2="966" stroke="#546e7a" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- 国税局 -->
  <rect x="130" y="970" width="400" height="50" rx="6" fill="#607d8b" stroke="#455a64" stroke-width="1.5"/>
  <text x="330" y="993" text-anchor="middle" fill="white" font-size="13" font-weight="bold">国税局（11局）＋ 沖縄国税事務所</text>
  <text x="330" y="1010" text-anchor="middle" fill="#e0e0e0" font-size="10">調査部（資本金1億円以上の大規模法人を管轄）</text>

  <!-- 専門部署 -->
  <rect x="55" y="1038" width="250" height="76" rx="6" fill="#eceff1" stroke="#78909c" stroke-width="1"/>
  <text x="180" y="1058" text-anchor="middle" fill="#37474f" font-size="11" font-weight="bold">移転価格専門部署</text>
  <text x="180" y="1076" text-anchor="middle" fill="#546e7a" font-size="10">東京局: 国際情報第一課・第二課</text>
  <text x="180" y="1090" text-anchor="middle" fill="#546e7a" font-size="10">大阪局: 国際情報第一課・第二課</text>
  <text x="180" y="1104" text-anchor="middle" fill="#546e7a" font-size="10">名古屋局: 国際情報課 等</text>

  <!-- 人員 -->
  <rect x="330" y="1038" width="180" height="76" rx="6" fill="#eceff1" stroke="#78909c" stroke-width="1"/>
  <text x="420" y="1058" text-anchor="middle" fill="#37474f" font-size="11" font-weight="bold">専任職員</text>
  <text x="420" y="1080" text-anchor="middle" fill="#c62828" font-size="20" font-weight="bold">約160名</text>
  <text x="420" y="1098" text-anchor="middle" fill="#546e7a" font-size="10">（2017年6月現在）</text>

  <!-- 矢印 国税局→部署 -->
  <line x1="230" y1="1020" x2="180" y2="1038" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="420" y1="1020" x2="420" y2="1038" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- 税務署 -->
  <rect x="540" y="1038" width="120" height="76" rx="6" fill="#eceff1" stroke="#78909c" stroke-width="1"/>
  <text x="600" y="1060" text-anchor="middle" fill="#37474f" font-size="11" font-weight="bold">税務署</text>
  <text x="600" y="1078" text-anchor="middle" fill="#546e7a" font-size="10">524署</text>
  <text x="600" y="1094" text-anchor="middle" fill="#546e7a" font-size="10">国際税務</text>
  <text x="600" y="1106" text-anchor="middle" fill="#546e7a" font-size="10">専門官等</text>

  <line x1="530" y1="1010" x2="600" y2="1038" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- 接続矢印: 制度基本構造→文書化 -->
  <line x1="700" y1="450" x2="700" y2="470" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- ============================================ -->
  <!-- SECTION 4: 事前確認制度（APA） -->
  <!-- ============================================ -->
  <rect x="720" y="850" width="650" height="340" rx="12" fill="white" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="720" y="850" width="650" height="42" rx="12" fill="#7b1fa2"/>
  <rect x="720" y="872" width="650" height="20" fill="#7b1fa2"/>
