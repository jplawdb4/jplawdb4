別冊 事例9 ── DCF法に準ずる方法と同等の方法を用いる場合
<span style="font-size:9px;font-weight:400;opacity:.7;display:block;">移転価格税制の適用に当たっての参考事例集 pp.58-60｜無形資産の譲渡取引における独立企業間価格の算定</span>
</div>

<!-- ===== 取引構造図 ===== -->
<rect x="12" y="54" width="876" height="190" rx="8" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
<foreignObject x="20" y="58" width="856" height="18">

<!-- 日本エリア -->
<rect x="30" y="80" width="300" height="110" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
<foreignObject x="36" y="82" width="80" height="14"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#1e40af;font-weight:600;">日本</div></foreignObject>
<rect x="50" y="96" width="260" height="60" rx="5" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<foreignObject x="56" y="98" width="248" height="56">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:9px;font-weight:700;color:#1e40af;">P社</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:2px;">グローバルに多様な製品の製造販売</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;margin-top:1px;">製品Aの独自技術を研究開発</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#dc2626;font-weight:600;">→ 特許権・ノウハウをS社に譲渡</div>
</foreignObject>

<!-- X国エリア -->
<rect x="420" y="80" width="460" height="110" rx="6" fill="#fefce8" stroke="#fcd34d"/>
<foreignObject x="426" y="82" width="80" height="14"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#b45309;font-weight:600;">X国</div></foreignObject>
<rect x="440" y="96" width="220" height="60" rx="5" fill="#fff" stroke="#b45309" stroke-width="1.5" filter="url(#sh)"/>
<foreignObject x="446" y="98" width="208" height="56">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:9px;font-weight:700;color:#b45309;">S社</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:2px;">製品Aの製造販売子会社</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;margin-top:1px;">R&D部門なし・独自広告宣伝なし</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;">単純な製造販売機能のみ</div>
</foreignObject>

<rect x="730" y="110" width="130" height="36" rx="5" fill="#fff" stroke="#64748b" filter="url(#sh)"/>
<foreignObject x="736" y="114" width="118" height="28">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:600;color:#64748b;">第三者</div>
</foreignObject>

<!-- 譲渡の矢印 -->
<line x1="310" y1="120" x2="436" y2="120" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arwRed)"/>
<foreignObject x="324" y="104" width="100" height="16">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#dc2626;text-align:center;font-weight:700;">特許権・ノウハウ<br/>譲渡</div>
</foreignObject>

<line x1="660" y1="126" x2="726" y2="126" stroke="#64748b" stroke-width="1.2" marker-end="url(#arw)"/>
<foreignObject x="670" y="112" width="50" height="14"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;text-align:center;">販売</div></foreignObject>

<!-- 譲渡の背景 -->
<foreignObject x="30" y="168" width="850" height="28">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;background:#fff;border-radius:4px;padding:4px 8px;border-left:3px solid #b45309;">
<span style="font-weight:600;">譲渡の背景：</span>X国の業績が非常に好調、今後も高水準の需要見込み → S社が事業責任を全般的に管理する方が効果的・効率的。譲渡時に支払対価の総額が確定。
</div>
</foreignObject>

<!-- ===== 比較可能性分析 ===== -->
<rect x="12" y="254" width="876" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
<foreignObject x="20" y="258" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#dc2626;">他の方法が適用できない理由</div>
</foreignObject>

<rect x="30" y="280" width="270" height="70" rx="4" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
<foreignObject x="36" y="284" width="258" height="64">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;font-weight:700;color:#dc2626;">CUP/RPM/CP/TNMM</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;line-height:1.4;">
独自技術の無形資産 → 比較対象取引なし<br/>
準ずる方法の比較対象取引も見いだせない
</div>
</foreignObject>

<rect x="315" y="280" width="270" height="70" rx="4" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
<foreignObject x="321" y="284" width="258" height="64">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;font-weight:700;color:#dc2626;">利益分割法</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;line-height:1.4;">
高度に統合された事業ではない<br/>
双方に独自の価値ある寄与が認められない<br/>
→ 利益分割法が適合する取引形態に該当しない
</div>
</foreignObject>

<rect x="600" y="280" width="280" height="70" rx="4" fill="#f0fdf4" stroke="#16a34a" filter="url(#sh)"/>
<foreignObject x="606" y="284" width="268" height="64">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;font-weight:700;color:#16a34a;">DCF法 → 適用可能</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;line-height:1.4;">
事業計画・特許残存期間・陳腐化状況から<br/>
利益を合理的に予測可能<br/>
合理的な割引率で割引現在価値を算出可能
</div>
</foreignObject>

<!-- ===== DCF法の算定プロセス ===== -->
<rect x="12" y="374" width="876" height="340" rx="8" fill="#faf5ff" stroke="#c4b5fd" filter="url(#sh)"/>
<foreignObject x="20" y="378" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#7c3aed;">DCF法に準ずる方法と同等の方法：算定プロセス</div>
</foreignObject>

<!-- Step 1 -->
<rect x="30" y="402" width="840" height="52" rx="5" fill="#ede9fe" stroke="#a78bfa" filter="url(#sh)"/>
<foreignObject x="36" y="406" width="828" height="46">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">Step 1：製品A事業全体の予測利益を算定</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:2px;">取締役会承認の事業計画、特許権の残存有効期間、技術の陳腐化状況等を考慮</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;margin-top:1px;">→ X国における製品A製造販売事業に係る各年度の予測利益を合理的に算出</div>
</foreignObject>

<!-- 下矢印 -->
<polygon points="450,456 460,464 440,464" fill="#7c3aed"/>

<!-- Step 2 -->
<rect x="30" y="468" width="840" height="68" rx="5" fill="#fff" stroke="#a78bfa" filter="url(#sh)"/>
<foreignObject x="36" y="472" width="828" height="62">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">Step 2：S社の通常利益（基本的機能に見合う利益）を控除</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:2px;">S社は単純な製造販売機能のみ → TNMM的な考え方でS社の機能に見合う通常の予測利益を計算</div>
</foreignObject>

<rect x="60" y="500" width="350" height="28" rx="4" fill="#fefce8" stroke="#fcd34d"/>
<foreignObject x="66" y="504" width="338" height="22">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#b45309;">S社の通常の予測利益 ＝ 同種事業・類似法人（独自機能なし）の利益率 x S社基準値</div>
</foreignObject>

<!-- 下矢印 -->
<polygon points="450,538 460,546 440,546" fill="#7c3aed"/>

<!-- Step 3 -->
<rect x="30" y="550" width="840" height="52" rx="5" fill="#fef2f2" stroke="#fca5a5" filter="url(#sh)"/>
<foreignObject x="36" y="554" width="828" height="46">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#dc2626;">Step 3：無形資産に係る予測利益を算定</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:2px;">製品A事業全体の予測利益 － S社の通常の予測利益 ＝ <span style="font-weight:700;">特許権・ノウハウに係る各年度の予測利益</span></div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;margin-top:1px;">（残余の予測利益が無形資産の価値に帰属する利益）</div>
</foreignObject>

<!-- 下矢印 -->
<polygon points="450,604 460,612 440,612" fill="#7c3aed"/>

<!-- Step 4 -->
<rect x="30" y="616" width="840" height="52" rx="5" fill="#f0fdf4" stroke="#86efac" filter="url(#sh)"/>
<foreignObject x="36" y="620" width="828" height="46">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#16a34a;">Step 4：割引現在価値を算出 → 独立企業間価格</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:2px;">各年度の無形資産予測利益を、合理的な割引率（市場データ等に基づく）で割引現在価値に換算</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;margin-top:1px;">PV = Σ [予測利益(t) / (1+r)^t] → この<span style="font-weight:600;">合計額が特許権・ノウハウの譲渡対価</span>（独立企業間価格）</div>
</foreignObject>

<!-- DCF数式のイメージ -->
<rect x="30" y="676" width="840" height="30" rx="4" fill="#ede9fe" stroke="#c4b5fd"/>
<foreignObject x="36" y="680" width="828" height="24">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#7c3aed;text-align:center;font-weight:600;">
独立企業間価格 ＝ Σ [ (事業予測利益(t) - S社通常予測利益(t)) / (1 + 割引率)^t ]　（t = 1, 2, ..., n年）
</div>
</foreignObject>

<!-- ===== 核心ポイント ===== -->
<rect x="12" y="724" width="876" height="152" rx="8" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#sh)"/>
<foreignObject x="20" y="728" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#16a34a;">核心ポイント</div>
</foreignObject>

<rect x="30" y="750" width="420" height="114" rx="5" fill="#fff" stroke="#16a34a" filter="url(#sh)"/>
<foreignObject x="36" y="754" width="408" height="108">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#16a34a;">DCF法が適切な場面</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:3px;line-height:1.5;">
・無形資産の<span style="font-weight:600;">独自性</span>により比較対象取引を選定できない<br/>
・利益分割法が適合する取引形態に<span style="font-weight:600;">該当しない</span><br/>
・無形資産の<span style="font-weight:600;">割引現在価値を適切に算出できる</span><br/>
・事業計画等から予測利益を<span style="font-weight:600;">合理的に予測可能</span><br/>
・合理的な割引率を算出するための市場データが入手可能
</div>
</foreignObject>

<rect x="460" y="750" width="420" height="114" rx="5" fill="#fff" stroke="#7c3aed" filter="url(#sh)"/>
<foreignObject x="466" y="754" width="408" height="108">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">DCF法の他の適用パターン</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:3px;line-height:1.5;">
<span style="font-weight:600;">利益分割法＋DCF法の併用：</span><br/>
法人・国外関連者双方が予測利益の発生に寄与する場合、<br/>
寄与度に応じて事業全体の予測利益を配分 → 無形資産に<br/>
帰属する予測利益を割引現在価値で算出<br/><br/>
<span style="font-weight:600;">事業譲渡への適用：</span><br/>
無形資産が他の資産等と一体として譲渡される場合、<br/>
事業全体の予測利益の割引現在価値＝譲渡対価
</div>
</foreignObject>

<!-- 根拠法令 -->
<foreignObject x="12" y="886" width="876" height="34">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;line-height:1.4;padding:4px 8px;background:#f1f5f9;border-radius:4px;">
<span style="font-weight:600;">根拠法令：</span>措置法66条の4②、施行令39条の12⑧六・七、措置法通達66の4(2)-1, 66の4(3)-1, 66の4(3)-3, 66の4(4)-1、事務運営指針4-1<br/>
<span style="font-weight:600;">関連：</span>「DCF法に準ずる方法と同等の方法」＝TNMM的な考え方で通常利益を控除し、残余利益の割引現在価値を算出する方法
</div>
</foreignObject>

<!-- 前後比較 -->
<foreignObject x="12" y="926" width="876" height="56">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;line-height:1.5;padding:4px 8px;background:#f8fafc;border-radius:4px;border:1px solid #e2e8f0;">
<span style="font-weight:600;">譲渡前後のS社の機能変化：</span><br/>
<span style="color:#64748b;">【譲渡前】</span>P社から使用許諾を受けて製造。R&D部門なし、独自広告宣伝なし、自らの販売計画で在庫管理・販売。<br/>
<span style="color:#64748b;">【譲渡後】</span>引き続きR&D活動は行わず、譲り受けた技術で製造。販売活動の機能に変化なし。→ S社は依然として<span style="font-weight:600;">単純な製造販売機能</span>のみ。
</div>
</foreignObject>
