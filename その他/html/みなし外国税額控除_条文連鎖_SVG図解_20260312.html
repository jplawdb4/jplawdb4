<text x="44" y="718" fill="#333" font-size="9.5" font-weight="bold">条文連鎖の要旨:</text>
<text x="44" y="734" fill="#333" font-size="9">条約23条3項が「みなし税率」を設定 → 23条2項「日本国の法令に従い」で国内法に橋渡し → 実施特例法12条が省令に委任</text>
<text x="44" y="748" fill="#333" font-size="9">→ 省令1条9号で「みなし外国税額」を定義し、省令10条で証明書類2種の添付を義務付け（69条25項の書類に「含むものとする」）</text>
<text x="44" y="762" fill="#333" font-size="9">→ 法人税法69条25項「<tspan fill="#c62828" font-weight="bold">場合に限り、適用する</tspan>」で添付＋保存が適用要件化 → 施行令142条の2第3項がみなし納付額の高率負担判定を規定</text>
<text x="44" y="776" fill="#333" font-size="9">→ 施行規則29条の4が添付・保存の具体的書類を列挙。69条28項は「<tspan fill="#7b1fa2" font-weight="bold">保存</tspan>」のみ救済し、「<tspan fill="#c62828" font-weight="bold">添付</tspan>」不備の救済規定は<tspan fill="#c62828" font-weight="bold">存在しない</tspan>。</text>
