<!-- ============ 第1層: 条約 ============ -->
<rect x="0" y="0" width="1080" height="400" fill="#e8eaf6" rx="0"/>
<rect x="0" y="0" width="1080" height="32" fill="#1a237e" rx="0"/>
<text x="20" y="22" fill="#fff" font-size="14" font-weight="bold">第1層　日中租税条約（条約）</text>

<!-- 10条2項 -->
<rect x="40" y="52" width="310" height="105" rx="8" fill="#fff" stroke="#1a237e" stroke-width="2" filter="url(#shadow)"/>
<rect x="40" y="52" width="310" height="28" rx="8" fill="#1a237e"/>
<rect x="40" y="72" width="310" height="8" fill="#1a237e"/>
<text x="195" y="70" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">第10条2項（配当の源泉税上限）</text>
<text x="55" y="100" fill="#333" font-size="11.5">配当に対して租税を課することができる。</text>
<text x="55" y="117" fill="#333" font-size="11.5">その租税の額は、当該配当の額の</text>
<text x="55" y="134" fill="#c62828" font-size="12.5" font-weight="bold">十パーセントを超えないものとする。</text>

<!-- 23条3項 -->
<rect x="420" y="52" width="620" height="180" rx="8" fill="#fff" stroke="#1a237e" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="420" y="52" width="620" height="28" rx="8" fill="#1a237e"/>
<rect x="420" y="72" width="620" height="8" fill="#1a237e"/>
<text x="730" y="70" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">第23条3項 ★★ みなし外国税額控除（Tax Sparing）本体</text>
<text x="435" y="100" fill="#333" font-size="11.5">2(a)に規定する控除の適用上、中国の租税は、</text>
<text x="435" y="117" fill="#333" font-size="11.5" font-weight="bold">次の率で支払われたものとみなす。</text>
<text x="435" y="142" fill="#333" font-size="11.5">(a) 第十条2の規定が適用される配当：</text>
<rect x="455" y="150" width="210" height="22" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
<text x="460" y="166" fill="#c62828" font-size="11.5" font-weight="bold">合弁企業 → 10%</text>
<rect x="680" y="150" width="210" height="22" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
<text x="685" y="166" fill="#c62828" font-size="11.5" font-weight="bold">その他の配当 → 20%</text>
<text x="435" y="195" fill="#333" font-size="11">(b) 利子 → 10%　(c) 使用料 → 20%</text>
<text x="435" y="215" fill="#757575" font-size="10">※ 中国が実際に課税した税率にかかわらず上記のみなし税率で控除を計算</text>

<!-- 10条→23条3項の参照矢印 -->
<line x1="350" y1="100" x2="418" y2="100" stroke="#1a237e" stroke-width="2" marker-end="url(#ah-blue)"/>
<text x="358" y="93" fill="#1a237e" font-size="9.5" font-weight="bold">「第十条2の</text>
<text x="358" y="104" fill="#1a237e" font-size="9.5" font-weight="bold">規定が適用</text>
<text x="358" y="115" fill="#1a237e" font-size="9.5" font-weight="bold">される配当」</text>

<!-- 23条4項 -->
<rect x="420" y="248" width="400" height="60" rx="8" fill="#fff" stroke="#1a237e" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="420" y="248" width="400" height="24" rx="8" fill="#303f9f"/>
<rect x="420" y="266" width="400" height="6" fill="#303f9f"/>
<text x="620" y="265" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">第23条4項（奨励措置のみなし納付）</text>
<text x="435" y="293" fill="#333" font-size="10.5">免除・軽減・還付が行われないとしたならば納付されたとみられる</text>
<text x="435" y="307" fill="#333" font-size="10.5">中国の租税の額を<tspan font-weight="bold" fill="#1a237e">含むものとみなす</tspan></text>

<!-- 23条2項 -->
<rect x="40" y="325" width="400" height="62" rx="8" fill="#fff" stroke="#1a237e" stroke-width="2" filter="url(#shadow)"/>
<rect x="40" y="325" width="400" height="24" rx="8" fill="#1a237e"/>
<rect x="40" y="343" width="400" height="6" fill="#1a237e"/>
<text x="240" y="342" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">第23条2項（日本側FTCの基本規定）</text>
<text x="55" y="370" fill="#1a237e" font-size="11.5" font-weight="bold">「日本国の法令に従い」</text>
<text x="256" y="370" fill="#333" font-size="10.5">→ FTCの計算方法・手続は国内法に委ねる</text>

<!-- 23条3項→23条2項 接続 -->
<path d="M 550 232 L 550 250 Q 550 260 540 260 L 290 260 Q 280 260 280 270 L 280 323" stroke="#1a237e" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#ah-blue)"/>
<text x="460" y="258" fill="#1a237e" font-size="9">2(a)の控除の適用上</text>


<!-- ============ 第2層: 実施特例法 ============ -->
<rect x="0" y="410" width="1080" height="130" fill="#f3e5f5" rx="0"/>
<rect x="0" y="410" width="1080" height="32" fill="#4a148c" rx="0"/>
<text x="20" y="432" fill="#fff" font-size="14" font-weight="bold">第2層　租税条約等実施特例法（法律）</text>

<rect x="60" y="458" width="400" height="62" rx="8" fill="#fff" stroke="#4a148c" stroke-width="2" filter="url(#shadow)"/>
<rect x="60" y="458" width="400" height="24" rx="8" fill="#4a148c"/>
<rect x="60" y="476" width="400" height="6" fill="#4a148c"/>
<text x="260" y="476" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">第12条（省令への包括委任）</text>
<text x="75" y="500" fill="#4a148c" font-size="11.5" font-weight="bold">「租税条約等の実施…に関し必要な事項は、</text>
<text x="75" y="516" fill="#4a148c" font-size="11.5" font-weight="bold"> 財務省令で定める」</text>

<line x1="240" y1="387" x2="240" y2="456" stroke="#555" stroke-width="2.5" marker-end="url(#ah)"/>
<rect x="160" y="393" width="160" height="18" rx="3" fill="#fff" stroke="#999" stroke-width="0.7"/>
<text x="240" y="406" text-anchor="middle" fill="#555" font-size="9.5">「日本国の法令に従い」</text>


<!-- ============ 第3層: 実施特例法省令 ============ -->
<rect x="0" y="550" width="1080" height="170" fill="#ffebee" rx="0"/>
<rect x="0" y="550" width="1080" height="32" fill="#b71c1c" rx="0"/>
<text x="20" y="572" fill="#fff" font-size="14" font-weight="bold">第3層　実施特例法省令（財務省令）</text>

<!-- 1条9号 -->
<rect x="60" y="598" width="380" height="55" rx="8" fill="#fff" stroke="#b71c1c" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="60" y="598" width="380" height="22" rx="8" fill="#b71c1c"/>
<rect x="60" y="614" width="380" height="6" fill="#b71c1c"/>
<text x="250" y="614" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="bold">第1条9号（みなし外国税額の定義）</text>
<text x="75" y="639" fill="#333" font-size="10.5">条約の規定に基づき<tspan fill="#b71c1c" font-weight="bold">納付したものとみなされるもの</tspan></text>

<!-- 10条 -->
<rect x="500" y="598" width="530" height="105" rx="8" fill="#fff" stroke="#b71c1c" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="500" y="598" width="530" height="24" rx="8" fill="#b71c1c"/>
<rect x="500" y="616" width="530" height="6" fill="#b71c1c"/>
<text x="765" y="616" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">第10条 ★★ みなし外国税額の控除の申告手続等</text>
<text x="515" y="640" fill="#333" font-size="10.5">法人税法69条1項の外国法人税の額のうちに<tspan font-weight="bold" fill="#b71c1c">みなし外国税額</tspan></text>
<text x="515" y="656" fill="#333" font-size="10.5">があるときは、次に掲げる書類には、</text>
<rect x="520" y="662" width="490" height="32" rx="4" fill="#ffcdd2" stroke="#c62828" stroke-width="1"/>
<text x="530" y="678" fill="#b71c1c" font-size="11" font-weight="bold">① 控除を受けるべきみなし外国税額の計算明細書</text>
<text x="530" y="693" fill="#b71c1c" font-size="11" font-weight="bold">② 当該みなし外国税額を証明する書類　を含むものとする</text>

<!-- 1条9号→10条 -->
<line x1="440" y1="625" x2="498" y2="625" stroke="#b71c1c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ah-red)"/>

<!-- 実施特例法12条→省令 矢印 -->
<line x1="260" y1="520" x2="260" y2="596" stroke="#555" stroke-width="2" marker-end="url(#ah)"/>
<rect x="195" y="529" width="130" height="16" rx="3" fill="#fff" stroke="#999" stroke-width="0.7"/>
<text x="260" y="542" text-anchor="middle" fill="#555" font-size="9">第12条に基づく委任</text>


<!-- ============ 第4層: 法人税法 ============ -->
<rect x="0" y="730" width="1080" height="310" fill="#fff3e0" rx="0"/>
<rect x="0" y="730" width="1080" height="32" fill="#e65100" rx="0"/>
<text x="20" y="752" fill="#fff" font-size="14" font-weight="bold">第4層　法人税法（法律）第69条（外国税額の控除）</text>

<!-- 69条1項 -->
<rect x="60" y="778" width="460" height="72" rx="8" fill="#fff" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
<rect x="60" y="778" width="460" height="24" rx="8" fill="#e65100"/>
<rect x="60" y="796" width="460" height="6" fill="#e65100"/>
<text x="290" y="796" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">第69条1項（FTCの基本規定）</text>
<text x="75" y="819" fill="#333" font-size="10.5">外国法人税を納付することとなる場合には…</text>
<text x="75" y="835" fill="#333" font-size="10.5"><tspan fill="#1b5e20" font-weight="bold">政令で定めるところにより計算した金額（控除限度額）</tspan>を限度として</text>
<text x="75" y="847" fill="#333" font-size="10.5">…<tspan fill="#e65100" font-weight="bold">控除対象外国法人税の額</tspan>を法人税の額から控除する</text>

<!-- 69条25項 -->
<rect x="60" y="868" width="660" height="82" rx="8" fill="#fff" stroke="#c62828" stroke-width="2.5" filter="url(#shadow)"/>
<rect x="60" y="868" width="660" height="24" rx="8" fill="#c62828"/>
<rect x="60" y="886" width="660" height="6" fill="#c62828"/>
<text x="390" y="886" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">第69条25項 ★★★ 適用要件 —「場合に限り、適用する」</text>
<text x="75" y="910" fill="#333" font-size="10.5">確定申告書…に…<tspan fill="#006064" font-weight="bold">財務省令で定める事項を記載した書類の添付</tspan>があり、</text>
<text x="75" y="926" fill="#333" font-size="10.5">かつ、…<tspan fill="#006064" font-weight="bold">財務省令で定める書類を保存</tspan>している</text>
<text x="75" y="945" fill="#c62828" font-size="13" font-weight="bold">場合に限り、適用する。</text>
<text x="247" y="945" fill="#333" font-size="10.5">…当該明細書に<tspan fill="#e65100" font-weight="bold">記載された金額を限度</tspan>とする。</text>

<!-- 69条28項 -->
<rect x="60" y="968" width="460" height="58" rx="8" fill="#fff" stroke="#7b1fa2" stroke-width="2" filter="url(#shadow)"/>
<rect x="60" y="968" width="460" height="22" rx="8" fill="#7b1fa2"/>
<rect x="60" y="984" width="460" height="6" fill="#7b1fa2"/>
<text x="290" y="985" text-anchor="middle" fill="#fff" font-size="11.5" font-weight="bold">第69条28項（救済規定 — 「保存」のみ）</text>
<text x="75" y="1006" fill="#333" font-size="10.5">…財務省令で定める書類の<tspan fill="#7b1fa2" font-weight="bold">保存がない場合</tspan>…</text>
<text x="75" y="1022" fill="#333" font-size="10.5"><tspan fill="#7b1fa2" font-weight="bold">やむを得ない事情があると認めるとき</tspan>は…適用することができる</text>

<!-- 行き止まり注記 -->
<rect x="540" y="968" width="500" height="58" rx="8" fill="url(#deadend-bg)" stroke="#c62828" stroke-width="2" stroke-dasharray="6,3"/>
<text x="555" y="989" fill="#c62828" font-size="12" font-weight="bold">「添付」不備の救済規定は存在しない</text>
<text x="555" y="1006" fill="#c62828" font-size="10.5">28項は「保存がない場合」のみ。「添付がない場合」は射程外。</text>
<text x="555" y="1022" fill="#c62828" font-size="10.5">→ 添付忘れ = 条約上の権利の永久喪失（全救済経路閉鎖）</text>

<!-- 省令10条→69条25項 矢印 -->
<path d="M 765 703 L 765 730 Q 765 745 750 745 L 480 745 Q 465 745 465 760 L 465 866" stroke="#b71c1c" stroke-width="2.5" fill="none" marker-end="url(#ah-red)"/>
<rect x="500" y="738" width="260" height="18" rx="3" fill="#ffcdd2" stroke="#c62828" stroke-width="0.7"/>
<text x="630" y="751" text-anchor="middle" fill="#b71c1c" font-size="9.5" font-weight="bold">省令10条の書類を「含むものとする」→添付書類に追加</text>

<rect x="0" y="1050" width="1080" height="200" fill="#e8f5e9" rx="0"/>
<rect x="0" y="1050" width="1080" height="32" fill="#1b5e20" rx="0"/>
<text x="20" y="1072" fill="#fff" font-size="14" font-weight="bold">第5層　法人税法施行令（政令）</text>

<rect x="60" y="1098" width="280" height="50" rx="8" fill="#fff" stroke="#1b5e20" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="60" y="1098" width="280" height="22" rx="8" fill="#1b5e20"/>
<rect x="60" y="1114" width="280" height="6" fill="#1b5e20"/>
<text x="200" y="1114" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">第141条（外国法人税の範囲）</text>
<text x="75" y="1137" fill="#333" font-size="10">外国の法令に基づき…所得を課税標準</text>
<text x="75" y="1149" fill="#333" font-size="10">として課される税を外国法人税とする</text>

<!-- 142条 -->
<rect x="370" y="1098" width="280" height="50" rx="8" fill="#fff" stroke="#1b5e20" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="370" y="1098" width="280" height="22" rx="8" fill="#1b5e20"/>
<rect x="370" y="1114" width="280" height="6" fill="#1b5e20"/>
<text x="510" y="1114" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">第142条（控除限度額の計算）</text>

<text x="385" y="1149" fill="#333" font-size="10">= <tspan font-weight="bold" fill="#1b5e20">控除限度額</tspan></text>

<!-- 142条の2第3項 -->
<rect x="680" y="1098" width="360" height="50" rx="8" fill="#fff" stroke="#1b5e20" stroke-width="2" filter="url(#shadow)"/>
<rect x="680" y="1098" width="360" height="22" rx="8" fill="#2e7d32"/>
<rect x="680" y="1114" width="360" height="6" fill="#2e7d32"/>
<text x="860" y="1114" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">第142条の2第3項 ★ みなし納付額優先</text>
<text x="695" y="1137" fill="#333" font-size="10">みなし納付額が含まれる場合、外国法人税の</text>

<!-- 69条1項→施行令 矢印 -->
<path d="M 290 850 L 290 860 Q 290 870 280 870 L 50 870 Q 30 870 30 890 L 30 1055 Q 30 1070 50 1070 L 50 1110 Q 50 1120 60 1120 L 58 1120" stroke="#1b5e20" stroke-width="2" fill="none" marker-end="url(#ah-green)"/>

<!-- 142条の2 追加情報 -->
