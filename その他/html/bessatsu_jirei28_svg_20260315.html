    <span style="font-size:7px;color:#475569;">しかし両社の合意により対価を収受しないことに変更</span>
    <span style="font-size:7px;color:#dc2626;">→ S社への財政的支援目的</span>
  </div>
</foreignObject>

    <span style="font-size:7px;color:#475569;">「親会社としての責務」という認識</span>
    <span style="font-size:7px;color:#1e40af;">→ 財政的支援の意図は直接的に認められない</span>

</foreignObject>

  </div>
</foreignObject>

<foreignObject x="25" y="404" width="120" height="50">

</foreignObject>
<rect x="150" y="404" width="365" height="50" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>

  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 8px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#dc2626;font-weight:700;">該当する</span>
    <span style="font-size:7px;color:#475569;">対価を収受する契約があるのにS社支援目的で免除</span>
    <span style="font-size:7px;color:#dc2626;">→ 意識的に対価を放棄 = 経済的利益の無償供与</span>

</foreignObject>
<rect x="520" y="404" width="355" height="50" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
<foreignObject x="520" y="404" width="355" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 8px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#1e40af;font-weight:700;">直ちには該当しない</span>
    <span style="font-size:7px;color:#475569;">対価を収受していないだけでは有償性がないとはいえない</span>
    <span style="font-size:7px;color:#1e40af;">→ 「無償の供与」の事実が認められない場合がある</span>
  </div>
</foreignObject>

<rect x="150" y="460" width="365" height="42" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>

  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 8px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:8px;color:#dc2626;font-weight:700;">措法66条の4第3項（寄附金の損金不算入）</span>
    <span style="font-size:7px;color:#475569;">→ 移転価格税制に基づく課税の対象とはならない</span>

    <span style="font-size:8px;color:#1e40af;font-weight:700;">措法66条の4第1項（移転価格税制）</span>
    <span style="font-size:7px;color:#475569;">→ 移転価格税制に基づく課税の対象として検討</span>

  </div>
</foreignObject>

<!-- 核心カード1 -->

<rect x="25" y="652" width="425" height="22" rx="7" fill="#dc2626"/>

<foreignObject x="25" y="652" width="425" height="22">

</foreignObject>
<foreignObject x="25" y="674" width="425" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">対価を収受していない事実のみでは判断できない。</span>
    <span style="font-size:7.5px;color:#dc2626;font-weight:600;">意識的に対価を放棄したか否かが決定的な差異。</span>
  </div>
</foreignObject>

<!-- 核心カード2 -->
<rect x="455" y="652" width="420" height="72" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="652" width="420" height="22" rx="7" fill="#1e40af"/>
<rect x="455" y="668" width="420" height="6" fill="#1e40af"/>
<foreignObject x="455" y="652" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">2. 契約の有無と支援意図が判定の鍵</div>
