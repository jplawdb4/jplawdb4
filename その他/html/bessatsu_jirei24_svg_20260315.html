</foreignObject>
<foreignObject x="25" y="764" width="425" height="90">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:7.5px;color:#475569;">取締役会承認の事業計画（10年間）が基礎。</span>
    <span style="font-size:7px;color:#1e40af;font-weight:600;">外部評価機関の検証を経て客観的合理性を確保。</span>
    <span style="font-size:7px;color:#94a3b8;">事務運営指針4-13の検証基準に適合が必要。</span>
  </div>
</foreignObject>

<rect x="455" y="742" width="420" height="112" rx="7" fill="#fff" stroke="#b45309" stroke-width="1.5" filter="url(#sh)"/>

<foreignObject x="455" y="764" width="420" height="90">

    <span style="font-size:7.5px;color:#475569;">S社が製品Ａ事業のみを行うため、S社のWACCが適用可能。</span>
    <span style="font-size:7px;color:#b45309;font-weight:600;">CAPM: 安全利子率 + β × 市場ﾘｽｸ・ﾌﾟﾚﾐｱﾑ。</span>
    <span style="font-size:7px;color:#94a3b8;">変動ﾘｽｸ等に応じた合理性の検討が必要。</span>
  </div>
