<html lang="ja">

<title>インボイス制度Q&A 全体構造SVG図解</title>
<style>
  body { margin: 0; padding: 16px; background: #f5f5f5; display: flex; justify-content: center; }
  .container { max-width: 1860px; width: 100%; }
  .container svg { width: 100%; height: auto; display: block; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  @media print { body { background: #fff; padding: 0; } .container svg { box-shadow: none; } }
</style>
</head>
<body>
<div class="container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 2800" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="section1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="section2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="section3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="section4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd0"/>
    </linearGradient>
    <linearGradient id="section5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="section6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-1%" y="-1%" width="102%" height="102%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e65100"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c62828"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="2800" fill="#f5f5f5" rx="0"/>

  <!-- ==================== HEADER ==================== -->
  <rect x="0" y="0" width="1400" height="100" fill="url(#headerGrad)" rx="0"/>
  <text x="700" y="45" text-anchor="middle" fill="white" font-size="28" font-weight="bold">インボイス制度（適格請求書等保存方式）全体構造図</text>
  <text x="700" y="75" text-anchor="middle" fill="#90caf9" font-size="15">消費税の仕入税額控除制度 ― 令和5年10月1日開始 ｜ 国税庁Q&amp;A（令和7年6月改訂）に基づく</text>

  <!-- ==================== SECTION I: 制度概要 ==================== -->
  <rect x="30" y="120" width="1340" height="280" rx="12" fill="url(#section1)" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="120" width="1340" height="42" rx="12" fill="#1565c0"/>
  <rect x="30" y="148" width="1340" height="14" fill="#1565c0"/>
  <text x="700" y="148" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Ⅰ  制度の概要 ― 適格請求書等保存方式（インボイス制度）とは</text>

  <!-- Timeline -->
  <line x1="80" y1="195" x2="1320" y2="195" stroke="#1565c0" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <circle cx="300" cy="195" r="8" fill="#1565c0"/>
  <text x="300" y="220" text-anchor="middle" fill="#0d47a1" font-size="12" font-weight="bold">～R1.9.30</text>
  <text x="300" y="236" text-anchor="middle" fill="#333" font-size="11">請求書等保存方式</text>

  <circle cx="620" cy="195" r="8" fill="#1565c0"/>
  <text x="620" y="220" text-anchor="middle" fill="#0d47a1" font-size="12" font-weight="bold">R1.10.1</text>
  <text x="620" y="236" text-anchor="middle" fill="#333" font-size="11">区分記載請求書等保存方式</text>
  <text x="620" y="251" text-anchor="middle" fill="#666" font-size="10">（軽減税率制度開始）</text>

  <circle cx="940" cy="195" r="8" fill="#e65100"/>
  <rect x="870" y="180" width="140" height="30" rx="15" fill="#e65100" opacity="0.9"/>
  <text x="940" y="200" text-anchor="middle" fill="white" font-size="12" font-weight="bold">R5.10.1 開始</text>
  <text x="940" y="236" text-anchor="middle" fill="#333" font-size="11">適格請求書等保存方式</text>
  <text x="940" y="251" text-anchor="middle" fill="#e65100" font-size="11" font-weight="bold">（インボイス制度）</text>

  <!-- Core concept boxes -->
  <rect x="60" y="270" width="300" height="110" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="60" y="270" width="300" height="28" rx="8" fill="#1565c0"/>
  <rect x="60" y="290" width="300" height="8" fill="#1565c0"/>
  <text x="210" y="291" text-anchor="middle" fill="white" font-size="13" font-weight="bold">制度の基本原則</text>
  <text x="75" y="318" fill="#333" font-size="11">• 複数税率（8%/10%）に対応した仕入税額控除方式</text>
  <text x="75" y="336" fill="#333" font-size="11">• 適格請求書発行事業者からの適格請求書の</text>
  <text x="82" y="352" fill="#333" font-size="11">  保存が仕入税額控除の原則的要件</text>
  <text x="75" y="370" fill="#333" font-size="11">• 帳簿＋請求書等の保存が必要（消法30⑦⑧⑨）</text>

  <rect x="390" y="270" width="300" height="110" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="390" y="270" width="300" height="28" rx="8" fill="#1565c0"/>
  <rect x="390" y="290" width="300" height="8" fill="#1565c0"/>
  <text x="540" y="291" text-anchor="middle" fill="white" font-size="13" font-weight="bold">制度の3つの柱</text>
  <text x="405" y="318" fill="#0d47a1" font-size="12" font-weight="bold">❶ 登録制度</text>
  <text x="490" y="318" fill="#333" font-size="11">（適格請求書発行事業者）</text>
  <text x="405" y="340" fill="#2e7d32" font-size="12" font-weight="bold">❷ 交付義務</text>
  <text x="490" y="340" fill="#333" font-size="11">（適格請求書の交付・保存）</text>
  <text x="405" y="362" fill="#e65100" font-size="12" font-weight="bold">❸ 仕入税額控除</text>
  <text x="520" y="362" fill="#333" font-size="11">（要件・計算方法）</text>

  <rect x="720" y="270" width="310" height="110" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="720" y="270" width="310" height="28" rx="8" fill="#1565c0"/>
  <rect x="720" y="290" width="310" height="8" fill="#1565c0"/>
  <text x="875" y="291" text-anchor="middle" fill="white" font-size="13" font-weight="bold">適格請求書の種類</text>
  <text x="735" y="318" fill="#333" font-size="11">① 適格請求書（フルインボイス）</text>
  <text x="735" y="336" fill="#333" font-size="11">② 適格簡易請求書（簡易インボイス）</text>
  <text x="735" y="354" fill="#333" font-size="11">③ 適格返還請求書（返還インボイス）</text>
  <text x="735" y="372" fill="#666" font-size="10">※ 電磁的記録（電子インボイス）での提供も可</text>

  <rect x="1060" y="270" width="280" height="110" rx="8" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="1060" y="270" width="280" height="28" rx="8" fill="#f57f17"/>
  <rect x="1060" y="290" width="280" height="8" fill="#f57f17"/>
  <text x="1200" y="291" text-anchor="middle" fill="white" font-size="13" font-weight="bold">⚠ 禁止事項・罰則</text>
  <text x="1075" y="318" fill="#333" font-size="11">• 非登録者による適格請求書類似書類</text>
  <text x="1082" y="334" fill="#333" font-size="11">の交付は禁止</text>
  <text x="1075" y="352" fill="#333" font-size="11">• 登録者による虚偽記載の交付も禁止</text>
  <text x="1075" y="370" fill="#c62828" font-size="11" font-weight="bold">→ 1年以下の拘禁刑 or 50万円以下の罰金</text>

  <!-- ==================== SECTION II: 登録制度 ==================== -->
  <rect x="30" y="420" width="1340" height="520" rx="12" fill="url(#section2)" stroke="#2e7d32" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="420" width="1340" height="42" rx="12" fill="#2e7d32"/>
  <rect x="30" y="448" width="1340" height="14" fill="#2e7d32"/>
  <text x="700" y="448" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Ⅱ  適格請求書発行事業者の登録制度</text>

  <!-- Registration Flow -->
  <rect x="60" y="480" width="620" height="290" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="370" y="505" text-anchor="middle" fill="#1b5e20" font-size="15" font-weight="bold">登録の手続フロー</text>

  <!-- Flow diagram -->
  <rect x="80" y="520" width="160" height="50" rx="25" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="160" y="540" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">課税事業者</text>
  <text x="160" y="556" text-anchor="middle" fill="#555" font-size="10">（登録の前提条件）</text>

  <line x1="240" y1="545" x2="280" y2="545" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="290" y="520" width="160" height="50" rx="6" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="370" y="542" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">登録申請書提出</text>
  <text x="370" y="558" text-anchor="middle" fill="#555" font-size="10">e-Tax or 郵送</text>

  <line x1="450" y1="545" x2="490" y2="545" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="500" y="520" width="160" height="50" rx="6" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="580" y="542" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">税務署長が登録</text>
  <text x="580" y="558" text-anchor="middle" fill="#555" font-size="10">登録簿に登載</text>

  <line x1="580" y1="570" x2="580" y2="600" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="480" y="605" width="180" height="45" rx="6" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="570" y="624" text-anchor="middle" fill="white" font-size="12" font-weight="bold">登録通知＋公表</text>
  <text x="570" y="640" text-anchor="middle" fill="white" font-size="10">公表サイトに掲載</text>

  <!-- Registration number structure -->
  <rect x="80" y="665" width="580" height="85" rx="6" fill="#f1f8e9" stroke="#689f38" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="90" y="685" fill="#33691e" font-size="12" font-weight="bold">登録番号の構成（問18）</text>
  <text x="90" y="706" fill="#333" font-size="12">法人：</text>
  <rect x="140" y="693" width="220" height="20" rx="4" fill="#dcedc8" stroke="#689f38" stroke-width="1"/>
  <text x="250" y="708" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">T ＋ 法人番号（13桁）</text>
  <text x="90" y="732" fill="#333" font-size="12">個人等：</text>
  <rect x="155" y="719" width="280" height="20" rx="4" fill="#dcedc8" stroke="#689f38" stroke-width="1"/>
  <text x="295" y="734" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">T ＋ 固有番号（13桁）※個人番号ではない</text>

  <!-- Right column: Special cases -->
  <rect x="710" y="480" width="640" height="290" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1030" y="505" text-anchor="middle" fill="#1b5e20" font-size="15" font-weight="bold">免税事業者の経過措置（問7）</text>

  <rect x="730" y="520" width="600" height="60" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
  <text x="1030" y="542" text-anchor="middle" fill="#e65100" font-size="13" font-weight="bold">R5.10.1 ～ R11.9.30 の属する課税期間中に登録する場合</text>
  <text x="1030" y="560" text-anchor="middle" fill="#333" font-size="11">→ 課税選択届出書の提出不要。登録希望日（提出日から15日以降）から課税事業者に</text>

  <rect x="730" y="595" width="290" height="80" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="875" y="615" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">新設法人の特例（問11）</text>
  <text x="740" y="635" fill="#333" font-size="11">事業開始日の課税期間末日までに</text>
  <text x="740" y="650" fill="#333" font-size="11">登録申請書を提出 → 課税期間の</text>
  <text x="740" y="665" fill="#333" font-size="11">初日に登録を受けたものとみなす</text>

  <rect x="1040" y="595" width="290" height="80" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="1185" y="615" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">相続の場合（問15）</text>
  <text x="1050" y="635" fill="#333" font-size="11">被相続人の死亡届出書を提出</text>
  <text x="1050" y="650" fill="#333" font-size="11">相続人は新たに登録申請が必要</text>
  <text x="1050" y="665" fill="#333" font-size="11">みなし措置あり（最大4か月間）</text>

  <rect x="730" y="690" width="600" height="65" rx="6" fill="#ffebee" stroke="#ef5350" stroke-width="1"/>
  <text x="1030" y="710" text-anchor="middle" fill="#c62828" font-size="12" font-weight="bold">登録の取りやめ・取消し（問13・16）</text>
  <text x="740" y="730" fill="#333" font-size="11">取りやめ：登録取消届出書を提出（翌課税期間初日から15日前まで → 翌期失効 / 過ぎた場合 → 翌々期失効）</text>
  <text x="740" y="745" fill="#333" font-size="11">取消し：1年以上所在不明、事業廃止、合併消滅、法令違反等 → 税務署長が登録取消し可能</text>

  <!-- Public disclosure -->
  <rect x="60" y="785" width="1290" height="140" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="700" y="810" text-anchor="middle" fill="#1b5e20" font-size="15" font-weight="bold">公表制度（問19-22）― 国税庁適格請求書発行事業者公表サイト</text>

  <rect x="80" y="825" width="380" height="85" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="270" y="845" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">法定公表事項</text>
  <text x="95" y="863" fill="#333" font-size="11">① 氏名又は名称  ② 法人の本店所在地</text>
  <text x="95" y="879" fill="#333" font-size="11">③ 国外事業者の事務所所在地  ④ 登録番号</text>
  <text x="95" y="895" fill="#333" font-size="11">⑤ 登録年月日  ⑥ 登録取消/失効年月日</text>

  <rect x="480" y="825" width="300" height="85" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="630" y="845" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">任意公表事項（申出による）</text>
  <text x="495" y="863" fill="#333" font-size="11">個人：主たる屋号、主たる事務所所在地</text>
  <text x="495" y="879" fill="#333" font-size="11">人格なき社団：本店/主たる事務所所在地</text>
  <text x="495" y="895" fill="#666" font-size="10">※ 旧姓・通称での公表も申出により可能</text>

  <rect x="800" y="825" width="530" height="85" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="1065" y="845" text-anchor="middle" fill="#1b5e20" font-size="12" font-weight="bold">確認方法（問20-21）</text>
  <text x="815" y="863" fill="#333" font-size="11">• 登録番号で検索（公表サイト）  • Web-API機能（システム連携）</text>
  <text x="815" y="879" fill="#333" font-size="11">• 公表情報ダウンロード機能（全件/差分）</text>
  <text x="815" y="895" fill="#c62828" font-size="11">※ スクレイピングは利用規約上禁止</text>

  <!-- ==================== SECTION III: 適格請求書の記載事項 ==================== -->
  <rect x="30" y="960" width="1340" height="460" rx="12" fill="url(#section3)" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="960" width="1340" height="42" rx="12" fill="#e65100"/>
  <rect x="30" y="988" width="1340" height="14" fill="#e65100"/>
  <text x="700" y="988" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Ⅲ  適格請求書の記載事項と交付義務</text>

  <!-- Three invoice types side by side -->
  <rect x="60" y="1020" width="410" height="310" rx="8" fill="white" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="60" y="1020" width="410" height="30" rx="8" fill="#e65100"/>
  <rect x="60" y="1042" width="410" height="8" fill="#e65100"/>
  <text x="265" y="1042" text-anchor="middle" fill="white" font-size="14" font-weight="bold">適格請求書（問54）</text>

  <text x="75" y="1070" fill="#e65100" font-size="12" font-weight="bold">① 発行事業者の氏名又は名称＋登録番号</text>
  <text x="75" y="1090" fill="#e65100" font-size="12" font-weight="bold">② 取引年月日</text>
  <text x="75" y="1110" fill="#e65100" font-size="12" font-weight="bold">③ 取引内容</text>
  <text x="90" y="1126" fill="#555" font-size="10">（軽減対象の場合はその旨の記載）</text>
  <text x="75" y="1146" fill="#e65100" font-size="12" font-weight="bold">④ 税率ごとの合計額＋適用税率</text>
  <text x="90" y="1162" fill="#555" font-size="10">（税抜又は税込を税率ごとに区分）</text>
  <text x="75" y="1182" fill="#e65100" font-size="12" font-weight="bold">⑤ 税率ごとの消費税額等</text>
  <text x="90" y="1198" fill="#555" font-size="10">（端数処理：1インボイスにつき税率ごとに1回）</text>
  <text x="75" y="1218" fill="#e65100" font-size="12" font-weight="bold">⑥ 交付を受ける事業者の氏名又は名称</text>

  <rect x="75" y="1240" width="380" height="75" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="85" y="1258" fill="#bf360c" font-size="11" font-weight="bold">様式の定めなし（問25）</text>
  <text x="85" y="1275" fill="#333" font-size="11">手書き領収書も可（問26）、屋号での記載も可（問55）</text>
  <text x="85" y="1292" fill="#333" font-size="11">複数書類の組合せで要件充足も可（問65・67）</text>
  <text x="85" y="1309" fill="#333" font-size="11">書面＋電磁的記録の組合せも可（問72）</text>

  <!-- 適格簡易請求書 -->
  <rect x="500" y="1020" width="390" height="310" rx="8" fill="white" stroke="#f57f17" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="500" y="1020" width="390" height="30" rx="8" fill="#f57f17"/>
  <rect x="500" y="1042" width="390" height="8" fill="#f57f17"/>
  <text x="695" y="1042" text-anchor="middle" fill="white" font-size="14" font-weight="bold">適格簡易請求書（問58）</text>

  <text x="515" y="1070" fill="#333" font-size="12">記載事項は適格請求書から一部簡略化：</text>
  <text x="515" y="1092" fill="#f57f17" font-size="12" font-weight="bold">• 「交付を受ける事業者名」が不要</text>
  <text x="515" y="1112" fill="#f57f17" font-size="12" font-weight="bold">• 「税率ごとの消費税額等」又は</text>
  <text x="525" y="1130" fill="#f57f17" font-size="12" font-weight="bold">  「適用税率」のいずれか一方でOK</text>

  <rect x="515" y="1148" width="360" height="90" rx="4" fill="#fff8e1" stroke="#fbc02d" stroke-width="1"/>
  <text x="695" y="1168" text-anchor="middle" fill="#f57f17" font-size="12" font-weight="bold">交付できる事業（問24）</text>
  <text x="525" y="1186" fill="#333" font-size="11">① 小売業  ② 飲食店業  ③ 写真業</text>
  <text x="525" y="1202" fill="#333" font-size="11">④ 旅行業  ⑤ タクシー業</text>
  <text x="525" y="1218" fill="#333" font-size="11">⑥ 駐車場業（不特定多数対象に限る）</text>
  <text x="525" y="1234" fill="#333" font-size="11">⑦ その他不特定多数への資産の譲渡等を行う事業</text>

  <rect x="515" y="1248" width="360" height="65" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="525" y="1268" fill="#333" font-size="11">ホテル・旅館、航空サービス、レンタカー等も</text>
  <text x="525" y="1285" fill="#333" font-size="11">「不特定多数」に該当。セミナー参加費等も</text>
  <text x="525" y="1302" fill="#333" font-size="11">多数参加者向けなら適格簡易請求書の対象（問24-2）</text>

  <!-- 適格返還請求書 -->
  <rect x="920" y="1020" width="430" height="220" rx="8" fill="white" stroke="#ad1457" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="920" y="1020" width="430" height="30" rx="8" fill="#ad1457"/>
  <rect x="920" y="1042" width="430" height="8" fill="#ad1457"/>
  <text x="1135" y="1042" text-anchor="middle" fill="white" font-size="14" font-weight="bold">適格返還請求書（問27・60）</text>

  <text x="935" y="1070" fill="#333" font-size="12">返品・値引き等の対価の返還等を行う場合に交付</text>
  <text x="935" y="1095" fill="#ad1457" font-size="12" font-weight="bold">記載事項：</text>
  <text x="935" y="1115" fill="#333" font-size="11">• 発行事業者の氏名又は名称＋登録番号</text>
  <text x="935" y="1133" fill="#333" font-size="11">• 対価返還等の年月日＋元の取引の年月日</text>
  <text x="935" y="1151" fill="#333" font-size="11">• 対価返還等の内容（軽減対象の旨含む）</text>
  <text x="935" y="1169" fill="#333" font-size="11">• 税率ごとの対価返還等の合計額</text>
  <text x="935" y="1187" fill="#333" font-size="11">• 税率ごとの消費税額等又は適用税率</text>

  <rect x="935" y="1200" width="400" height="28" rx="4" fill="#fce4ec" stroke="#ad1457" stroke-width="1"/>
  <text x="1135" y="1219" text-anchor="middle" fill="#ad1457" font-size="12" font-weight="bold">適格請求書と一の書類で交付可能（問62）</text>

  <!-- 交付義務免除 -->
  <rect x="920" y="1260" width="430" height="145" rx="8" fill="white" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLight)"/>
  <rect x="920" y="1260" width="430" height="30" rx="8" fill="#6a1b9a"/>
  <rect x="920" y="1282" width="430" height="8" fill="#6a1b9a"/>
  <text x="1135" y="1282" text-anchor="middle" fill="white" font-size="14" font-weight="bold">交付義務が免除される取引（問41-47）</text>

  <text x="935" y="1308" fill="#333" font-size="11">① 3万円未満の公共交通機関による旅客運送</text>
  <text x="935" y="1325" fill="#333" font-size="11">② 卸売市場を通じた生鮮食料品等の委託販売</text>
  <text x="935" y="1342" fill="#333" font-size="11">③ 農協等を通じた農林水産物の委託販売</text>
  <text x="935" y="1359" fill="#333" font-size="11">④ 3万円未満の自動販売機・自動サービス機</text>
  <text x="935" y="1376" fill="#333" font-size="11">⑤ 郵便切手類のみを対価とする郵便・貨物サービス</text>
  <text x="940" y="1393" fill="#666" font-size="10">  （郵便ポストに差し出されたものに限る）</text>

  <!-- 少額返還インボイス免除 -->
  <rect x="60" y="1345" width="410" height="55" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="265" y="1367" text-anchor="middle" fill="#c62828" font-size="13" font-weight="bold">少額な対価返還等の免除（問28）</text>
  <text x="75" y="1387" fill="#333" font-size="11">税込1万円未満の対価返還等 → 適格返還請求書の交付義務免除</text>

  <!-- ==================== SECTION IV: 仕入税額控除の要件 ==================== -->
  <rect x="30" y="1440" width="1340" height="580" rx="12" fill="url(#section4)" stroke="#c62828" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="1440" width="1340" height="42" rx="12" fill="#c62828"/>
  <rect x="30" y="1468" width="1340" height="14" fill="#c62828"/>
  <text x="700" y="1468" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Ⅳ  仕入税額控除の要件</text>

  <!-- Main requirement -->
  <rect x="60" y="1500" width="640" height="130" rx="8" fill="white" stroke="#c62828" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="380" y="1525" text-anchor="middle" fill="#b71c1c" font-size="15" font-weight="bold">原則的要件（問84）</text>
  <rect x="80" y="1540" width="260" height="40" rx="6" fill="#ffcdd2" stroke="#ef5350" stroke-width="1"/>
  <text x="210" y="1565" text-anchor="middle" fill="#b71c1c" font-size="13" font-weight="bold">帳簿の保存</text>
  <text x="355" y="1565" text-anchor="middle" fill="#b71c1c" font-size="20" font-weight="bold">＋</text>
  <rect x="380" y="1540" width="300" height="40" rx="6" fill="#ffcdd2" stroke="#ef5350" stroke-width="1"/>
  <text x="530" y="1565" text-anchor="middle" fill="#b71c1c" font-size="13" font-weight="bold">適格請求書等の保存</text>
  <text x="80" y="1610" fill="#333" font-size="11">保存すべき請求書等：適格請求書、適格簡易請求書、電磁的記録、仕入明細書等</text>

  <!-- 帳簿のみの保存 -->
  <rect x="730" y="1500" width="620" height="260" rx="8" fill="white" stroke="#c62828" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1040" y="1525" text-anchor="middle" fill="#b71c1c" font-size="15" font-weight="bold">帳簿のみの保存で仕入税額控除が認められる場合（問104-108）</text>

  <text x="745" y="1548" fill="#333" font-size="11">① 3万円未満の公共交通機関による旅客の運送</text>
  <text x="745" y="1566" fill="#333" font-size="11">② 適格簡易請求書の記載事項ある入場券等が使用時回収される取引</text>
  <text x="745" y="1584" fill="#333" font-size="11">③ 古物商の非登録者からの古物購入（棚卸資産に限る）</text>
  <text x="745" y="1602" fill="#333" font-size="11">④ 質屋の非登録者からの質物取得（棚卸資産に限る）</text>
  <text x="745" y="1620" fill="#333" font-size="11">⑤ 宅建業者の非登録者からの建物購入（棚卸資産に限る）</text>
  <text x="745" y="1638" fill="#333" font-size="11">⑥ 非登録者からの再生資源・再生部品の購入（棚卸資産に限る）</text>
  <text x="745" y="1656" fill="#333" font-size="11">⑦ 3万円未満の自動販売機・自動サービス機からの購入等</text>
  <text x="745" y="1674" fill="#333" font-size="11">⑧ 郵便切手類のみを対価とする郵便・貨物サービス（ポスト差出し）</text>
  <text x="745" y="1692" fill="#333" font-size="11">⑨ 従業員等への出張旅費・宿泊費・日当・通勤手当</text>

  <rect x="745" y="1705" width="585" height="40" rx="4" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="1037" y="1720" text-anchor="middle" fill="#e65100" font-size="11" font-weight="bold">帳簿には「住所等」の記載追加が必要（①③～⑥は住所等の代わりに特例記載）</text>
  <text x="1037" y="1735" text-anchor="middle" fill="#e65100" font-size="11">⑦⑧は「○○市 自動販売機」「郵便役務」等の記載、⑨は「出張旅費等」の記載（問110）</text>

  <!-- 仕入明細書 -->
  <rect x="60" y="1650" width="640" height="115" rx="8" fill="white" stroke="#c62828" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="380" y="1675" text-anchor="middle" fill="#b71c1c" font-size="14" font-weight="bold">仕入明細書による仕入税額控除（問86-91）</text>
  <text x="75" y="1698" fill="#333" font-size="11">• 買手が作成する仕入明細書でも、適格請求書の記載事項を満たし、売手の確認を受ければ可</text>
  <text x="75" y="1716" fill="#333" font-size="11">• 相手方の確認方法：送付後一定期間内に連絡なければ確認済みとする方法も可</text>
  <text x="75" y="1734" fill="#333" font-size="11">• 仕入明細書に返品等の記載がある場合、別途の適格返還請求書は不要（問90）</text>
  <text x="75" y="1752" fill="#333" font-size="11">• 仕入明細書と適格請求書を一の書類で交付することも可能（問91）</text>

  <!-- 帳簿記載事項 -->
  <rect x="60" y="1780" width="640" height="80" rx="8" fill="white" stroke="#c62828" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="380" y="1805" text-anchor="middle" fill="#b71c1c" font-size="14" font-weight="bold">帳簿の記載事項（問109）</text>
  <text x="75" y="1828" fill="#333" font-size="11">① 課税仕入れの相手方の氏名又は名称  ② 取引年月日  ③ 取引の内容（軽減対象の旨含む）</text>
  <text x="75" y="1846" fill="#333" font-size="11">④ 課税仕入れに係る支払対価の額 ※帳簿のみ保存の場合は「住所又は所在地」の追加記載が必要</text>

  <!-- 電磁的記録の保存 -->
  <rect x="730" y="1780" width="620" height="80" rx="8" fill="white" stroke="#c62828" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1040" y="1805" text-anchor="middle" fill="#b71c1c" font-size="14" font-weight="bold">電磁的記録の保存（問85・102・103）</text>
  <text x="745" y="1828" fill="#333" font-size="11">• 電子データで提供を受けた適格請求書は、電帳法に準じた方法で保存</text>
  <text x="745" y="1846" fill="#333" font-size="11">• 出力書面の保存のみでは不可（R6.1.1以後）、ただし検索要件の不要特例あり</text>

  <!-- 立替金 -->
  <rect x="60" y="1875" width="640" height="65" rx="8" fill="white" stroke="#c62828" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="380" y="1900" text-anchor="middle" fill="#b71c1c" font-size="14" font-weight="bold">立替金の取扱い（問94）</text>
  <text x="75" y="1923" fill="#333" font-size="11">立替払の適格請求書は立替者名義 → 立替金精算書等で経費の明細を別途確認し保存する必要あり</text>

  <!-- ETC/ATM -->
  <rect x="730" y="1875" width="620" height="65" rx="8" fill="white" stroke="#c62828" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1040" y="1900" text-anchor="middle" fill="#b71c1c" font-size="14" font-weight="bold">高速道路ETC・ATM手数料等（問103・103-2）</text>
  <text x="745" y="1923" fill="#333" font-size="11">ETC：クレジットカード利用明細では不可 → ETC利用照会サービスの利用明細書等を保存</text>

  <!-- ==================== SECTION V: 経過措置・特例 ==================== -->
  <rect x="30" y="1960" width="1340" height="420" rx="12" fill="url(#section5)" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="1960" width="1340" height="42" rx="12" fill="#6a1b9a"/>
  <rect x="30" y="1988" width="1340" height="14" fill="#6a1b9a"/>
  <text x="700" y="1988" text-anchor="middle" fill="white" font-size="20" font-weight="bold">Ⅴ  経過措置・特例</text>

  <!-- 免税事業者からの仕入れ経過措置 -->
  <rect x="60" y="2020" width="640" height="180" rx="8" fill="white" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="380" y="2045" text-anchor="middle" fill="#4a148c" font-size="15" font-weight="bold">免税事業者等からの仕入れに係る経過措置（問113・130）</text>

  <!-- Timeline for 経過措置 -->
  <line x1="80" y1="2075" x2="670" y2="2075" stroke="#6a1b9a" stroke-width="2"/>
  <circle cx="120" cy="2075" r="6" fill="#6a1b9a"/>
  <circle cx="350" cy="2075" r="6" fill="#6a1b9a"/>
  <circle cx="580" cy="2075" r="6" fill="#6a1b9a"/>

  <text x="120" y="2095" text-anchor="middle" fill="#4a148c" font-size="11" font-weight="bold">R5.10.1</text>
  <text x="350" y="2095" text-anchor="middle" fill="#4a148c" font-size="11" font-weight="bold">R8.10.1</text>
  <text x="580" y="2095" text-anchor="middle" fill="#4a148c" font-size="11" font-weight="bold">R11.10.1</text>

  <rect x="130" y="2105" width="210" height="35" rx="4" fill="#e1bee7" stroke="#7b1fa2" stroke-width="1"/>
  <text x="235" y="2127" text-anchor="middle" fill="#4a148c" font-size="13" font-weight="bold">80% 控除可能</text>

  <rect x="360" y="2105" width="210" height="35" rx="4" fill="#ce93d8" stroke="#7b1fa2" stroke-width="1"/>
  <text x="465" y="2127" text-anchor="middle" fill="white" font-size="13" font-weight="bold">50% 控除可能</text>

  <rect x="590" y="2105" width="90" height="35" rx="4" fill="#9c27b0" stroke="#7b1fa2" stroke-width="1"/>
  <text x="635" y="2127" text-anchor="middle" fill="white" font-size="13" font-weight="bold">控除不可</text>

  <text x="75" y="2165" fill="#333" font-size="11">• 区分記載請求書等と同等の書類の保存＋帳簿に「経過措置の適用を受ける旨」の記載が必要</text>
  <text x="75" y="2183" fill="#333" font-size="11">• 登録番号の記載がない請求書等に基づく課税仕入れに一律適用は不可（登録者の分は全額控除）（問113-2）</text>

  <!-- ２割特例 -->
  <rect x="730" y="2020" width="620" height="180" rx="8" fill="white" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1040" y="2045" text-anchor="middle" fill="#4a148c" font-size="15" font-weight="bold">２割特例（問114-117）</text>

  <rect x="750" y="2060" width="580" height="45" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
  <text x="1040" y="2080" text-anchor="middle" fill="#4a148c" font-size="12" font-weight="bold">登録により課税事業者となった免税事業者の納税額軽減措置</text>
  <text x="1040" y="2096" text-anchor="middle" fill="#333" font-size="11">納付税額 ＝ 売上税額 × 20%（仕入税額を売上税額の80%とみなす）</text>

  <text x="750" y="2125" fill="#333" font-size="11">適用期間：R5.10.1を含む課税期間～R8.9.30を含む課税期間</text>
  <text x="750" y="2145" fill="#333" font-size="11">適用不可：基準期間の課税売上高が1,000万円超の課税期間など（問115・116）</text>
  <text x="750" y="2165" fill="#333" font-size="11">確定申告書に付記することで適用（届出不要）</text>
  <text x="750" y="2185" fill="#333" font-size="11">２割特例適用後 → 翌課税期間中に簡易課税選択届出書を提出で簡易課税へ移行可（問117）</text>

  <!-- 少額特例 -->
  <rect x="60" y="2220" width="640" height="145" rx="8" fill="white" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="380" y="2245" text-anchor="middle" fill="#4a148c" font-size="15" font-weight="bold">少額特例（一定規模以下の事業者の負担軽減）（問111・112）</text>

  <rect x="80" y="2260" width="600" height="35" rx="4" fill="#ede7f6" stroke="#7e57c2" stroke-width="1"/>
  <text x="380" y="2282" text-anchor="middle" fill="#4a148c" font-size="12" font-weight="bold">1万円未満の課税仕入れ → 帳簿のみの保存で仕入税額控除OK</text>

  <text x="75" y="2315" fill="#333" font-size="11">対象事業者：基準期間の課税売上高が1億円以下、又は特定期間の課税売上高が5,000万円以下</text>
  <text x="75" y="2335" fill="#333" font-size="11">適用期間：R5.10.1 ～ R11.9.30</text>
  <text x="75" y="2355" fill="#333" font-size="11">判定単位：一回の取引の課税仕入れに係る税込金額（一商品ごとではない）（問112）</text>

  <!-- 簡易課税との関係 -->
  <rect x="730" y="2220" width="620" height="145" rx="8" fill="white" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1040" y="2245" text-anchor="middle" fill="#4a148c" font-size="15" font-weight="bold">簡易課税制度との関係（問9）</text>

  <text x="745" y="2270" fill="#333" font-size="11">• 簡易課税を選択している事業者は、適格請求書等の保存は仕入税額控除の要件ではない</text>
  <text x="745" y="2290" fill="#333" font-size="11">• ただし、適格請求書発行事業者としての交付義務は課される</text>

  <rect x="750" y="2305" width="580" height="45" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
