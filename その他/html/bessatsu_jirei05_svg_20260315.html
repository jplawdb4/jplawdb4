<!-- ===== Section 2: 「本来の業務に付随した役務提供」の判定フロー ===== -->
<rect x="16" y="382" width="868" height="24" rx="4" fill="#1e40af"/>
<foreignObject x="26" y="384" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">2. 「総原価の額 = 独立企業間価格」の適用判定フロー</div>
</foreignObject>

<rect x="30" y="418" width="854" height="200" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="40" y="422" width="834" height="192">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8.5px;font-weight:700;color:#7c3aed;margin-bottom:8px;">事務運営指針3-11(2) に基づく判定（3条件全てYesで「総原価＝独立企業間価格」適用可）</div>
    <div style="display:flex;gap:8px;">
      <!-- Q1 -->
      <div style="flex:1;">
        <div style="background:#faf5ff;border:1.5px solid #7c3aed;border-radius:8px;padding:8px;text-align:center;margin-bottom:6px;">
          <div style="font-size:7.5px;font-weight:700;color:#7c3aed;">Q1: 本来の業務に付随した役務提供か？</div>
        </div>
        <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:6px;text-align:center;">
          <div style="font-size:8px;font-weight:700;color:#16a34a;">Yes</div>
          <div style="font-size:6.5px;color:#166534;margin-top:2px;">P社の本来業務は部品a販売。<br/>設備の保守・点検はこれに付随。</div>
        </div>
      </div>
      <!-- Q2 -->
      <div style="flex:1;">
        <div style="background:#faf5ff;border:1.5px solid #7c3aed;border-radius:8px;padding:8px;text-align:center;margin-bottom:6px;">
          <div style="font-size:7.5px;font-weight:700;color:#7c3aed;">Q2: 費用が原価総額の相当部分を占めるか？</div>
        </div>
        <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:6px;text-align:center;">
          <div style="font-size:8px;font-weight:700;color:#16a34a;">No（相当部分ではない）</div>
          <div style="font-size:6.5px;color:#166534;margin-top:2px;">年延べ2ヶ月・3名の出張費用<br/>→ P社原価の相当部分を占めない</div>
        </div>
      </div>
      <!-- Q3 -->
      <div style="flex:1;">
        <div style="background:#faf5ff;border:1.5px solid #7c3aed;border-radius:8px;padding:8px;text-align:center;margin-bottom:6px;">
          <div style="font-size:7.5px;font-weight:700;color:#7c3aed;">Q3: 役務提供に無形資産を使用しているか？</div>
        </div>
        <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:6px;text-align:center;">
          <div style="font-size:8px;font-weight:700;color:#16a34a;">No（使用していない）</div>
          <div style="font-size:6.5px;color:#166534;margin-top:2px;">独自性のない保守・点検。<br/>P社の製造ノウハウ等は不使用。</div>
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-top:8px;">
      <div style="display:inline-block;background:#16a34a;color:#fff;padding:5px 20px;border-radius:20px;font-size:8px;font-weight:700;">
        3条件クリア → 総原価の額にマークアップ不要 → 総原価 = 独立企業間価格
      </div>
    </div>
  </div>
</foreignObject>

<!-- ===== Section 3: 総原価の構成 ===== -->
<rect x="16" y="632" width="868" height="24" rx="4" fill="#b45309"/>
<foreignObject x="26" y="634" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">3. 総原価の構成要素</div>
</foreignObject>

<rect x="30" y="668" width="854" height="100" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="40" y="672" width="834" height="92">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8.5px;font-weight:700;color:#b45309;margin-bottom:6px;">独立企業間価格 = 総原価（直接費 + 間接費）｜マークアップなし</div>
    <div style="display:flex;gap:8px;">
      <div style="flex:1;background:#eff6ff;border-radius:6px;padding:6px 8px;">
        <div style="font-size:7.5px;font-weight:700;color:#1e40af;margin-bottom:3px;">直接費</div>
        <div style="font-size:6.5px;color:#1e3a8a;line-height:1.5;">
          &#x25CF; 出張旅費・交通費<br/>
          &#x25CF; 滞在費<br/>
          &#x25CF; 出張者の出張期間対応給与・賞与・退職給付費用<br/>
          &#x25CF; その他出張に要した費用
        </div>
      </div>
      <div style="font-size:14px;color:#94a3b8;display:flex;align-items:center;">+</div>
      <div style="flex:1;background:#fefce8;border-radius:6px;padding:6px 8px;">
        <div style="font-size:7.5px;font-weight:700;color:#b45309;margin-bottom:3px;">間接費（合理的基準で配賦）</div>
        <div style="font-size:6.5px;color:#92400e;line-height:1.5;">
          &#x25CF; 担当部門の一般管理費<br/>
          &#x25CF; 補助部門の一般管理費等
        </div>
      </div>
      <div style="font-size:14px;color:#94a3b8;display:flex;align-items:center;">=</div>
      <div style="flex:1;background:#f0fdf4;border-radius:6px;padding:6px 8px;">
        <div style="font-size:7.5px;font-weight:700;color:#16a34a;margin-bottom:3px;">独立企業間価格</div>
        <div style="font-size:6.5px;color:#166534;line-height:1.5;">
          &#x25CF; 通常の利潤（マークアップ）は不要<br/>
          &#x25CF; 現行: 対価の支払いなし（0円）<br/>
          &#x25CF; 差額が移転価格課税の対象
        </div>
      </div>
    </div>
  </div>
</foreignObject>

<!-- ===== Section 4: 判定・結論 ===== -->
<rect x="16" y="784" width="868" height="24" rx="4" fill="#16a34a"/>
<foreignObject x="26" y="786" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">4. 判定・結論</div>
</foreignObject>

<rect x="30" y="822" width="854" height="72" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="826" width="834" height="64">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#166534;">
    <div style="font-size:9px;font-weight:700;margin-bottom:4px;">結論: 原価基準法に準ずる方法と同等の方法を最も適切な方法として選定</div>
    <div style="line-height:1.6;">
      P社がS社に行う<span style="font-weight:700;">製造設備の保守・点検等の役務提供</span>について、役務提供の総原価の額を独立企業間価格とする。<br/>
      本来の業務に付随した役務提供であり、費用が相当部分を占めず、無形資産も不使用のため、マークアップ不要。<br/>
      <span style="font-size:6.5px;color:#15803d;">※ 部品aの販売取引はCUP法で検証済み（同一価格のため問題なし）。役務提供取引は別途検証が必要。</span>
    </div>
  </div>
</foreignObject>

<!-- ===== Section 5: 核心ポイント ===== -->
<rect x="16" y="910" width="868" height="24" rx="4" fill="#7c3aed"/>
<foreignObject x="26" y="912" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">5. 核心ポイント</div>
</foreignObject>

<rect x="30" y="946" width="280" height="68" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="40" y="950" width="260" height="60">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8px;font-weight:700;color:#7c3aed;margin-bottom:3px;">棚卸資産 + 役務提供 = 別々に検証</div>
    <div style="line-height:1.4;">P社はS社と棚卸資産の取引（部品a）と役務提供取引の両方を行っている。それぞれ別の算定方法で検証する必要がある。</div>
  </div>
</foreignObject>

<rect x="322" y="946" width="270" height="68" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="332" y="950" width="250" height="60">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8px;font-weight:700;color:#7c3aed;margin-bottom:3px;">マークアップ不要の3条件</div>
    <div style="line-height:1.4;">(1)本来業務に付随 (2)費用が相当部分を占めない (3)無形資産不使用。1つでも不充足なら通常のCP法等を適用（マークアップ必要）。</div>
  </div>
</foreignObject>

<rect x="604" y="946" width="280" height="68" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="614" y="950" width="260" height="60">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8px;font-weight:700;color:#dc2626;margin-bottom:3px;">対価ゼロは移転価格リスク</div>
    <div style="line-height:1.4;">現行は無償で役務提供。総原価の額が独立企業間価格であるから、対価ゼロとの差額（=総原価全額）が移転価格課税の対象となりうる。</div>
  </div>
</foreignObject>
