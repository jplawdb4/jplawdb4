<!-- ======== SECTION 3: 価格調整措置の判定フロー ======== -->

<!-- Step 1 -->
<rect x="25" y="434" width="850" height="48" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="434" width="60" height="48" rx="7" fill="#1e40af"/>
<rect x="79" y="434" width="6" height="48" fill="#1e40af"/>

</foreignObject>
<foreignObject x="90" y="434" width="600" height="48">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;height:100%;padding:0 10px;font-family:'Noto Sans JP',sans-serif;">
    <span style="font-size:8px;color:#1e293b;font-weight:600;">特定無形資産国外関連取引に該当するか?</span>
  </div>
</foreignObject>
<foreignObject x="700" y="434" width="170" height="48">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-family:'Noto Sans JP',sans-serif;">
    <span style="font-size:8px;font-weight:700;color:#dc2626;">Yes ── 該当</span>
  </div>
</foreignObject>

<!-- Q1の理由 -->
<rect x="90" y="486" width="780" height="38" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<foreignObject x="90" y="486" width="780" height="38">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:flex-start;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;gap:2px;">
    <span style="font-size:7px;color:#475569;">- 独自性・個別性により比較対象取引の発見が困難 / 重要な価値を有し所得の源泉</span>
    <span style="font-size:7px;color:#475569;">- 新規事業で過去の収益実績なし / 参照できる他社実績もなし → 著しく不確実な要素あり</span>
  </div>
</foreignObject>

<!-- Step 2 -->
<rect x="25" y="532" width="850" height="48" rx="7" fill="#fff" stroke="#b45309" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="532" width="60" height="48" rx="7" fill="#b45309"/>
<rect x="79" y="532" width="6" height="48" fill="#b45309"/>
<foreignObject x="25" y="532" width="60" height="48">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">Q2</div>
</foreignObject>
<foreignObject x="90" y="532" width="600" height="48">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;height:100%;padding:0 10px;font-family:'Noto Sans JP',sans-serif;">
    <span style="font-size:8px;color:#1e293b;font-weight:600;">措法66条の4第9項の免除規定に該当するか?</span>
  </div>
</foreignObject>
<foreignObject x="700" y="532" width="170" height="48">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-family:'Noto Sans JP',sans-serif;">
    <span style="font-size:8px;font-weight:700;color:#dc2626;">No ── 非該当</span>
  </div>
</foreignObject>

<!-- Q2の理由 -->
<rect x="90" y="584" width="780" height="38" rx="5" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
<foreignObject x="90" y="584" width="780" height="38">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:flex-start;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;gap:2px;">
    <span style="font-size:7px;color:#dc2626;font-weight:600;">P社は評価算定書を入手済み → 取引時に合理的に予測可能だった</span>
    <span style="font-size:7px;color:#475569;">合理的な理由なく大幅超過の可能性を考慮せず → 免除の要件を満たさない</span>
  </div>
</foreignObject>

<!-- Step 3 -->
<rect x="25" y="630" width="850" height="68" rx="7" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
<rect x="25" y="630" width="60" height="68" rx="7" fill="#16a34a"/>
<rect x="79" y="630" width="6" height="68" fill="#16a34a"/>
<foreignObject x="25" y="630" width="60" height="68">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">結論</div>
</foreignObject>
<foreignObject x="90" y="630" width="780" height="68">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:flex-start;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;gap:3px;">
    <span style="font-size:8px;font-weight:700;color:#16a34a;">DCF法で再計算した対価 &gt; 当初対価 × 120% → 価格調整措置を適用</span>
    <span style="font-size:7.5px;color:#475569;">評価算定書の加重平均方法（50:50）は客観的事実に基づき通常用いられる方法と認定</span>
    <span style="font-size:7px;color:#94a3b8;">ただし書（120%以内なら不適用）には非該当</span>
  </div>
</foreignObject>

<!-- ======== SECTION 4: 核心ポイント ======== -->

<text x="450" y="742" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af" font-family="'Noto Sans JP',sans-serif">事例25の核心 ── 4つのポイント</text>

<!-- 核心カード（2x2） -->

<rect x="25" y="754" width="425" height="22" rx="7" fill="#dc2626"/>
<rect x="25" y="770" width="425" height="6" fill="#dc2626"/>
<foreignObject x="25" y="754" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">1. 「予測可能だったか」が免除の分水嶺</div>
</foreignObject>
<foreignObject x="25" y="776" width="425" height="76">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:7.5px;color:#475569;">取引時に評価算定書を入手済み → 予測可能だった。</span>
    <span style="font-size:7px;color:#dc2626;font-weight:600;">合理的理由なく無視 → 免除規定（第9項）は不適用。</span>
  </div>
</foreignObject>

<rect x="455" y="754" width="420" height="98" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="754" width="420" height="22" rx="7" fill="#7c3aed"/>
<rect x="455" y="770" width="420" height="6" fill="#7c3aed"/>
<foreignObject x="455" y="754" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">2. 単純な実績置換は認められない</div>
