<!-- ======== SECTION 4: 核心 ======== -->
<rect x="10" y="730" width="880" height="200" rx="10" fill="#f0f5ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="450" y="750" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af" font-family="'Noto Sans JP',sans-serif">事例16の核心 ── 4つのポイント</text>

<!-- 核心カード4枚（2×2） -->
<rect x="25" y="762" width="425" height="75" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="762" width="425" height="22" rx="7" fill="#1e40af"/>
<rect x="25" y="778" width="425" height="6" fill="#1e40af"/>
<foreignObject x="25" y="762" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">1. 形式（出向）ではなく実質（何を介して供与）が判断基準</div>
</foreignObject>
<foreignObject x="25" y="784" width="425" height="53">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">同じ10名の出向でも5名は供与あり、5名は供与なし。</span>
    <span style="font-size:7.5px;color:#1e40af;font-weight:600;">出向者が体現する無形資産の有無と所得への寄与が決定的。</span>
  </div>
</foreignObject>

<rect x="455" y="762" width="420" height="75" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="762" width="420" height="22" rx="7" fill="#1e40af"/>
<rect x="455" y="778" width="420" height="6" fill="#1e40af"/>
<foreignObject x="455" y="762" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">2. 出向者は親会社の「無形資産パイプライン」</div>
</foreignObject>
<foreignObject x="455" y="784" width="420" height="53">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">出向者個人ではなく、P社技術開発部門という組織全体の知見が流入。</span>
    <span style="font-size:7.5px;color:#1e40af;font-weight:600;">出向者が交代しても構造は維持される。</span>
  </div>
</foreignObject>

<rect x="25" y="842" width="425" height="75" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="842" width="425" height="22" rx="7" fill="#1e40af"/>
<rect x="25" y="858" width="425" height="6" fill="#1e40af"/>
<foreignObject x="25" y="842" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">3.「基本的活動のみの法人」との差分が所得の源泉</div>
</foreignObject>
<foreignObject x="25" y="864" width="425" height="53">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">P社ﾉｳﾊｳなしの製造原価 vs P社ﾉｳﾊｳありの低製造原価。</span>
    <span style="font-size:7.5px;color:#1e40af;font-weight:600;">その差分が超過利益＝営業企画出向者にこの要素はない。</span>
  </div>
</foreignObject>

<rect x="455" y="842" width="420" height="75" rx="7" fill="#fff" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="842" width="420" height="22" rx="7" fill="#dc2626"/>
<rect x="455" y="858" width="420" height="6" fill="#dc2626"/>
<foreignObject x="455" y="842" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">4. 出向コスト負担 ≠ 無形資産の対価</div>
</foreignObject>
<foreignObject x="455" y="864" width="420" height="53">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">出向者の人件費（給与較差補填等）は労務の対価。</span>
    <span style="font-size:7.5px;color:#dc2626;font-weight:600;">製造ﾉｳﾊｳという無形資産の使用対価は別途必要。</span>
  </div>
</foreignObject>
