<!-- ===== Section: 保証料率の算定 ===== -->
<rect x="16" y="700" width="868" height="24" rx="4" fill="#7c3aed"/>
<foreignObject x="26" y="702" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">保証料率の算定ロジック（前提条件3）</div>
</foreignObject>

<rect x="30" y="736" width="854" height="120" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="40" y="740" width="834" height="112">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <div style="flex:1;background:#fef3c7;border-radius:6px;padding:6px 8px;">
        <div style="font-size:7.5px;font-weight:700;color:#92400e;margin-bottom:3px;">信用力に応じたスプレッドの差</div>
        <div style="font-size:6.5px;color:#78350f;line-height:1.4;">
          &#x25CF; 保証なし（格付B相当）の利率: <span style="font-weight:700;">6%</span><br/>
          &#x25CF; グループ効果後（格付A）の利率: <span style="font-weight:700;">4%</span><br/>
          &#x25CF; 保証あり（格付A+相当）の利率: <span style="font-weight:700;">3%</span><br/>
          &#x2192; スプレッドの差 = 4% - 3% = <span style="font-weight:700;font-size:8px;">1%</span>
        </div>
      </div>
      <div style="flex:1;background:#faf5ff;border-radius:6px;padding:6px 8px;">
        <div style="font-size:7.5px;font-weight:700;color:#7c3aed;margin-bottom:3px;">期待損失率</div>
        <div style="font-size:6.5px;color:#6b21a8;line-height:1.4;">
          &#x25CF; デフォルト確率 &#x00D7; デフォルト時損失率<br/>
          &#x25CF; 公開財務ツールで算定<br/>
          &#x25CF; S社の期待損失率 = <span style="font-weight:700;font-size:8px;">0.5%</span>
        </div>
      </div>
      <div style="flex:1;background:#f0fdf4;border-radius:6px;padding:6px 8px;">
        <div style="font-size:7.5px;font-weight:700;color:#16a34a;margin-bottom:3px;">独立企業間の保証料率</div>
        <div style="font-size:6.5px;color:#166534;line-height:1.4;">
          (スプレッドの差 + 期待損失率) / 2<br/>
          = (1% + 0.5%) / 2<br/>
          = <span style="font-weight:700;font-size:10px;">0.75%</span><br/>
          <span style="color:#dc2626;">現行の0.1%は過少 → 移転価格課税の可能性</span>
        </div>
      </div>
    </div>
    <div style="font-size:6.5px;color:#64748b;line-height:1.4;">
      ※ 付随的便益（グループ所属による格付向上 B→A）は対価不要。しかし債務保証（A→A+の改善）は明示的行為であり対価が必要。<br/>
      ※ 信用力の比較可能性は、単独格付(B)ではなく付随的便益を加味した格付(A)を基に判断する（事務運営指針3-8(2)(注)2）。
    </div>
  </div>
</foreignObject>

</foreignObject>

<rect x="606" y="908" width="278" height="76" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="616" y="912" width="258" height="68">
