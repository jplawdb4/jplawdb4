<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1040;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="govGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#962d22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="anthGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="openaiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10a37f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d8a6a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="xaiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#555;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#333;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="googleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4285f4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3367c4;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="courtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8e44ad;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6c3483;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dangerLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="safeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#58d68d;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Pulse animation for the central question -->
    <style>
      @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
      .pulse { animation: pulse 2.5s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -20; } }
      .flowDash { animation: dash 1s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(60,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(120,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(180,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(240,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(360,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(420,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(480,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(540,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(660,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(720,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(780,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(840,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(900,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(960,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(1020,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(1080,0)"/>
    <line x1="0" y1="0" x2="0" y2="900" stroke="#fff" stroke-width="0.5" transform="translate(1140,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,60)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,120)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,180)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,240)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,300)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,360)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,420)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,480)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,540)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,600)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,660)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,720)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,780)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="0.5" transform="translate(0,840)"/>
  </g>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" fill="#fff" font-size="26" font-weight="700" letter-spacing="2">AIの支配権をめぐる対立構図</text>
  <text x="600" y="74" text-anchor="middle" fill="#8899bb" font-size="13" letter-spacing="1">2026年2月27日 ── 誰がAIの使い方を決めるのか</text>
  <line x1="350" y1="85" x2="850" y2="85" stroke="#8899bb" stroke-width="0.5" opacity="0.4"/>

  <!-- ============================================ -->
  <!-- CENTRAL QUESTION - glowing orb -->
  <!-- ============================================ -->
  <circle cx="600" cy="340" r="88" fill="none" stroke="#f39c12" stroke-width="1.5" opacity="0.25" class="pulse"/>
  <circle cx="600" cy="340" r="72" fill="#1a1040" stroke="#f39c12" stroke-width="2" opacity="0.9" filter="url(#glow)"/>
  <text x="600" y="325" text-anchor="middle" fill="#f39c12" font-size="15" font-weight="700">核心の問い</text>
  <text x="600" y="348" text-anchor="middle" fill="#fff" font-size="12.5">AIの使用条件を</text>
  <text x="600" y="366" text-anchor="middle" fill="#fff" font-size="12.5">決める権利は誰に？</text>

  <!-- ============================================ -->
  <!-- GOVERNMENT (top) -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <rect x="455" y="105" width="290" height="110" rx="12" fill="url(#govGrad)"/>
    <rect x="455" y="105" width="290" height="110" rx="12" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Icon: building/capitol -->
  <rect x="478" y="130" width="24" height="18" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
  <polygon points="490,124 478,132 502,132" fill="none" stroke="#fff" stroke-width="1.5"/>
  <line x1="484" y1="135" x2="484" y2="145" stroke="#fff" stroke-width="1.2"/>
  <line x1="490" y1="135" x2="490" y2="145" stroke="#fff" stroke-width="1.2"/>
  <line x1="496" y1="135" x2="496" y2="145" stroke="#fff" stroke-width="1.2"/>

  <text x="512" y="140" fill="#fff" font-size="17" font-weight="700">米国政府</text>
  <text x="512" y="157" fill="#ffcccc" font-size="11">トランプ大統領 / ヘグセス国防長官</text>
  <text x="475" y="180" fill="#ffeedd" font-size="11.5">「全合法用途でAIを使わせろ」</text>
  <text x="475" y="196" fill="#ffeedd" font-size="11.5">「企業が軍に口出しするな」</text>

  <!-- Arrow: Gov → Central question -->
  <line x1="600" y1="215" x2="600" y2="268" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
    </marker>
  </defs>
  <text x="618" y="248" fill="#e74c3c" font-size="10" font-weight="600">圧力</text>

  <!-- ============================================ -->
  <!-- ANTHROPIC (left) -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <rect x="45" y="275" width="260" height="130" rx="12" fill="#1e1338" stroke="url(#anthGrad)" stroke-width="2"/>
  </g>
  <text x="175" y="302" text-anchor="middle" fill="#d4a574" font-size="17" font-weight="700">Anthropic</text>
  <text x="175" y="320" text-anchor="middle" fill="#ccc" font-size="10.5">Dario Amodei CEO</text>

  <!-- Red lines -->
  <g transform="translate(65, 332)">
    <rect width="220" height="22" rx="4" fill="#c0392b" opacity="0.2"/>
    <line x1="4" y1="11" x2="14" y2="11" stroke="#e74c3c" stroke-width="2.5"/>
    <text x="20" y="15" fill="#ff8888" font-size="10.5" font-weight="600">🚫 国内大規模監視の禁止</text>
  </g>
  <g transform="translate(65, 360)">
    <rect width="220" height="22" rx="4" fill="#c0392b" opacity="0.2"/>
    <line x1="4" y1="11" x2="14" y2="11" stroke="#e74c3c" stroke-width="2.5"/>
    <text x="20" y="15" fill="#ff8888" font-size="10.5" font-weight="600">🚫 完全自律型兵器への使用禁止</text>
  </g>

  <!-- Anthropic stance label -->
  <text x="175" y="403" text-anchor="middle" fill="#d4a574" font-size="10" font-style="italic">「良心にかけて応じられない」</text>

  <!-- Arrow: Anthropic → Central -->
  <line x1="305" y1="340" x2="528" y2="340" stroke="#d4a574" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="410" y="332" text-anchor="middle" fill="#d4a574" font-size="10" font-weight="600">拒否</text>

  <!-- ============================================ -->
  <!-- CONSEQUENCE for Anthropic (bottom-left) -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <rect x="45" y="440" width="260" height="95" rx="12" fill="#2a0a0a" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  </g>
  <text x="175" y="466" text-anchor="middle" fill="#e74c3c" font-size="13" font-weight="700">⚡ 制裁発動</text>
  <text x="175" y="486" text-anchor="middle" fill="#ff9999" font-size="10.5">全連邦機関でAnthropic使用停止</text>
  <text x="175" y="503" text-anchor="middle" fill="#ff9999" font-size="10.5">サプライチェーンリスク指定</text>
  <text x="175" y="520" text-anchor="middle" fill="#ffaaaa" font-size="9.5" font-style="italic">（米国企業への適用は史上初）</text>

  <!-- Arrow down from Anthropic to consequence -->
  <line x1="175" y1="405" x2="175" y2="440" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- ============================================ -->
  <!-- OTHER COMPANIES (right) -->
  <!-- ============================================ -->

  <!-- OpenAI -->
  <g filter="url(#shadow)">
    <rect x="895" y="200" width="260" height="115" rx="12" fill="#0d2e25" stroke="#10a37f" stroke-width="2"/>
  </g>
  <text x="1025" y="228" text-anchor="middle" fill="#10a37f" font-size="16" font-weight="700">OpenAI</text>
  <text x="1025" y="246" text-anchor="middle" fill="#aaa" font-size="10">Sam Altman CEO</text>
  <text x="1025" y="268" text-anchor="middle" fill="#7dcea0" font-size="10.5">「Anthropicと同じレッドライン」</text>
  <text x="1025" y="284" text-anchor="middle" fill="#7dcea0" font-size="10.5">を主張しつつ合意を獲得</text>
  <text x="1025" y="304" text-anchor="middle" fill="#2ecc71" font-size="10.5" font-weight="600">✓ 機密ネットワーク展開で合意</text>

  <!-- Arrow: OpenAI → Central -->
  <line x1="895" y1="290" x2="672" y2="335" stroke="#10a37f" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="775" y="298" text-anchor="middle" fill="#10a37f" font-size="10" font-weight="600">外交的合意</text>

  <!-- xAI -->
  <g filter="url(#shadow)">
    <rect x="895" y="345" width="260" height="80" rx="12" fill="#1a1a1a" stroke="#777" stroke-width="1.5"/>
  </g>
  <text x="1025" y="372" text-anchor="middle" fill="#ccc" font-size="15" font-weight="700">xAI (Grok)</text>
  <text x="1025" y="390" text-anchor="middle" fill="#999" font-size="10.5">条件に無条件で全面同意</text>
  <text x="1025" y="408" text-anchor="middle" fill="#aaa" font-size="10" font-style="italic">制限なし</text>

  <!-- Arrow: xAI → Central -->
  <line x1="895" y1="380" x2="672" y2="350" stroke="#777" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="782" y="373" text-anchor="middle" fill="#999" font-size="10" font-weight="600">全面服従</text>

  <!-- Google -->
  <g filter="url(#shadow)">
    <rect x="895" y="455" width="260" height="80" rx="12" fill="#0d1a3a" stroke="#4285f4" stroke-width="1.5"/>
  </g>
  <text x="1025" y="483" text-anchor="middle" fill="#4285f4" font-size="15" font-weight="700">Google</text>
  <text x="1025" y="502" text-anchor="middle" fill="#88aadd" font-size="10.5">AI兵器禁止の原則を削除済み</text>
  <text x="1025" y="520" text-anchor="middle" fill="#88aadd" font-size="10" font-style="italic">「全合法用途」に同意</text>

  <!-- ============================================ -->
  <!-- THE MYSTERY BOX -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <rect x="700" y="440" width="170" height="68" rx="10" fill="#1a1040" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,3" class="pulse"/>
  </g>
  <text x="785" y="465" text-anchor="middle" fill="#f39c12" font-size="12" font-weight="700">❓ 最大の謎</text>
  <text x="785" y="482" text-anchor="middle" fill="#ddd" font-size="9.5">同じ条件なのになぜ</text>
  <text x="785" y="496" text-anchor="middle" fill="#ddd" font-size="9.5">Anthropicだけ排除？</text>

  <!-- ============================================ -->
  <!-- COURT BATTLE (bottom center) -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <rect x="370" y="570" width="460" height="100" rx="14" fill="#1a0f2e" stroke="url(#courtGrad)" stroke-width="2"/>
  </g>
  <!-- Scales of justice icon -->
  <line x1="430" y1="600" x2="430" y2="640" stroke="#bb88dd" stroke-width="2"/>
  <line x1="414" y1="608" x2="446" y2="608" stroke="#bb88dd" stroke-width="2"/>
  <path d="M414,608 L410,622 L424,622 Z" fill="none" stroke="#bb88dd" stroke-width="1.5"/>
  <path d="M446,608 L442,622 L456,622 Z" fill="none" stroke="#bb88dd" stroke-width="1.5"/>
  <circle cx="430" cy="598" r="3" fill="#bb88dd"/>

  <text x="600" y="598" text-anchor="middle" fill="#bb88dd" font-size="16" font-weight="700">⚖️  法廷闘争へ</text>
  <text x="600" y="618" text-anchor="middle" fill="#ddd" font-size="11">Anthropicが勝訴 → AI企業の倫理的交渉権が確立</text>
  <text x="600" y="638" text-anchor="middle" fill="#ddd" font-size="11">Anthropicが敗訴 → 政府のAI支配が決定的に</text>
  <text x="600" y="658" text-anchor="middle" fill="#aaa" font-size="10" font-style="italic">AI産業全体のガバナンスの方向性がここで決まる</text>

  <!-- Arrow from consequence to court -->
  <path d="M175,535 L175,560 Q175,575 190,580 L370,615" fill="none" stroke="#bb88dd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <defs>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bb88dd"/>
    </marker>
  </defs>

  <!-- ============================================ -->
  <!-- BOTTOM: The deeper meaning -->
  <!-- ============================================ -->
  <rect x="100" y="700" width="1000" height="100" rx="14" fill="#0f0a20" stroke="#445" stroke-width="1"/>

  <!-- Three pillars of insight -->
  <g transform="translate(140, 718)">
    <circle cx="12" cy="12" r="12" fill="#e74c3c" opacity="0.8"/>
    <text x="12" y="17" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>
    <text x="34" y="12" fill="#ff8888" font-size="11" font-weight="600">底辺への競争</text>
    <text x="34" y="28" fill="#bbb" font-size="9.5">「安全」を主張した唯一の企業が制裁。</text>
    <text x="34" y="42" fill="#bbb" font-size="9.5">安全なAI開発＝競争上の不利益に</text>
  </g>

  <g transform="translate(465, 718)">
    <circle cx="12" cy="12" r="12" fill="#f39c12" opacity="0.8"/>
    <text x="12" y="17" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>
    <text x="34" y="12" fill="#f5c563" font-size="11" font-weight="600">忠誠のシグナリング</text>
    <text x="34" y="28" fill="#bbb" font-size="9.5">技術的安全性ではなく政治的忠誠が</text>
    <text x="34" y="42" fill="#bbb" font-size="9.5">AI企業の命運を決める時代</text>
  </g>

  <g transform="translate(790, 718)">
    <circle cx="12" cy="12" r="12" fill="#3498db" opacity="0.8"/>
    <text x="12" y="17" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>
    <text x="34" y="12" fill="#7ec8e3" font-size="11" font-weight="600">立法の空白</text>
    <text x="34" y="28" fill="#bbb" font-size="9.5">議会がAI軍事利用の法律を未制定。</text>
    <text x="34" y="42" fill="#bbb" font-size="9.5">「方針」は行政の一存で変更可能</text>
  </g>

  <!-- Dividers -->
  <line x1="440" y1="715" x2="440" y2="790" stroke="#445" stroke-width="0.5"/>
  <line x1="770" y1="715" x2="770" y2="790" stroke="#445" stroke-width="0.5"/>

  <!-- ============================================ -->
  <!-- EMPLOYEE SOLIDARITY (small note) -->
  <!-- ============================================ -->
  <g filter="url(#shadow)">
    <rect x="45" y="570" width="280" height="60" rx="10" fill="#0f2a18" stroke="#2ecc71" stroke-width="1" opacity="0.8"/>
  </g>
  <text x="185" y="592" text-anchor="middle" fill="#2ecc71" font-size="11" font-weight="600">✊ 従業員450人以上の連帯</text>
  <text x="185" y="610" text-anchor="middle" fill="#aaddaa" font-size="9.5">Google・OpenAI社員がAnthropicを支持</text>
  <text x="185" y="624" text-anchor="middle" fill="#aaddaa" font-size="9.5">「我々は分断されない」公開書簡</text>

  <!-- ============================================ -->
  <!-- Bottom tagline -->
  <!-- ============================================ -->
  <text x="600" y="842" text-anchor="middle" fill="#667799" font-size="12" font-style="italic">
    人類史上最も強力な汎用技術の使用条件が、議論ではなく政治的圧力で決まりつつある
  </text>
  <text x="600" y="864" text-anchor="middle" fill="#556688" font-size="10">
    ── それがこの事件の核心であり、最も深刻な含意である
  </text>

  <!-- Date stamp -->
  <text x="1160" y="890" text-anchor="end" fill="#334" font-size="9">2026.02.28</text>
</svg>