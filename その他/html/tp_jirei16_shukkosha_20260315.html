<!-- ===== 6. Conclusion ===== -->
<rect x="30" y="836" width="1140" height="100" rx="8" fill="#f0f5ff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<foreignObject x="30" y="836" width="1140" height="100">

<span style="font-size:11px;font-weight:700;color:#1e40af;">移転価格税制上の原則（事務運営指針3-13）</span>
<span style="font-size:9px;color:#1e3a5f;">親会社が海外子会社に自社社員を出向させ、その社員を通じて親会社が形成・維持・発展した無形資産を供与し、その無形資産が基本的活動のみを行う法人との比較において所得の源泉になっている場合、<b>無形資産の形成・維持・発展への貢献は親会社側にある</b>。</span>
<span style="font-size:8.5px;color:#475569;">→ 無形資産の所得への貢献を検討する際は、法的所有関係のみならず、形成・維持・発展への貢献の程度（意思決定・役務提供・費用負担・リスク管理）を総合的に勘案する。</span>
</div>
</foreignObject>
