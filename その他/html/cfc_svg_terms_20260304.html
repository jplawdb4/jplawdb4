<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFC税制 条文用語のSVG定義集</title>
<style>
  body { margin: 0; padding: 16px; background: #f5f5f5; display: flex; justify-content: center; }
  .container { max-width: 1860px; width: 100%; }
  .container svg { width: 100%; height: auto; display: block; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  @media print { body { background: #fff; padding: 0; } .container svg { box-shadow: none; } }
</style>
</head>
<body>
<div class="container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1840 6800" font-family="'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Meiryo',sans-serif">

  <!-- ===== DEFS: gradients, filters ===== -->
  <defs>
    <linearGradient id="gHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="gSec" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8eaf6"/>
      <stop offset="100%" stop-color="#c5cae9"/>
    </linearGradient>
    <linearGradient id="gEntity" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="gSpecific" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffebee"/>
      <stop offset="100%" stop-color="#ffcdd2"/>
    </linearGradient>
    <linearGradient id="gTarget" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="gPartial" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="gAmount" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <linearGradient id="gProc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <linearGradient id="gFlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="100%" stop-color="#b2ebf2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowB" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#455a64"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#c62828"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="1840" height="6800" rx="12" fill="#fafafa" stroke="#ccc" stroke-width="1"/>

  <!-- ===== HEADER ===== -->
  <rect x="20" y="20" width="1800" height="100" rx="10" fill="url(#gHead)" filter="url(#shadow)"/>
  <text x="920" y="62" text-anchor="middle" fill="#fff" font-size="32" font-weight="bold">CFC税制（外国子会社合算税制）条文構造図 — 法人部分</text>
  <text x="920" y="90" text-anchor="middle" fill="#e8eaf6" font-size="14">租税特別措置法 §66-6〜§66-9 / 同施行令 §39-14〜§39-17-2 ｜ 出典: jplawdb4 (法令 as of 2025-12-27)</text>

  <!-- ================================================================== -->
  <!-- SECTION 1: エンティティ分類 (§66-6①②) -->
  <!-- ================================================================== -->
  <rect x="20" y="140" width="1800" height="1480" rx="10" fill="url(#gSec)" stroke="#7986cb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="172" fill="#1a237e" font-size="22" font-weight="bold">1. エンティティ分類体系（措法§66-6①②）</text>
  <text x="40" y="196" fill="#37474f" font-size="13">外国関係会社を3層に分類し、それぞれ異なる合算方式・租税負担割合の閾値を適用する。</text>

  <!-- 1-A: 外国関係会社 (FRC) -->
  <rect x="40" y="215" width="1760" height="200" rx="8" fill="url(#gEntity)" stroke="#42a5f5" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="60" y="243" fill="#0d47a1" font-size="18" font-weight="bold">外国関係会社（FRC）— §66-6②一</text>
  <text x="60" y="268" fill="#212121" font-size="13">外国法人で、居住者・内国法人が以下のいずれかの割合で直接・間接に保有するもの：</text>
  <text x="80" y="290" fill="#212121" font-size="13">• 発行済株式等の総数又は総額の50％超（株式等保有割合）</text>
  <text x="80" y="310" fill="#212121" font-size="13">• 議決権の総数の50％超（議決権割合）</text>
  <text x="80" y="330" fill="#212121" font-size="13">• 請求権に基づく配当等の50％超（請求権割合）</text>
  <text x="80" y="355" fill="#455a64" font-size="12" font-style="italic">※ 実質支配関係（§66-6②七）がある場合も含む（後述セクション3）。</text>
  <text x="80" y="375" fill="#455a64" font-size="12" font-style="italic">※ 内国法人が直接・間接に10％以上の株式等・議決権・請求権を保有する場合に合算対象（§66-6①柱書）。</text>
  <text x="80" y="395" fill="#455a64" font-size="12" font-style="italic">※ 「間接保有」の計算: 施行令§39-14③④で規定（他の外国法人を通じた持株割合の乗算方式）。</text>

  <!-- 1-B: 特定外国関係会社 (Specific FRC) -->
  <rect x="40" y="430" width="850" height="540" rx="8" fill="url(#gSpecific)" stroke="#e53935" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="60" y="458" fill="#b71c1c" font-size="18" font-weight="bold">特定外国関係会社 — §66-6②二</text>
  <rect x="620" y="438" width="250" height="28" rx="14" fill="#c62828" opacity="0.9"/>
  <text x="745" y="457" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">全所得合算 ｜ 閾値 27%</text>
  <text x="60" y="485" fill="#212121" font-size="13">FRCのうち、次のいずれかに該当するもの：</text>

  <text x="70" y="510" fill="#c62828" font-size="13" font-weight="bold">イ. ペーパーカンパニー（§66-6②二イ）</text>
  <text x="90" y="530" fill="#212121" font-size="12">主たる事業を行うに必要と認められる事務所等の固定施設を有しない</text>
  <text x="90" y="548" fill="#212121" font-size="12">（除外: 施行令§39-14-3①で定める特定保険外国子会社等）</text>

  <text x="70" y="575" fill="#c62828" font-size="13" font-weight="bold">ロ. 事実上のキャッシュボックス（§66-6②二ロ）</text>
  <text x="90" y="595" fill="#212121" font-size="12">総資産のうち、有価証券・貸付金等（§66-8⑩各号の金額の合計額）が</text>
  <text x="90" y="613" fill="#212121" font-size="12">総資産の額の30%超であるもの</text>

  <text x="70" y="640" fill="#c62828" font-size="13" font-weight="bold">ハ. ブラックリスト国（§66-6②二ハ）</text>
  <text x="90" y="660" fill="#212121" font-size="12">租税に関する情報の交換に非協力的な国又は地域に本店等を有するもの</text>
  <text x="90" y="678" fill="#212121" font-size="12">（情報交換規定の整備状況を勘案して財務省令で指定）</text>

  <line x1="60" y1="695" x2="870" y2="695" stroke="#ef9a9a" stroke-width="1"/>
  <text x="60" y="718" fill="#b71c1c" font-size="13" font-weight="bold">除外要件（ペーパーカンパニー判定からの除外）:</text>
  <text x="80" y="740" fill="#212121" font-size="12">①固定施設を有すること</text>
  <text x="80" y="758" fill="#212121" font-size="12">②本店所在地国で事業の管理・支配・運営を自ら行っていること</text>
  <text x="80" y="776" fill="#212121" font-size="12">③外国子会社株式の保有割合25%以上（施行令§39-14-3⑥）</text>
  <text x="80" y="794" fill="#212121" font-size="12">④特定保険外国子会社等に該当する場合（同①②）</text>

  <rect x="55" y="810" width="820" height="55" rx="6" fill="#ffcdd2" stroke="#e53935" stroke-width="1" opacity="0.7"/>
  <text x="65" y="830" fill="#b71c1c" font-size="12" font-weight="bold">租税負担割合 ≧ 27% → 合算対象外（§66-6⑤一）</text>
  <text x="65" y="850" fill="#212121" font-size="11">租税負担割合の計算: 施行令§39-17-2（後述セクション7）</text>

  <!-- ARROW from Specific to full inclusion -->
  <text x="465" y="950" text-anchor="middle" fill="#c62828" font-size="14" font-weight="bold">↓ 租税負担割合 ＜ 27%</text>
  <rect x="305" y="930" width="320" height="25" rx="4" fill="none" stroke="#c62828" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 1-C: 対象外国関係会社 (Target FRC) -->
  <rect x="950" y="430" width="850" height="380" rx="8" fill="url(#gTarget)" stroke="#ef6c00" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="970" y="458" fill="#e65100" font-size="18" font-weight="bold">対象外国関係会社 — §66-6②三</text>
  <rect x="1530" y="438" width="250" height="28" rx="14" fill="#e65100" opacity="0.9"/>
  <text x="1655" y="457" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">全所得合算 ｜ 閾値 20%</text>
  <text x="970" y="485" fill="#212121" font-size="13">特定外国関係会社に該当しないFRCのうち、次の全てを満たさないもの：</text>

  <text x="980" y="515" fill="#e65100" font-size="13" font-weight="bold">経済活動基準（4要件）— いずれか不充足で該当:</text>
  <text x="1000" y="540" fill="#212121" font-size="12">イ. 事業基準: 株式保有・知的財産提供・船舶航空機賃貸等でないこと</text>
  <text x="1000" y="560" fill="#212121" font-size="12">ロ. 実体基準: 本店所在地国に事務所等の固定施設を有すること</text>
  <text x="1000" y="580" fill="#212121" font-size="12">ハ. 管理支配基準: 本店所在地国で事業の管理・支配・運営を自ら行うこと</text>
  <text x="1000" y="600" fill="#212121" font-size="12">ニ. 所在地国基準又は非関連者基準:</text>
  <text x="1020" y="620" fill="#212121" font-size="12">- 所在地国基準（卸売等以外）: 主として本店所在地国で事業を行うこと</text>
  <text x="1020" y="640" fill="#212121" font-size="12">- 非関連者基準（卸売・銀行・信託・保険・水運・航空等）:</text>
  <text x="1040" y="658" fill="#212121" font-size="12">主として非関連者との取引で事業を行うこと</text>

  <rect x="965" y="680" width="820" height="55" rx="6" fill="#ffe0b2" stroke="#ef6c00" stroke-width="1" opacity="0.7"/>
  <text x="975" y="700" fill="#e65100" font-size="12" font-weight="bold">租税負担割合 ≧ 20% → 合算対象外（§66-6⑤二）</text>
  <text x="975" y="720" fill="#212121" font-size="11">経済活動基準の4要件すべてを充足 → 部分対象外国関係会社へ</text>

  <text x="1375" y="795" text-anchor="middle" fill="#e65100" font-size="14" font-weight="bold">↓ 租税負担割合 ＜ 20% かつ 基準不充足</text>

  <!-- 1-D: 部分対象外国関係会社 (Partial Target FRC) -->
  <rect x="40" y="985" width="1760" height="310" rx="8" fill="url(#gPartial)" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="60" y="1013" fill="#1b5e20" font-size="18" font-weight="bold">部分対象外国関係会社 — §66-6②四</text>
  <rect x="1480" y="993" width="300" height="28" rx="14" fill="#2e7d32" opacity="0.9"/>
  <text x="1630" y="1012" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">部分合算（受動的所得）｜ 閾値 20%</text>

  <text x="60" y="1043" fill="#212121" font-size="13">特定外国関係会社にも対象外国関係会社にも該当しないFRC（＝経済活動基準の4要件をすべて充足）。</text>
  <text x="60" y="1068" fill="#212121" font-size="13">→ 受動的所得（部分合算対象所得）のみを合算（§66-6⑥各号、後述セクション5）。</text>

  <text x="80" y="1098" fill="#1b5e20" font-size="13" font-weight="bold">合算免除の基準（§66-6⑧⑨⑩）:</text>
  <text x="100" y="1120" fill="#212121" font-size="12">① 租税負担割合 ≧ 20% → 部分合算対象外（§66-6⑧）</text>
  <text x="100" y="1140" fill="#212121" font-size="12">② 部分適用対象金額 ≦ 2,000万円 → 合算免除（§66-6⑨一）</text>
  <text x="100" y="1160" fill="#212121" font-size="12">③ 部分適用対象金額が当期利益の5%以下 → 合算免除（§66-6⑨二）</text>

  <text x="80" y="1195" fill="#1b5e20" font-size="13" font-weight="bold">外国金融子会社等（§66-6②五）:</text>
  <text x="100" y="1217" fill="#212121" font-size="12">部分対象外国関係会社のうち、銀行業・金商業・保険業を営み、本店所在地国で役員・使用人が</text>
  <text x="100" y="1237" fill="#212121" font-size="12">業務の全てを行うもの。施行令§39-17で詳細定義（純資産に占める株式保有割合75%超 or 50%超等）。</text>
  <text x="100" y="1257" fill="#212121" font-size="12">→ 金融子会社等部分適用対象金額で計算（§66-6⑥⑦）。</text>

  <rect x="55" y="1268" width="700" height="20" rx="3" fill="none"/>
  <text x="100" y="1282" fill="#455a64" font-size="11" font-style="italic">※ 施行令§39-17③: 特定中間持株会社(p9)、従属関連業務子会社(p8)の定義も含む。</text>

  <!-- ================================================================== -->
  <!-- SECTION 2: 適用対象の内国法人 -->
  <!-- ================================================================== -->
  <rect x="20" y="1640" width="1800" height="310" rx="10" fill="url(#gSec)" stroke="#7986cb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="1672" fill="#1a237e" font-size="22" font-weight="bold">2. 適用対象の内国法人（措法§66-6①柱書）</text>

  <rect x="40" y="1695" width="1760" height="235" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="60" y="1722" fill="#212121" font-size="14" font-weight="bold">合算課税の対象となる内国法人の要件:</text>
  <text x="80" y="1748" fill="#212121" font-size="13">外国関係会社の発行済株式等・議決権・請求権のいずれかを直接・間接に10%以上保有する内国法人。</text>
  <text x="80" y="1773" fill="#212121" font-size="13">ただし、次は適用除外（§66-7②括弧書）:</text>
  <text x="100" y="1798" fill="#212121" font-size="12">• 特定目的会社（TMK）、投資法人、特定目的信託の受託法人（§66-7②）</text>

  <text x="60" y="1830" fill="#212121" font-size="14" font-weight="bold">合算の仕組み（§66-6①）:</text>
  <text x="80" y="1855" fill="#212121" font-size="13">適用対象金額（又は部分適用対象金額・金融子会社等部分適用対象金額）のうち</text>
  <text x="80" y="1878" fill="#212121" font-size="13">請求権等勘案合算割合（施行令§39-14①）に応じた部分を、内国法人の所得に合算。</text>
  <text x="80" y="1903" fill="#455a64" font-size="12" font-style="italic">※ 請求権等勘案合算割合 = 直接保有割合 + 間接保有割合（施行令§39-14②③④で計算）。</text>
  <text x="80" y="1923" fill="#455a64" font-size="12" font-style="italic">※ 合算金額は益金の額に算入（法人税法上の課税所得に加算）。</text>

  <!-- ================================================================== -->
  <!-- SECTION 3: 実質支配関係 -->
  <!-- ================================================================== -->
  <rect x="20" y="1970" width="1800" height="340" rx="10" fill="url(#gSec)" stroke="#7986cb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="2002" fill="#1a237e" font-size="22" font-weight="bold">3. 実質支配関係（措法§66-6②七 / 施行令§39-16）</text>

  <rect x="40" y="2020" width="860" height="270" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="60" y="2048" fill="#212121" font-size="14" font-weight="bold">実質支配関係の成立要件（施行令§39-16①）:</text>
  <text x="80" y="2075" fill="#212121" font-size="13">居住者等と外国法人の間で、次のいずれかの事実がある場合:</text>
  <text x="100" y="2100" fill="#212121" font-size="12">イ. 残余財産のほぼ全部の分配を請求できる権利を有すること</text>
  <text x="100" y="2122" fill="#212121" font-size="12">ロ. 資産処分方針のほぼ全部を決定できる契約等が存すること</text>
  <text x="100" y="2144" fill="#212121" font-size="12">（ただし、利益が金銭・資産で居住者等以外に配分される場合は除外）</text>
  <text x="80" y="2175" fill="#455a64" font-size="12" font-style="italic">→ 持株割合が50%以下でも、実質支配関係があればFRCに該当し得る。</text>

  <text x="60" y="2210" fill="#212121" font-size="14" font-weight="bold">「特殊の関係」（施行令§39-16②）:</text>
  <text x="80" y="2235" fill="#212121" font-size="12">a. 親族・事実婚配偶者・使用人・生計維持者等の個人関係</text>
  <text x="80" y="2255" fill="#212121" font-size="12">b. 直接・間接の支配関係にある法人（法人税法施行令§4③準用）</text>
  <text x="80" y="2275" fill="#212121" font-size="12">c. 発行済株式等の50%超を直接・間接保有する関係</text>

  <rect x="940" y="2020" width="860" height="270" rx="8" fill="#fff" stroke="#90a4ae" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="960" y="2048" fill="#212121" font-size="14" font-weight="bold">施行令§39-14⑥: 特殊関係者の範囲</text>
  <text x="980" y="2078" fill="#212121" font-size="13">居住者・内国法人と特殊関係にある個人・法人:</text>
  <text x="1000" y="2103" fill="#212121" font-size="12">• 親族（6親等内血族・3親等内姻族）</text>
  <text x="1000" y="2125" fill="#212121" font-size="12">• 使用人・被使用人</text>
  <text x="1000" y="2147" fill="#212121" font-size="12">• 金銭等で生計を維持されている者及びその親族</text>
  <text x="1000" y="2169" fill="#212121" font-size="12">• 支配関係法人（発行済株式50%超の保有関係）</text>
  <text x="1000" y="2191" fill="#212121" font-size="12">• 同一の者が2法人の株式を各50%超保有する場合の相互関係</text>
  <text x="980" y="2225" fill="#455a64" font-size="12" font-style="italic">※ 施行令§39-16④: 上記の50%以上 → 50%超と読み替え。</text>
  <text x="980" y="2250" fill="#455a64" font-size="12" font-style="italic">※ 施行令§39-12②③の間接保有計算も一部準用。</text>

  <!-- ================================================================== -->
  <!-- SECTION 4: 金額概念（適用対象金額等） -->
  <!-- ================================================================== -->
  <rect x="20" y="2330" width="1800" height="680" rx="10" fill="url(#gSec)" stroke="#7986cb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="2362" fill="#1a237e" font-size="22" font-weight="bold">4. 金額概念（措法§66-6①④ / 施行令§39-15）</text>

  <!-- 4-A: 適用対象金額 -->
  <rect x="40" y="2385" width="860" height="300" rx="8" fill="url(#gAmount)" stroke="#c62828" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="60" y="2413" fill="#c62828" font-size="17" font-weight="bold">適用対象金額（§66-6④）</text>
  <text x="60" y="2438" fill="#212121" font-size="13">特定FRC・対象FRCに適用。全所得合算。</text>
  <text x="60" y="2465" fill="#212121" font-size="13" font-weight="bold">計算式:</text>
  <rect x="70" y="2475" width="810" height="50" rx="6" fill="#fff" stroke="#ef9a9a" stroke-width="1"/>
  <text x="80" y="2500" fill="#212121" font-size="13">適用対象金額 ＝ 基準所得金額 − 欠損金控除額</text>
  <text x="80" y="2518" fill="#455a64" font-size="11">（欠損金控除: 前7年以内の欠損金額を控除可能）</text>

  <text x="60" y="2548" fill="#212121" font-size="13" font-weight="bold">基準所得金額（施行令§39-15）:</text>
  <text x="80" y="2572" fill="#212121" font-size="12">=（①所得金額 + ②外国法人税額）−（③還付法人税額 + ④子会社配当 + ⑤特定譲渡益）</text>
  <text x="80" y="2595" fill="#212121" font-size="12">① 日本の法人税法に準じて計算した所得（特定条文を除外）</text>
  <text x="80" y="2615" fill="#212121" font-size="12">② 実際に納付した外国法人税の額</text>
  <text x="80" y="2635" fill="#212121" font-size="12">③ 還付された外国法人税の額</text>
  <text x="80" y="2655" fill="#212121" font-size="12">④ 子会社（持株25%以上、継続6月以上保有等）からの配当</text>
  <text x="80" y="2675" fill="#212121" font-size="12">⑤ 部分対象FRC株式の特定譲渡益（一定要件下）</text>

  <!-- 4-B: 外国税額控除 -->
  <rect x="940" y="2385" width="860" height="300" rx="8" fill="url(#gAmount)" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="960" y="2413" fill="#6a1b9a" font-size="17" font-weight="bold">外国税額控除（措法§66-7 / §66-9-3）</text>
  <text x="960" y="2438" fill="#212121" font-size="13">合算課税された所得に対応する外国法人税を二重課税排除。</text>

  <text x="960" y="2468" fill="#212121" font-size="13" font-weight="bold">みなし納付外国税額（§66-7①）:</text>
  <text x="980" y="2493" fill="#212121" font-size="12">FRCが納付した外国法人税のうち、合算課税対象金額に対応する部分を</text>
  <text x="980" y="2513" fill="#212121" font-size="12">内国法人が納付したものとみなし、法人税法§69の外国税額控除を適用。</text>
  <text x="980" y="2538" fill="#212121" font-size="12">→ 地方法人税法§12にも同様に適用。</text>

  <text x="960" y="2570" fill="#212121" font-size="13" font-weight="bold">適用順序:</text>
  <text x="980" y="2595" fill="#212121" font-size="12">① まず法人税法§69-2の控除（通常の外国税額控除）</text>
  <text x="980" y="2615" fill="#212121" font-size="12">② 次に法人税法§70の控除</text>
  <text x="980" y="2640" fill="#212121" font-size="12">③ 確定申告書への明細書添付が適用条件（§66-7④）</text>

  <text x="960" y="2670" fill="#455a64" font-size="12" font-style="italic">※ 特定目的会社・投資法人等は適用除外（§66-7②括弧書）。</text>

  <!-- 4-C: 課税済配当の二重課税排除 -->
  <rect x="40" y="2700" width="1760" height="290" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="60" y="2728" fill="#1565c0" font-size="17" font-weight="bold">課税済配当の二重課税排除（措法§66-8 / §66-9-4）</text>
  <text x="60" y="2755" fill="#212121" font-size="13">合算課税後にFRCから配当を受けた場合の二重課税排除。</text>

  <text x="60" y="2785" fill="#212121" font-size="13" font-weight="bold">直接控除（§66-8①②③）:</text>
  <text x="80" y="2808" fill="#212121" font-size="12">FRCから受けた剰余金の配当等 → 特定課税対象金額の範囲内で益金不算入。</text>
  <text x="80" y="2828" fill="#212121" font-size="12">法人税法§23の2（外国子会社配当益金不算入）の対象となる配当は除外。</text>

  <text x="60" y="2858" fill="#212121" font-size="13" font-weight="bold">特定課税対象金額（§66-8④）:</text>
  <text x="80" y="2880" fill="#212121" font-size="12">直接保有株式数に応じた合算課税済金額の累積額（過去10年分）。</text>

  <text x="60" y="2908" fill="#212121" font-size="13" font-weight="bold">間接控除（§66-8⑦〜⑪）:</text>
  <text x="80" y="2930" fill="#212121" font-size="12">間接特定課税対象金額: 他の外国法人を通じた間接的な合算課税済金額。</text>
  <text x="80" y="2950" fill="#212121" font-size="12">2つの計算額の小さい方を限度とする。</text>
  <text x="80" y="2975" fill="#455a64" font-size="12" font-style="italic">※ 適格合併等の場合: 被合併法人の特定課税対象金額を引継ぎ（§66-8⑤⑥）。</text>

  <!-- ================================================================== -->
  <!-- SECTION 5: 部分合算対象所得 -->
  <!-- ================================================================== -->
  <rect x="20" y="3030" width="1800" height="870" rx="10" fill="url(#gSec)" stroke="#7986cb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="3062" fill="#1a237e" font-size="22" font-weight="bold">5. 部分合算対象所得（措法§66-6⑥各号）— 部分対象外国関係会社に適用</text>
  <text x="40" y="3088" fill="#37474f" font-size="13">経済活動基準をすべて充足するFRC（部分対象外国関係会社）について、受動的所得のみを合算。</text>

  <!-- Income items grid -->
  <rect x="40" y="3105" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="55" y="3128" fill="#1b5e20" font-size="13" font-weight="bold">一号: 配当所得</text>
  <text x="55" y="3148" fill="#212121" font-size="11">FRCが受ける剰余金の配当等（関連費用控除後）。</text>
  <text x="55" y="3166" fill="#212121" font-size="11">ただし、持株25%以上の子法人からの配当は除外。</text>
  <text x="55" y="3184" fill="#455a64" font-size="10" font-style="italic">※持株要件は施行令§39-15④の25%以上・6月以上継続保有。</text>

  <rect x="635" y="3105" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="650" y="3128" fill="#1b5e20" font-size="13" font-weight="bold">二号: 受取利子</text>
  <text x="650" y="3148" fill="#212121" font-size="11">FRCが受ける貸付金の利子（関連費用控除後）。</text>
  <text x="650" y="3166" fill="#212121" font-size="11">本業としての貸付業務に係る利子は除外。</text>

  <rect x="1230" y="3105" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="1245" y="3128" fill="#1b5e20" font-size="13" font-weight="bold">三号: 有価証券貸借料</text>
  <text x="1245" y="3148" fill="#212121" font-size="11">有価証券の貸付けの対価（費用控除後）。</text>

  <rect x="40" y="3220" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="55" y="3243" fill="#1b5e20" font-size="13" font-weight="bold">四号: 有価証券譲渡損益</text>
  <text x="55" y="3263" fill="#212121" font-size="11">有価証券の譲渡に係る対価の額から原価を控除。</text>
  <text x="55" y="3281" fill="#212121" font-size="11">持株25%以上の子法人株式の譲渡は除外。</text>

  <rect x="635" y="3220" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="650" y="3243" fill="#1b5e20" font-size="13" font-weight="bold">五号: デリバティブ損益</text>
  <text x="650" y="3263" fill="#212121" font-size="11">デリバティブ取引に係る損益（財務省令で計算）。</text>

  <rect x="1230" y="3220" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="1245" y="3243" fill="#1b5e20" font-size="13" font-weight="bold">六号: 為替差損益</text>
  <text x="1245" y="3263" fill="#212121" font-size="11">外国為替相場の変動に伴う利益・損失。</text>
  <text x="1245" y="3281" fill="#212121" font-size="11">本業に係る為替差損益は除外。</text>

  <rect x="40" y="3335" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="55" y="3358" fill="#1b5e20" font-size="13" font-weight="bold">七号: その他資産運用損益</text>
  <text x="55" y="3378" fill="#212121" font-size="11">資産の保有・運用・譲渡・貸付けから生ずる所得</text>
  <text x="55" y="3396" fill="#212121" font-size="11">（一号〜六号に含まれないもの）。</text>

  <rect x="635" y="3335" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="650" y="3358" fill="#1b5e20" font-size="13" font-weight="bold">八号: 正味保険料</text>
  <text x="650" y="3378" fill="#212121" font-size="11">異常危険準備金等の繰入・取崩しを調整した</text>
  <text x="650" y="3396" fill="#212121" font-size="11">正味収入保険料相当額。</text>

  <rect x="1230" y="3335" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="1245" y="3358" fill="#1b5e20" font-size="13" font-weight="bold">九号: 固定資産賃貸料</text>
  <text x="1245" y="3378" fill="#212121" font-size="11">固定資産の貸付けによる対価（費用控除後）。</text>
  <text x="1245" y="3396" fill="#212121" font-size="11">所定の場合を除く。</text>

  <rect x="40" y="3450" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="55" y="3473" fill="#1b5e20" font-size="13" font-weight="bold">十号: 無形資産使用料</text>
  <text x="55" y="3493" fill="#212121" font-size="11">無形資産の使用料（ロイヤルティ）。費用控除後。</text>
  <text x="55" y="3511" fill="#212121" font-size="11">自ら開発した知的財産に係るものは除外。</text>

  <rect x="635" y="3450" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="650" y="3473" fill="#1b5e20" font-size="13" font-weight="bold">十一号: 無形資産譲渡損益</text>
  <text x="650" y="3493" fill="#212121" font-size="11">無形資産の譲渡対価から原価を控除。</text>
  <text x="650" y="3511" fill="#212121" font-size="11">自己開発の無形資産は除外。</text>

  <rect x="1230" y="3450" width="570" height="100" rx="6" fill="#e8f5e9" stroke="#43a047" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="1245" y="3473" fill="#1b5e20" font-size="13" font-weight="bold">十二号: 異常所得</text>
  <text x="1245" y="3493" fill="#212121" font-size="11">上記各号に該当しない場合の受動的所得。</text>
  <text x="1245" y="3511" fill="#212121" font-size="11">副次項目（イ〜ヲ）で各種所得を列挙。</text>

  <!-- Partial amount calculation -->
  <rect x="40" y="3570" width="1760" height="145" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="60" y="3598" fill="#1b5e20" font-size="15" font-weight="bold">部分適用対象金額の計算（§66-6⑥⑦）:</text>
  <rect x="70" y="3610" width="1710" height="35" rx="5" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="85" y="3633" fill="#212121" font-size="13">部分適用対象金額 ＝ 一号〜十二号の合計額（負の場合は零）</text>
  <text x="60" y="3668" fill="#212121" font-size="13" font-weight="bold">金融子会社等部分適用対象金額（§66-6⑦⑧）:</text>
  <text x="80" y="3690" fill="#212121" font-size="12">2つの計算額のうち大きい方を採用。外国金融子会社等に適用。</text>
  <text x="80" y="3708" fill="#455a64" font-size="11" font-style="italic">※ 合算免除: ①税負担≧20%、②金額≦2,000万円、③当期利益の5%以下（§66-6⑧⑨）。</text>

  <!-- ================================================================== -->
  <!-- SECTION 6: 特殊関係株主等（§66-9-2〜§66-9-5） -->
  <!-- ================================================================== -->
  <rect x="20" y="3920" width="1800" height="620" rx="10" fill="url(#gSec)" stroke="#7986cb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="3952" fill="#1a237e" font-size="22" font-weight="bold">6. 特殊関係株主等に係るCFC税制（措法§66-9-2〜§66-9-5）</text>
  <text x="40" y="3978" fill="#37474f" font-size="13">80%以上保有の特殊関係がある場合の特則。§66-6〜§66-9の法人版CFC税制と並行する制度。</text>

  <rect x="40" y="3998" width="860" height="260" rx="8" fill="#fff" stroke="#5c6bc0" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="60" y="4025" fill="#283593" font-size="16" font-weight="bold">特殊関係株主等（§66-9-2①）</text>
  <text x="60" y="4050" fill="#212121" font-size="12">居住者・内国法人等で、特殊関係にある者と合わせて特殊関係内国法人の</text>
  <text x="60" y="4070" fill="#212121" font-size="12">発行済株式等の80%以上を保有する株主等。</text>

  <text x="60" y="4100" fill="#283593" font-size="14" font-weight="bold">特殊関係内国法人（§66-9-2①）:</text>
  <text x="80" y="4122" fill="#212121" font-size="12">政令で定める、特定の内国法人から資産・負債の大部分を引き継ぐ内国法人。</text>

  <text x="60" y="4152" fill="#283593" font-size="14" font-weight="bold">エンティティ分類（§66-9-2①②）:</text>
  <text x="80" y="4175" fill="#212121" font-size="12">• 特定外国関係法人: §66-6②二と同様の基準（ペーパー・キャッシュボックス・ブラックリスト）</text>
  <text x="80" y="4195" fill="#212121" font-size="12">• 対象外国関係法人: 経済活動基準の不充足</text>
  <text x="80" y="4215" fill="#212121" font-size="12">• 部分対象外国関係法人: 経済活動基準全充足（部分合算のみ）</text>
  <text x="80" y="4240" fill="#455a64" font-size="11" font-style="italic">閾値は同一（特定: 27%、対象・部分: 20%）。金額・免除基準も§66-6と同様。</text>

  <rect x="940" y="3998" width="860" height="260" rx="8" fill="#fff" stroke="#5c6bc0" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="960" y="4025" fill="#283593" font-size="16" font-weight="bold">二重課税排除（§66-9-3 / §66-9-4）</text>

  <text x="960" y="4055" fill="#283593" font-size="14" font-weight="bold">外国税額控除（§66-9-3）:</text>
  <text x="980" y="4078" fill="#212121" font-size="12">§66-7と同構造。FRCの外国法人税を内国法人のみなし納付と</text>
  <text x="980" y="4098" fill="#212121" font-size="12">して法人税法§69・地方法人税法§12を適用。</text>
  <text x="980" y="4118" fill="#212121" font-size="12">確定申告書への明細添付が条件。</text>

  <text x="960" y="4150" fill="#283593" font-size="14" font-weight="bold">課税済配当排除（§66-9-4）:</text>
  <text x="980" y="4173" fill="#212121" font-size="12">§66-8と同構造。FRCからの配当 → 特定課税対象金額の範囲内で</text>
  <text x="980" y="4193" fill="#212121" font-size="12">益金不算入（法人税法§23の2対象の配当を除く）。</text>
  <text x="980" y="4213" fill="#212121" font-size="12">間接特定課税対象金額による間接控除も規定。</text>
  <text x="980" y="4240" fill="#455a64" font-size="11" font-style="italic">※ 適格組織再編時の引継規定あり（§66-9-4⑤⑥）。</text>

  <!-- 委任規定 -->
  <rect x="40" y="4278" width="1760" height="80" rx="8" fill="#e8eaf6" stroke="#7986cb" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="60" y="4305" fill="#283593" font-size="15" font-weight="bold">委任規定（§66-9-5）:</text>
  <text x="60" y="4330" fill="#212121" font-size="13">特定関係の判定に関する事項その他§66-9-2〜§66-9-4の適用に関し必要な事項は政令で定める。</text>
  <text x="60" y="4350" fill="#455a64" font-size="12" font-style="italic">→ 具体的な計算方法・判定基準は施行令に委任。</text>

  <!-- Part‑applicable income for special shareholders -->
  <rect x="40" y="4380" width="1760" height="140" rx="8" fill="#fff" stroke="#5c6bc0" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="60" y="4408" fill="#283593" font-size="15" font-weight="bold">部分合算対象所得（§66-9-2⑥各号）— 特殊関係株主等版:</text>
  <text x="60" y="4435" fill="#212121" font-size="12">§66-6⑥と同一の12項目: 配当(i1)・利子(i2)・有価証券貸借料(i3)・有価証券譲渡(i4)・デリバティブ(i5)・</text>
  <text x="60" y="4455" fill="#212121" font-size="12">為替差損益(i6)・その他資産運用(i7)・保険料(i8)・固定資産賃貸(i9)・無形資産使用料(i10)・無形資産譲渡(i11)・異常所得(i12)</text>
  <text x="60" y="4480" fill="#212121" font-size="12">免除基準: 税負担≧20%、金額≦2,000万円、当期利益の5%以下（§66-9-2⑧⑨⑩と同様）。</text>
  <text x="60" y="4505" fill="#455a64" font-size="11" font-style="italic">※ 外国金融子会社等に係る部分適用対象金額の特則もあり（§66-9-2⑧⑨と同構造）。</text>

  <!-- ================================================================== -->
  <!-- SECTION 7: 施行令補足 -->
  <!-- ================================================================== -->
  <rect x="20" y="4560" width="1800" height="540" rx="10" fill="url(#gSec)" stroke="#7986cb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="4592" fill="#1a237e" font-size="22" font-weight="bold">7. 施行令の主要規定（施行令§39-14〜§39-17-2）</text>

  <rect x="40" y="4610" width="570" height="220" rx="8" fill="#fff" stroke="#78909c" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="55" y="4635" fill="#37474f" font-size="14" font-weight="bold">§39-14: 課税対象金額の計算等</text>
  <text x="55" y="4660" fill="#212121" font-size="12">①適用対象金額×請求権等勘案合算割合</text>
  <text x="55" y="4680" fill="#212121" font-size="12">②請求権等勘案合算割合の定義:</text>
  <text x="75" y="4700" fill="#212121" font-size="11">直接保有（配当額比率加重）+間接保有割合</text>
  <text x="55" y="4722" fill="#212121" font-size="12">③④間接保有割合の計算方法</text>
  <text x="55" y="4742" fill="#212121" font-size="12">⑥特殊関係者の範囲:</text>
  <text x="75" y="4762" fill="#212121" font-size="11">親族・使用人・支配関係法人等</text>
  <text x="55" y="4784" fill="#455a64" font-size="11" font-style="italic">→ 合算金額＝適用対象金額×持分割合</text>
  <text x="55" y="4804" fill="#455a64" font-size="11" font-style="italic">→ 法人税法§23①一号の配当額比率を使用</text>

  <rect x="635" y="4610" width="570" height="220" rx="8" fill="#fff" stroke="#78909c" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="650" y="4635" fill="#37474f" font-size="14" font-weight="bold">§39-14-3: 特定FRC等の範囲</text>
  <text x="650" y="4660" fill="#212121" font-size="12">ペーパーカンパニーの除外要件の詳細:</text>
  <text x="670" y="4682" fill="#212121" font-size="11">• 特定保険外国子会社（全株式直接間接保有+</text>
  <text x="680" y="4700" fill="#212121" font-size="11">本店所在地国で保険業務遂行）</text>
  <text x="670" y="4722" fill="#212121" font-size="11">• 特定保険受託者（同上）</text>
  <text x="670" y="4744" fill="#212121" font-size="11">• 外国子会社: 株式25%以上+6月以上保有</text>
  <text x="670" y="4766" fill="#212121" font-size="11">• 収入・資産の95%超集中の子会社</text>
  <text x="670" y="4788" fill="#212121" font-size="11">• 特定不動産保有の子会社</text>
  <text x="650" y="4812" fill="#455a64" font-size="11" font-style="italic">主要閾値: 25%、95%、10%、50%</text>

  <rect x="1230" y="4610" width="570" height="220" rx="8" fill="#fff" stroke="#78909c" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="1245" y="4635" fill="#37474f" font-size="14" font-weight="bold">§39-15: 基準所得金額の計算</text>
  <text x="1245" y="4660" fill="#212121" font-size="12">基準所得金額 =（①+②）−（③+④+⑤）</text>
  <text x="1265" y="4682" fill="#212121" font-size="11">① 所得金額（日本法人税法準拠、特定条項除外）</text>
  <text x="1265" y="4702" fill="#212121" font-size="11">② 実際に納付した外国法人税額</text>
  <text x="1265" y="4722" fill="#212121" font-size="11">③ 還付された外国法人税額</text>
  <text x="1265" y="4742" fill="#212121" font-size="11">④ 子会社配当（持株25%以上又は10%以上</text>
  <text x="1275" y="4760" fill="#212121" font-size="11">〔租税条約国〕+6月以上継続保有）</text>
  <text x="1265" y="4782" fill="#212121" font-size="11">⑤ 部分対象FRC株式の特定譲渡益</text>
  <text x="1245" y="4810" fill="#455a64" font-size="11" font-style="italic">→ 欠損金控除: 前7年分を順次控除</text>

  <!-- Row 2 -->
  <rect x="40" y="4845" width="570" height="230" rx="8" fill="#fff" stroke="#78909c" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="55" y="4870" fill="#37474f" font-size="14" font-weight="bold">§39-16: 実質支配関係の判定</text>
  <text x="55" y="4895" fill="#212121" font-size="12">①残余財産の全部請求権 or 処分方針決定権</text>
  <text x="55" y="4917" fill="#212121" font-size="12">②特殊の関係（個人: 親族等、法人: 50%超保有）</text>
  <text x="55" y="4939" fill="#212121" font-size="12">③法人税法施行令§4③の準用</text>
  <text x="55" y="4961" fill="#212121" font-size="12">④「50%以上」→「50%超」と読替え</text>
  <text x="55" y="4990" fill="#455a64" font-size="11" font-style="italic">→ 持株割合だけでなく契約・権利ベースの判定</text>

  <rect x="635" y="4845" width="570" height="230" rx="8" fill="#fff" stroke="#78909c" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="650" y="4870" fill="#37474f" font-size="14" font-weight="bold">§39-17: 部分対象FRCの詳細定義</text>
  <text x="650" y="4895" fill="#212121" font-size="12">①②特定保険外国子会社の要件</text>
  <text x="650" y="4917" fill="#212121" font-size="12">③外国金融機関の管理会社:</text>
  <text x="670" y="4937" fill="#212121" font-size="11">純資産の75%超 or 50%超が金融機関株式</text>
  <text x="670" y="4957" fill="#212121" font-size="11">議決権40%以上要件（直接保有不能時）</text>
  <text x="650" y="4979" fill="#212121" font-size="12">⑧従属関連業務子会社（収入の90%以上が関連取引）</text>
  <text x="650" y="4999" fill="#212121" font-size="12">⑨特定中間持株会社（50%超保有+同一管轄）</text>
  <text x="650" y="5019" fill="#455a64" font-size="11" font-style="italic">主要閾値: 75%, 50%, 90%, 40%</text>
  <text x="650" y="5039" fill="#455a64" font-size="11" font-style="italic">④特定資本関係: 全株式の直接間接保有</text>

  <rect x="1230" y="4845" width="570" height="230" rx="8" fill="#fff" stroke="#78909c" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="1245" y="4870" fill="#37474f" font-size="14" font-weight="bold">§39-17-2: 租税負担割合の計算</text>
  <text x="1245" y="4895" fill="#212121" font-size="12">= 外国法人税額 ÷ 所得金額</text>
  <text x="1245" y="4920" fill="#212121" font-size="12" font-weight="bold">イ（法人税ある国）:</text>
  <text x="1265" y="4940" fill="#212121" font-size="11">所得 = 決算利益 +（非課税所得+配当費用+</text>
  <text x="1275" y="4958" fill="#212121" font-size="11">外国税+保険準備金等）− 還付外国税</text>
  <text x="1245" y="4983" fill="#212121" font-size="12" font-weight="bold">ロ（法人税なき国）:</text>
  <text x="1265" y="5003" fill="#212121" font-size="11">所得 = 決算利益 +（費用計上配当+外国税+</text>
  <text x="1275" y="5021" fill="#212121" font-size="11">保険準備金）−（収益計上配当+還付外国税）</text>
  <text x="1245" y="5045" fill="#455a64" font-size="11" font-style="italic">④段階税率の場合は最高税率を適用可。</text>
  <text x="1245" y="5063" fill="#455a64" font-size="11" font-style="italic">所得零又は欠損の場合の特例あり。</text>

  <!-- SECTION 8: 手続規定 -->

  <rect x="20" y="5120" width="1800" height="280" rx="10" fill="url(#gSec)" stroke="#7986cb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="40" y="5152" fill="#1a237e" font-size="22" font-weight="bold">8. 手続規定・書類保存義務</text>

  <rect x="40" y="5170" width="860" height="210" rx="8" fill="url(#gProc)" stroke="#8e24aa" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="60" y="5198" fill="#6a1b9a" font-size="16" font-weight="bold">確定申告書への添付義務</text>
  <text x="60" y="5225" fill="#212121" font-size="12" font-weight="bold">§66-6⑩⑪ / §66-9-2⑪⑫:</text>
  <text x="80" y="5248" fill="#212121" font-size="12">• 貸借対照表・損益計算書の添付（FRCの財務書類）</text>
  <text x="80" y="5270" fill="#212121" font-size="12">• 合算金額の計算明細書の添付</text>
  <text x="80" y="5292" fill="#212121" font-size="12">• 確定申告書（又は修正申告書）への記載が適用要件</text>
  <text x="60" y="5322" fill="#212121" font-size="12" font-weight="bold">§66-7④ / §66-9-3④:</text>
  <text x="80" y="5345" fill="#212121" font-size="12">• 外国税額控除の明細書添付が控除適用の条件</text>
  <text x="80" y="5365" fill="#455a64" font-size="11" font-style="italic">→ 添付漏れは合算課税・税額控除の否認リスクあり。</text>

  <rect x="940" y="5170" width="860" height="210" rx="8" fill="url(#gProc)" stroke="#8e24aa" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="960" y="5198" fill="#6a1b9a" font-size="16" font-weight="bold">書類保存・情報提供義務</text>
  <text x="960" y="5225" fill="#212121" font-size="12" font-weight="bold">§66-6⑪ / §66-9-2⑫:</text>
  <text x="980" y="5248" fill="#212121" font-size="12">• FRCの事業年度に係る書類の保存義務</text>
  <text x="980" y="5270" fill="#212121" font-size="12">• 国税庁職員からの書類提示・提出要求への対応義務</text>

  <text x="960" y="5300" fill="#212121" font-size="12" font-weight="bold">§66-9（委任規定）:</text>
  <text x="980" y="5323" fill="#212121" font-size="12">• FRCの分類判定に関する事項は政令で定める</text>
  <text x="980" y="5345" fill="#212121" font-size="12">• 前三条（§66-6〜§66-8）の適用に関する事項は政令で定める</text>
  <text x="980" y="5368" fill="#455a64" font-size="11" font-style="italic">→ 施行令が実務上の詳細基準を規定。</text>
