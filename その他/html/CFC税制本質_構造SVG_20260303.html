<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CFC税制の本質 - 構造SVG</title>
<style>
  body { margin: 0; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .wrapper { background: white; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<div class="wrapper">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#e8edf2"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#2b4c7e"/>
    </linearGradient>
    <linearGradient id="kaneko" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="fuchi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="okamura" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="judgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="conflictGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <marker id="arrowGreen" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 8" refX="10" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#1a365d" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#1a365d" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#1a365d" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#1a365d" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#1a365d" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#1a365d" stroke-width="1"/>
    <line x1="0" y1="700" x2="1200" y2="700" stroke="#1a365d" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="800" stroke="#1a365d" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="800" stroke="#1a365d" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="800" stroke="#1a365d" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="800" stroke="#1a365d" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="800" stroke="#1a365d" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a365d" letter-spacing="2">CFC税制（外国子会社合算税制）の本質論 ─ 構造ダイアグラム</text>
  <line x1="150" y1="48" x2="1050" y2="48" stroke="#2563eb" stroke-width="1.5" opacity="0.3"/>

  <!-- ============================== -->
  <!-- SECTION: 3学説 (Left-Center)   -->
  <!-- ============================== -->

  <!-- Central node -->
  <g filter="url(#glow)">
    <rect x="430" y="280" width="220" height="70" rx="35" fill="url(#centerGrad)" stroke="#0f172a" stroke-width="1.5"/>
    <text x="540" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">CFC税制の本質</text>
    <text x="540" y="330" text-anchor="middle" font-size="10.5" fill="#93c5fd">外国子会社合算税制の法的性質</text>
  </g>

  <!-- 金子説 (Top-left) -->
  <g filter="url(#shadow)">
    <rect x="140" y="140" width="230" height="100" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="140" y="140" width="230" height="30" rx="12" fill="url(#kaneko)"/>
    <rect x="140" y="158" width="230" height="12" fill="url(#kaneko)"/>
    <text x="255" y="161" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">金子説（擬制配当説）</text>
    <text x="255" y="187" text-anchor="middle" font-size="10.5" fill="#334155">合算対象＝擬制配当として課税</text>
    <text x="255" y="204" text-anchor="middle" font-size="10.5" fill="#334155">法人格：尊重</text>
    <text x="255" y="221" text-anchor="middle" font-size="10.5" fill="#16a34a" font-weight="bold">条約適合性：◯ 適合</text>
  </g>

  <!-- 渕説 (Top-right) -->
  <g filter="url(#shadow)">
    <rect x="710" y="140" width="230" height="100" rx="12" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="710" y="140" width="230" height="30" rx="12" fill="url(#fuchi)"/>
    <rect x="710" y="158" width="230" height="12" fill="url(#fuchi)"/>
    <text x="825" y="161" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">渕説（内国法人所得説）</text>
    <text x="825" y="187" text-anchor="middle" font-size="10.5" fill="#334155">実質的には内国法人の所得</text>
    <text x="825" y="204" text-anchor="middle" font-size="10.5" fill="#334155">法人格：実質否認</text>
    <text x="825" y="221" text-anchor="middle" font-size="10.5" fill="#dc2626" font-weight="bold">条約適合性：△ 問題あり</text>
  </g>

  <!-- 岡村説 (Bottom-center) -->
  <g filter="url(#shadow)">
    <rect x="385" y="420" width="310" height="110" rx="12" fill="#ffffff" stroke="#1d4ed8" stroke-width="2.5"/>
    <rect x="385" y="420" width="310" height="32" rx="12" fill="url(#okamura)"/>
    <rect x="385" y="440" width="310" height="12" fill="url(#okamura)"/>
    <text x="540" y="443" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">岡村説（私法上帰属説）★最精緻</text>
    <text x="540" y="472" text-anchor="middle" font-size="10.5" fill="#334155">「私法上はCFCに帰属する所得を、</text>
    <text x="540" y="488" text-anchor="middle" font-size="10.5" fill="#334155">租税政策上合算する」</text>
    <text x="540" y="505" text-anchor="middle" font-size="10.5" fill="#334155">法人格：尊重</text>
    <text x="540" y="520" text-anchor="middle" font-size="10.5" fill="#16a34a" font-weight="bold">条約適合性：◯ 適合</text>
  </g>

  <!-- 三角形の辺（点線） -->
  <line x1="370" y1="195" x2="710" y2="195" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
  <line x1="270" y1="240" x2="480" y2="420" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
  <line x1="810" y1="240" x2="610" y2="420" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>

  <!-- 中央←→学説の接続矢印 -->
  <path d="M 430,300 Q 380,260 370,210" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)" opacity="0.6"/>
  <path d="M 650,300 Q 700,260 710,210" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)" opacity="0.6"/>
  <path d="M 540,350 L 540,420" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)" opacity="0.6"/>

  <!-- ============================== -->
  <!-- SECTION: グラクソ判決 (Orange)  -->
  <!-- ============================== -->
  <g filter="url(#shadow)">
    <rect x="90" y="380" width="250" height="80" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <rect x="90" y="380" width="250" height="28" rx="12" fill="url(#judgeGrad)"/>
    <rect x="90" y="396" width="250" height="12" fill="url(#judgeGrad)"/>
    <text x="215" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">グラクソ最高裁判決（2009年）</text>
    <text x="215" y="425" text-anchor="middle" font-size="10" fill="#9a3412">「内国法人に対する</text>
    <text x="215" y="440" text-anchor="middle" font-size="10" fill="#9a3412">課税権の行使」と判示</text>
  </g>

  <!-- グラクソ → 岡村説 支持矢印 -->
  <path d="M 340,435 Q 362,445 385,455" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="348" y="430" font-size="9.5" fill="#16a34a" font-weight="bold" transform="rotate(-8, 348, 430)">支持</text>

  <!-- ============================== -->
  <!-- SECTION: ハイブリッド矛盾構造  -->
  <!-- ============================== -->

  <!-- 外枠 -->
  <rect x="730" y="300" width="440" height="250" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.9"/>
  <text x="950" y="322" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">⚠ ハイブリッド状態の構造的矛盾</text>

  <!-- 左側：私法上・条約上 -->
  <rect x="750" y="338" width="190" height="90" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="845" y="358" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">私法上・条約上</text>
  <line x1="770" y1="365" x2="920" y2="365" stroke="#cbd5e1" stroke-width="1"/>
  <text x="845" y="383" text-anchor="middle" font-size="11" fill="#334155">→ 外国法人</text>
  <text x="845" y="400" text-anchor="middle" font-size="10" fill="#64748b">法人格を尊重</text>
  <text x="845" y="417" text-anchor="middle" font-size="10" fill="#64748b">岡村説の立場</text>

  <!-- 右側：計算上 -->
  <rect x="960" y="338" width="190" height="90" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
  <text x="1055" y="358" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">計算上（本邦法令基準）</text>
  <line x1="980" y1="365" x2="1130" y2="365" stroke="#fca5a5" stroke-width="1"/>
  <text x="1055" y="383" text-anchor="middle" font-size="11" fill="#334155">→ 内国法人扱い</text>
  <text x="1055" y="400" text-anchor="middle" font-size="10" fill="#64748b">本邦法令の規定の</text>
  <text x="1055" y="417" text-anchor="middle" font-size="10" fill="#64748b">例に準じて計算</text>

  <!-- VS / 矛盾マーク -->
  <circle cx="950" cy="383" r="16" fill="#dc2626"/>
  <text x="950" y="388" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">VS</text>

  <!-- 準用の病理 -->
  <rect x="770" y="445" width="360" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="950" y="464" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">「準用の病理」</text>
  <text x="950" y="482" text-anchor="middle" font-size="10" fill="#7f1d1d">青色申告要件の適用不能 ／ 損金経理要件の適用不能</text>

  <!-- 矛盾への矢印 -->
  <path d="M 845,428 L 880,445" stroke="#dc2626" stroke-width="1.2" fill="none" marker-end="url(#arrowRed)" opacity="0.7"/>
  <path d="M 1055,428 L 1020,445" stroke="#dc2626" stroke-width="1.2" fill="none" marker-end="url(#arrowRed)" opacity="0.7"/>

  <!-- ============================== -->
  <!-- SECTION: 課税根拠論の変遷      -->
  <!-- ============================== -->

  <!-- Timeline bar -->
  <rect x="70" y="588" width="1060" height="3" rx="1.5" fill="#cbd5e1"/>

  <!-- 年代マーカー -->
  <circle cx="160" cy="589" r="6" fill="#2563eb"/>
  <text x="160" y="580" text-anchor="middle" font-size="9" fill="#64748b" font-weight="bold">1978年〜</text>

  <circle cx="500" cy="589" r="6" fill="#ea580c"/>
  <text x="500" y="580" text-anchor="middle" font-size="9" fill="#64748b" font-weight="bold">2009年</text>

  <circle cx="780" cy="589" r="6" fill="#ea580c"/>
  <text x="780" y="580" text-anchor="middle" font-size="9" fill="#64748b" font-weight="bold">2017年</text>

  <circle cx="1020" cy="589" r="6" fill="#16a34a"/>
  <text x="1020" y="580" text-anchor="middle" font-size="9" fill="#64748b" font-weight="bold">BEPS以降</text>

  <!-- 課税繰延防止説 -->
  <g filter="url(#shadow)">
    <rect x="80" y="608" width="200" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="180" y="628" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">課税繰延防止説</text>
    <text x="180" y="644" text-anchor="middle" font-size="9.5" fill="#475569">（米国型）</text>
    <text x="180" y="660" text-anchor="middle" font-size="9" fill="#64748b">課税繰延という特典を否定</text>
  </g>

  <!-- 説明力低下の矢印 -->
  <line x1="280" y1="643" x2="400" y2="643" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="340" y="636" text-anchor="middle" font-size="8.5" fill="#dc2626">益金不算入制度導入</text>
  <text x="340" y="656" text-anchor="middle" font-size="8.5" fill="#dc2626">→ 説明力低下</text>

  <!-- 租税回避防止説 -->
  <g filter="url(#shadow)">
    <rect x="410" y="608" width="200" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="510" y="628" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">租税回避防止説</text>
    <text x="510" y="644" text-anchor="middle" font-size="9.5" fill="#475569">（日本型）</text>
    <text x="510" y="660" text-anchor="middle" font-size="9" fill="#64748b">租税回避類型への対抗</text>
  </g>

  <!-- 説明困難の矢印 -->
  <line x1="610" y1="643" x2="730" y2="643" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="670" y="636" text-anchor="middle" font-size="8.5" fill="#dc2626">部分合算課税導入</text>
  <text x="670" y="656" text-anchor="middle" font-size="8.5" fill="#dc2626">→ 説明困難に</text>

  <!-- 新たな統合理解 -->
  <g filter="url(#shadow)">
    <rect x="740" y="608" width="380" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="930" y="628" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">新たな統合理解（BEPS対応型）</text>
    <line x1="760" y1="636" x2="1100" y2="636" stroke="#bbf7d0" stroke-width="1"/>
    <text x="930" y="652" text-anchor="middle" font-size="9.5" fill="#334155">受動的所得 → 課税繰延防止</text>
    <text x="930" y="668" text-anchor="middle" font-size="9.5" fill="#334155">能動的所得 → 租税回避防止</text>
  </g>

  <!-- Section label: 課税根拠論 -->
  <text x="600" y="560" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569" letter-spacing="3">課 税 根 拠 論 の 変 遷</text>
  <line x1="400" y1="568" x2="800" y2="568" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>

  <!-- ============================== -->
  <!-- Legend -->
  <!-- ============================== -->
  <g transform="translate(70, 710)">
    <rect x="0" y="0" width="1060" height="55" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="0.8"/>
    <text x="20" y="20" font-size="10" font-weight="bold" fill="#475569">凡例：</text>
    <rect x="70" y="10" width="14" height="14" rx="3" fill="#2563eb"/>
    <text x="90" y="22" font-size="10" fill="#334155">法理論・学説</text>
    <rect x="190" y="10" width="14" height="14" rx="3" fill="#ea580c"/>
    <text x="210" y="22" font-size="10" fill="#334155">判例・実務</text>
    <rect x="310" y="10" width="14" height="14" rx="3" fill="#dc2626"/>
    <text x="330" y="22" font-size="10" fill="#334155">矛盾・問題点</text>
    <rect x="440" y="10" width="14" height="14" rx="3" fill="#16a34a"/>
    <text x="460" y="22" font-size="10" fill="#334155">支持・整合</text>

    <line x1="570" y1="17" x2="600" y2="17" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <text x="610" y="22" font-size="10" fill="#334155">支持</text>

    <line x1="670" y1="17" x2="700" y2="17" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
    <text x="710" y="22" font-size="10" fill="#334155">説明力低下</text>

    <line x1="810" y1="17" x2="840" y2="17" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,3"/>
    <text x="850" y="22" font-size="10" fill="#334155">学説間の対立軸</text>

    <text x="20" y="44" font-size="9" fill="#94a3b8">★ 岡村説が最も精緻とされ、グラクソ最高裁判決（2009年）が支持。しかし「準用の病理」というハイブリッド矛盾が残存する。</text>
  </g>

  <!-- ============================== -->
  <!-- 接続：グラクソ→矛盾構造       -->
  <!-- ============================== -->
  <path d="M 215,460 Q 215,530 600,530 Q 820,530 870,500" stroke="#ea580c" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowOrange)" opacity="0.5"/>
  <text x="530" y="544" text-anchor="middle" font-size="8.5" fill="#ea580c">判決の論理が矛盾を内包</text>

  <!-- 岡村説 → ハイブリッド矛盾 接続 -->
  <path d="M 695,470 L 730,400" stroke="#dc2626" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)" opacity="0.6"/>
  <text x="730" y="448" font-size="8.5" fill="#dc2626" transform="rotate(-55, 730, 448)">矛盾を惹起</text>

</svg>
</div>
</body>
</html>
