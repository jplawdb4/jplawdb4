<!-- ===== ZONE B: Action 3 CFC税制強化 (y=50-168) ===== -->
<rect x="8" y="50" width="1084" height="22" rx="5" fill="#1c1400" stroke="#fbbf24" stroke-width="1.5"/>
<text x="550" y="65" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">Action 3: CFC税制強化（平成29年度改正）</text>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_6&amp;mode=only" target="_blank">
  <rect x="8" y="78" width="354" height="84" rx="6" fill="#1c1400" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="185" y="96" text-anchor="middle" fill="#fbbf24" font-size="10.5" font-weight="bold">措法66の6①：全所得合算課税</text>
  <text x="185" y="112" text-anchor="middle" fill="#fde68a" font-size="9.5">特定外国関係会社（ペーパーカンパニー等）の</text>
  <text x="185" y="126" text-anchor="middle" fill="#fde68a" font-size="9.5">全所得を内国法人の所得に合算課税</text>
  <text x="185" y="141" text-anchor="middle" fill="#d97706" font-size="9">実体基準・管理支配基準いずれも充足しない外国法人</text>
  <text x="185" y="154" text-anchor="middle" fill="#d97706" font-size="8.5">（平29年度改正：特定・対象・部分対象の3類型整理）</text>
</a>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_6&amp;mode=only" target="_blank">
  <rect x="372" y="78" width="354" height="84" rx="6" fill="#1c1400" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="549" y="96" text-anchor="middle" fill="#fbbf24" font-size="10.5" font-weight="bold">措法66の6⑥：部分合算課税（8類型）</text>
  <text x="549" y="112" text-anchor="middle" fill="#fde68a" font-size="9.5">①配当等　②利子等　③有価証券　④デリバティブ</text>
  <text x="549" y="126" text-anchor="middle" fill="#fde68a" font-size="9.5">⑤不動産等　⑥無形資産　⑦保険　⑧異常所得</text>
  <text x="549" y="141" text-anchor="middle" fill="#d97706" font-size="9">受動的所得を8類型に分類し部分合算課税</text>
  <text x="549" y="154" text-anchor="middle" fill="#d97706" font-size="8.5">特定課税対象金額 = 持分割合 × 部分合算対象金額</text>
</a>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln40_4&amp;mode=only" target="_blank">
  <rect x="736" y="78" width="356" height="84" rx="6" fill="#1c1400" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="914" y="96" text-anchor="middle" fill="#fbbf24" font-size="10.5" font-weight="bold">措法40の4〜6：個人居住者版合算課税</text>
  <text x="914" y="112" text-anchor="middle" fill="#fde68a" font-size="9.5">40の4：居住者の外国子会社合算（雑所得算入）</text>
  <text x="914" y="126" text-anchor="middle" fill="#fde68a" font-size="9.5">40の5：外国税額控除（個人版）</text>
  <text x="914" y="141" text-anchor="middle" fill="#d97706" font-size="9">40の6：個人居住者版部分合算課税</text>
  <text x="914" y="154" text-anchor="middle" fill="#d97706" font-size="8.5">法人版（66の6〜9）と並列して規定</text>
</a>

<!-- ===== ZONE C: Action 4 利子損金算入制限 (y=178-310) ===== -->
<rect x="8" y="178" width="1084" height="22" rx="5" fill="#1a0a00" stroke="#f97316" stroke-width="1.5"/>
<text x="550" y="193" text-anchor="middle" fill="#f97316" font-size="11" font-weight="bold">Action 4: 利子損金算入制限（平成31年度改正）</text>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_5_2&amp;mode=only" target="_blank">
  <rect x="8" y="206" width="264" height="94" rx="6" fill="#1a0a00" stroke="#f97316" stroke-width="1.5"/>
  <text x="140" y="223" text-anchor="middle" fill="#f97316" font-size="10.5" font-weight="bold">措法66の5の2：過大支払利子</text>
  <text x="140" y="238" text-anchor="middle" fill="#f97316" font-size="10.5" font-weight="bold">損金不算入（基本規定）</text>
  <text x="140" y="254" text-anchor="middle" fill="#fdba74" font-size="9.5">関連者純支払利子 ≦ 調整所得×20%</text>
  <text x="140" y="268" text-anchor="middle" fill="#fdba74" font-size="9.5">（固定比率ルール）</text>
  <text x="140" y="283" text-anchor="middle" fill="#d97706" font-size="9">超過部分：損金不算入</text>
  <text x="140" y="294" text-anchor="middle" fill="#d97706" font-size="8.5">調整所得金額 = EBITDA相当額</text>
</a>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_5_2&amp;mode=only" target="_blank">
  <rect x="280" y="206" width="264" height="94" rx="6" fill="#1a0a00" stroke="#f97316" stroke-width="1.5"/>
  <text x="412" y="223" text-anchor="middle" fill="#f97316" font-size="10.5" font-weight="bold">措法66の5の3：グループ比率ルール</text>
  <text x="412" y="240" text-anchor="middle" fill="#fdba74" font-size="9.5">連結EBITDAに対する純支払利子比率が</text>
  <text x="412" y="254" text-anchor="middle" fill="#fdba74" font-size="9.5">固定比率（20%）を超える場合に適用</text>
  <text x="412" y="269" text-anchor="middle" fill="#d97706" font-size="9">グループ全体の利子費用比率で判定</text>
  <text x="412" y="283" text-anchor="middle" fill="#d97706" font-size="9">固定比率ルールより有利な場合に選択可</text>
  <text x="412" y="294" text-anchor="middle" fill="#d97706" font-size="8.5">（BEPSグループ比率アプローチ）</text>
</a>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_5_2&amp;mode=only" target="_blank">
  <rect x="552" y="206" width="264" height="94" rx="6" fill="#1a0a00" stroke="#f97316" stroke-width="1.5"/>
  <text x="684" y="223" text-anchor="middle" fill="#f97316" font-size="10.5" font-weight="bold">措法66の5の4：繰越規定</text>
  <text x="684" y="240" text-anchor="middle" fill="#fdba74" font-size="9.5">超過利子額：7年間繰越可</text>
  <text x="684" y="254" text-anchor="middle" fill="#fdba74" font-size="9.5">繰越未控除利子の当期損金算入</text>
  <text x="684" y="269" text-anchor="middle" fill="#d97706" font-size="9">繰越控除額 ≦ 当期余裕額</text>
  <text x="684" y="283" text-anchor="middle" fill="#d97706" font-size="9">（固定比率20%以下の部分）</text>
  <text x="684" y="294" text-anchor="middle" fill="#d97706" font-size="8.5">平成31年度改正で新設</text>
</a>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_5&amp;mode=only" target="_blank">
  <rect x="824" y="206" width="268" height="94" rx="6" fill="#1a0a00" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="958" y="223" text-anchor="middle" fill="#fb923c" font-size="10.5" font-weight="bold">措法66の5：過少資本税制</text>
  <text x="958" y="240" text-anchor="middle" fill="#fdba74" font-size="9.5">負債資本比率3倍超の部分</text>
  <text x="958" y="254" text-anchor="middle" fill="#fdba74" font-size="9.5">→ 支払利子損金不算入</text>
  <text x="958" y="269" text-anchor="middle" fill="#d97706" font-size="9">BEPS以前からの制度（平成4年度改正）</text>
  <text x="958" y="283" text-anchor="middle" fill="#d97706" font-size="9">66の5の2との重複適用時は大きい方を適用</text>
  <text x="958" y="294" text-anchor="middle" fill="#d97706" font-size="8.5">（66の5の2③）</text>
</a>

<!-- ===== ZONE D: Action 6/15 条約濫用防止・MLI (y=316-444) ===== -->
<rect x="8" y="316" width="1084" height="22" rx="5" fill="#1a0810" stroke="#f87171" stroke-width="1.5"/>
<text x="550" y="331" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">Action 6/15: 条約濫用防止・MLI（2019年1月発効）</text>

<!-- MLI7条：PPT（破線・リンクなし） -->
<rect x="8" y="344" width="354" height="92" rx="6" fill="#1a0810" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="185" y="362" text-anchor="middle" fill="#f87171" font-size="10.5" font-weight="bold">MLI7条：PPT（主要目的テスト）</text>
<text x="185" y="378" text-anchor="middle" fill="#fca5a5" font-size="9.5">取引の主要目的の1つが条約便益の取得</text>
<text x="185" y="392" text-anchor="middle" fill="#fca5a5" font-size="9.5">→ 便益不適用（客観的判断）</text>
<text x="185" y="407" text-anchor="middle" fill="#ef4444" font-size="9">日本が採用する最低基準（BEPS Action 6）</text>
<text x="185" y="420" text-anchor="middle" fill="#ef4444" font-size="9">締約国との全条約に適用</text>
<text x="185" y="430" text-anchor="middle" fill="#dc2626" font-size="8.5">MLI = 税源浸食・利益移転防止多数国間条約</text>

<!-- LOB（破線・リンクなし） -->
<rect x="372" y="344" width="354" height="92" rx="6" fill="#1a0810" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="549" y="362" text-anchor="middle" fill="#f87171" font-size="10.5" font-weight="bold">LOB（特典制限条項）</text>
<text x="549" y="378" text-anchor="middle" fill="#fca5a5" font-size="9.5">適格居住者要件：上場・政府・事業目的等</text>
<text x="549" y="392" text-anchor="middle" fill="#fca5a5" font-size="9.5">条約締約国の真の居住者でない者の便益排除</text>
<text x="549" y="407" text-anchor="middle" fill="#ef4444" font-size="9">主観的テスト（PPT）と客観的テスト（LOB）を組合せ</text>
<text x="549" y="420" text-anchor="middle" fill="#ef4444" font-size="9">OECDモデル条約29条に規定</text>
<text x="549" y="430" text-anchor="middle" fill="#dc2626" font-size="8.5">（日本：PPT採用、LOBは二国間条約で対応）</text>

<!-- MLI12〜15条 PE定義修正（破線・リンクなし） -->
<rect x="736" y="344" width="356" height="92" rx="6" fill="#1a0810" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="914" y="362" text-anchor="middle" fill="#f87171" font-size="10.5" font-weight="bold">MLI12〜15条：PE定義修正</text>
<text x="914" y="378" text-anchor="middle" fill="#fca5a5" font-size="9.5">代理人PE強化（独立代理人要件厳格化）</text>
<text x="914" y="392" text-anchor="middle" fill="#fca5a5" font-size="9.5">Anti-fragmentation rule（準備的補助的活動の細分化防止）</text>
<text x="914" y="407" text-anchor="middle" fill="#ef4444" font-size="9">従属代理人：「習慣的に締約」→ 「主要役割」基準に</text>
<text x="914" y="420" text-anchor="middle" fill="#ef4444" font-size="9">独立代理人：通常の業務範囲内のみ除外</text>
<text x="914" y="430" text-anchor="middle" fill="#dc2626" font-size="8.5">（BEPS Action 7 対応）</text>

<!-- ===== ZONE E: Action 8-10 移転価格 (y=452-578) ===== -->
<rect x="8" y="452" width="1084" height="22" rx="5" fill="#0d1a30" stroke="#60a5fa" stroke-width="1.5"/>
<text x="550" y="467" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">Action 8-10: 移転価格改訂・DEMPE分析（平成29〜30年度改正）</text>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_4&amp;mode=only" target="_blank">
  <rect x="8" y="480" width="264" height="90" rx="6" fill="#0d1a30" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="140" y="497" text-anchor="middle" fill="#60a5fa" font-size="10.5" font-weight="bold">措法66の4①：ALP・DEMPE分析</text>
  <text x="140" y="513" text-anchor="middle" fill="#93c5fd" font-size="9.5">独立企業間原則（Arm's Length Principle）</text>
  <text x="140" y="527" text-anchor="middle" fill="#93c5fd" font-size="9.5">DEMPE機能分析による無形資産評価</text>
  <text x="140" y="542" text-anchor="middle" fill="#6ea8fe" font-size="9">開発・強化・維持・保護・活用の機能に応じた</text>
  <text x="140" y="555" text-anchor="middle" fill="#6ea8fe" font-size="9">リターン配分（BEPS Action 8最終報告書）</text>
  <text x="140" y="565" text-anchor="middle" fill="#3b82f6" font-size="8.5">平成29年度改正で無形資産の定義を拡充</text>
</a>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_4_6&amp;mode=only" target="_blank">
  <rect x="280" y="480" width="264" height="90" rx="6" fill="#1a1000" stroke="#eab308" stroke-width="1.5"/>
  <text x="412" y="497" text-anchor="middle" fill="#eab308" font-size="10.5" font-weight="bold">措法66の4の6：特定無形資産CWI</text>
  <text x="412" y="513" text-anchor="middle" fill="#fde68a" font-size="9.5">収益配分法（CWI）：令和5年度改正</text>
  <text x="412" y="527" text-anchor="middle" fill="#fde68a" font-size="9.5">特定無形資産（開発中等）の価格調整条項</text>
  <text x="412" y="542" text-anchor="middle" fill="#d97706" font-size="9">実際の結果と予測の著しい乖離時→</text>
  <text x="412" y="555" text-anchor="middle" fill="#d97706" font-size="9">更新価格への遡及調整（HTVI条項）</text>
  <text x="412" y="565" text-anchor="middle" fill="#b45309" font-size="8.5">BEPS Action 8 Hard-to-Value Intangibles対応</text>
</a>

<a href="https://lawzilla.jp/law/332CO0000000043?n=ln39_12&amp;mode=only" target="_blank">
  <rect x="552" y="480" width="264" height="90" rx="6" fill="#0d1a30" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="684" y="497" text-anchor="middle" fill="#60a5fa" font-size="10.5" font-weight="bold">措令39の12：算定方法詳細</text>
  <text x="684" y="513" text-anchor="middle" fill="#93c5fd" font-size="9.5">独立価格比準法（CUP）</text>
  <text x="684" y="527" text-anchor="middle" fill="#93c5fd" font-size="9.5">原価基準法（CP）・再販売価格基準法（RP）</text>
  <text x="684" y="542" text-anchor="middle" fill="#6ea8fe" font-size="9">利益分割法（PS）・取引単位営業利益法（TNMM）</text>
  <text x="684" y="555" text-anchor="middle" fill="#6ea8fe" font-size="9">DCF法（割引現在価値）</text>
  <text x="684" y="565" text-anchor="middle" fill="#3b82f6" font-size="8.5">最適方法ルール（Most Appropriate Method）</text>
</a>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_4&amp;mode=only" target="_blank">
  <rect x="824" y="480" width="268" height="90" rx="6" fill="#0d1a30" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="958" y="497" text-anchor="middle" fill="#60a5fa" font-size="10.5" font-weight="bold">措法66の4②：国外関連者の定義</text>
  <text x="958" y="513" text-anchor="middle" fill="#93c5fd" font-size="9.5">50%超持分保有（直接・間接）</text>
  <text x="958" y="527" text-anchor="middle" fill="#93c5fd" font-size="9.5">実質支配関係（役員・取引依存等）</text>
  <text x="958" y="542" text-anchor="middle" fill="#6ea8fe" font-size="9">国外関連取引：国外関連者との資産移転・</text>
  <text x="958" y="555" text-anchor="middle" fill="#6ea8fe" font-size="9">役務提供・無形資産使用等の取引全般</text>
  <text x="958" y="565" text-anchor="middle" fill="#3b82f6" font-size="8.5">（66の4①の適用前提となる定義規定）</text>
</a>

<!-- ===== ZONE F: Action 13 移転価格文書化 (y=588-704) ===== -->
<rect x="8" y="588" width="1084" height="22" rx="5" fill="#1a1000" stroke="#fbbf24" stroke-width="1.5"/>
<text x="550" y="603" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">Action 13: 移転価格文書化（平成28年度改正）</text>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_4_3&amp;mode=only" target="_blank">
  <rect x="8" y="616" width="354" height="80" rx="6" fill="#1a1000" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="185" y="633" text-anchor="middle" fill="#fbbf24" font-size="10.5" font-weight="bold">措法66の4の3：マスターファイル（MF）</text>
  <text x="185" y="649" text-anchor="middle" fill="#fde68a" font-size="9.5">提出義務：売上高1,000億円以上のMNE</text>
  <text x="185" y="663" text-anchor="middle" fill="#fde68a" font-size="9.5">グループ全体の事業・組織・移転価格ポリシー</text>
  <text x="185" y="678" text-anchor="middle" fill="#d97706" font-size="9">無形資産・資金調達・財務状況を記載</text>
  <text x="185" y="690" text-anchor="middle" fill="#d97706" font-size="8.5">提出期限：各事業年度終了後1年以内</text>
</a>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_4_4&amp;mode=only" target="_blank">
  <rect x="372" y="616" width="356" height="80" rx="6" fill="#1a1000" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="550" y="633" text-anchor="middle" fill="#fbbf24" font-size="10.5" font-weight="bold">措法66の4の4：ローカルファイル（LF）</text>
  <text x="550" y="649" text-anchor="middle" fill="#fde68a" font-size="9.5">各事業体レベルの関連者間取引の文書化</text>
  <text x="550" y="663" text-anchor="middle" fill="#fde68a" font-size="9.5">取引の詳細・比較分析・算定方法の根拠</text>
  <text x="550" y="678" text-anchor="middle" fill="#d97706" font-size="9">国外関連取引ごとに独立企業間価格の妥当性を記載</text>
  <text x="550" y="690" text-anchor="middle" fill="#d97706" font-size="8.5">申告期限（原則）までに作成・保存義務</text>
</a>

<a href="https://lawzilla.jp/law/332AC0000000026?n=ln66_4_5&amp;mode=only" target="_blank">

  <text x="914" y="649" text-anchor="middle" fill="#fde68a" font-size="9.5">提出義務：連結総収入額1,000億円以上のMNE</text>
  <text x="914" y="663" text-anchor="middle" fill="#fde68a" font-size="9.5">国別の収益・税額・従業員数・資産額等を報告</text>
  <text x="914" y="678" text-anchor="middle" fill="#d97706" font-size="9">不提出ペナルティ：5%加重（通常より重課）</text>
  <text x="914" y="690" text-anchor="middle" fill="#d97706" font-size="8.5">国際共同・自動的情報交換（CRS）と連携</text>

<!-- ===== ZONE G: Pillar Two GloBE最低課税 (y=712-870) ===== -->
<rect x="8" y="712" width="1084" height="24" rx="5" fill="#1c0a1a" stroke="#e879f9" stroke-width="2"/>
<text x="550" y="728" text-anchor="middle" fill="#e879f9" font-size="12" font-weight="bold">Pillar Two: GloBE最低課税（令和5年度改正・2024年4月適用開始）</text>

<!-- IIR -->
<rect x="8" y="742" width="354" height="116" rx="8" fill="#1c0a1a" stroke="#e879f9" stroke-width="2"/>
<text x="185" y="760" text-anchor="middle" fill="#e879f9" font-size="11" font-weight="bold">IIR（所得合算ルール）</text>
<text x="185" y="776" text-anchor="middle" fill="#f0abfc" font-size="9.5">日本親会社が低課税（実効税率15%未満）</text>
<text x="185" y="790" text-anchor="middle" fill="#f0abfc" font-size="9.5">外国子会社分を上乗せ課税</text>
<text x="185" y="805" text-anchor="middle" fill="#d946ef" font-size="9">対象：MNEグループ（連結売上高750億ユーロ≒1,200億円以上）</text>
<text x="185" y="819" text-anchor="middle" fill="#d946ef" font-size="9">計算：トップアップ税額 = (15% - 実効税率) × GloBE対象所得</text>
<text x="185" y="834" text-anchor="middle" fill="#a21caf" font-size="8.5">法人税法・措置法・地方税法を一体改正</text>
<text x="185" y="847" text-anchor="middle" fill="#a21caf" font-size="8.5">GloBE = Global Anti-Base Erosion Rules</text>

<!-- QDMTT -->
<rect x="372" y="742" width="356" height="116" rx="8" fill="#1c0a1a" stroke="#e879f9" stroke-width="2"/>
<text x="550" y="760" text-anchor="middle" fill="#e879f9" font-size="11" font-weight="bold">QDMTT（国内最低課税額）</text>
<text x="550" y="776" text-anchor="middle" fill="#f0abfc" font-size="9.5">日本国内のグループ事業体が先取り課税</text>
<text x="550" y="790" text-anchor="middle" fill="#f0abfc" font-size="9.5">（セーフハーバー対応）</text>
<text x="550" y="805" text-anchor="middle" fill="#d946ef" font-size="9">外国のIIR課税の前に日本側で15%確保</text>
<text x="550" y="819" text-anchor="middle" fill="#d946ef" font-size="9">地方税を含む国内税率でQDMTT計算</text>
<text x="550" y="834" text-anchor="middle" fill="#a21caf" font-size="8.5">QDMTT = Qualified Domestic Minimum Top-up Tax</text>
<text x="550" y="847" text-anchor="middle" fill="#a21caf" font-size="8.5">IIR・UTPR適用前に優先適用される仕組み</text>

<!-- UTPR -->
<rect x="736" y="742" width="356" height="116" rx="8" fill="#1c0a1a" stroke="#e879f9" stroke-width="2"/>
<text x="914" y="760" text-anchor="middle" fill="#e879f9" font-size="11" font-weight="bold">UTPR（未課税利益ルール）</text>
<text x="914" y="776" text-anchor="middle" fill="#f0abfc" font-size="9.5">IIRが適用されない場合の補完ルール</text>
<text x="914" y="790" text-anchor="middle" fill="#f0abfc" font-size="9.5">最終親会社所在地国以外の国でも執行可能</text>
<text x="914" y="805" text-anchor="middle" fill="#d946ef" font-size="9">各構成事業体に追加課税を配分する仕組み</text>
<text x="914" y="819" text-anchor="middle" fill="#d946ef" font-size="9">令和5年度改正：2024年4月以降の事業年度から適用</text>
<text x="914" y="834" text-anchor="middle" fill="#a21caf" font-size="8.5">UTPR = Undertaxed Profits Rule</text>
<text x="914" y="847" text-anchor="middle" fill="#a21caf" font-size="8.5">（令和5年度改正：法人税法・措置法・地方税法改正）</text>

<!-- Pillar Two 注記 -->
<rect x="8" y="864" width="1084" height="18" rx="4" fill="#0f0520" stroke="#7c3aed" stroke-width="1"/>
<text x="550" y="877" text-anchor="middle" fill="#a78bfa" font-size="9">令和5年度改正（法人税法・措置法・地方税法改正）で実施　対象：連結売上高750億ユーロ（約1,200億円）以上のMNEグループ</text>
