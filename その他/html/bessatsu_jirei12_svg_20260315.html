<!-- Section 2: Two Key Intangible Assets -->
<foreignObject x="20" y="355" width="300" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#1e40af;">所得の源泉となる2つの無形資産</div>

<!-- P's Asset: Global Sales Network -->
<rect x="30" y="378" width="415" height="145" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="383" width="395" height="135">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8.5px;font-weight:700;color:#1e40af;">P社: グローバルな販売網</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:5px;line-height:1.6;">
<span style="font-weight:600;">形成過程:</span><br/>
&#x2022; 早期の海外展開開始 ＋ 綿密な市場調査<br/>
&#x2022; 有望市場に販売支店等を設置<br/>
&#x2022; 自社拠点のない国では代理店経由<br/>
&#x2022; 営業企画部門が各国のニーズに適した戦略策定<br/>
<span style="font-weight:600;margin-top:3px;display:inline-block;">効果:</span><br/>
&#x2022; 基本的活動のみを行う法人より広範な販売網<br/>
&#x2022; 全世界で高いマーケットシェア確保<br/>
&#x2022; 装置産業的特性（固定費大）→ 大量販売で規模の利益を実現
</div>
</foreignObject>

<!-- S's Asset: Quality Control Know-how -->
<rect x="460" y="378" width="410" height="145" rx="6" fill="#fefce8" stroke="#b45309" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="470" y="383" width="390" height="135">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8.5px;font-weight:700;color:#b45309;">S社: 独自の品質管理ノウハウ</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:5px;line-height:1.6;">
<span style="font-weight:600;">形成過程:</span><br/>
&#x2022; 20年間の製造活動で品質問題と改善方法を蓄積<br/>
&#x2022; 独自開発の検査技術・検査機器<br/>
&#x2022; 製造過程の主要段階でチェック体制を構築<br/>
&#x2022; 社員の1割超を品質管理に配置<br/>
<span style="font-weight:600;margin-top:3px;display:inline-block;">効果:</span><br/>
&#x2022; 検査効率の大幅改善<br/>
&#x2022; 仕損品発生の減少 → 製造原価低減<br/>
&#x2022; 故障の少ない製品との評価 → 販売面での優位性
</div>
</foreignObject>

<!-- Section 3: Income Source Mechanism -->
<foreignObject x="20" y="538" width="300" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#16a34a;">所得の源泉メカニズム</div>
</foreignObject>

<rect x="30" y="560" width="840" height="95" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="565" width="820" height="85">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;line-height:1.6;">
<table style="width:100%;border-collapse:collapse;font-size:7px;">
<tr style="background:#dcfce7;">
<td style="padding:4px 8px;font-weight:700;color:#16a34a;width:130px;">P社の販売網</td>
<td style="padding:4px 8px;font-weight:700;color:#16a34a;">→ 収益面への貢献</td>
</tr>
<tr style="border-bottom:1px solid #bbf7d0;">
<td style="padding:4px 8px;" colspan="2">大量の販売量を実現 → 製造原価（固定費割合が大）→ 売上が伸びるほど利益が拡大（規模の利益）</td>
</tr>
<tr style="background:#dcfce7;">
<td style="padding:4px 8px;font-weight:700;color:#16a34a;">S社の品質管理</td>
<td style="padding:4px 8px;font-weight:700;color:#16a34a;">→ 原価面 ＋ 収益面への二重の貢献</td>
</tr>
<tr>
<td style="padding:4px 8px;" colspan="2">仕損品発生損失の低減 → 製造原価削減 ＋ 故障率低下 → 「故障の少ない製品」という評価 → 販売面での優位性</td>
</tr>
</table>
</div>
</foreignObject>

<!-- Section 4: Key Insight -->
<foreignObject x="20" y="668" width="300" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#7c3aed;">核心ポイント: 「独自性」が鍵</div>
</foreignObject>

<rect x="30" y="690" width="840" height="105" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="695" width="820" height="95">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#334155;line-height:1.7;">
<table style="width:100%;border-collapse:collapse;font-size:7px;">
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:5px 8px;width:50%;vertical-align:top;">
<div style="font-weight:700;color:#dc2626;margin-bottom:3px;">&#x2716; 単なる活動では不十分</div>
<div>&#x2022; 企業は通常何らかの販売網を有している</div>
<div>&#x2022; 製造にあたっては何らかの品質管理を行っている</div>
<div style="color:#dc2626;font-weight:600;margin-top:3px;">→ 直ちに所得の源泉とは認められない</div>
</td>
<td style="padding:5px 8px;vertical-align:top;">
<div style="font-weight:700;color:#16a34a;margin-bottom:3px;">&#x2714; 独自性がある場合は認定</div>
<div>&#x2022; 販売網が他には見られない広範・ユニークなもの</div>
<div>&#x2022; 品質管理ノウハウに基本的活動法人との比較で独自性</div>
<div style="color:#16a34a;font-weight:600;margin-top:3px;">→ 所得の源泉と認められる場合がある</div>
</td>
</tr>
</table>
</div>
