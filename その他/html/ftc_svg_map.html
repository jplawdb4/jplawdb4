<!-- B1: 外国所得の発生 -->
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">
  <rect x="8" y="72" width="350" height="68" rx="5" fill="#1a1a30" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="183" y="91" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">外国所得の発生　法法69条①</text>
  <text x="183" y="107" text-anchor="middle" fill="#c4b5fd" font-size="9.5">国外PE所得・配当・使用料・利子等の国外源泉所得</text>
  <text x="183" y="122" text-anchor="middle" fill="#c4b5fd" font-size="9.5">「外国法人税」＝外国の所得等を課税標準とする税</text>
  <text x="183" y="135" text-anchor="middle" fill="#64748b" font-size="9">→ 対象税目の詳細は法令141条で限定列挙</text>
</a>

<!-- B2: 外国法人税の納付 -->
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">
  <rect x="368" y="72" width="354" height="68" rx="5" fill="#1a1a30" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="545" y="91" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">外国法人税の納付　法法69条①⑦</text>
  <text x="545" y="107" text-anchor="middle" fill="#c4b5fd" font-size="9.5">外国法人税を実際に納付したことが適用の大前提</text>
  <text x="545" y="122" text-anchor="middle" fill="#c4b5fd" font-size="9.5">特定外国法人税（条約免除額等）は控除対象外（法69⑦）</text>
  <text x="545" y="135" text-anchor="middle" fill="#64748b" font-size="9">→ 間接外国税額控除はH27廃止・益金不算入制度へ移行</text>
</a>

<!-- B3: 外国子会社からの配当（法23の2前提） -->
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln23_2&amp;mode=only" target="_blank">
  <rect x="732" y="72" width="360" height="68" rx="5" fill="#1a1a30" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="912" y="91" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">外国子会社配当の前提　法法23条の2</text>
  <text x="912" y="107" text-anchor="middle" fill="#c4b5fd" font-size="9.5">持株割合25%以上・6ヶ月以上継続保有の外国子会社</text>
  <text x="912" y="122" text-anchor="middle" fill="#c4b5fd" font-size="9.5">配当等の95%益金不算入（残5%は費用対応で益金算入）</text>
  <text x="912" y="135" text-anchor="middle" fill="#64748b" font-size="9">→ FTCとの棲み分けの前提となる保有・持株要件</text>
</a>

<!-- C1: 外国税額控除（FTC） -->
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">
  <rect x="8" y="186" width="536" height="68" rx="5" fill="#1a1a30" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="272" y="205" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">外国税額控除（FTC）　法法69条①</text>
  <text x="272" y="221" text-anchor="middle" fill="#c4b5fd" font-size="9.5">控除限度額の範囲内で外国法人税を法人税から直接控除</text>
  <text x="272" y="236" text-anchor="middle" fill="#c4b5fd" font-size="9.5">国別限度額と全世界限度額のうち大きい方が控除上限</text>
  <text x="272" y="249" text-anchor="middle" fill="#64748b" font-size="9">→ 限度超過額・税額超過額は各3年繰越可（法69③④）</text>
</a>

<!-- C2: 外国子会社配当益金不算入 -->

  <text x="823" y="221" text-anchor="middle" fill="#c4b5fd" font-size="9.5">外国子会社からの配当等の95%を益金不算入</text>
  <text x="823" y="236" text-anchor="middle" fill="#c4b5fd" font-size="9.5">FTCとの択一ではなく制度の棲み分けによる適用</text>
  <text x="823" y="249" text-anchor="middle" fill="#64748b" font-size="9">→ 対応する外国源泉税は損金不算入（法法69の2）</text>
</a>

<!-- D1: 控除限度額の計算 -->
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">

  <text x="183" y="319" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">控除限度額の計算　法法69条②</text>
  <text x="183" y="335" text-anchor="middle" fill="#c4b5fd" font-size="9.5">法人税額 × （国外所得金額 ÷ 全所得金額）</text>
  <text x="183" y="350" text-anchor="middle" fill="#c4b5fd" font-size="9.5">国別限度額（法令142の2）と全世界限度額を比較適用</text>
  <text x="183" y="363" text-anchor="middle" fill="#64748b" font-size="9">→ 調整国外所得・国別国外所得の算定（法令142条〜）</text>
</a>

<!-- D2: 繰越控除 -->
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">

  <text x="545" y="319" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">繰越控除　法法69条③④</text>
  <text x="545" y="335" text-anchor="middle" fill="#c4b5fd" font-size="9.5">控除限度超過額（外国税額＞限度額）：3年間繰越控除</text>
  <text x="545" y="350" text-anchor="middle" fill="#c4b5fd" font-size="9.5">税額超過額（限度額＞外国税額）：3年間繰越可能</text>
  <text x="545" y="363" text-anchor="middle" fill="#64748b" font-size="9">→ 繰越順序：古い年度分から順に控除（FIFO方式）</text>
</a>

<!-- D3: みなし外国税額控除 -->
<a href="https://lawzilla.jp/law/340AC0000000034?n=ln69&amp;mode=only" target="_blank">

  <text x="912" y="319" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">みなし外国税額控除　法法69条⑧</text>
  <text x="912" y="335" text-anchor="middle" fill="#c4b5fd" font-size="9.5">tax sparing credit：開発途上国への投資促進目的</text>
  <text x="912" y="350" text-anchor="middle" fill="#c4b5fd" font-size="9.5">条約で免除された税額をみなし納付として控除可</text>
  <text x="912" y="363" text-anchor="middle" fill="#64748b" font-size="9">→ 適用条約に個別規定必要（日ASEAN各国・日中条約等）</text>
</a>
