<!-- 右側: CUP法の特徴 -->
<rect x="466" y="426" width="418" height="200" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="476" y="430" width="398" height="194">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#334155;">
    <div style="font-size:8.5px;font-weight:700;color:#7c3aed;margin-bottom:6px;">CUP法の位置づけ</div>
    <div style="background:#faf5ff;border-left:3px solid #7c3aed;padding:6px 8px;margin-bottom:8px;border-radius:0 4px 4px 0;">
      <div style="font-size:7px;font-weight:600;color:#7c3aed;">最も直接的な算定方法</div>
      <div style="font-size:6.5px;color:#6b21a8;margin-top:2px;">国外関連取引と比較対象取引の「価格」を直接比較するため、独立企業間価格の算定において最も信頼性が高い。</div>
    </div>
    <div style="font-size:7.5px;font-weight:600;margin-bottom:4px;">算定方法の選定優先順位（事務運営指針4-2）:</div>
    <div style="display:flex;gap:4px;margin-bottom:8px;">
      <div style="background:#1e40af;color:#fff;padding:3px 8px;border-radius:10px;font-size:6.5px;font-weight:700;">1. CUP法</div>
      <div style="background:#94a3b8;color:#fff;padding:3px 8px;border-radius:10px;font-size:6.5px;">2. RP法/CP法</div>
      <div style="background:#cbd5e1;color:#475569;padding:3px 8px;border-radius:10px;font-size:6.5px;">3. TNMM</div>
      <div style="background:#e2e8f0;color:#64748b;padding:3px 8px;border-radius:10px;font-size:6.5px;">4. PS法</div>
    </div>
    <div style="font-size:7px;color:#475569;line-height:1.5;">
      <div style="font-weight:600;margin-bottom:2px;">本事例のポイント:</div>
      &#x25CF; 内部比較対象取引（P社→T社）が存在<br/>
      &#x25CF; 製品の同種性が高い（型番のみ異なる）<br/>
      &#x25CF; 機能・契約条件・市場条件の差異なし<br/>
      &#x25CF; 外部比較対象取引は公開情報から見出せない<br/>
      &#x2192; CUP法の比較可能性が十分と認められる
    </div>
  </div>
</foreignObject>

<!-- ===== Section 3: 判定・結論 ===== -->
<rect x="16" y="640" width="868" height="24" rx="4" fill="#16a34a"/>
<foreignObject x="26" y="642" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">3. 判定・結論</div>
</foreignObject>

<rect x="30" y="676" width="854" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="680" width="834" height="72">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#166534;">
    <div style="font-size:9px;font-weight:700;margin-bottom:4px;">結論: 独立価格比準法（CUP法）を最も適切な方法として選定</div>
    <div style="line-height:1.6;">
      P社からS社への<span style="font-weight:700;">製品Aの販売取引</span>に対し、P社からT社への<span style="font-weight:700;">製品Bの販売価格</span>を用いる独立価格比準法を適用。<br/>
      T社への製品B販売取引は内部比較対象取引として十分な比較可能性を有するため、この取引価格を独立企業間価格として算定する。<br/>
      <span style="font-size:6.5px;color:#15803d;">※ 検証対象の当事者: P社・S社いずれも適切（販売機能の程度に大きな差なし）</span>
    </div>
  </div>
</foreignObject>

<!-- ===== Section 4: 核心ポイント ===== -->
<rect x="16" y="772" width="868" height="24" rx="4" fill="#7c3aed"/>
<foreignObject x="26" y="774" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">4. 核心ポイント</div>
</foreignObject>

<rect x="30" y="808" width="270" height="90" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="40" y="812" width="250" height="82">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8px;font-weight:700;color:#7c3aed;margin-bottom:4px;">内部CUP vs 外部CUP</div>
    <div style="line-height:1.5;">内部比較対象取引は取引関連情報を法人自身が保有するため、比較可能性の判断が容易。本事例はP社自身のT社向け取引を使用（内部CUP）。外部CUPは公開情報から見出せなかった。</div>
  </div>
</foreignObject>

<rect x="316" y="808" width="270" height="90" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="326" y="812" width="250" height="82">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8px;font-weight:700;color:#7c3aed;margin-bottom:4px;">「同種」の厳格性</div>
    <div style="line-height:1.5;">CUP法は資産の同種性を厳格に要求する。本事例では製品A・Bが型番のみ異なり性状・構造・機能が同様のため「同種」と認定。通常、CUP法は公開情報から比較対象を見出しにくい方法である。</div>
  </div>
</foreignObject>

<rect x="602" y="808" width="282" height="90" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="612" y="812" width="262" height="82">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8px;font-weight:700;color:#7c3aed;margin-bottom:4px;">基本三法優先の原則</div>
    <div style="line-height:1.5;">CUP法の比較可能性が十分な場合はCUP法を選定（事務運営指針4-2）。基本三法（CUP/RP/CP）はTNMMより直接的に独立企業間価格を算定でき、その中でもCUP法は価格を直接比較する最も直接的な方法。</div>
  </div>
</foreignObject>
