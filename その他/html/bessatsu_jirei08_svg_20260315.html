<span style="font-size:9px;font-weight:400;opacity:.7;display:block;">移転価格税制の適用に当たっての参考事例集 pp.55-57｜双方に独自の価値ある寄与がある場合の利益配分</span>

<!-- 取引一体性 -->
<foreignObject x="30" y="174" width="850" height="30">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#dc2626;background:#fef2f2;border-radius:4px;padding:4px 8px;border:1px solid #fecaca;text-align:center;">
部品aの販売取引と特許権・ノウハウの使用許諾取引は<span style="font-weight:700;">一体として行われている</span>と認められる。S社の損益を両取引に区分して切り出すことはできない。
</div>
</foreignObject>

<!-- ===== 比較可能性分析 ===== -->
<rect x="12" y="264" width="876" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
<foreignObject x="20" y="268" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#dc2626;">比較可能性分析：なぜ他の方法が適用できないか</div>
</foreignObject>

<rect x="30" y="290" width="420" height="60" rx="5" fill="#fff" stroke="#1e40af" filter="url(#sh)"/>
<foreignObject x="36" y="294" width="408" height="54">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#1e40af;">P社側の検証が困難な理由</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;line-height:1.4;">
・P社の独自技術 → CUP/CP/TNMM適用の比較対象取引なし<br/>
・準ずる方法の比較対象取引も見いだせない<br/>
・独自の無形資産の存在が比較を困難にしている
</div>
</foreignObject>

<rect x="460" y="290" width="420" height="60" rx="5" fill="#fff" stroke="#b45309" filter="url(#sh)"/>
<foreignObject x="466" y="294" width="408" height="54">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#b45309;">S社側の検証が困難な理由</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;line-height:1.4;">
・S社は「基本的活動のみを行う法人」ではない<br/>
・独自の広告宣伝による高い認知度・小売店舗網 → 独自の寄与<br/>
・同様の条件の非関連者間取引が見つからない → RPM/TNMM不可
</div>
</foreignObject>

<foreignObject x="30" y="358" width="850" height="58">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;line-height:1.5;background:#fff;border-radius:4px;padding:6px 8px;border-left:3px solid #16a34a;">
<span style="font-weight:700;color:#16a34a;">結論：</span>P社（研究開発活動による独自技術）とS社（広告宣伝・販売促進による製品認知度・店舗網）の<span style="font-weight:700;">双方に独自の価値ある寄与</span>が認められる。<br/>
一方のみの検証では適切な利益配分ができない → <span style="font-weight:700;color:#7c3aed;">残余利益分割法に準ずる方法</span>を選定。
</div>
</foreignObject>

<!-- ===== 残余利益分割法の構造 ===== -->
<rect x="12" y="434" width="876" height="310" rx="8" fill="#faf5ff" stroke="#c4b5fd" filter="url(#sh)"/>
<foreignObject x="20" y="438" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#7c3aed;">残余利益分割法の利益配分構造</div>
</foreignObject>

<!-- ステップ1: 合算利益 -->
<rect x="30" y="462" width="840" height="38" rx="5" fill="#ede9fe" stroke="#a78bfa" filter="url(#sh)"/>
<foreignObject x="36" y="466" width="828" height="32">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">Step 0：分割対象利益の算定</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:1px;">P社の国外関連取引に係る営業利益 ＋ S社の営業利益 ＝ <span style="font-weight:700;">分割対象利益（合算営業利益）</span></div>
</foreignObject>

<!-- ステップ2: 基本的利益 -->
<rect x="30" y="508" width="840" height="80" rx="5" fill="#fff" stroke="#a78bfa" filter="url(#sh)"/>
<foreignObject x="36" y="512" width="828" height="74">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">Step 1：基本的利益の配分</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:3px;">「基本的活動のみを行う法人」の比較対象取引に基づき、各当事者の基本的機能に見合う利益を算定</div>
</foreignObject>

<!-- 基本利益の図解 -->
<rect x="60" y="540" width="350" height="38" rx="4" fill="#eff6ff" stroke="#bfdbfe"/>
<foreignObject x="66" y="544" width="338" height="32">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#1e40af;">P社の基本的利益 = 比較対象取引の利益率 x P社の基準値</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6px;color:#64748b;margin-top:1px;">独自技術がない同種事業の製造販売会社の利益水準</div>
</foreignObject>

<rect x="460" y="540" width="380" height="38" rx="4" fill="#fefce8" stroke="#fcd34d"/>
<foreignObject x="466" y="544" width="368" height="32">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#b45309;">S社の基本的利益 = 比較対象取引の利益率 x S社の基準値</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6px;color:#64748b;margin-top:1px;">独自の広告宣伝がない同種事業の製造販売会社の利益水準</div>
</foreignObject>

<!-- ステップ3: 残余利益 -->
<rect x="30" y="596" width="840" height="38" rx="5" fill="#fef2f2" stroke="#fca5a5" filter="url(#sh)"/>
<foreignObject x="36" y="600" width="828" height="32">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#dc2626;">Step 2：残余利益の算定</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:1px;">分割対象利益 － P社基本的利益 － S社基本的利益 ＝ <span style="font-weight:700;color:#dc2626;">残余利益</span>（独自の寄与により生じた超過利益）</div>
</foreignObject>

<!-- ステップ4: 残余利益の配分 -->
<rect x="30" y="642" width="840" height="92" rx="5" fill="#f0fdf4" stroke="#86efac" filter="url(#sh)"/>
<foreignObject x="36" y="646" width="828" height="86">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#16a34a;">Step 3：残余利益の配分</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:3px;">残余利益を、各当事者の独自の寄与の程度に応じて配分</div>
</foreignObject>

<rect x="60" y="676" width="350" height="48" rx="4" fill="#eff6ff" stroke="#bfdbfe"/>
<foreignObject x="66" y="680" width="338" height="42">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;font-weight:600;color:#1e40af;">P社への配分</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:1px;">基本的利益 ＋ 残余利益のうちP社分</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6px;color:#64748b;">（研究開発投資に応じた配分）</div>
</foreignObject>

<rect x="460" y="676" width="380" height="48" rx="4" fill="#fefce8" stroke="#fcd34d"/>
<foreignObject x="466" y="680" width="368" height="42">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;font-weight:600;color:#b45309;">S社への配分</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:1px;">基本的利益 ＋ 残余利益のうちS社分</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6px;color:#64748b;">（広告宣伝・販促投資に応じた配分）</div>
</foreignObject>

<!-- ===== 核心ポイント ===== -->
<rect x="12" y="754" width="876" height="120" rx="8" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#sh)"/>
<foreignObject x="20" y="758" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#16a34a;">核心ポイント</div>
</foreignObject>

<rect x="30" y="780" width="420" height="82" rx="5" fill="#fff" stroke="#16a34a" filter="url(#sh)"/>
<foreignObject x="36" y="784" width="408" height="76">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#16a34a;">残余利益分割法の適用条件</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:3px;line-height:1.5;">
・双方に<span style="font-weight:600;">独自の価値ある寄与</span>が認められること<br/>
・無形資産の独自性により比較対象取引の選定が困難<br/>
・一方のみの検証では適切な利益配分ができない<br/>
・「基本的活動のみを行う法人」との比較で超過利益を把握
</div>
</foreignObject>

<rect x="460" y="780" width="420" height="82" rx="5" fill="#fff" stroke="#7c3aed" filter="url(#sh)"/>
<foreignObject x="466" y="784" width="408" height="76">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">「残余利益分割法に準ずる方法」の例</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:3px;line-height:1.5;">
・棚卸資産販売＋無形資産使用許諾を一体として算定<br/>
・基本的取引が複数ある場合に利益指標の平均値等を使用<br/>
・棚卸資産の買手が賃貸している場合の所得合算<br/>
・買手が関連者に再販売した場合のTNMM準用での所得合算
</div>
</foreignObject>

<!-- 根拠法令 -->
<foreignObject x="12" y="884" width="876" height="34">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;line-height:1.4;padding:4px 8px;background:#f1f5f9;border-radius:4px;">
<span style="font-weight:600;">根拠法令：</span>措置法66条の4②、施行令39条の12⑧一イ～ハ・七、措置法通達66の4(2)-1, 66の4(3)-1, 66の4(3)-3, 66の4(4)-1, 66の4(5)-1、事務運営指針4-1<br/>
<span style="font-weight:600;">対比：</span>寄与度利益分割法（事例7）＝独自の価値ある寄与<span style="font-weight:700;">なし</span>の場合。残余利益分割法（本事例）＝双方に独自の価値ある寄与<span style="font-weight:700;">あり</span>の場合。
</div>
</foreignObject>

<!-- 用語注記 -->
<foreignObject x="12" y="924" width="876" height="40">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6px;color:#94a3b8;line-height:1.4;padding:4px 8px;background:#f8fafc;border-radius:4px;">
<span style="font-weight:600;">「基本的活動のみを行う法人」</span>＝国外関連取引の事業と同種の事業を営み、市場・事業規模等が類似する法人のうち、基本的な製造・販売等の活動だけでは生み出すことができない利益の発生に貢献する独自の機能を果たしていない法人。
「高い」製品認知度、「充実した」小売店舗網、「独自」の技術等の表現は、全て基本的活動のみを行う法人との比較において用いられている。
</div>
</foreignObject>
