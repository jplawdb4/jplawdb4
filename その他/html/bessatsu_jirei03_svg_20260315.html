<!-- ===== Section 2: CP法の仕組み ===== -->
<rect x="16" y="392" width="868" height="24" rx="4" fill="#1e40af"/>
<foreignObject x="26" y="394" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">2. CP法の仕組みと事例1(CUP法)との対比</div>
</foreignObject>

<!-- CP法の図解 -->
<rect x="30" y="428" width="420" height="170" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="40" y="432" width="400" height="164">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#334155;">
    <div style="font-size:8.5px;font-weight:700;color:#1e40af;margin-bottom:6px;">CP法（原価基準法）の算定イメージ</div>
    <div style="background:#eff6ff;border-radius:6px;padding:8px;margin-bottom:6px;">
      <div style="font-size:7px;font-weight:700;color:#1e40af;margin-bottom:4px;">独立企業間価格 = 取得原価 + 通常の利潤の額</div>
      <div style="display:flex;gap:4px;align-items:center;">
        <div style="background:#fef3c7;border:1px solid #fcd34d;padding:4px 8px;border-radius:4px;font-size:6.5px;text-align:center;">
          <div style="font-weight:700;">P社の取得原価</div>
          <div>（製品の仕入原価）</div>
        </div>
        <div style="font-size:10px;color:#1e40af;">+</div>
        <div style="background:#dcfce7;border:1px solid #86efac;padding:4px 8px;border-radius:4px;font-size:6.5px;text-align:center;">
          <div style="font-weight:700;">通常の利潤の額</div>
          <div>（P社→T社取引の原価利益率）</div>
        </div>
        <div style="font-size:10px;color:#1e40af;">=</div>
        <div style="background:#dbeafe;border:1px solid #93c5fd;padding:4px 8px;border-radius:4px;font-size:6.5px;text-align:center;">
          <div style="font-weight:700;">独立企業間価格</div>
          <div>（P社→S社の適正価格）</div>
        </div>
      </div>
    </div>
    <div style="font-size:6.5px;color:#64748b;line-height:1.5;">
      &#x25CF; 検証対象の当事者: P社（売手側。仕入原価にマークアップ）<br/>
      &#x25CF; 比較するのは「原価利益率」（売上総利益 / 売上原価）<br/>
      &#x25CF; CP法は売手側の原価にフォーカスする基本三法の一つ
    </div>
  </div>
</foreignObject>

<!-- CUP法との対比 -->
<rect x="466" y="428" width="418" height="170" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="476" y="432" width="398" height="164">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#334155;">
    <div style="font-size:8.5px;font-weight:700;color:#7c3aed;margin-bottom:6px;">事例1(CUP法) vs 事例3(CP法) ── 何が異なるか</div>
    <table style="width:100%;border-collapse:collapse;font-size:7px;">
      <tr style="background:#f8fafc;"><th style="text-align:left;padding:3px 4px;border-bottom:1px solid #e2e8f0;width:28%;">項目</th><th style="text-align:left;padding:3px 4px;border-bottom:1px solid #e2e8f0;width:36%;">事例1（CUP法）</th><th style="text-align:left;padding:3px 4px;border-bottom:1px solid #e2e8f0;width:36%;">事例3（CP法）</th></tr>
      <tr><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;font-weight:600;">製品の関係</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">A・Bは同種</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">A・Bは類似（同種でない）</td></tr>
      <tr><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;font-weight:600;">比較するもの</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">取引価格</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">原価利益率（売上総利益率）</td></tr>
      <tr><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;font-weight:600;">CUP法適用</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;color:#16a34a;font-weight:700;">適用可能</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;color:#dc2626;">適用不可（同種でないため）</td></tr>
      <tr><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;font-weight:600;">T社の損益</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">不要（価格比較）</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">不要（P社側で原価利益率算定）</td></tr>
      <tr><td style="padding:3px 4px;font-weight:600;">RP法適用</td><td style="padding:3px 4px;">候補にあり得た</td><td style="padding:3px 4px;color:#dc2626;">T社の損益データ入手不可</td></tr>
    </table>
    <div style="font-size:6.5px;color:#7c3aed;margin-top:4px;font-weight:600;">
      構造は事例1とほぼ同じだが、製品が「類似」止まりのためCUP法不可 → CP法を選定
    </div>
  </div>
</foreignObject>

<!-- ===== Section 3: 判定・結論 ===== -->
<rect x="16" y="612" width="868" height="24" rx="4" fill="#16a34a"/>
<foreignObject x="26" y="614" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">3. 判定・結論</div>
</foreignObject>

<rect x="30" y="648" width="854" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="652" width="834" height="72">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#166534;">
    <div style="font-size:9px;font-weight:700;margin-bottom:4px;">結論: 原価基準法（CP法）を最も適切な方法として選定</div>
    <div style="line-height:1.6;">
      P社からS社への製品Aの販売取引に対し、P社からT社への製品Bの販売取引を<span style="font-weight:700;">内部比較対象取引</span>として使用。<br/>
      P社を検証対象の当事者（売手側）としてCP法を適用し、P社のT社向け取引の原価利益率を基準に独立企業間価格を算定。<br/>
      <span style="font-size:6.5px;color:#15803d;">※ TNMMも適用候補だったが、CP法の比較可能性が十分のため基本三法を優先。CUP法は製品が同種でないため不可。</span>
    </div>
  </div>
</foreignObject>

<!-- ===== Section 4: 核心ポイント ===== -->
<rect x="16" y="744" width="868" height="24" rx="4" fill="#7c3aed"/>
<foreignObject x="26" y="746" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">4. 核心ポイント</div>
</foreignObject>

<rect x="30" y="780" width="420" height="86" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="40" y="784" width="400" height="78">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8px;font-weight:700;color:#7c3aed;margin-bottom:4px;">CP法が選ばれる典型的場面</div>
    <div style="line-height:1.5;">
      &#x25CF; 売手（P社）側に内部比較対象取引あり（同じ製品を第三者にも販売）<br/>
      &#x25CF; 製品が「類似」だが「同種」でない → CUP法は不可だがCP法は可<br/>
      &#x25CF; 買手（T社）の損益データが入手不可 → RP法は不可<br/>
      &#x25CF; 外部比較対象取引が公開情報から見出せない
    </div>
  </div>
</foreignObject>

<rect x="466" y="780" width="418" height="86" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="476" y="784" width="398" height="78">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8px;font-weight:700;color:#7c3aed;margin-bottom:4px;">CP法の検証対象 ── 売手側</div>
    <div style="line-height:1.5;">CP法はRP法と異なり、売手側の原価構造を検証する方法。本事例では売手P社の仕入原価に通常の利潤（T社取引の原価利益率）を加算して独立企業間価格を算定する。P社・S社ともに販売機能の程度に大きな差がないため、いずれを検証対象としても適切と認められた。</div>
  </div>
</foreignObject>
