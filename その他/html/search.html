<style>
:root{--accent:#5E6AD2;--accent-light:#7B85E0;

[data-theme="dark"]{

  --header-bg:rgba(10,10,10,.85);--input-bg:rgba(255,255,255,.04);
}
[data-theme="light"]{
  --bg:#FAFAF7;--bg-card:#fff;--border:rgba(0,0,0,.07);

}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.7;transition:background .4s,color .4s;min-height:100vh}
a{color:inherit;text-decoration:none}

.logo-mark{width:26px;height:26px;background:var(--accent);border-radius:6px;

.back-a:hover{color:var(--accent)}
.theme-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:8px;

  display:flex;align-items:center;justify-content:center;transition:all .2s;margin-left:8px}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

.main{max-width:860px;margin:0 auto;padding:88px 24px 60px}

/* Search bar */
.search-hero{padding:32px 0 24px;text-align:center}
.search-hero h1{font-family:var(--font-display);font-size:1.7rem;font-weight:900;
  letter-spacing:-.03em;margin-bottom:20px}
.search-hero h1 span{background:linear-gradient(135deg,var(--accent),var(--accent-light));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.search-wrap{position:relative;max-width:640px;margin:0 auto}
.search-wrap input{width:100%;padding:14px 52px 14px 48px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  color:var(--text);font-size:1rem;font-family:var(--font-body);outline:none;
  transition:border-color .2s,box-shadow .2s;box-shadow:var(--shadow)}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(94,106,210,.15)}
.search-wrap .ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;color:var(--text-muted);pointer-events:none}
.search-wrap .clear-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;border:none;background:transparent;color:var(--text-muted);
  cursor:pointer;font-size:1rem;display:none;align-items:center;justify-content:center;
  border-radius:50%;transition:background .15s}
.search-wrap .clear-btn:hover{background:var(--border);color:var(--text)}
.search-wrap.has-value .clear-btn{display:flex}

/* Status */
.status{text-align:center;font-size:.85rem;color:var(--text-muted);margin:16px 0 4px;min-height:20px}

/* Results */
.results{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.result-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px;transition:border-color .2s,transform .15s;display:block}
.result-card:hover{border-color:rgba(94,106,210,.4);transform:translateX(3px)}
.rc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.rc-lesson{font-family:var(--font-display);font-size:.7rem;font-weight:700;

  color:var(--accent);border:1px solid rgba(94,106,210,.25)}
.rc-sec{font-size:.85rem;font-weight:600;color:var(--text)}
.rc-text{font-size:.85rem;color:var(--text-sub);line-height:1.65}
.rc-text mark{background:rgba(94,106,210,.18);color:var(--accent);border-radius:3px;padding:0 2px}

/* Empty / initial */
.hint{text-align:center;padding:60px 0;color:var(--text-muted)}
.hint-icon{font-size:3rem;margin-bottom:16px;display:block}
.hint p{font-size:.9rem}

.hint .tag{font-size:.78rem;padding:5px 12px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:100px;cursor:pointer;
  transition:border-color .2s;color:var(--text-sub)}
.hint .tag:hover{border-color:var(--accent);color:var(--accent)}

<script>
var INDEX = [{"id":"l1-s1","ln":1,"lt":"国際課税総論","sec":"国際課税とは何か","text":"id=\"sec1\" class=\"section\"> SECTION 01 国際課税とは何か 1-1. 国際課税の定義と射程 国際課税（International Taxation）とは、複数の国家の課税管轄権が交錯する場面における租税法上の問題を取り扱う法分野です。企業や個人が国境を越えて経済活動を行う場合、所得の稼得地、支払地、受領者の居住地など、複数の接点（ネクサス）を通じて複数の国家が課税権を主張しうる状況が生じます。国際課税は、こうした課税権の競合と調整に関する法的枠組みの総体を指します。 国際課税の射程は極めて広範です。具体的には、非居住者および外国法人に対する所得課税、国際...","url":"lesson_1_国際課税総論.html"},{"id":"l1-s2","ln":1,"lt":"国際課税総論","sec":"居住地国課税と源泉地国課税","text":"id=\"sec2\" class=\"section\"> SECTION 02 居住地国課税と源泉地国課税 2-1. 二つの課税原則の概念 国際課税の基本構造を理解するうえで最も重要な概念が、居住地国課税（Residence-Based Taxation）と源泉地国課税（Source-Based Taxation）の区別です。この二つの課税原則は、国際課税のあらゆる論点の出発点となるものであり、その正確な理解なくして国際課税の体系を把握することはできません。 居住地国課税とは、納税者の居住地国（Residence State）が、その居住者の全世界所得（Worldwide Income）に対...","url":"lesson_1_国際課税総論.html"},{"id":"l1-s3","ln":1,"lt":"国際課税総論","sec":"居住者・非居住者の判定基準","text":"id=\"sec3\" class=\"section\"> SECTION 03 居住者・非居住者の判定基準 3-1. 居住者概念の重要性 国際課税において、ある個人または法人が「居住者」であるか「非居住者」であるかという区分は、課税の範囲と方法を決定する最も基本的な基準です。前節で見たとおり、居住者には全世界所得課税が適用され、非居住者には国内源泉所得に限定した課税が適用されるため、この区分は納税義務の範囲に決定的な差異をもたらします。 居住者概念の判定は、一見すると単純な問題のように思えるかもしれませんが、実際にはきわめて複雑な判断を要する場面が少なくありません。個人について言えば、複数の...","url":"lesson_1_国際課税総論.html"},{"id":"l1-s4","ln":1,"lt":"国際課税総論","sec":"国内源泉所得の範囲","text":"id=\"sec4\" class=\"section\"> SECTION 04 国内源泉所得の範囲 4-1. 国内源泉所得の意義 源泉地国課税を実施するためには、どのような所得が「国内で発生した所得」に該当するかを明確にする必要があります。この「国内源泉所得」（Domestic Source Income）の範囲の画定は、非居住者および外国法人に対する課税の範囲を直接に規定する重要な問題です。日本の 所得税法第161条 および 法人税法第138条 は、国内源泉所得の類型を詳細に列挙しています。 国内源泉所得の範囲の画定にあたっては、所得の種類ごとに異なる「源泉」（ソース）の基準が用いられます...","url":"lesson_1_国際課税総論.html"},{"id":"l1-s5","ln":1,"lt":"国際課税総論","sec":"国際的二重課税の発生メカニズム","text":"id=\"sec5\" class=\"section\"> SECTION 05 国際的二重課税の発生メカニズム 5-1. 国際的二重課税の定義 国際的二重課税（International Double Taxation）とは、同一の所得に対して、二以上の国が同一の課税期間において課税を行う状態を指します。これは国際課税において最も基本的かつ重要な問題であり、国際課税制度の多くの仕組みは、この二重課税を排除することを目的として設計されています。 OECDモデル租税条約のコメンタリーにおいては、国際的二重課税を「二以上の国が、同一の納税者に対し、同一の所得又は資産について、同一の期間にわたり、同...","url":"lesson_1_国際課税総論.html"},{"id":"l1-s6","ln":1,"lt":"国際課税総論","sec":"二重課税排除の方法論","text":"id=\"sec6\" class=\"section\"> SECTION 06 二重課税排除の方法論 6-1. 外国税額控除方式（Credit Method） 二重課税を排除するための方法として最も広く用いられているのが、外国税額控除方式（Foreign Tax Credit Method）です。この方式のもとでは、居住地国が居住者の全世界所得に対して課税を行いつつ、外国（源泉地国）で課された税額を居住地国の税額から控除することで、二重課税の排除を図ります。 日本の外国税額控除制度は、 所得税法第95条 および 法人税法第69条 に規定されています。 法人税法第69条 を例にとると、内国法人...","url":"lesson_1_国際課税総論.html"},{"id":"l1-s7","ln":1,"lt":"国際課税総論","sec":"租税回避とタックスヘイブン問題","text":"id=\"sec7\" class=\"section\"> SECTION 07 租税回避とタックスヘイブン問題 7-1. 租税回避の概念 国際課税の分野において、租税回避（Tax Avoidance）は最も重要な政策課題の一つです。租税回避とは、私法上の法形式を濫用的に利用することにより、租税法規の想定する通常の取引形態とは異なる法形式を用いて、税負担を不当に軽減又は排除する行為を指します。これは違法な脱税（Tax Evasion）とは区別されます。脱税が法的義務の不履行（所得の隠蔽、虚偽の申告等）であるのに対し、租税回避は法形式上は適法な取引を通じて行われる点に特徴があります。もっとも、両...","url":"lesson_1_国際課税総論.html"},{"id":"l1-s8","ln":1,"lt":"国際課税総論","sec":"法源の階層（国内法・条約・ソフトロー）","text":"id=\"sec8\" class=\"section\"> SECTION 08 法源の階層（国内法・条約・ソフトロー） 8-1. 国際課税における法源の重層構造 国際課税の法的枠組みは、国内租税法、租税条約、およびソフトローという三層の法源によって構成されています。これらの法源は階層的な関係に立ち、それぞれ異なる法的性質と機能を有しています。国際課税を正確に理解し適用するためには、この法源の重層構造を明確に把握することが不可欠です。 8-2. 第一層：国内租税法 国際課税の法的基盤を形成するのは、各国の国内租税法です。日本の場合、所得税法、法人税法、相続税法、租税特別措置法等が中核的な法源と...","url":"lesson_1_国際課税総論.html"},{"id":"l1-s9","ln":1,"lt":"国際課税総論","sec":"OECDとG20の役割","text":"id=\"sec9\" class=\"section\"> SECTION 09 OECDとG20の役割 9-1. OECDの租税委員会 経済協力開発機構（OECD）は、国際課税の分野において最も重要な国際機関であり、約100年にわたって国際課税ルールの形成と発展を主導してきました。OECDの租税委員会（Committee on Fiscal Affairs, CFA）は、国際課税に関する政策研究、基準設定、各国間の調整を行う中心的な機関です。 OECDの国際課税分野における主要な成果として、以下のものが挙げられます。第一に、OECDモデル租税条約の策定と継続的改訂です。OECDモデル条約は、...","url":"lesson_1_国際課税総論.html"},{"id":"l1-s10","ln":1,"lt":"国際課税総論","sec":"日本の国際課税制度発展史","text":"id=\"sec10\" class=\"section\"> SECTION 10 日本の国際課税制度発展史 10-1. 戦後の国際課税立法の出発点 日本の近代的な国際課税制度は、昭和31年（1956年）の法人税法改正を原点とします。この改正では、外国税額控除制度が整備され、外国所得に対する国際的二重課税の排除に向けた基本的な仕組みが導入されました。その後、高度経済成長に伴う日本企業の海外展開が本格化するにつれ、国際課税制度の整備も加速していきます。 昭和41年（1966年）には移転価格税制の前身となる規定が法人税法に設けられ、関連者間取引の価格操作に対する課税根拠が整備されました。また、昭和...","url":"lesson_1_国際課税総論.html"},{"id":"l1-s11","ln":1,"lt":"国際課税総論","sec":"デジタル経済と新潮流","text":"id=\"sec11\" class=\"section\"> SECTION 11 デジタル経済と新潮流 11-1. デジタル経済が国際課税にもたらす課題 インターネットとデジタル技術の急速な発展は、国際課税の在り方に根本的な問題を提起しています。従来の国際課税ルールは、物理的な事業拠点（PE）と有形財産の所在を基礎として設計されていましたが、デジタル経済においては、物理的拠点なしに大量の顧客・ユーザーベースと価値創造が実現されます。例えば、あるデジタルプラットフォーム企業が日本に法人を設立せず、サーバも日本に置かずに、日本のユーザーから多大な収益を得ている場合、従来のルールの下では日本には課...","url":"lesson_1_国際課税総論.html"},{"id":"l1-s12","ln":1,"lt":"国際課税総論","sec":"全12回の学習ロードマップ","text":"id=\"sec12\" class=\"section\"> SECTION 12 全12回の学習ロードマップ 12-1. コース全体の構造 本コース「国際課税 — 税法ラボ」は、全12回の体系的な学習プログラムです。第1回（本回）の国際課税総論から始まり、租税条約・PE課税・移転価格・CFC税制・外国税額控除・BEPSとグローバルミニマム課税まで、現代の国際課税実務に必要な知識を網羅的にカバーします。 回 テーマ キーワード 第1回 国際課税総論 課税管轄権・居住地主義・源泉地主義・二重課税 第2回 租税条約の基礎 OECDモデル・PEなければ課税なし・配当利子使用料 第3回 租税条約の応用...","url":"lesson_1_国際課税総論.html"},{"id":"l2-s1","ln":2,"lt":"租税条約の基礎","sec":"租税条約の歴史──1920年代から現在まで","text":"id=\"sec1\"> Section 01 租税条約の歴史──1920年代から現在まで 国際連盟の先駆的取組み 租税条約の歴史は、第一次世界大戦後の国際秩序再編にまで遡ります。1920年代、各国が戦費調達のために所得税を大幅に引き上げたことにより、複数国にまたがる経済活動に対する二重課税の問題が深刻化しました。 国際連盟（League of Nations） はこの問題に取り組むため、1921年にイタリアの経済学者ルイジ・エイナウディらを含む4人の経済学者に委嘱し、二重課税問題の調査報告書を作成させました。この報告書は「経済的忠誠（economic allegiance）」の概念を用いて...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s2","ln":2,"lt":"租税条約の基礎","sec":"OECDモデル条約の構造（全30条）","text":"id=\"sec2\"> Section 02 OECDモデル条約の構造（全30条） モデル条約の全体像 OECDモデル租税条約は全30条から構成されており、大きく7つのグループに分類できます。条約の構造は論理的に組み立てられており、まず「誰に」「何に」適用されるかを定め（適用範囲）、次に用語を定義し（定義規定）、続いて所得の種類ごとに課税権の配分ルールを規定し（所得課税条項）、二重課税の排除方法を定め（排除条項）、最後に運用上の手続規定と雑則を置くという体系です。 グループ 条項 内容 Ⅰ 適用範囲 第1条〜第2条 人的範囲・租税の範囲 Ⅱ 定義 第3条〜第5条 一般的定義・居住者・恒久的...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s3","ln":2,"lt":"租税条約の基礎","sec":"国連モデルとの相違","text":"id=\"sec3\"> Section 03 国連モデルとの相違 国連モデル条約の成立背景 OECDモデルが先進国間の条約交渉の基準として発展した一方で、先進国と途上国との間の条約には別のモデルが必要とされました。 国連モデル租税条約 は、1968年に設置された国連の専門家委員会（現在の「国際租税協力に関する専門家委員会」）の作業に基づき、 1980年に初版が公表 されました。以後、2001年、2011年、2017年、2021年に改訂版が公表されています。 国連モデルの基本的な設計思想は、 源泉地国の課税権をOECDモデルよりも広く認める ことにあります。途上国は資本輸入国であることが多く...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s4","ln":2,"lt":"租税条約の基礎","sec":"日本の条約ネットワーク","text":"id=\"sec4\"> Section 04 日本の条約ネットワーク 現状の概観 日本は世界有数の租税条約ネットワークを構築しています。2025年3月時点で、日本は 87件の租税条約等を155か国・地域に適用 しています。この数字には、二国間租税条約のほか、情報交換協定（Tax Information Exchange Agreements＝TIEAs）、税務行政執行共助条約（Convention on Mutual Administrative Assistance in Tax Matters）、および日台民間租税取決めが含まれます。税務行政執行共助条約は多数国間条約であるため、また旧...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s5","ln":2,"lt":"租税条約の基礎","sec":"適用範囲──人的範囲と租税の範囲","text":"id=\"sec5\"> Section 05 適用範囲──人的範囲と租税の範囲 第1条：人的範囲 OECDモデル第1条は、条約が 「一方又は双方の締約国の居住者である者」 に適用されると定めています。この「居住者」の概念は第4条で定義されますが（後述）、第1条の機能は、条約の恩典（benefits）を受けられる者の範囲を画定することにあります。すなわち、いずれの締約国の居住者でもない者（第三国居住者）は、原則として条約の恩典を享受できません。 2017年改訂により、第1条には 条約濫用防止に関する重要な規定 が追加されました。具体的には、条約が二重非課税（double non-taxati...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s6","ln":2,"lt":"租税条約の基礎","sec":"居住者の定義とタイブレーカー","text":"id=\"sec6\"> Section 06 居住者の定義とタイブレーカー 第4条1項──居住者の定義 OECDモデル第4条1項は、条約上の「居住者」を 「住所、居所、本店所在地、管理の場所又はこれに類する基準により、一方の締約国において租税を課されるべき者」 と定義しています。この定義は、各国の国内法における居住者概念を前提として（referring to）おり、条約独自の居住者概念を創設するものではありません。したがって、ある者が条約上の居住者に該当するか否かは、まず関係する締約国の国内法に照らして判断されます。 日本の国内法では、 所得税法上の「居住者」 は国内に住所を有し又は現在ま...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s7","ln":2,"lt":"租税条約の基礎","sec":"事業所得条項（第7条）","text":"id=\"sec7\"> Section 07 事業所得条項（第7条） 基本原則──PE なければ課税なし OECDモデル第7条1項は、 「一方の締約国の企業の利得に対しては、その企業が他方の締約国内にある恒久的施設を通じて当該他方の国内において事業を行わない限り、当該一方の国においてのみ租税を課すことができる」 と規定しています。これが有名な 「PEなければ課税なし（no PE, no tax）」 の原則です。 この原則は、国際課税における最も基本的なルールの一つです。源泉地国が事業所得に課税するためには、企業が当該国内にPE（Permanent Establishment＝恒久的施設）を...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s8","ln":2,"lt":"租税条約の基礎","sec":"配当条項（第10条）","text":"id=\"sec8\"> Section 08 配当条項（第10条） 配当に対する課税権の配分 OECDモデル第10条は、配当に対する課税権の配分を定めています。配当は、法人が株主に対して利益を分配する行為であり、源泉地国（配当支払法人の居住地国）と居住地国（株主の居住地国）の双方が課税権を主張し得る所得類型です。第10条は、 両国が課税できることを認めつつ、源泉地国の課税権に限度税率を設定する という構造を採用しています。 第10条1項は、配当について受益者の居住地国が課税できることを確認します。同条2項は、配当が生じた締約国（源泉地国）も課税できることを認めたうえで、以下の限度税率を設定...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s9","ln":2,"lt":"租税条約の基礎","sec":"利子条項（第11条）","text":"id=\"sec9\"> Section 09 利子条項（第11条） 利子に対する課税権の配分 OECDモデル第11条は、利子に対する課税権の配分を定めています。配当条項と同様に、居住地国の課税権を確認するとともに（1項）、源泉地国にも限度税率内での課税を認める（2項）という構造です。OECDモデルの限度税率は 10% です。ただし、日本が締結している条約では、相手国との経済関係や交渉の結果に応じて、10%より低い税率（0%を含む）が設定されている場合が多く見られます。 利子の定義 第11条3項は、「利子」を 「すべての種類の信用に係る債権（担保の有無及び債務者の利得の分配を受ける権利の有無...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s10","ln":2,"lt":"租税条約の基礎","sec":"使用料条項（第12条）","text":"id=\"sec10\"> Section 10 使用料条項（第12条） OECDモデルの基本ルール──居住地国のみ課税 OECDモデル第12条は、使用料について 受益的所有者の居住地国においてのみ課税できる と定めています。すなわち、源泉地国（使用料の支払者の居住地国）には課税権がないとするのがOECDモデルの基本的立場です。これは、前述のとおり先進国が技術・知的財産の輸出国として使用料の受取側に立つことが多いという事情を反映した規定であり、OECDモデルと国連モデルの最も顕著な相違点です。 しかし、日本が実際に締結している二国間条約の多くは、OECDモデルの居住地国専属課税原則に従ってお...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s11","ln":2,"lt":"租税条約の基礎","sec":"譲渡収益条項（第13条）","text":"id=\"sec11\"> Section 11 譲渡収益条項（第13条） 不動産・PE帰属財産・法人株式の譲渡 OECDモデル第13条は、財産の譲渡から生ずる収益の課税権を定めています。資産の類型ごとに課税権の所在が区別されている点が特徴です。まず、 不動産の譲渡収益 （第1項）については、不動産所在地国が課税権を有します。第6条（不動産所得）と同様に、不動産については源泉地国（所在地国）優先の原則が一貫して適用されています。 次に、 PE又は固定的施設に帰属する財産 の譲渡収益（第2項）については、PE又は固定的施設の所在地国が課税権を有します。事業用資産はPE所在地国で課税されるという...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s12","ln":2,"lt":"租税条約の基礎","sec":"二重課税排除条項（第23条）","text":"id=\"sec12\"> Section 12 二重課税排除条項（第23条） 二重課税の発生メカニズムと排除の必要性 国際的二重課税は、複数の国が同一の所得・財産に対して課税権を行使した結果として発生します。例えば、日本居住者が米国法人から配当を受け取る場合、米国が源泉地国として配当に対して源泉徴収税を課し（例：30%、条約適用で10%）、さらに日本が居住地国として当該配当を含む全世界所得に対して課税する結果、同一の配当に対して二重の税負担が生じます。この二重課税を排除することなく放置すれば、国際的な経済活動・投資が著しく阻害されます。 免除法（Exemption Method） OECD...","url":"lesson_2_租税条約の基礎.html"},{"id":"l2-s13","ln":2,"lt":"租税条約の基礎","sec":"無差別・相互協議条項（第24〜25条）","text":"id=\"sec13\"> Section 13 無差別・相互協議条項（第24〜25条） 無差別原則（第24条） OECDモデル第24条は無差別原則を定めており、締約国の国民（国籍を有する者）は、相手国の国民と同じ状況にある限り、相手国において相手国の国民より重い課税又はこれに関連する要件に服させられないとしています。無差別原則にはいくつかの適用局面があります。 まず 国籍による無差別 （第1項）は、外国人に対して自国民より重い税負担を課してはならないとする原則です。次に PEの無差別 （第3項）は、一方の国に有するPEに帰属する利得への課税が、その国の同種の事業を行う企業に対する課税より不...","url":"lesson_2_租税条約の基礎.html"},{"id":"l3-s1","ln":3,"lt":"租税条約の応用","sec":"条約濫用（Treaty Shopping）","text":"id=\"sec1\"> Section 01 条約濫用（Treaty Shopping） 条約濫用の定義と基本構造 租税条約は、二国間（あるいは多国間）で締結される国際的な合意であり、源泉地国における課税を軽減・免除することで二重課税を排除し、国際的な経済活動を促進することを主な目的としています。しかしながら、この条約上の特典（treaty benefits）は本来、締約国の居住者に対して付与されるものです。 条約濫用（Treaty Shopping） とは、本来は条約上の特典を享受する資格を持たない第三国の居住者が、特典を有する締約国に中間的な事業体（導管会社等）を設立し、その事業体を通...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s2","ln":3,"lt":"租税条約の応用","sec":"LOB条項（日米条約中心）","text":"id=\"sec2\"> Section 02 LOB条項（日米条約中心） LOB条項の概念と目的 LOB条項（Limitation on Benefits：特典制限条項） は、条約濫用に対する最も体系的かつ詳細な対抗手段です。LOB条項は、条約上の特典を享受するための「適格性テスト」（qualification test）を設定し、一定の要件を満たした者のみが条約上の特典を受けられるようにする仕組みです。この条項の基本的な考え方は、条約の特典は当該締約国と「真正な結びつき」（genuine link）を有する者にのみ付与されるべきであるということにあります。 LOB条項は、米国が1980年...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s3","ln":3,"lt":"租税条約の応用","sec":"PPT（主要目的テスト：Principal Purpose Test）","text":"id=\"sec3\"> Section 03 PPT（主要目的テスト：Principal Purpose Test） PPTの概要と背景 PPT（Principal Purpose Test：主要目的テスト） は、租税条約上の特典の付与を判断する際に、取引や取決めの主要な目的の一つが条約上の特典の取得にあったかどうかを基準とするプリンシプルベース（原則ベース）の濫用防止規定です。PPTはOECD/G20のBEPS（Base Erosion and Profit Shifting：税源浸食と利益移転）プロジェクトの行動6において策定され、2017年OECDモデル条約改訂により第29条第9項と...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s4","ln":3,"lt":"租税条約の応用","sec":"導管取引否認","text":"id=\"sec4\"> Section 04 導管取引否認 導管取引の概念 導管取引（conduit arrangement） とは、所得の流れの中間に介在する事業体が、当該所得に対する実質的な経済的権利を有さず、単に所得を受領して別の者に移転する「パイプ」として機能する取引類型を指します。導管取引は条約濫用の最も一般的な形態であり、前述のTreaty Shoppingの中核的な仕組みです。 導管取引否認のアプローチは、条約レベルと国内法レベルの双方で展開されています。条約レベルでは、受益所有者（beneficial owner）概念の厳格な適用、LOB条項、PPTがそれぞれ導管取引を否認...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s5","ln":3,"lt":"租税条約の応用","sec":"BEPS行動6：条約濫用の防止","text":"id=\"sec5\"> Section 05 BEPS行動6：条約濫用の防止 BEPS プロジェクトの位置づけ OECD/G20の BEPS（Base Erosion and Profit Shifting：税源浸食と利益移転）プロジェクト は、2012年のG20メキシコサミットでの要請を受けて2013年に開始され、2015年に15の行動計画に関する最終報告書が公表されました。BEPSプロジェクトは、多国籍企業による国際的な租税回避に対する包括的な対応策を策定することを目的としており、国際税務の枠組みを根本的に変革する画期的な取組みです。 行動6「条約濫用の防止」（Preventing t...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s6","ln":3,"lt":"租税条約の応用","sec":"MLIの概要と仕組み","text":"id=\"sec6\"> Section 06 MLIの概要と仕組み MLIとは何か MLI（Multilateral Instrument：多数国間条約�strong>、正式名称「税源浸食及び利益移転を防止するための租税条約関連措置を実施するための多数国間条約」） は、BEPS行動15の成果として2016年11月に採択され、2017年6月にパリで署名式が行われた国際条約です。MLIは、BEPSプロジェクトの成果を既存の二国間租税条約に迅速かつ効率的に反映させるための革新的な手段として設計されました。 MLIが必要とされた背景には、国際的な租税条約ネットワークの規模の問題があります。世界には...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s7","ln":3,"lt":"租税条約の応用","sec":"MLI適用メカニズム","text":"id=\"sec7\"> Section 07 MLI適用メカニズム 「マッチング」の仕組み MLIの適用メカニズムの核心は 「マッチング」（matching） の概念にあります。MLIは、両締約国がともにMLIの署名国であり、かつ、ある条項について両国ともに留保していない場合にのみ、当該条項が二国間条約を修正する効果を持ちます。つまり、MLIの各規定は、両方の締約国が当該規定の適用に合意している場合にのみ適用されるという「二国間のマッチング」が必要です。 このマッチングの仕組みは、MLIの柔軟性を支える基盤であると同時に、その適用関係を複雑にする要因でもあります。各国がMLIのどの条項を採...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s8","ln":3,"lt":"租税条約の応用","sec":"日本のMLI適用状況","text":"id=\"sec8\"> Section 08 日本のMLI適用状況 日本のMLI署名・批准の経緯 日本は2017年6月7日にパリで開催されたMLIの署名式において署名を行い、2018年9月26日に批准書を寄託しました。これにより、日本についてのMLIは2019年1月1日に発効しています。日本はMLIに対して積極的な姿勢を示しており、広範な二国間条約をCTAとして通告しています。 日本のCTA通告と留保の概要 日本は約40の二国間租税条約をMLIのCTAとして通告しました。ただし、日米租税条約はCTAとして通告されていません。これは、日米租税条約にはすでに詳細なLOB条項（第22条）が存在し...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s9","ln":3,"lt":"租税条約の応用","sec":"情報交換（EOI・AEOI・CRS）","text":"id=\"sec9\"> Section 09 情報交換（EOI・AEOI・CRS） 租税条約における情報交換の枠組み 租税条約における情報交換（Exchange of Information：EOI）は、締約国間で税務に関する情報を共有する仕組みであり、条約の実効性を担保するための重要な柱です。OECDモデル条約第26条は情報交換に関する基本規定を設けており、締約国の権限ある当局が、条約の実施又は国内税法の執行に関連する情報を交換することを義務づけています。 情報交換の類型は、大きく以下の三種類に分類されます。 要請に基づく情報交換（Exchange of Information on R...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s10","ln":3,"lt":"租税条約の応用","sec":"CRS報告義務","text":"id=\"sec10\"> Section 10 CRS報告義務 日本における CRS 国内法の整備 日本においてCRSの国内実施を担保する法律は、「租税条約等の実施に伴う所得税法、法人税法及び地方税法の特例等に関する法律」（租税条約等実施特例法）です。同法の第10条の5以下に、「報告対象契約についての届出書の提出義務」および「報告金融機関等の報告義務」に関する規定が設けられています。 CRSに基づく報告義務は、以下の主要な要素から構成されます。 報告金融機関 （Reporting Financial Institution）の範囲として、銀行、証券会社、保険会社（特定の貯蓄性保険）、投資信...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s11","ln":3,"lt":"租税条約の応用","sec":"徴収共助","text":"id=\"sec11\"> Section 11 徴収共助 徴収共助の意義 徴収共助（Assistance in the Collection of Taxes） とは、一方の締約国の租税債権を他方の締約国が代わって徴収する国際的な協力の仕組みです。OECDモデル条約第27条に規定されており、また、税務行政執行共助条約にも徴収共助に関する規定が含まれています。 徴収共助が必要とされる背景には、租税の属地的性格の問題があります。国家の徴税権は原則として自国の領域内でのみ行使でき、他国の領域内で直接的な徴収活動を行うことはできません（国際法上の主権原則）。したがって、納税者が海外に資産を保有して...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s12","ln":3,"lt":"租税条約の応用","sec":"仲裁条項","text":"id=\"sec12\"> Section 12 仲裁条項 仲裁の意義と沿革 相互協議手続（MAP）は国際的二重課税の救済に重要な役割を果たしますが、両国の権限当局が合意に至らない場合には、二重課税が解消されないまま終了するリスクがあります。この問題に対応するために設けられたのが 仲裁条項 です。OECDモデル条約第25条第5項（2008年改定で追加）は、3年以内にMAPが解決しない場合、いずれかの当事者の要請により案件を仲裁に付す仕組みを設けています。 EU仲裁条約（1990年）は、移転価格調整に伴う二重課税についてEU加盟国間の仲裁を義務付けた先駆的な枠組みです。また、MLI（多国間条約...","url":"lesson_3_租税条約の応用.html"},{"id":"l3-s13","ln":3,"lt":"租税条約の応用","sec":"デジタル課税と条約の将来","text":"id=\"sec13\"> Section 13 デジタル課税と条約の将来 デジタル経済における条約適用の限界 現行の租税条約は、物理的な事業拠点（PE）の存在を課税権発生の要件とするため、デジタルサービスのように物理的拠点なしに市場所在地国で大量の収益を上げる事業モデルに対する課税が困難です。例えば、ソーシャルメディアプラットフォームが日本に法人やサーバを置かず、日本のユーザーから広告収益を得ている場合、日本との間に租税条約があれば、PEが存在しない限り日本の課税権は制限されます。この問題に対応するため、第一の柱（Pillar One）の枠組みが提案されています。 第一の柱（Pillar ...","url":"lesson_3_租税条約の応用.html"},{"id":"l4-s1","ln":4,"lt":"PE課税の基礎","sec":"PE概念の歴史的発展","text":"id=\"sec1\" class=\"content-section container\"> SECTION 01 — HISTORICAL DEVELOPMENT PE概念の歴史的発展 1-1. PE概念はなぜ生まれたか 恒久的施設（Permanent Establishment、以下「PE」）という概念は、国際課税の歴史のなかで最も重要な概念の一つであり、その発展は約150年にわたる歴史を有しています。19世紀後半から20世紀初頭にかけて、産業革命を契機として国際的な商取引が急速に拡大しました。これに伴い、ある国の企業が他国の領域内で事業活動を行い、所得を得るケースが増加し、「源泉地国は...","url":"lesson_4_PE課税の基礎.html"},{"id":"l4-s2","ln":4,"lt":"PE課税の基礎","sec":"基本定義「固定的事業場所」","text":"id=\"sec2\" class=\"content-section container\"> SECTION 02 — BASIC DEFINITION 基本定義「固定的事業場所」 2-1. OECDモデル租税条約第5条第1項 PE概念の基本定義は、OECDモデル租税条約第5条第1項に規定されています。原文は次のとおりです。 \"For the purposes of this Convention, the term 'permanent establishment' means a fixed place of business through which the business of ...","url":"lesson_4_PE課税の基礎.html"},{"id":"l4-s3","ln":4,"lt":"PE課税の基礎","sec":"支店PE・工場PE","text":"id=\"sec3\" class=\"content-section container\"> SECTION 03 — BRANCH PE & FACTORY PE 支店PE・工場PE 3-1. OECDモデル第5条第2項の例示リスト OECDモデル租税条約第5条第2項は、PEの典型的な形態を例示列挙しています。この規定は次のように定めています。 「恒久的施設には、特に次のものを含む。 (a) 事業の経営の場所（a place of management） (b) 支店（a branch） (c) 事務所（an office） (d) 工場（a factory） (e) 作業場（a work...","url":"lesson_4_PE課税の基礎.html"},{"id":"l4-s4","ln":4,"lt":"PE課税の基礎","sec":"建設PE（12ヶ月基準）","text":"id=\"sec4\" class=\"content-section container\"> SECTION 04 — CONSTRUCTION PE 建設PE（12ヶ月基準） 4-1. OECDモデル第5条第3項 OECDモデル租税条約第5条第3項は、建設工事現場に関する特別のPE規定を設けています。 「建設工事現場又は建設若しくは据付けの工事は、12ヶ月を超える期間存続する場合にのみ、恒久的施設を構成する。」 \"A building site or construction or installation project constitutes a permanent establish...","url":"lesson_4_PE課税の基礎.html"},{"id":"l4-s5","ln":4,"lt":"PE課税の基礎","sec":"サービスPE","text":"id=\"sec5\" class=\"content-section container\"> SECTION 05 — SERVICE PE サービスPE 5-1. サービスPE規定の意義 サービスPE（Services PE）は、外国企業が一国においてコンサルティング、技術支援、経営指導などのサービスを一定期間以上提供する場合に、固定的な事業場所を持たなくともPEの存在を認める規定です。この規定は、従来のPE概念（物理的施設の存在を前提とする基本定義）では捕捉できないサービス提供活動を課税の対象とするために設けられたものです。 OECDモデル租税条約は、2017年の改訂まではサービスPE規...","url":"lesson_4_PE課税の基礎.html"},{"id":"l4-s6","ln":4,"lt":"PE課税の基礎","sec":"準備的・補助的活動除外","text":"id=\"sec6\" class=\"content-section container\"> SECTION 06 — PREPARATORY / AUXILIARY EXEMPTION 準備的・補助的活動除外 6-1. OECDモデル第5条第4項の構造 OECDモデル租税条約第5条第4項は、企業が固定的な事業場所を有している場合であっても、当該場所で行われる活動が「準備的又は補助的な性格のもの」（preparatory or auxiliary character）にすぎないときは、PEを構成しないと規定しています。この規定は、PE概念のネガティブ・リスト（除外リスト）として機能しており、...","url":"lesson_4_PE課税の基礎.html"},{"id":"l4-s7","ln":4,"lt":"PE課税の基礎","sec":"BEPSによるアンチフラグメンテーション","text":"id=\"sec7\" class=\"content-section container\"> SECTION 07 — BEPS ANTI-FRAGMENTATION BEPSによるアンチフラグメンテーション 7-1. フラグメンテーション（活動分断）問題 フラグメンテーション（fragmentation）とは、PE認定を回避するために、本来一体の事業活動を複数のグループ企業や複数の場所に分断し、それぞれの活動が「準備的又は補助的」であるとして第5条第4項の除外を主張するスキームを指します。 例えば、多国籍企業グループが、ある国において次のように活動を分散させるケースを考えてみましょう。子会...","url":"lesson_4_PE課税の基礎.html"},{"id":"l4-s8","ln":4,"lt":"PE課税の基礎","sec":"日本国内法のPE概念","text":"id=\"sec8\" class=\"content-section container\"> SECTION 08 — JAPANESE DOMESTIC LAW 日本国内法のPE概念 8-1. 所得税法・法人税法におけるPE規定 日本の国内法は、 所得税法第164条 及び 法人税法第141条 において、非居住者・外国法人の国内源泉所得に対する課税の範囲を規定し、この文脈で恒久的施設（PE）の概念を用いています。2014年度及び2018年度の税制改正により、国内法のPE定義が租税条約の定義に大幅に近づけられました。 所得税法第2条第1項第8号 の4及び 法人税法第2条 第12号の19は、恒久...","url":"lesson_4_PE課税の基礎.html"},{"id":"l4-s9","ln":4,"lt":"PE課税の基礎","sec":"PE認定の主要判例","text":"id=\"sec9\" class=\"content-section container\"> SECTION 09 — CASE LAW PE認定の主要判例 9-1. 国内判例：みずほ証券PE事件（東京地裁平成26年） みずほ証券PE事件は、日本の国内裁判所がPE課税の論点を正面から扱った数少ない事件の一つです。この事件では、外国証券会社が日本法人（みずほ証券）を通じて行った有価証券売買取引が、日本における恒久的施設（PE）を通じた取引に該当するか否か、及びPEに帰属すべき利得の算定が争われました。 東京地裁は、外国証券会社の従業員が日本法人の施設を使用して業務を行っていた事実に基づき、当該...","url":"lesson_4_PE課税の基礎.html"},{"id":"l4-s10","ln":4,"lt":"PE課税の基礎","sec":"PEなければ課税なし原則","text":"id=\"sec10\" class=\"content-section container\"> SECTION 10 — NO PE, NO TAX PEなければ課税なし原則 10-1. 原則の意義と歴史的背景 「PEなければ課税なし（No PE, No Tax）」原則は、国際課税における最も基本的な原則の一つです。一方の締約国の企業は、他方の締約国において事業を行う場合において、他方の締約国に有するPEを通じて当該事業を行わない限り、他方の締約国において課税されないとするものです（OECDモデル第7条第1項）。 この原則の歴史的背景は、19世紀末から20世紀初頭の二国間租税条約の萌芽期にさ...","url":"lesson_4_PE課税の基礎.html"},{"id":"l4-s11","ln":4,"lt":"PE課税の基礎","sec":"実務チェックリスト","text":"id=\"sec11\" class=\"content-section container\"> SECTION 11 — CHECKLIST 実務チェックリスト 11-1. PE判定の基本フロー 実務において外国企業が日本においてPEを有するか否かを判定する際には、以下のステップで検討を進めます。 Step 1：国内法上のPE該当性の検討 まず、日本の国内法（ 法人税法第2条 第12号の19、 所得税法第2条第1項第8号 の4）上のPE定義を確認します。事業の拠点・建設PE・代理人PEのいずれかに該当するか判断します。 Step 2：適用条約の確認 日本と当該外国企業の居住地国との間に租税条...","url":"lesson_4_PE課税の基礎.html"},{"id":"l5-s1","ln":5,"lt":"PE課税の応用","sec":"代理人PE（従属 vs 独立）","text":"id=\"sec1\"> Section 01 代理人PE（従属 vs 独立） 1-1. 代理人PEとは何か──物理的拠点なきPE認定 国際課税において「恒久的施設（PE: Permanent Establishment）」は、源泉地国に課税権が生じるか否かを分ける最重要の閾値概念です。伝統的にPEといえば支店・工場・事務所といった物理的な「場所PE（fixed place of business PE）」が想起されますが、実務上はもう一つの類型──「代理人PE（agency PE）」──が極めて重要な役割を果たします。 代理人PEとは、外国企業が相手国に物理的な事業拠点を構えていなくても、...","url":"lesson_5_PE課税の応用.html"},{"id":"l5-s2","ln":5,"lt":"PE課税の応用","sec":"BEPS行動7 コミッショネア対策","text":"id=\"sec2\"> Section 02 BEPS行動7 コミッショネア対策 2-1. BEPSプロジェクトの背景と行動7の位置づけ BEPS（Base Erosion and Profit Shifting：税源浸食と利益移転）プロジェクトは、2012年にOECDとG20の共同イニシアティブとして開始され、2015年に15の行動計画の最終報告書が公表されました。多国籍企業が各国の税制の差異や抜け穴を利用して、経済活動が実際に行われている場所とは異なる低税率国に利益を移転させる問題に対処することが、このプロジェクトの核心的な目的です。 行動7（Preventing the Artifi...","url":"lesson_5_PE課税の応用.html"},{"id":"l5-s3","ln":5,"lt":"PE課税の応用","sec":"契約締結代理人の新定義","text":"id=\"sec3\"> Section 03 契約締結代理人の新定義 3-1. 新第5条第5項の構造分析 BEPS行動7を反映した2017年OECDモデル条約の新第5条第5項は、代理人PEの認定基準を大幅に拡張しました。その条文構造を詳細に分析すると、PE認定のためには以下の要件が充足される必要があります。 第一に、ある者（a person）が締約国の一方において、他方の締約国の企業に代わって行動していること（acts on behalf of an enterprise）。ここでいう「者」は、個人でも法人でもよく、当該企業の従業員であるか否かを問いません。「企業に代わって行動する」とは、...","url":"lesson_5_PE課税の応用.html"},{"id":"l5-s4","ln":5,"lt":"PE課税の応用","sec":"独立代理人除外の厳格化","text":"id=\"sec4\"> Section 04 独立代理人除外の厳格化 4-1. 新第5条第6項の改正内容 BEPS行動7は、代理人PEの認定基準を拡張する（第5条第5項の改正）と同時に、独立代理人の除外規定（第5条第6項）についても重要な改正を行いました。新第5条第6項は、第5条第5項が適用される場合であっても、ある者が独立の地位を有する代理人として通常の業務の範囲内で企業のために活動するときは、PE認定は行われない旨を規定していますが、ここに決定的な制限条件が追加されました。 追加された制限とは、当該代理人が「もっぱらまたは主として（exclusively or almost exclu...","url":"lesson_5_PE課税の応用.html"},{"id":"l5-s5","ln":5,"lt":"PE課税の応用","sec":"AOA（Authorised OECD Approach）の概要","text":"id=\"sec5\"> Section 05 AOA（Authorised OECD Approach）の概要 5-1. PEへの利益帰属問題の所在 PEが認定されると、次の問題は「PEにどれだけの利益を帰属させるか」です。PE課税の二段構造──まずPEの存否を判断し（第5条）、次にPEへの利益帰属を計算する（第7条）──において、利益帰属の問題は第7条（事業利得条項）の解釈問題として位置づけられます。 PEは法的に独立した主体ではなく、本店と同一の法人の一部にすぎません。したがって、PEと本店の間の取引は、法的には「自己との取引」であり、第三者間取引のような明確な対価設定がなされないこと...","url":"lesson_5_PE課税の応用.html"},{"id":"l5-s6","ln":5,"lt":"PE課税の応用","sec":"AOA二段階分析","text":"id=\"sec6\"> Section 06 AOA二段階分析 6-1. 第1段階：機能・事実分析（Functional and Factual Analysis） AOAの第1段階は、PEを仮想的に独立した企業として特徴づけるための分析です。具体的には、PEが遂行する「機能」、PEに帰属する「資産」、PEが負担する「リスク」、さらにPEに帰属すべき「資本」を特定します。この分析は、移転価格税制における機能分析（functional analysis）と概念的に類似していますが、PEの場合にはPEと本店が法的に同一主体であるという特殊性から、独自の方法論が必要とされます。 第1段階の分析に...","url":"lesson_5_PE課税の応用.html"},{"id":"l5-s7","ln":5,"lt":"PE課税の応用","sec":"PEへの資本配賦","text":"id=\"sec7\"> Section 07 PEへの資本配賦 7-1. なぜ資本配賦が重要か PEへの利益帰属を計算する上で、資本配賦（capital attribution）は決定的に重要な要素です。その理由は単純明快で、PEに帰属する資本の額が、PEの利息費用の控除額を左右し、結果としてPEの課税所得に直接的な影響を与えるからです。 企業の資金調達は自己資本（エクイティ）と他人資本（デット）の組み合わせで行われます。他人資本（借入金）に対する利息は費用として控除可能ですが、自己資本に対する「配当」は費用として控除できません。したがって、PEに多くの自己資本を配賦すれば、PEで控除可能...","url":"lesson_5_PE課税の応用.html"},{"id":"l5-s8","ln":5,"lt":"PE課税の応用","sec":"内部取引の認識と計算","text":"id=\"sec8\"> Section 08 内部取引の認識と計算 8-1. 内部取引（dealings）の意義 AOAの最も革新的かつ議論を呼ぶ側面が、PEと本店の間の「内部取引（dealings）」の税務上の認識です。法的には、PEと本店は同一法人の一部であり、両者間に法律上の「取引」は存在しません。しかしAOAは、PEを仮想独立企業として扱う以上、PEと本店の間の資産・サービス・資金の移動を経済的な「取引」として認識し、独立企業原則に基づく対価を設定すべきとしています。 内部取引の認識が必要となる典型的な場面を列挙すると、PEで製造した製品を本店経由で第三者に販売する場合の製品移転、...","url":"lesson_5_PE課税の応用.html"},{"id":"l5-s9","ln":5,"lt":"PE課税の応用","sec":"日本のAOA導入（2014年）","text":"id=\"sec9\"> Section 09 日本のAOA導入（2014年） 9-1. 日本の国内法改正の背景 日本は、2014年度（平成26年度）税制改正において、PEへの利益帰属に関する国内法の規定をAOAに基づくものに改正しました。改正法は2016年（平成28年）4月1日以後に開始する事業年度から適用されています。この改正は、日本の国際課税制度の近代化における画期的な出来事であり、「総合主義」から「帰属主義」への転換として広く知られています。 改正前の日本の法人税法は、いわゆる「総合主義（全所得主義：worldwide income approach）」に基づいていました。総合主義の...","url":"lesson_5_PE課税の応用.html"},{"id":"l5-s10","ln":5,"lt":"PE課税の応用","sec":"計算事例演習","text":"id=\"sec10\"> Section 10 計算事例演習 10-1. 事例1：製造業のPE帰属所得計算 ここでは具体的な数値例を用いて、AOAに基づくPE帰属所得の計算プロセスを体感してみましょう。 【前提事実】 A国法人X社は、日本にPE（支店）を有して製品の販売活動を行っています。X社はA国の工場で製品を製造し、日本PEが日本の顧客に対する販売を担当しています。日本PEの従業員は営業担当者10名、営業管理者2名です。日本PEの第三者への売上高は100億円、X社全体の売上高は500億円です。X社全体の自己資本は200億円、総資産は1,000億円です。日本PEの総資産は150億円です。...","url":"lesson_5_PE課税の応用.html"},{"id":"l5-s11","ln":5,"lt":"PE課税の応用","sec":"デジタル経済とPE限界","text":"id=\"sec11\"> Section 11 デジタル経済とPE限界 11-1. デジタル経済における「固定の事業の場所」の概念的限界 伝統的なPEの概念は、固定の物理的拠点（支店・工場・事務所等）を前提としています。しかし、デジタル経済においては、企業はサーバやクラウドインフラを利用して、物理的な拠点なしに特定の国の市場に深く関与し、大量の収益を上げることが可能です。例えば、クラウドSaaS（Software as a Service）を提供する企業が日本に法人・施設・従業員を一切置かずに、日本の企業から月額料金を受領しているケースでは、従来のPEルールの下では日本のPEは認定されず、...","url":"lesson_5_PE課税の応用.html"},{"id":"l5-s12","ln":5,"lt":"PE課税の応用","sec":"Pillar 1 との関係","text":"id=\"sec12\"> Section 12 Pillar 1 との関係 12-1. Amount AとPE課税の代替 第一の柱のAmount Aは、既存のPEルールの代替を目指すものではなく、既存のPEルールに加えて適用される追加的な課税権の配分メカニズムです。Amount Aが適用される企業（年間売上高200億ユーロ超かつ利益率10%超）は、全世界でも約100社程度と見込まれており、大多数の企業はAmount Aの対象外です。したがって、PE課税ルールはAmount A対象企業にとっても、非対象企業にとっても引き続き適用されます。 12-2. Amount Aが適用される場合のPE課...","url":"lesson_5_PE課税の応用.html"},{"id":"l6-s1","ln":6,"lt":"移転価格税制の基礎","sec":"移転価格の歴史──米国1968年規則から現代まで","text":"id=\"sec1\" class=\"content-section reveal\"> SECTION 01 移転価格の歴史──米国1968年規則から現代まで 1-1. 移転価格問題の原点 移転価格（Transfer Pricing）とは、関連企業間の国際取引において設定される価格のことを指します。例えば、日本の親会社がアメリカの子会社に製品を販売する際の価格、あるいは日本の親会社がシンガポールの子会社からロイヤルティを受け取る際の料率など、グループ内部で設定されるあらゆる対価が移転価格に該当します。この価格設定は、各国の課税所得を直接左右するため、国際税務における最も重要な論点の一つとなっ...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l6-s2","ln":6,"lt":"移転価格税制の基礎","sec":"独立企業原則（ALP）の意義と理論的基盤","text":"id=\"sec2\" class=\"content-section reveal\"> SECTION 02 独立企業原則（ALP）の意義と理論的基盤 2-1. 独立企業原則とは何か 独立企業原則（Arm's Length Principle、略してALP）とは、関連企業間取引の価格は、仮に当該取引が独立した第三者間で行われたとしたならば設定されたであろう価格と一致すべきであるという原則です。英語の\"arm's length\"とは「腕の長さの距離」、すなわち「一定の距離を保った」という意味であり、取引当事者間に特殊な関係がなく、互いに独立した立場で交渉を行ったであろう状態を示す比喩的表現です...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l6-s3","ln":6,"lt":"移転価格税制の基礎","sec":"日本の条文構造──租税特別措置法66条の4","text":"id=\"sec3\" class=\"content-section reveal\"> SECTION 03 日本の条文構造──租税特別 措置法66条の4 3-1. 日本における移転価格税制の導入経緯 日本に移転価格税制が導入されたのは昭和61年（1986年）のことです。この年の税制改正により、租税特別措置法（以下「措置法」）に第66条の4が新設されました。導入の背景には、日本企業の海外進出の拡大と、それに伴う国外関連者との取引を通じた所得移転への懸念がありました。また、国際的には米国が既に移転価格税制を運用しており、日米間の課税権の調整の観点からも日本における制度整備が急務とされていたので...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l6-s4","ln":6,"lt":"移転価格税制の基礎","sec":"国外関連者の定義と支配関係の判定","text":"id=\"sec4\" class=\"content-section reveal\"> SECTION 04 国外関連者の定義と支配関係の判定 4-1. 国外関連者の概念 移転価格税制が適用されるためには、取引の相手方が「国外関連者」に該当する必要があります。国外関連者とは、法人との間に特殊の関係がある外国法人をいい、 措置法第66条の4第3項 および第4項に定義規定が置かれています。「特殊の関係」とは、一般に「支配関係」と呼ばれるものであり、具体的には以下の三つの類型に分類されます。 第一の類型は、「持株関係」に基づく支配です。法人と外国法人の間に、直接又は間接に50%以上の株式保有関係が...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l6-s5","ln":6,"lt":"移転価格税制の基礎","sec":"基本三法の詳解──概観と選択基準","text":"id=\"sec5\" class=\"content-section reveal\"> SECTION 05 基本三法の詳解──概観と選択基準 5-1. 基本三法の位置づけ 基本三法（Traditional Transaction Methods）とは、独立価格比準法（CUP法）、再販売価格基準法（RP法）、原価基準法（CP法）の三つの算定方法の総称です。これらはいずれも「取引基準法」（Transaction-Based Methods）に分類され、個々の取引の価格又は利益率を直接比較するアプローチを採用しています。基本三法は1968年の米国規則で確立されて以来、移転価格税制の算定方法の中核...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l6-s6","ln":6,"lt":"移転価格税制の基礎","sec":"独立価格比準法（CUP法）","text":"id=\"sec6\" class=\"content-section reveal\"> SECTION 06 独立価格比準法（CUP法） 6-1. CUP法の基本構造 独立価格比準法（Comparable Uncontrolled Price Method、CUP法）は、国外関連取引に係る棚卸資産の価格と、比較可能な非関連者間取引（Comparable Uncontrolled Transaction）における同種の棚卸資産の価格を直接比較する方法です。すべての算定方法の中で最も直接的かつ信頼性の高い方法とされており、適用が可能な場合には他のいずれの方法にも優先して採用されるべきとする考え方...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l6-s7","ln":6,"lt":"移転価格税制の基礎","sec":"再販売価格基準法（RP法）","text":"id=\"sec7\" class=\"content-section reveal\"> SECTION 07 再販売価格基準法（RP法） 7-1. RP法の基本構造 再販売価格基準法（Resale Price Method、RP法）は、国外関連者から購入した棚卸資産を非関連者に再販売する場合に適用される方法です。具体的には、再販売価格から、比較可能な非関連者間取引における通常の利益率（粗利益率）に相当する金額を差し引いて独立企業間価格を算定します。 算式で表すと、独立企業間価格（仕入価格） = 再販売価格 ×（1 − 通常の利益率）です。ここで「通常の利益率」とは、比較可能な非関連者間取引に...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l6-s8","ln":6,"lt":"移転価格税制の基礎","sec":"原価基準法（CP法）","text":"id=\"sec8\" class=\"content-section reveal\"> SECTION 08 原価基準法（CP法） 8-1. CP法の基本構造 原価基準法（Cost Plus Method、CP法）は、棚卸資産の供給者（売り手）側の原価に通常の利益率（マークアップ率）を加算して独立企業間価格を算定する方法です。算式で表すと、独立企業間価格 = 原価 ×（1 + 通常の利益率）です。ここで「原価」とは売り手が負担する直接費と間接費を含む製造原価（又は取得原価）であり、「通常の利益率」とは比較可能な非関連者間取引における原価に対するマークアップ率（Cost Plus Markup...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l6-s9","ln":6,"lt":"移転価格税制の基礎","sec":"取引単位営業利益法（TNMM）","text":"id=\"sec9\" class=\"content-section reveal\"> SECTION 09 取引単位営業利益法（TNMM） 9-1. TNMMの基本構造 取引単位営業利益法（Transactional Net Margin Method、TNMM）は、国外関連者との取引から生ずる営業利益に関する利益率（利益水準指標：PLI）を、比較可能な非関連者間取引における利益率と比較することにより独立企業間価格を算定する方法です。TNMMは、売上総利益ではなく営業利益を基準とするため、粗利ベースで比較が困難な複雑な取引（例：複数の種類の商品・サービスが混在する取引）に適していると言われ...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l6-s10","ln":6,"lt":"移転価格税制の基礎","sec":"利益分割法（PS法）","text":"id=\"sec10\" class=\"content-section reveal\"> SECTION 10 利益分割法（PS法） 10-1. 利益分割法の基本的な考え方 利益分割法（Profit Split Method、PS法）は、国外関連者間取引に係る結合利益を、それぞれの貢献度に応じて分割し、各法人に帰属する利益を算定する方法です。PS法は、高度に統合された取引や、双方の当事者がユニークで価値ある貢献（特許技術、独自のノウハウ等）を行っている取引において特に適切とされています。CUP法・RP法・CP法・TNMMのいずれも適用できない場合の「最後の手段（last resort）」とさ...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l6-s11","ln":6,"lt":"移転価格税制の基礎","sec":"最適方法ルール（Best Method Rule）","text":"id=\"sec11\" class=\"content-section reveal\"> SECTION 11 最適方法ルール（Best Method Rule） 11-1. 最適方法ルールとは 平成23年（2011年）度の移転価格税制改正前、日本の移転価格税制は「CUP法・RP法・CP法の順に優先して適用し、これらが適用できない場合にはOECDが認める方法（TNMM・PS法等）を用いる」という優先順位ルール（hierarchy）を採用していました。しかし、この優先順位ルールは、CUP法・RP法・CP法が適用できない場合であっても形式的にこれらを検討する手間をかけることになり、実態に即した最...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l6-s12","ln":6,"lt":"移転価格税制の基礎","sec":"比較可能性分析の5要素","text":"id=\"sec12\" class=\"content-section reveal\"> SECTION 12 比較可能性分析の5要素 12-1. 比較可能性分析の重要性 移転価格の独立企業間価格の算定においては、関連者間取引を独立企業間の比較可能な取引と比較することが基本となります。この比較が有意義であるためには、比較される取引が「比較可能（comparable）」でなければなりません。OECDの移転価格ガイドライン（パラグラフ1.38〜1.63）は、比較可能性を評価するための5つの要素を示しています。 12-2. 5要素の内容 ①財産または役務の特性（Characteristics of...","url":"lesson_6_移転価格税制の基礎.html"},{"id":"l7-s1","ln":7,"lt":"移転価格税制の応用","sec":"OECD移転価格ガイドライン第6章の概要","text":"id=\"s1\"> Section 01 OECD移転価格ガイドライン第6章の概要 OECD移転価格ガイドライン（以下「TPG」）第6章は、無形資産に関する移転価格の問題を包括的に取り扱う章であり、2015年のBEPSプロジェクト（行動計画8〜10）を経て大幅に改訂されました。旧版の第6章は比較的簡潔な内容でしたが、改訂後は200パラグラフ以上に膨れ上がり、無形資産の定義、分類、所有と帰属に関する分析枠組み、そして具体的な評価方法論に至るまで、詳細かつ体系的な指針を提供しています。 第6章が大幅改訂された背景には、多国籍企業グループが無形資産を低税率国に移転することで、価値創造の場とは乖離...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s2","ln":7,"lt":"移転価格税制の応用","sec":"無形資産の分類と定義","text":"id=\"s2\"> Section 02 無形資産の分類と定義 TPG第6章は、移転価格上の「無形資産」を、有形資産や金融資産ではない資産であって、商業活動において所有または管理することが可能であり、独立企業間の取引において対価が支払われるようなもの、と広く定義しています（パラ6.6）。この定義は、会計基準（IAS 38等）や法律上の知的財産の定義とは異なることに注意が必要です。会計上認識されない無形資産（自己創設のれんなど）も、移転価格上は無形資産として扱われる場合があります。 無形資産の主要な分類 TPG第6章は、無形資産を明確にカテゴリ分けすることに慎重な姿勢を示していますが、分析の...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s3","ln":7,"lt":"移転価格税制の応用","sec":"DEMPE分析","text":"id=\"s3\"> Section 03 DEMPE分析 DEMPE分析は、TPG第6章の中核をなす分析枠組みであり、BEPSプロジェクトの最も重要な成果の一つです。DEMPEとは、Development（開発）、Enhancement（改良・向上）、Maintenance（維持）、Protection（保護）、Exploitation（活用）の頭文字を取ったもので、無形資産に関連するリターンは、これらの機能を実質的に遂行し、関連するリスクを管理・負担する当事者に帰属すべきであるとする考え方を示しています。 DEMPE機能の詳細 Development（開発）は、無形資産を最初に創出する活...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s4","ln":7,"lt":"移転価格税制の応用","sec":"HTVI（評価困難な無形資産）","text":"id=\"s4\"> Section 04 HTVI（評価困難な無形資産） Hard-to-Value Intangibles（HTVI、評価困難な無形資産）は、TPG第6章セクションDで導入された概念であり、BEPS行動計画8の重要な成果の一つです。HTVIとは、取引時点において信頼できる比較対象が存在せず、かつ将来のキャッシュフローや所得に関する予測が極めて不確実な無形資産を指します。 HTVIアプローチの背景と趣旨 従来、無形資産の移転価格は取引時点の情報に基づいて事前に（ex ante）決定されていました。しかし、無形資産の価値は高度に不確実であり、取引時点の評価と事後的に実現した所...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s5","ln":7,"lt":"移転価格税制の応用","sec":"費用分担契約（CCA）","text":"id=\"s5\"> Section 05 費用分担契約（CCA） 費用分担契約（Cost Contribution Arrangement: CCA）は、2以上の関連企業が、無形資産の開発や役務の取得にかかる費用とリスクを分担し、各参加者が開発成果に対する持分を取得する取決めです。TPG第8章がCCAに関する詳細な指針を提供しており、BEPSプロジェクトを経て大幅に改訂されました。 CCAの基本構造と類型 CCAは大きく二つの類型に分かれます。一つは開発CCA（development CCA）であり、新たな無形資産の共同開発を目的とするものです。もう一つは役務CCA（services CC...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s6","ln":7,"lt":"移転価格税制の応用","sec":"グループ内役務提供（TPG第7章）","text":"id=\"s6\"> Section 06 グループ内役務提供（TPG第7章） TPG第7章は、多国籍企業グループ内における役務提供取引の移転価格問題を取り扱います。多国籍企業グループでは、親会社やリージョナル本社が子会社に対して経営管理サービス、IT支援、法務・税務アドバイス、人事管理、財務管理などの多様な役務を提供することが一般的です。これらの役務提供取引が独立企業間価格に基づいているかどうかは、移転価格税制上の重要な論点です。 役務提供が行われたか否かの判定（ベネフィット・テスト） グループ内役務提供の分析における最初の問題は、そもそも移転価格上の「役務提供」が行われたといえるかどうか...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s7","ln":7,"lt":"移転価格税制の応用","sec":"低付加価値役務（LVIS）","text":"id=\"s7\"> Section 07 低付加価値役務（LVIS） 低付加価値グループ内役務（Low Value-Adding Intra-group Services: LVIS）は、TPG第7章セクションDで導入された簡便法（simplified approach）です。BEPS行動計画10の成果として、低付加価値役務に関する紛争を減少させ、コンプライアンスコストを軽減することを目的としています。 LVISの定義と特徴 低付加価値役務とは、グループ内で提供される支援的性質の役務であって、グループのコアビジネスの一部を構成せず、独自で価値の高い無形資産の使用や創出を伴わず、重要なリスク...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s8","ln":7,"lt":"移転価格税制の応用","sec":"金融取引（TPG第10章）","text":"id=\"s8\"> Section 08 金融取引（TPG第10章） TPG第10章は、2020年2月に新たに追加された章であり、グループ内金融取引の移転価格問題に関する包括的な指針を提供します。BEPS行動計画4（利子控除制限）および行動計画8〜10（価値創造に沿った移転価格）の成果を踏まえ、グループ内貸付、保証取引、キャプティブ保険、キャッシュプーリングなどの金融取引に関する詳細な分析枠組みを示しています。 第10章追加の背景 従来、TPGにはグループ内金融取引に特化した章は存在せず、一般的な独立企業原則の枠組みの中で金融取引も分析されていました。しかし、金融取引は多国籍企業グループの...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s9","ln":7,"lt":"移転価格税制の応用","sec":"グループ内貸付と金利設定","text":"id=\"s9\"> Section 09 グループ内貸付と金利設定 グループ内貸付の金利設定は、移転価格税制において最も頻繁に問題となるテーマの一つです。多国籍企業グループは、外部金融機関からの借入れに加え、グループ内の資金融通（intercompany loans）を広く活用しています。グループ内貸付の金利が独立企業間条件を満たしていない場合、所得の不適切な移転が生じ、税務上の問題となります。 金利設定の分析枠組み グループ内貸付の金利設定の分析は、以下のステップで行われます。まず、取引の正確な描写として、貸付の条件（金額、通貨、期間、返済条件、担保の有無、劣後性の有無等）を明確にし、そ...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s10","ln":7,"lt":"移転価格税制の応用","sec":"保証取引","text":"id=\"s10\"> Section 10 保証取引 グループ内保証取引（intra-group guarantees）は、TPG第10章セクションCで取り扱われています。親会社が子会社の外部借入に対して保証を提供する取引は、多国籍企業グループにおいて極めて一般的です。この保証によって子会社はより有利な条件（低い金利）で外部借入を行うことが可能になりますが、保証の提供に対して対価（保証料）を請求すべきか否か、請求する場合にはいかなる水準が適正かが移転価格上の問題となります。 保証の性質の分析 グループ内保証の分析においては、まず保証の性質を正確に理解する必要があります。保証には様々な形態が...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s11","ln":7,"lt":"移転価格税制の応用","sec":"キャプティブ保険","text":"id=\"s11\"> Section 11 キャプティブ保険 キャプティブ保険（captive insurance）は、多国籍企業グループが自らの保険ニーズを満たすために設立する保険子会社を通じた保険取引です。TPG第10章セクションDがこの問題を詳細に取り扱っています。キャプティブ保険は、グループのリスク管理戦略の一部として正当に活用される場合がある一方、利益移転のツールとして悪用されるリスクもあるため、移転価格の観点から慎重な分析が必要です。 キャプティブ保険の基本構造 キャプティブ保険の典型的な構造は、以下のとおりです。多国籍企業グループの子会社（被保険者）が、グループ内に設立された...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s12","ln":7,"lt":"移転価格税制の応用","sec":"移転価格と関税の交錯","text":"id=\"s12\"> Section 12 移転価格と関税の交錯 移転価格税制と関税制度は、いずれもグループ内取引の価格の適正性に関わる制度ですが、その目的と方向性は根本的に異なります。移転価格税制は、グループ内取引の価格が過大または過小に設定されることによる法人税の課税ベースの侵食を防止するものであり、輸入国の観点からは移転価格が「高い」方が好ましい（課税ベースが大きくなる）場合があります。一方、関税制度は、輸入品の関税評価額に基づいて関税を課すものであり、輸入国の観点からは関税評価額が「高い」方が関税収入は増加しますが、輸入者としては関税評価額を「低く」したいインセンティブがあります。...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l7-s13","ln":7,"lt":"移転価格税制の応用","sec":"更正手続と不服申立て","text":"id=\"s13\"> Section 13 更正手続と不服申立て 13-1. 移転価格調査と更正処分 移転価格税制上の問題は、多くの場合、税務調査（移転価格調査）によって発見されます。国税局調査部（大企業対象）または税務署法人課税部門が調査を行い、申告された取引価格が独立企業間価格と異なると認定した場合、更正処分（課税所得の増額）が行われます。更正の請求期限は、申告期限から5年以内（ 法人税法第77条の2 ）ですが、移転価格の場合は更正可能期間が7年（租税特別 措置法第66条の4第22項 ）と一般の場合より長く設定されています。 更正処分に対しては、30日以内に異議申立て（税務署長または国...","url":"lesson_7_移転価格税制の応用.html"},{"id":"l8-s1","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"BEPS行動13と三層文書化","text":"id=\"s1\"> Section 01 BEPS行動13と三層文書化 1-1. BEPS プロジェクトの背景と行動13の位置づけ OECD/G20が主導した「税源浸食と利益移転（Base Erosion and Profit Shifting: BEPS）」プロジェクトは、2012年に検討が開始され、2015年10月に最終報告書（15の行動計画）が公表された。多国籍企業グループが、各国税制の隙間や租税条約のミスマッチを利用して利益を低税率国に人為的に移転し、実質的な課税逃れを行う構造が国際的に問題視されたことがその出発点であった。BEPSプロジェクトの15の行動計画は、大きく分けて「整合...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s2","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"マスターファイル","text":"id=\"s2\"> Section 02 マスターファイル 2-1. マスターファイルの目的と性格 マスターファイル（Master File）は、多国籍企業グループの組織構造、事業活動、無形資産の保有・利用状況、グループ内の金融活動、および移転価格ポリシーの全体像を包括的に記述する文書である。OECDの移転価格ガイドライン第V章（行動13の成果を反映して改訂された章）に、その記載項目が詳細に列挙されている。マスターファイルの主たる目的は、各国の税務当局に対して、当該グループのグローバルな事業とその移転価格ポリシーの全体的な文脈（コンテクスト）を提供することにある。 重要な点として、マスター...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s3","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"ローカルファイル","text":"id=\"s3\"> Section 03 ローカルファイル 3-1. ローカルファイルの目的と位置づけ ローカルファイル（Local File）は、三層文書化の第二層として、特定の国に所在する法人が行う重要な関連者間取引について、当該取引の条件が独立企業原則に合致していることを詳細に分析・立証する文書である。マスターファイルがグループ全体の「マクロ」な視点を提供するのに対し、ローカルファイルは個別取引の「ミクロ」な分析を提供する。ローカルファイルは各国ごとに、当該国の法人が関与する重要な関連者間取引に焦点を当てて作成されるため、グループ内の各法人がそれぞれの所在国の要件に従って作成する必要...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s4","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"国別報告書（CbCR）","text":"id=\"s4\"> Section 04 国別報告書（CbCR） 4-1. CbCRの意義と法的位置づけ 国別報告書（Country-by-Country Report: CbCR）は、三層文書化の第三層として、多国籍企業グループが活動する各国・地域における収入、税引前利益、支払税額・未払税額、資本金、利益剰余金、従業員数、有形資産（現金等を除く）等の集計データを、国・地域ごとに報告する文書である。CbCRは、BEPS行動13の中でもミニマムスタンダード（最低基準）として位置づけられており、すべてのInclusive Framework参加国が導入を義務づけられている。これはマスターファイ...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s5","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"日本の文書化制度","text":"id=\"s5\"> Section 05 日本の文書化制度 5-1. 法令上の根拠 日本の移転価格文書化制度は、租税特別措置法（以下「措置法」）第66条の4の4から第66条の4の6に規定されている。具体的には、国別報告事項（CbCR）は 措置法第66条の4の4 に、事業概況報告事項（マスターファイル）は 措置法第66条の4の5 に、独立企業間価格を算定するために必要と認められる書類（ローカルファイル）は 措置法第66条の4第6項 および措置法施行規則第22条の10に規定されている。これらの規定は、2016年度（平成28年度）税制改正により新設され、2016年4月1日以後に開始する事業年度か...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s6","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"推定課税と挙証責任","text":"id=\"s6\"> Section 06 推定課税と挙証責任 6-1. 推定課税の法的根拠と趣旨 移転価格税制における推定課税とは、税務当局が独立企業間価格を算定するために必要な情報を納税者から十分に得られない場合に、税務当局が入手し得る情報に基づいて独立企業間価格を推定的に算定する制度である。日本では 措置法第66条の4第8項 に規定されている。同項は、国税職員が独立企業間価格を算定するために必要と認められる帳簿書類等の提示・提出を求めた場合において、当該求めに対して適時に提示・提出がなされなかったときは、税務署長は、同種の事業を営む者の利益率等の一定の基準に基づいて、独立企業間価格を算...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s7","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"移転価格調査の流れ","text":"id=\"s7\"> Section 07 移転価格調査の流れ 7-1. 調査対象の選定 移転価格調査は、税務当局がCbCRやその他の情報源を分析し、移転価格リスクの高い企業・取引を特定するところから始まる。日本の国税当局（国税局調査部または国税庁相互協議室の支援を受けた調査担当部門）は、CbCRのデータ分析、外国税務当局との情報交換、法人税確定申告書の分析、過去の調査実績等を総合的に勘案して、調査対象を選定する。特に、利益率が同業他社に比して著しく低い法人、大規模な無形資産取引を行っている法人、事業再編を行った法人、低税率国に重要な関連者を有する法人等が調査対象として選定されやすい。 7-...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s8","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"MAP申立てから合意","text":"id=\"s8\"> Section 08 MAP申立てから合意 8-1. MAPの定義と法的根拠 相互協議手続（Mutual Agreement Procedure: MAP）とは、租税条約の規定に適合しない課税が行われた場合（またはその恐れがある場合）に、納税者の申立てに基づき、関係する二カ国の権限ある当局（Competent Authority）が協議を行い、条約に適合しない課税を排除するための手続である。MAPの法的根拠は、各租税条約の相互協議条項（典型的にはOECDモデル租税条約第25条）に置かれている。移転価格の文脈では、一方の国が移転価格調整を行った結果、同一の所得に対して両国...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s9","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"対応的調整","text":"id=\"s9\"> Section 09 対応的調整 9-1. 対応的調整の意義 対応的調整（Corresponding Adjustment）とは、一方の締約国が移転価格調整（一次的調整: Primary Adjustment）を行った場合に、他方の締約国がこれに対応して自国の課税を調整することで、経済的二重課税を排除する措置をいう。OECDモデル租税条約第9条第2項がその法的根拠であり、「一方の締約国が、条約第9条第1項の原則に従って関連企業の利益について調整を行った場合、他方の締約国は、当該調整が正当であると認めるときは、当該利益について課した税額について適切な調整を行う」旨を規定し...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s10","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"APA（ユニラテラル・バイラテラル・マルチラテラル）","text":"id=\"s10\"> Section 10 APA（ユニラテラル・バイラテラル・マルチラテラル） 10-1. APAの定義と目的 事前確認（Advance Pricing Arrangement: APA）とは、納税者と税務当局との間で、将来の一定期間における関連者間取引について、適切な移転価格算定方法及びその適用にあたっての重要な前提条件を事前に合意する制度である。APAの目的は、移転価格に関する将来の不確実性を除去し、移転価格調査・調整の事前回避を図ることにある。APAは事後的な紛争解決手段（MAP）とは異なり、事前予防的な制度であり、納税者にとっては税務リスクの大幅な軽減、税務当局に...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s11","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"APA審査プロセス","text":"id=\"s11\"> Section 11 APA審査プロセス 11-1. APA申請の準備 APA申請の準備は、通常、事前相談（Pre-filing Meeting）から始まる。日本では、APA申請に先立ち、国税庁相互協議室（BAPA・MAPAの場合）または国税局調査部（ユニラテラルAPAの場合）に対して事前相談を行うことが推奨されている。事前相談では、対象取引の概要、想定する移転価格算定方法、主要な論点等について非公式な意見交換が行われ、APA申請の実現可能性や手続の見通しについて情報を得ることができる。 事前相談を経て、正式なAPA申請書を提出する。APA申請書には、申請対象取引の概...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s12","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"仲裁制度","text":"id=\"s12\"> Section 12 仲裁制度 12-1. 仲裁制度の概要 移転価格に係る相互協議（MAP）が解決しない場合の最終手段として、 仲裁制度 があります（OECDモデル条約第25条第5項、EU仲裁条約、MLI第6部等）。MAP開始から一定期間（通常3年）以内に合意に至らない場合、一方当事者の要請により仲裁パネルを設置し、拘束力ある決定を求めることができます。 仲裁の方式には、① ラストベストオファー方式（Baseball Arbitration） と② 独立意見方式（Independent Opinion） があります。ラストベストオファー方式では、双方がそれぞれの最終提...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l8-s13","ln":8,"lt":"移転価格の文書化と紛争解決","sec":"Amount Bアプローチ","text":"id=\"s13\"> Section 13 Amount Bアプローチ 13-1. Amount Bとは Amount B（アマウントB） は、OECDのBEPS包摂的枠組みにおいて合意された、特定の基本的な販売・マーケティング活動に対する移転価格の簡素化・合理化アプローチです。具体的には、一定の要件を満たす基本的な流通機能（販売子会社・販売代理店等が製品を非関連の顧客に再販売する機能）について、複雑な個別分析なしに標準的な報酬（固定の利益率）を適用することを認めるものです。 Amount Bは、移転価格の文書化・調査・紛争に関わるコストと不確実性を軽減し、特にデータや専門家へのアクセスが...","url":"lesson_8_移転価格の文書化と紛争解決.html"},{"id":"l9-s1","ln":9,"lt":"CFC税制の基礎","sec":"CFC税制の誕生—米国Subpart F（1962年）から各国への波及","text":"id=\"sec1\"> Section 01 CFC税制の誕生—米国Subpart F（1962年）から各国への波及 1-1. CFC税制とは何か CFC税制（Controlled Foreign Corporation Rules／外国子会社合算税制）とは、内国法人や居住者が、低税率国に設立された外国子会社を通じて所得を留保し、自国での課税を繰り延べる行為を防止するために設けられた国際租税制度である。具体的には、内国法人等が一定の支配関係を有する外国法人（CFC）が得た所得の全部または一部を、配当の有無にかかわらず、内国法人等の所得に合算して課税する仕組みである。 この制度は「タックスヘ...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l9-s2","ln":9,"lt":"CFC税制の基礎","sec":"CFC税制の制度趣旨—資本輸出中立性とタックスヘイブン対策","text":"id=\"sec2\"> Section 02 CFC税制の制度趣旨—資本輸出中立性とタックスヘイブン対策 2-1. CFC税制の根本的な政策目的 CFC税制の制度趣旨を正確に理解することは、個別の適用判定やグレーゾーンの解釈において極めて重要である。CFC税制には複数の政策目的が内包されているが、主要なものとして以下の4つを挙げることができる。第一に「資本輸出中立性」（Capital Export Neutrality: CEN）の確保、第二に「タックスヘイブンを利用した租税回避の防止」、第三に「課税ベースの保全」（Revenue Protection）、第四に「公平性の確保」（Equit...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l9-s3","ln":9,"lt":"CFC税制の基礎","sec":"日本のCFC税制の条文構造（措置法66条の6〜66条の9の2）","text":"id=\"sec3\"> Section 03 日本のCFC税制の条文構造（ 措置法66条の6 〜66条の9の2） 3-1. 条文の全体構造 日本のCFC税制は、租税特別措置法（以下「措置法」という）第66条の6から第66条の9の2までに規定されている。2017年度（平成29年度）の大幅改正後の条文構造は極めて複雑であり、関連する政令（租税特別措置法施行令）および省令（租税特別措置法施行規則）の規定も含めると、膨大な条文量となっている。ここでは、条文の全体構造を俯瞰し、各条文の役割と相互関係を整理する。 条文の全体的な構造は以下のとおりである。 措置法第66条の6 は、CFC税制の中核規定で...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l9-s4","ln":9,"lt":"CFC税制の基礎","sec":"外国関係会社の定義—持株基準と実質支配基準","text":"id=\"sec4\"> Section 04 外国関係会社の定義—持株基準と実質支配基準 4-1. 「外国関係会社」の定義—条文の読み方 CFC税制の第一の判定ステップは、対象となる外国法人が「外国関係会社」に該当するかどうかである。 措置法第66条の6第2項第1号 は、外国関係会社を「次に掲げる外国法人をいう」と定義し、イとロの2つの基準を定めている。イが「持株基準」（50%基準）であり、ロが「実質支配基準」である。いずれか一方の基準を満たせば、当該外国法人は外国関係会社に該当する。 4-2. 持株基準（50%基準） 持株基準とは、居住者及び内国法人が直接及び間接に保有する株式等の数又は...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l9-s5","ln":9,"lt":"CFC税制の基礎","sec":"特定外国関係会社の3類型","text":"id=\"sec5\"> Section 05 特定外国関係会社の3類型 5-1. 特定外国関係会社とは 外国関係会社のうち、「特定外国関係会社」に該当する場合には、後述する経済活動基準による適用除外の余地がなく、原則として所得の全額が合算の対象となる（ 措置法第66条の6第2項第2号 イ）。特定外国関係会社とは、タックスヘイブン対策税制において最も重い規制を受けるカテゴリーであり、その実質的な経済活動を問わず合算課税が適用される。2017年度改正により、3つの類型が明確に定義された。 5-2. 第1類型：ペーパー・カンパニー ペーパー・カンパニーとは、本店所在地国においてその主たる事業を行...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l9-s6","ln":9,"lt":"CFC税制の基礎","sec":"ペーパーカンパニーの認定基準の詳細分析","text":"id=\"sec6\"> Section 06 ペーパーカンパニーの認定基準の詳細分析 6-1. 実体基準の詳細 実体基準（固定施設の有無）の判定において、「固定施設」とは、事務所、店舗、工場、倉庫、作業場、農場等の施設であって、その主たる事業を行うために通常必要と認められるものをいう。重要なのは、「その主たる事業を行うために通常必要と認められる」という文言であり、事業の規模・内容に応じた必要性の有無が問われる。 例えば、投資持株会社（ホールディング・カンパニー）については、株式保有という性質上、大規模な事務所や従業員は必ずしも必要とされない。このため、小規模な登記事務所のみを有する持株会社...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l9-s7","ln":9,"lt":"CFC税制の基礎","sec":"事実上のキャッシュボックスの判定","text":"id=\"sec7\"> Section 07 事実上のキャッシュボックスの判定 7-1. 受動的資産の具体的範囲 事実上のキャッシュ・ボックスの判定に用いる受動的資産の具体的な範囲は、措置法施行令第39条の14の3（第2項各号）に規定されている。主な受動的資産は以下のとおりである。①有価証券（株式等を除く）：社債、国債、外国国債、投資信託の受益証券等。②貸付金（グループ内金銭の貸付けに係るもの）：関連者に対する貸付金であって、事業遂行に必要な運転資金の貸付け等一定のものを除く。③無形固定資産（一定のもの）：特許権、商標権、著作権、営業権等。④現金・預貯金（一定のもの）：日常的な事業遂行に必...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l9-s8","ln":9,"lt":"CFC税制の基礎","sec":"対象外国関係会社の判定—租税負担割合の計算方法","text":"id=\"sec8\"> Section 08 対象外国関係会社の判定—租税負担割合の計算方法 8-1. 対象外国関係会社とは 特定外国関係会社に該当しない外国関係会社のうち、さらに「経済活動基準」（第10回で詳述）を満たさないもの、または租税負担割合が一定の基準（トリガー税率）以下のものを「対象外国関係会社」という。対象外国関係会社に該当すると、その所得の全額（会社単位の合算課税）が日本の内国法人の所得に合算される（2017年度改正以降）。 対象外国関係会社の判定フローを整理すると、①特定外国関係会社該当→経済活動基準審査不要でそのまま合算、②特定外国関係会社非該当→経済活動基準を審査→基...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l9-s9","ln":9,"lt":"CFC税制の基礎","sec":"20%基準と30%基準のトリガー税率","text":"id=\"sec9\"> Section 09 20%基準と30%基準のトリガー税率 9-1. トリガー税率とは トリガー税率とは、租税負担割合がこの水準以下であれば対象外国関係会社に該当し、合算課税の対象となるという基準税率である。日本のCFC税制では、現在2つのトリガー税率が設定されている。①20%基準（原則的なトリガー税率）と②30%基準（特定外国関係会社に係る合算税率に相当する水準）である。 9-2. 20%基準（本則） 経済活動基準を満たす外国関係会社（対象外国関係会社に該当しない可能性がある法人）については、租税負担割合が20%以上であれば、原則として合算課税が適用されない（経済...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l9-s10","ln":9,"lt":"CFC税制の基礎","sec":"租税負担割合の計算における実務上の論点","text":"id=\"sec10\"> Section 10 租税負担割合の計算における実務上の論点 10-1. 複数税目の合計と地方税の取扱い 租税負担割合の計算における「外国税額」には、本店所在地国で課される法人税（国税）のほか、地方法人税、事業所得に対する地方税等も含まれる。ただし、消費税・付加価値税（VAT）、関税、源泉徴収税（受取配当等に対するもの）、その他特定の取引に対して課される取引税等は原則として含まれない。 各国の地方税制度は多様であり、例えば米国の州法人税（State income tax）、中国の地方教育附加・城市維護建設税、ドイツの営業税（Gewerbesteuer）等の取扱いに...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l9-s11","ln":9,"lt":"CFC税制の基礎","sec":"各国CFC税制の比較","text":"id=\"sec11\"> Section 11 各国CFC税制の比較 11-1. 主要国CFC税制の概要比較 各国のCFC税制は、その設計思想や対象範囲において大きな違いがある。以下に主要国の制度を比較する。 国 制度名 支配基準 トリガー税率 合算アプローチ 米国 Subpart F + GILTI 議決権50%超 13.125%（GILTI実効） トランザクション型 日本 措法66条の6 持株50%以上・実質支配 20%（30%：部分合算） ハイブリッド型 英国 CFC Rules（TIOPA） 議決権25%超 英国税率の75%未満 トランザクション型 ドイツ AStG §7-14 持...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l9-s12","ln":9,"lt":"CFC税制の基礎","sec":"BEPS行動3のCFC勧告と各国の対応","text":"id=\"sec12\"> Section 12 BEPS行動3のCFC勧告と各国の対応 12-1. BEPS行動3の概要 BEPS（Base Erosion and Profit Shifting）プロジェクトの行動3（Action 3）は「CFC税制の強化（Strengthening CFC Rules）」をテーマとしており、2015年10月に最終報告書が公表された。BEPS行動3は、各国のCFC税制の共通的な設計原則として、以下の6つの要素を勧告している。 ①CFC定義（支配の定義）：持株・議決権・経済的利益に基づく包括的な支配の定義。②CFC除外規定：完全免税国・十分な税負担をしてい...","url":"lesson_9_CFC税制の基礎.html"},{"id":"l10-s1","ln":10,"lt":"CFC税制の応用","sec":"経済活動基準──4基準の全体像","text":"id=\"sec1\"> Section 01 経済活動基準──4基準の全体像 1-1. CFC税制における経済活動基準の位置づけ 外国子会社合算税制（CFC税制）は、日本の内国法人（または居住者）が、租税負担の低い外国関係会社を通じて所得を留保し、日本での課税を不当に繰り延べることを防止するための制度です。平成29年度税制改正により抜本的に改組され、現在の枠組みではまず「ペーパー・カンパニー」「事実上のキャッシュ・ボックス」「ブラック・リスト国所在会社」というカテゴリーに該当するかどうかを判定し、これらに該当しない外国関係会社については「経済活動基準」の充足度を検証するという二段階構造を採...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s2","ln":10,"lt":"CFC税制の応用","sec":"事業基準──主たる事業の判定","text":"id=\"sec2\"> Section 02 事業基準──主たる事業の判定 2-1. 事業基準の趣旨と条文構造 事業基準とは、外国関係会社の主たる事業が「株式等若しくは債券の保有」「工業所有権その他の技術に関する権利若しくは特別の技術による生産方式若しくはこれらに準ずるものの提供」「船舶若しくは航空機の貸付け」のいずれにも該当しないことを要求する基準です（ 措法66条の6第2項第2号 イ）。換言すれば、外国関係会社がいわゆる「持株会社」「知的財産保有会社」「船舶・航空機リース会社」として機能している場合には事業基準を満たさず、経済活動基準全体が不充足となります。 この基準の趣旨は、受動的な...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s3","ln":10,"lt":"CFC税制の応用","sec":"実体基準──固定施設の要件","text":"id=\"sec3\"> Section 03 実体基準──固定施設の要件 3-1. 実体基準の意義 実体基準とは、外国関係会社がその本店所在地国に「主たる事業を行うに必要と認められる事務所、店舗、工場その他の固定施設」を有していることを要求する基準です（ 措法66条の6第2項第2号 ロ）。これは、ペーパー・カンパニーとしての実態を有する外国関係会社、すなわち登記上の本店所在地国に物理的な事業拠点を持たない会社を排除するための要件です。 固定施設とは、事業活動のために継続的に使用される物理的な場所を意味し、事務所、店舗、工場、倉庫、作業場などが典型例です。租税条約における「恒久的施設（PE）...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s4","ln":10,"lt":"CFC税制の応用","sec":"管理支配基準──意思決定の所在","text":"id=\"sec4\"> Section 04 管理支配基準──意思決定の所在 4-1. 管理支配基準の趣旨 管理支配基準とは、外国関係会社がその本店所在地国において「事業の管理、支配及び運営を自ら行っている」ことを要求する基準です（ 措法66条の6第2項第2号 ハ）。この基準は、法人の意思決定機能がどこに所在するかという観点から事業実体を検証するものであり、いわば「頭脳」の所在を問うものです。 管理支配基準の背景にある考え方は、外国関係会社の経営判断が日本の親会社によってすべて代替されている場合、当該外国関係会社は独立した事業主体としての実体を欠くということです。すなわち、日本の親会社が外...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s5","ln":10,"lt":"CFC税制の応用","sec":"所在地国基準と非関連者基準","text":"id=\"sec5\"> Section 05 所在地国基準と非関連者基準 5-1. 第4基準の二分構造 経済活動基準の第4基準は、外国関係会社の主たる事業の種類に応じて「所在地国基準」と「非関連者基準」に分かれます。この使い分けは、業種の性質に由来するものであり、事業活動が地理的に本店所在地国に限定されることが通常である業種には所在地国基準が、取引先が必然的に国境を越え多国間にまたがる業種には非関連者基準がそれぞれ適用されます。 5-2. 所在地国基準の内容 所在地国基準とは、外国関係会社が「その主たる事業を主としてその本店又は主たる事務所の所在する国又は地域において行っている」ことを要求...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s6","ln":10,"lt":"CFC税制の応用","sec":"部分合算課税の仕組み","text":"id=\"sec6\"> Section 06 部分合算課税の仕組み 6-1. 部分合算課税の概要と趣旨 部分合算課税とは、経済活動基準を4基準ともすべて充足する外国関係会社について、その所得の全額ではなく、受動的所得（passive income）に限定して日本の内国法人の所得に合算する制度です（ 措法66条の6第6項 ）。平成29年度改正で導入された「インカム・アプローチ」の核心部分であり、事業実体のある外国関係会社であっても、受動的所得については合算の対象とするという考え方に基づいています。 部分合算課税の趣旨は、実質的な経済活動を行っている外国関係会社を全面的に合算対象から除外すると...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s7","ln":10,"lt":"CFC税制の応用","sec":"受動的所得13類型の詳解","text":"id=\"sec7\"> Section 07 受動的所得13類型の詳解 7-1. 受動的所得の概念 受動的所得（passive income）とは、外国関係会社が能動的な事業活動を行うことなく獲得できる所得を指す概念です。CFC税制における受動的所得の範囲は租税特別 措置法第66条の6第6項 各号に限定列挙されており、現行法では13の類型が規定されています。これらの類型は、国際的なCFC税制の設計においても広く認識される受動的所得のカテゴリーを網羅したものです。 7-2. 13類型の一覧と各論 【第1類型】配当等 外国関係会社が受ける剰余金の配当等の額です。ただし、外国関係会社が他の外国法...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s8","ln":10,"lt":"CFC税制の応用","sec":"受動的所得の計算──算定ルールと調整","text":"id=\"sec8\"> Section 08 受動的所得の計算──算定ルールと調整 8-1. 受動的所得の計算の基本的枠組み 受動的所得の金額は、外国関係会社の各事業年度の決算に基づく所得を基礎として、日本の法人税法の規定に準じて計算されます。具体的には、外国関係会社の現地会計基準に基づく財務諸表の数値を出発点とし、日本の法人税法上の所得計算の考え方に基づく調整（税務調整）を加えた上で、受動的所得13類型に該当する金額を抽出します。 この計算過程で重要なのは、「本店所在地国の法令に基づいて計算した所得」と「日本の法人税法に準じて計算した所得」の間に差異が生じ得るという点です。減価償却の方法...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s9","ln":10,"lt":"CFC税制の応用","sec":"会社単位合算（全部合算）の構造","text":"id=\"sec9\"> Section 09 会社単位合算（全部合算）の構造 9-1. 会社単位合算課税が適用される場合 会社単位の合算課税（全部合算課税）は、以下のいずれかに該当する外国関係会社について適用されます。第一に、ペーパー・カンパニー（実体基準または管理支配基準のいずれも満たさない会社）に該当する場合、第二に、事実上のキャッシュ・ボックス（受動的所得の総資産に対する割合が30%超かつ租税負担割合が20%未満の会社）に該当する場合、第三に、ブラック・リスト国所在の会社に該当する場合（現在のところ指定国はありません）、第四に、経済活動基準の4基準のうち1つ以上を満たさない場合です。...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s10","ln":10,"lt":"CFC税制の応用","sec":"適用対象金額の計算","text":"id=\"sec10\"> Section 10 適用対象金額の計算 10-1. 適用対象金額の算定プロセス 適用対象金額とは、外国関係会社の各事業年度の所得の金額について、日本の法人税法に準じた調整を行った後の金額です。適用対象金額の計算は、概ね以下のステップで行われます。 まず、外国関係会社の本店所在地国の法令に基づく決算上の所得金額（税引前利益に相当するもの）を出発点とします。次に、日本の法人税法の規定に準じて一定の加算・減算調整を行います。この調整には、本店所在地国と日本の法人税法における損金算入・益金算入の基準の差異に起因するものが含まれます。 具体的な調整項目としては、減価償却費...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s11","ln":10,"lt":"CFC税制の応用","sec":"二重課税調整・外国税額控除","text":"id=\"sec11\"> Section 11 二重課税調整・外国税額控除 11-1. 二重課税の問題構造 CFC税制により外国関係会社の所得が内国法人の所得に合算される場合、同一の所得に対して外国関係会社の所在地国と日本の双方で課税が生じる「二重課税」の問題が発生します。この二重課税を放置すると、CFC税制が単なる追加課税の仕組みとなり、国際的な事業活動を不当に阻害する結果となりかねません。そこで、CFC税制には二重課税を調整するための各種の措置が組み込まれています。 二重課税の発生パターンとしては、主に以下の3つが考えられます。第一に、外国関係会社がその所在地国で法人税を納付している場...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s12","ln":10,"lt":"CFC税制の応用","sec":"配当二重課税の排除","text":"id=\"sec12\"> Section 12 配当二重課税の排除 12-1. 配当二重課税の発生メカニズム 外国関係会社が内国法人に配当を行った場合、CFC税制により既に合算課税を受けた利益を原資とする配当については、合算課税の段階で日本において一度課税されているにもかかわらず、配当受領の段階で再び課税されるという二重課税の問題が生じます。 この問題を図示すると、まずStep1として外国関係会社が所得100を稼得し、Step2としてCFC税制により当該所得100が内国法人の益金に合算されます。その後、Step3として外国関係会社が留保利益から80の配当を内国法人に支払い、Step4として...","url":"lesson_10_CFC税制の応用.html"},{"id":"l10-s13","ln":10,"lt":"CFC税制の応用","sec":"ケーススタディ3問","text":"id=\"sec13\"> Section 13 ケーススタディ3問 ケース1：地域統括会社の経済活動基準判定 【問題設定】 日本の上場企業であるX社は、シンガポールに地域統括会社であるA社を設立しています。A社はASEAN地域の5つの事業子会社（B1～B5社）の株式を保有するとともに、各事業子会社に対する経営指導、資金管理、人事制度の統一化などの統括業務を行っています。A社の概要は以下のとおりです。 【A社の概要】 ・所在地：シンガポール ・X社の持分割合：100% ・従業員数：25名（うち取締役3名、すべてシンガポール居住） ・オフィス：シンガポール中心部に200㎡の賃借オフィス ・取締...","url":"lesson_10_CFC税制の応用.html"},{"id":"l11-s1","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"二重課税の類型 ― 法的二重課税と経済的二重課税","text":"id=\"s1\"> Section 01 二重課税の類型 ― 法的二重課税と経済的二重課税 1-1. 国際的二重課税とは何か 国際的二重課税（international double taxation）とは、同一の所得または同一の経済的事象に対して、2以上の国が課税権を行使する結果、納税者に過重な租税負担が生じる現象をいいます。国際取引が日常化した現代において、この問題の解決は租税政策の最重要課題の一つです。 二重課税が放置されると、国境を越えた経済活動のコストが著しく増大し、資本・労働の自由な移動を阻害します。OECDモデル租税条約の前文においても「所得に対する二重課税の排除が国際的な財...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s2","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"二重課税排除方法の比較","text":"id=\"s2\"> Section 02 二重課税排除方法の比較 2-1. 全額免除方式（exemption method） 全額免除方式とは、居住地国が国外源泉所得を課税所得から完全に除外する方法です。フランス、オランダ、ベルギーなど欧州諸国を中心に採用されてきた伝統的方式であり、テリトリアル課税（領土主義課税）の考え方に基づきます。 この方式のメリットは制度の簡素さにあります。国外所得は課税ベースから除外されるため、外国税率が高くても低くても、居住地国の税負担に影響しません。企業にとっては計算が単純であり、予見可能性が高いというメリットがあります。 一方、デメリットとして、源泉地国の税...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s3","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"日本の外国税額控除 ― 法人税法69条の全体構造","text":"id=\"s3\"> Section 03 日本の外国税額控除 ― 法人税法69条 の全体構造 3-1. 制度趣旨と法的根拠 日本の外国税額控除制度は、 法人税法69条 に規定されています。内国法人が各事業年度において外国法人税を納付することとなる場合に、一定の控除限度額の範囲内で、その外国法人税額を法人税の額から控除する制度です。 制度の趣旨は、内国法人の国外源泉所得に対する国際的二重課税を排除し、内国法人の海外経済活動に対する税制上の中立性を確保することにあります。最高裁平成17年12月19日判決（外国税額控除余裕枠利用事件）においても、外国税額控除の趣旨は「同一の所得に対する国際的二重...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s4","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"控除対象外国法人税の範囲","text":"id=\"s4\"> Section 04 控除対象外国法人税の範囲 4-1. 外国法人税の定義 控除対象外国法人税の範囲は、法人税法施行令141条に詳細に規定されています。外国法人税とは、外国の法令に基づき外国またはその地方公共団体により法人の所得を課税標準として課される税をいいます。ここでいう「法人の所得を課税標準として課される税」には、所得の特定の部分を課税標準として課される税（例：源泉徴収税）も含まれます。 この定義のポイントは、外国税の名称ではなく、その実質（substance）に着目するという点です。したがって、外国の法令において「所得税」「法人税」と呼ばれていなくても、実質的に...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s5","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"控除限度額の計算方法","text":"id=\"s5\"> Section 05 控除限度額の計算方法 5-1. 控除限度額の基本算式 外国税額控除の控除限度額は、次の算式により計算されます。 控除限度額の算式 控除限度額 = 当期の法人税額 × 国外所得金額 / 全世界所得金額 ただし: 国外所得金額 ≤ 全世界所得金額 × 90% （上限規制） ここで「当期の法人税額」とは、外国税額控除を適用する前の法人税額（所得税額控除後の金額）をいいます。法人税法施行令142条において、具体的な計算方法が規定されています。 「全世界所得金額」は、当期の所得金額をいいます。欠損金の繰越控除前の金額を基礎とする点に注意が必要です。「国外所得...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s6","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"国外所得金額と共通費用の配賦","text":"id=\"s6\"> Section 06 国外所得金額と共通費用の配賦 6-1. 国外所得金額の定義 国外所得金額は、控除限度額計算の分子を構成する極めて重要な要素です。法人税法施行令142条において、国外所得金額とは、内国法人の各事業年度の所得金額のうち、国外源泉所得に係る所得のみについて法人税法その他の法令の規定により計算した金額をいうものと規定されています。 国外源泉所得の範囲は、 法人税法69条 4項各号に規定されています。具体的には、国外事業所等帰属所得、国外資産の運用・保有・譲渡による所得、国外における人的役務の提供の対価、国外不動産の賃貸料、その他の国外源泉所得が列挙されてい...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s7","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"繰越控除制度（控除余裕額・控除限度超過額）","text":"id=\"s7\"> Section 07 繰越控除制度（控除余裕額・控除限度超過額） 7-1. 繰越制度の趣旨 外国税額控除は各事業年度ごとに計算されますが、国外所得の金額や外国法人税の額は年度によって大きく変動することがあります。例えば、ある年度に外国で多額の税を課されたが国外所得が少なく控除限度額が小さい場合、大部分の外国税額が控除できないという問題が生じます。逆に、外国税額が少なく控除限度額に余裕がある年度もあります。 このような年度間の変動を平準化し、外国税額控除の実効性を確保するために設けられたのが繰越制度です。 法人税法69条 2項は控除限度超過額の繰越しを、同条3項は控除余裕...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s8","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"地方税における外国税額控除","text":"id=\"s8\"> Section 08 地方税における外国税額控除 8-1. 地方税の外国税額控除の全体像 法人税（国税）の外国税額控除だけでは、国際的二重課税の排除は完全ではありません。内国法人は法人税のほか、法人住民税（道府県民税・市町村民税）と法人事業税を課されます。このうち法人住民税の法人税割は法人税額を課税標準としているため、法人税額が減少すれば自動的に法人住民税も減少しますが、それだけでは不十分な場合があります。 そこで、地方税法においても外国税額控除に相当する制度が設けられています。具体的には、 法人税法69条 の控除限度額を超える外国法人税額がある場合に、その超過額を法人...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s9","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"みなし外国税額控除（タックス・スペアリング）","text":"id=\"s9\"> Section 09 みなし外国税額控除（タックス・スペアリング） 9-1. みなし外国税額控除の意義 みなし外国税額控除（deemed foreign tax credit）とは、租税条約上の制度であり、「タックス・スペアリング・クレジット（tax sparing credit）」とも呼ばれます。これは、発展途上国が外国投資を誘致するために設けた租税減免措置（タックス・インセンティブ）の効果が、居住地国の外国税額控除制度によって相殺されることを防止するための制度です。 例えば、発展途上国A国が外国企業の投資誘致のために法人税を減免する優遇措置を設けたとします。A国の法...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s10","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"外国子会社配当益金不算入制度","text":"id=\"s10\"> Section 10 外国子会社配当益金不算入制度 10-1. 制度の概要と導入経緯 外国子会社配当益金不算入制度は、2009年度（平成21年度）税制改正により導入された制度で、 法人税法23条の2 に規定されています。内国法人が外国子会社（持株割合25%以上を6月以上保有）から受ける配当等の額の95%を益金不算入とする制度です。残り5%は配当に係る費用（管理費用等）の概算相当額として益金に算入されます。 この制度の導入により、外国子会社からの配当に関する経済的二重課税の排除方法が、間接外国税額控除方式から国外所得免除方式（exemption method）に転換され...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s11","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"間接外国税額控除の廃止と制度転換","text":"id=\"s11\"> Section 11 間接外国税額控除の廃止と制度転換 11-1. 間接外国税額控除制度の仕組み 間接外国税額控除（indirect foreign tax credit）は、2009年度税制改正前まで存在した制度であり、旧 法人税法69条 8項以下に規定されていました。この制度は、内国法人が外国子会社から配当を受ける場合に、外国子会社が源泉地国で納付した法人税のうち、配当に対応する部分を、あたかも内国法人自身が納付したものとみなして外国税額控除の対象とする制度でした。 間接外国税額控除の対象となる「みなし納付税額」の計算は、以下の算式によります。みなし納付税額 ＝ ...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s12","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"ハイブリッド・ミスマッチ取決め（BEPS行動2）","text":"id=\"s12\"> Section 12 ハイブリッド・ミスマッチ取決め（BEPS行動2） 12-1. ハイブリッド・ミスマッチとは ハイブリッド・ミスマッチ取決め（Hybrid Mismatch Arrangements） とは、金融商品や事業体（エンティティ）の分類（キャラクタリゼーション）が国家間で異なることを利用して、二重非課税や二重控除等の税制上の優遇を得る取引構造です。BEPS行動計画2は、この問題に対処するための勧告をまとめており、日本を含む多くの国が国内法の整備を行っています。 ハイブリッド・ミスマッチの典型例として、 ハイブリッド金融商品 があります。これは、ある国では...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l11-s13","ln":11,"lt":"外国税額控除と国際的二重課税","sec":"計算演習 ― 3つの総合事例","text":"id=\"s13\"> Section 13 計算演習 ― 3つの総合事例 事例1：直接外国税額控除の計算 【前提】日本の内国法人A社（法人税率30%）が、米国子会社B社（米国法人税率21%）から配当50億円（外国源泉税10%、5億円源泉徴収後の手取り45億円）を受け取った。A社の国内課税所得は100億円（配当前）。 【外国税額控除の計算】 ①配当に係る国外所得金額：50億円 ②控除限度額：30億円（国内所得100億円）× 50億円/(100億円+50億円) = 10億円 ③外国で納付した税額：5億円（源泉税のみ；注：子会社の法人税は間接外国税額控除廃止後は対象外） ④控除額：min(10億...","url":"lesson_11_外国税額控除と国際的二重課税.html"},{"id":"l12-s1","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"BEPSの背景──なぜ国際課税改革が必要になったか","text":"id=\"sec1\"> SECTION 01 BEPSの背景──なぜ国際課税改革が必要になったか 国際課税制度の歴史的出発点 現行の国際課税の基本的枠組みは、1920年代に国際連盟の財政委員会が策定した原則に遡る。当時の世界経済は、有形資産を中心とした製造業が主流であり、企業活動は物理的な工場や店舗といった「恒久的施設（Permanent Establishment: PE）」を通じて行われていた。この前提のもとで確立されたのが、「PE なければ課税なし」という原則である。すなわち、市場国（消費者がいる国）が外国企業に課税するためには、当該企業がその国に物理的拠点を有していることが必要条件...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s2","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"BEPS 15の行動計画","text":"id=\"sec2\"> SECTION 02 BEPS 15の行動計画 行動計画の策定経緯 2013年7月、OECDは「税源浸食と利益移転に関する行動計画（Action Plan on Base Erosion and Profit Shifting）」を公表した。この行動計画は15の具体的な行動（Action 1〜15）で構成され、2年間という異例の短期間での成果物取りまとめが目標として設定された。2015年10月、OECDはG20トルコ・アンタルヤサミットに合わせ、全15行動の最終報告書を公表した。この一連のプロジェクトには、OECD加盟国のみならず、G20メンバーの非OECD国も参画...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s3","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"包摂的枠組み（Inclusive Framework）","text":"id=\"sec3\"> SECTION 03 包摂的枠組み（Inclusive Framework） 包摂的枠組みの成立経緯 2015年のBEPS最終報告書公表後、その実施をモニタリングし、残された課題（特に行動1のデジタル課税問題）に取り組むための国際的なプラットフォームの必要性が認識された。2016年、OECDとG20は「BEPS包摂的枠組み（OECD/G20 Inclusive Framework on BEPS: IF）」を設立した。包摂的枠組みの最大の特徴は、OECD非加盟国や途上国を含む全ての参加国・地域が対等な立場（on an equal footing）で意思決定に参加でき...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s4","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"二本の柱（Two-Pillar Solution）概観","text":"id=\"sec4\"> SECTION 04 二本の柱（Two-Pillar Solution）概観 基本構造 包摂的枠組みが合意した解決策は、相互に補完的な二本の柱で構成される。Pillar 1は「課税権の配分」に関するルールであり、巨大多国籍企業の利益の一部を、物理的拠点の有無にかかわらず市場国に再配分する仕組みである。Pillar 2は「グローバルミニマム課税」に関するルールであり、多国籍企業の各国における実効税率が最低税率（15%）を下回る場合に、追加的な課税（トップアップ税）を課す仕組みである。 Pillar 1 の基本的考え方 Pillar 1は、物理的拠点がなくとも「重大かつ...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s5","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"Pillar 1 ── Amount A：新たな課税権配分","text":"id=\"sec5\"> SECTION 05 Pillar 1 ── Amount A：新たな課税権配分 Amount A の基本設計 Amount Aは、Pillar 1の中核をなす仕組みであり、一定の大規模多国籍企業の利益の一部を、物理的拠点の有無にかかわらず、売上が生じている市場国に配分するものである。従来の移転価格税制や恒久的施設概念に基づく利益配分ルールとは根本的に異なる、新たな課税権（new taxing right）の創設である。 対象企業の範囲（スコープ） Amount Aの適用対象となるのは、全世界における連結売上高が200億ユーロを超え、かつ利益率（税引前利益/売上高）...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s6","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"Pillar 1 ── Amount B：基本的マーケティング・販売活動","text":"id=\"sec6\"> SECTION 06 Pillar 1 ── Amount B：基本的マーケティング・販売活動 Amount Bの趣旨 Amount Bは、市場国における基本的なマーケティング・販売活動（baseline marketing and distribution activities）に対して、移転価格税制上の固定リターンを設定するものである。Amount Aが全く新しい課税権の創設であるのに対し、Amount Bは既存の移転価格税制の枠組みの中での簡素化・標準化措置と位置づけられる。 背景にある問題 現行の移転価格税制のもと、市場国の販売子会社に帰属すべき利益の算定を...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s7","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"Pillar 2の趣旨──グローバルミニマム課税の基本思想","text":"id=\"sec7\"> SECTION 07 Pillar 2の趣旨──グローバルミニマム課税の基本思想 「底辺への競争」の問題 過去数十年間、各国は外国直接投資（FDI）を誘致するために法人税率の引下げ競争を繰り広げてきた。OECD加盟国の平均法定法人税率は、2000年の32.2%から2023年の23.5%へと大幅に低下した。この「底辺への競争（Race to the Bottom）」は、各国の税収基盤を浸食するのみならず、中小企業や多国籍展開をしていない国内企業との間の競争条件の公平性を損ない、さらには公共サービスの財源を圧迫するという深刻な問題を引き起こしてきた。 特に問題となったの...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s8","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"GloBEの4つの仕組み（IIR・UTPR・STTR・Subject to Tax Rule）","text":"id=\"sec8\"> SECTION 08 GloBEの4つの仕組み（IIR・UTPR・STTR・Subject to Tax Rule） 4つの仕組みの全体像 Pillar 2の枠組みは、複数のルールが階層的に適用されることで、低課税利益に対するトップアップ課税の「網」を張り巡らせる仕組みとなっている。主要な構成要素は、IIR（Income Inclusion Rule：所得合算ルール）、UTPR（Undertaxed Profits Rule：軽課税支払ルール、旧称UTPR: Undertaxed Payment Rule）、STTR（Subject to Tax Rule：源泉地国...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s9","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"IIR（所得合算ルール）の詳細","text":"id=\"sec9\"> SECTION 09 IIR（所得合算ルール）の詳細 IIRの法的構造 IIRは、多国籍企業グループの構成エンティティが所在する法域（jurisdiction）において、GloBEルールに基づく実効税率（ETR）が最低税率15%を下回る場合に、親会社に対して当該法域に関するトップアップ税を課す仕組みである。重要なのは、IIRが「エンティティ単位」ではなく「法域単位（jurisdictional blending）」で適用される点である。すなわち、同一法域に所在する全ての構成エンティティのGloBE所得と調整対象租税を合算して当該法域のETRを算定し、ETRが15%を...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s10","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"UTPR（軽課税支払ルール）の計算","text":"id=\"sec10\"> SECTION 10 UTPR（軽課税支払ルール）の計算 UTPRの機能と適用場面 UTPR（Undertaxed Profits Rule）は、IIRのバックストップとして設計されたルールである。IIRが適用されない場合、すなわち最終親会社の所在国がIIRを導入していない場合や、中間持株会社のIIR適用で捕捉しきれない低課税利益が残存する場合に、他のグループ構成国がUTPRを通じてトップアップ税を回収する。UTPRの存在により、GloBEルールの適用範囲に「穴」が生じることを防ぎ、ルール全体の実効性が担保される。 UTPRの適用メカニズム UTPRの適用は、以下...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s11","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"ETR（実効税率）の計算メカニズム","text":"id=\"sec11\"> SECTION 11 ETR（実効税率）の計算メカニズム ETR計算の重要性 GloBEルールの適用において、各法域のETR（Effective Tax Rate：実効税率）の計算は制度の根幹をなす。ETRが15%（最低税率）以上であればトップアップ税は発生せず、15%未満であればその差額がトップアップ税率となる。したがって、ETRの計算方法の正確な理解は、GloBEルールの適用結果を決定する上で不可欠である。 ETRの計算式 GloBE上のETRは、以下の計算式で算定される。 ETR = 調整対象租税（Adjusted Covered Taxes）÷ GloBE...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s12","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"QDMTT（適格国内ミニマムトップアップ税）","text":"id=\"sec12\"> SECTION 12 QDMTT（適格国内ミニマムトップアップ税） QDMTTの意義 QDMTT（Qualified Domestic Minimum Top-up Tax）は、GloBEルールの適用優先順位において最上位に位置する仕組みであり、低課税国自身が自国に所在する構成エンティティの低課税利益に対してトップアップ税を課すものである。QDMTTの最大の意義は、トップアップ税の税収が低課税国自身に帰属する点にある。IIRやUTPRでは、トップアップ税の税収は親会社所在国や他のグループ構成国に流出するが、QDMTTを導入すればその税収を自国で確保できる。 QDM...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s13","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"移行期セーフハーバー","text":"id=\"sec13\"> SECTION 13 移行期セーフハーバー 移行期セーフハーバーの意義 GloBEルールの適用に当たっては、グローバルに統一された精緻なETRの計算が求められますが、制度の初期段階においては各国の国別報告書（CbCR）の情報を活用した簡素な判定が可能な 移行期セーフハーバー（Transitional Safe Harbours） が設けられています。移行期セーフハーバーに該当する構成エンティティについては、GloBEルールによるトップアップ税額がゼロとみなされ、精緻な計算を行う義務が免除されます。 移行期CbCRセーフハーバーの3要件 最も重要な移行期セーフハーバ...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s14","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"日本の国内法制化──各法改正の全体像","text":"id=\"sec14\"> SECTION 14 日本の国内法制化──各法改正の全体像 令和5年（2023年）度税制改正：グローバルミニマム課税の導入 日本は令和5年（2023年）度税制改正により、GloBEルールのPillar Two（第二の柱）の第一段階として、IIR（国際最低課税額申告制度）を導入しました。国内法の整備は以下の法令にわたっています。 法人税法の改正 ：グローバルミニマム課税に係る課税所得の計算・申告・納付に関する規定を新設（法人税法第2編第3章「特定多国籍企業グループ等に係る特例」）。対象は総収入金額7.5億ユーロ（約1,100億円）以上の特定多国籍企業グループに属する...","url":"lesson_12_BEPSとグローバルミニマム課税.html"},{"id":"l12-s15","ln":12,"lt":"BEPSとグローバルミニマム課税","sec":"今後の展望──国際課税の未来","text":"id=\"sec15\"> SECTION 15 今後の展望──国際課税の未来 15-1. 第二の柱の残課題 グローバルミニマム課税（第二の柱）はほぼすべての先進国で法制化が進んでいますが、いくつかの残課題があります。まず、 米国の対応問題 です。米国はGILTI税制（第9回・第10回参照）を有しており、実質的にGloBEルールに相当する課税を行っていると主張していますが、厳密にはGloBEルールに完全に適合していない部分があります。バイデン政権はGloBEルールへの参加を進めようとしましたが、議会の承認に困難があり、トランプ政権下での対応は不透明です。米国が完全に参加しない場合、GloBE...","url":"lesson_12_BEPSとグローバルミニマム課税.html"}];

var fuse = new Fuse(INDEX, {
  keys: [
    {name:'sec', weight:0.4},
    {name:'text', weight:0.35},
    {name:'lt', weight:0.25}
  ],
  includeScore: true,
  includeMatches: true,
  threshold: 0.4,
  minMatchCharLength: 2,
  useExtendedSearch: false,
  ignoreLocation: true,
  findAllMatches: true
});

var qEl=document.getElementById('q');
var resEl=document.getElementById('results');
var statusEl=document.getElementById('status');
var wrapEl=document.getElementById('searchWrap');

function highlight(str, matches, key) {
  if (!matches) return escHtml(str);
  var indices = [];
  matches.forEach(function(m) { if(m.key===key) indices = indices.concat(m.indices); });
  if(!indices.length) return escHtml(str);
  var result='', last=0;
  indices.sort(function(a,b){return a[0]-b[0];});
  indices.forEach(function(pair){
    result += escHtml(str.slice(last, pair[0]));
    result += '<mark>' + escHtml(str.slice(pair[0], pair[1]+1)) + '</mark>';
    last = pair[1]+1;
  });
  result += escHtml(str.slice(last));
  return result;
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function doSearch(q) {
  q = q.trim();
  wrapEl.classList.toggle('has-value', q.length > 0);
  if(!q) {
    statusEl.textContent = '全 152 セクションから検索';
    resEl.innerHTML = document.getElementById('hintTags') ?
      resEl.innerHTML : '<div class="hint"><span class="hint-icon">🔍</span><p>キーワードを入力してください</p></div>';
    resEl.innerHTML = `<div class="hint"><span class="hint-icon">🔍</span><p>国際課税の12レッスン全セクションを横断検索できます</p><div class="tags" id="hintTags">
      <span class="tag" onclick="setQ('独立企業原則')">独立企業原則</span>
      <span class="tag" onclick="setQ('PE 認定')">PE認定</span>
      <span class="tag" onclick="setQ('CFC 経済活動基準')">経済活動基準</span>
      <span class="tag" onclick="setQ('BEPS GloBE')">GloBEルール</span>
      <span class="tag" onclick="setQ('外国税額控除')">外国税額控除</span>
      <span class="tag" onclick="setQ('移転価格 文書化')">移転価格文書化</span>
      <span class="tag" onclick="setQ('租税条約 LOB')">LOB条項</span>
      <span class="tag" onclick="setQ('MAP 相互協議')">相互協議</span>
    </div></div>`;
    return;
  }
  var results = fuse.search(q, {limit: 20});
  statusEl.textContent = results.length + ' 件ヒット';
  if(!results.length) {
    resEl.innerHTML = '<div class="hint"><span class="hint-icon">😔</span><p>「' + escHtml(q) + '」に一致する内容が見つかりませんでした</p></div>';
    return;
  }
  var html = '';
  results.forEach(function(r) {
    var item = r.item;
    var matches = r.matches;
    var secHL = highlight(item.sec || '', matches, 'sec');
    var textHL = highlight(item.text, matches, 'text');
    html += '<a href="' + item.url + '" class="result-card">'
      + '<div class="rc-top">'
      + '<span class="rc-lesson">Lesson ' + item.ln + ' — ' + escHtml(item.lt) + '</span>'
      + (item.sec ? '<span class="rc-sec">' + secHL + '</span>' : '')
      + '</div>'
      + '<div class="rc-text">' + textHL + '</div>'
      + '</a>';
  });
  resEl.innerHTML = html;
}

var timer;
qEl.addEventListener('input', function() {
  clearTimeout(timer);
  timer = setTimeout(function(){ doSearch(qEl.value); }, 150);
});
document.getElementById('clearBtn').addEventListener('click', function() {
  qEl.value = '';
  doSearch('');
  qEl.focus();
});
function setQ(val) { qEl.value = val; doSearch(val); qEl.focus(); }

// URL param ?q=...
var urlParams = new URLSearchParams(window.location.search);
var initQ = urlParams.get('q');
if(initQ) { qEl.value = initQ; doSearch(initQ); }

// Theme
var htmlEl=document.documentElement,mI=document.getElementById('moonI'),sI=document.getElementById('sunI');
function setTheme(t){htmlEl.setAttribute('data-theme',t);mI.style.display=t==='dark'?'block':'none';sI.style.display=t==='light'?'block':'none';localStorage.setItem('theme',t);}
document.getElementById('themeBtn').addEventListener('click',function(){setTheme(htmlEl.getAttribute('data-theme')==='dark'?'light':'dark');});
var sv=localStorage.getItem('theme');if(sv)setTheme(sv);
</script>
