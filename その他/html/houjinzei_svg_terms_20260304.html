<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法人税基本用語定義のSVGビジュアル化</title>
<style>
  body { margin: 0; padding: 16px; background: #f5f5f5; display: flex; justify-content: center; }
  .container { max-width: 1860px; width: 100%; }
  .container svg { width: 100%; height: auto; display: block; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  @media print { body { background: #fff; padding: 0; } .container svg { box-shadow: none; } }
</style>
</head>
<body>
<div class="container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 4800" font-family="'Helvetica Neue', Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#283593"/>
    </linearGradient>
    <linearGradient id="catA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
    <linearGradient id="catB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="catC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
    <linearGradient id="catD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f8bbd0"/>
    </linearGradient>
    <linearGradient id="catE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e5f5"/>
      <stop offset="100%" style="stop-color:#e1bee7"/>
    </linearGradient>
    <linearGradient id="catF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
    <linearGradient id="catG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f8e9"/>
      <stop offset="100%" style="stop-color:#dcedc8"/>
    </linearGradient>
    <linearGradient id="catH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#efebe9"/>
      <stop offset="100%" style="stop-color:#d7ccc8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#546e7a"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1800" height="4800" fill="#f5f5f5" rx="8"/>

  <!-- Main Title -->
  <rect x="30" y="20" width="1740" height="90" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="900" y="58" text-anchor="middle" fill="white" font-size="28" font-weight="bold">法人税法 第2条（定義）— 基本的事項の用語集 体系図</text>
  <text x="900" y="85" text-anchor="middle" fill="#b3c5ff" font-size="14">昭和40年法律第34号｜全44号の定義規定をカテゴリ別に整理（カッコ書きの要件含む）</text>

  <!-- ============================================ -->
  <!-- CATEGORY 1: 地域・法人区分（1号〜9号の2） -->
  <!-- ============================================ -->
  <rect x="30" y="130" width="1740" height="720" rx="10" fill="url(#catA)" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="130" width="1740" height="42" rx="10" fill="#1565c0"/>
  <rect x="30" y="155" width="1740" height="17" fill="#1565c0"/>
  <text x="50" y="158" fill="white" font-size="18" font-weight="bold">■ カテゴリ1：地域区分・法人の種類（1号〜9号の2）</text>

  <!-- 国内・国外 -->
  <rect x="60" y="190" width="340" height="70" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="80" y="215" fill="#1565c0" font-size="15" font-weight="bold">1号 国内</text>
  <text x="80" y="240" fill="#333" font-size="12.5">この法律の施行地</text>

  <rect x="60" y="275" width="340" height="70" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="80" y="300" fill="#1565c0" font-size="15" font-weight="bold">2号 国外</text>
  <text x="80" y="325" fill="#333" font-size="12.5">この法律の施行地外の地域</text>

  <!-- Arrow between 国内 and 国外 -->
  <line x1="230" y1="260" x2="230" y2="275" stroke="#90a4ae" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="240" y="270" fill="#78909c" font-size="10">対概念</text>

  <!-- 法人分類の大ツリー -->
  <rect x="470" y="190" width="380" height="90" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="490" y="215" fill="#1565c0" font-size="15" font-weight="bold">3号 内国法人</text>
  <text x="490" y="237" fill="#333" font-size="12.5">国内に本店又は主たる事務所を有する法人</text>
  <text x="490" y="257" fill="#666" font-size="11">→ 全世界所得課税（法5条）</text>

  <rect x="470" y="295" width="380" height="90" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="490" y="320" fill="#1565c0" font-size="15" font-weight="bold">4号 外国法人</text>
  <text x="490" y="342" fill="#333" font-size="12.5">内国法人以外の法人</text>
  <text x="490" y="362" fill="#666" font-size="11">→ 国内源泉所得課税（法138条）</text>

  <!-- 内国法人の下位分類 -->
  <line x1="850" y1="235" x2="920" y2="235" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="920" y1="200" x2="920" y2="520" stroke="#1565c0" stroke-width="1.5"/>

  <!-- 公共法人 -->
  <line x1="920" y1="210" x2="950" y2="210" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="950" y="190" width="380" height="62" rx="8" fill="white" stroke="#0d47a1" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="970" y="213" fill="#0d47a1" font-size="14" font-weight="bold">5号 公共法人</text>
  <text x="970" y="235" fill="#333" font-size="12">別表第一に掲げる法人</text>
  <text x="1220" y="235" fill="#999" font-size="10.5">（納税義務なし・法4②）</text>

  <!-- 公益法人等 -->
  <line x1="920" y1="280" x2="950" y2="280" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="950" y="260" width="380" height="76" rx="8" fill="white" stroke="#0d47a1" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="970" y="283" fill="#0d47a1" font-size="14" font-weight="bold">6号 公益法人等</text>
  <text x="970" y="305" fill="#333" font-size="12">別表第二に掲げる法人</text>
  <text x="970" y="322" fill="#999" font-size="10.5">（収益事業を行う場合等に限り納税義務・法4①但書）</text>

  <!-- 協同組合等 -->
  <line x1="920" y1="365" x2="950" y2="365" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="950" y="345" width="380" height="62" rx="8" fill="white" stroke="#0d47a1" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="970" y="368" fill="#0d47a1" font-size="14" font-weight="bold">7号 協同組合等</text>
  <text x="970" y="390" fill="#333" font-size="12">別表第三に掲げる法人</text>

  <!-- 人格のない社団等 -->
  <line x1="920" y1="435" x2="950" y2="435" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="950" y="415" width="380" height="76" rx="8" fill="white" stroke="#0d47a1" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="970" y="438" fill="#0d47a1" font-size="14" font-weight="bold">8号 人格のない社団等</text>
  <text x="970" y="458" fill="#333" font-size="12">法人でない社団又は財団で代表者又は</text>
  <text x="970" y="475" fill="#333" font-size="12">管理人の定めがあるもの</text>

  <!-- 普通法人 -->
  <line x1="920" y1="520" x2="950" y2="520" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="950" y="500" width="380" height="76" rx="8" fill="white" stroke="#0d47a1" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="970" y="523" fill="#0d47a1" font-size="14" font-weight="bold">9号 普通法人</text>
  <text x="970" y="543" fill="#333" font-size="12">5号〜7号に掲げる法人以外の法人</text>
  <text x="970" y="560" fill="#c62828" font-size="11" font-weight="bold">（人格のない社団等を含まない）</text>

  <!-- 同族会社 -->
  <rect x="60" y="365" width="380" height="120" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="80" y="390" fill="#1565c0" font-size="15" font-weight="bold">10号 同族会社</text>
  <text x="80" y="412" fill="#333" font-size="12">株主等の3人以下＋特殊関係者が</text>
  <text x="80" y="430" fill="#333" font-size="12">発行済株式等の50%超を保有する会社</text>
  <text x="80" y="450" fill="#666" font-size="10.5">（投資法人を含む。自己株式は分母から除外）</text>
  <text x="80" y="468" fill="#666" font-size="10.5">（その他政令で定める場合を含む）</text>

  <!-- 非営利型法人 -->
  <rect x="60" y="500" width="380" height="145" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="80" y="523" fill="#1565c0" font-size="14" font-weight="bold">9号の2 非営利型法人</text>
  <text x="80" y="543" fill="#333" font-size="11.5">一般社団法人又は一般財団法人のうち：</text>
  <text x="80" y="563" fill="#333" font-size="11.5">（公益社団法人又は公益財団法人を除く）</text>
  <text x="80" y="588" fill="#333" font-size="11.5">イ 利益を得ること・分配することを目的</text>
  <text x="95" y="605" fill="#333" font-size="11.5">としない法人（組織適正要件・政令）</text>
  <text x="80" y="628" fill="#333" font-size="11.5">ロ 会費により共通利益事業を行う法人</text>
  <text x="95" y="643" fill="#333" font-size="11.5">（組織適正要件・政令）</text>

  <!-- 法人分類の概念図（枠外注記） -->
  <rect x="1360" y="190" width="380" height="150" rx="8" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="1380" y="215" fill="#283593" font-size="13" font-weight="bold">【法人分類と課税関係の整理】</text>
  <text x="1380" y="240" fill="#333" font-size="11.5">公共法人　→ 非課税（法4②）</text>
  <text x="1380" y="260" fill="#333" font-size="11.5">公益法人等→ 収益事業所得のみ課税</text>
  <text x="1380" y="280" fill="#333" font-size="11.5">協同組合等→ 全所得課税（軽減税率）</text>
  <text x="1380" y="300" fill="#333" font-size="11.5">普通法人　→ 全所得課税</text>
  <text x="1380" y="320" fill="#333" font-size="11.5">人格のない社団等→ 収益事業所得のみ課税</text>

  <!-- 恒久的施設 -->
  <rect x="470" y="405" width="455" height="180" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="490" y="428" fill="#1565c0" font-size="14" font-weight="bold">12号の19 恒久的施設（PE）</text>
  <text x="490" y="448" fill="#333" font-size="12">イ 支店PE：国内の支店・工場等（政令）</text>
  <text x="490" y="468" fill="#333" font-size="12">ロ 建設PE：建設・据付工事又は指揮監督役務</text>
  <text x="490" y="488" fill="#333" font-size="12">ハ 代理人PE：契約締結権限のある者等（政令）</text>
  <text x="490" y="515" fill="#c62828" font-size="11" font-weight="bold">但書：租税条約に異なる定めがある場合は</text>
  <text x="490" y="532" fill="#c62828" font-size="11" font-weight="bold">条約の定めによる（条約優先）</text>
  <text x="490" y="555" fill="#666" font-size="10.5">→ 外国法人の課税範囲の画定基準</text>

  <!-- 収益事業 -->
  <rect x="470" y="600" width="455" height="90" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="490" y="625" fill="#1565c0" font-size="14" font-weight="bold">13号 収益事業</text>
  <text x="490" y="647" fill="#333" font-size="12">販売業・製造業その他の政令で定める事業で、</text>
  <text x="490" y="667" fill="#c62828" font-size="12" font-weight="bold">継続して事業場を設けて行われるもの</text>
  <text x="490" y="681" fill="#666" font-size="10.5">→ 令5条：34業種を限定列挙</text>

  <!-- 補足ボックス：納税義務（法4条） -->
  <rect x="1360" y="365" width="380" height="330" rx="8" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="1380" y="388" fill="#283593" font-size="13" font-weight="bold">【参照：納税義務者（法4条）】</text>
  <text x="1380" y="413" fill="#333" font-size="11.5">①内国法人→法人税の納税義務あり</text>
  <text x="1395" y="433" fill="#333" font-size="11">但書：公益法人等・人格のない社団等は</text>
  <text x="1395" y="450" fill="#333" font-size="11">・収益事業を行う場合</text>
  <text x="1395" y="467" fill="#333" font-size="11">・法人課税信託の引受けを行う場合</text>
  <text x="1395" y="484" fill="#333" font-size="11">・特定多国籍企業グループ等に属する場合</text>
  <text x="1395" y="501" fill="#333" font-size="11">・退職年金業務等を行う場合</text>
  <text x="1395" y="518" fill="#333" font-size="11">に限る</text>
  <text x="1380" y="543" fill="#333" font-size="11.5">②公共法人→納税義務なし</text>
  <text x="1380" y="568" fill="#333" font-size="11.5">③外国法人→国内源泉所得を有するとき等</text>
  <text x="1380" y="593" fill="#333" font-size="11.5">④個人→法人課税信託の引受時のみ</text>
  <text x="1380" y="625" fill="#283593" font-size="12" font-weight="bold">【課税所得の範囲（法5条）】</text>
  <text x="1380" y="648" fill="#333" font-size="11.5">内国法人→各事業年度の所得</text>
  <text x="1380" y="668" fill="#333" font-size="11.5">（全世界所得に対して課税）</text>

  <!-- ============================================ -->
  <!-- CATEGORY 2: 組織再編（11号〜12号の18） -->
  <!-- ============================================ -->
  <rect x="30" y="870" width="1740" height="910" rx="10" fill="url(#catC)" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="870" width="1740" height="42" rx="10" fill="#e65100"/>
  <rect x="30" y="895" width="1740" height="17" fill="#e65100"/>
  <text x="50" y="898" fill="white" font-size="18" font-weight="bold">■ カテゴリ2：組織再編成関係（11号〜12号の18）</text>

  <!-- 合併 -->
  <rect x="60" y="930" width="400" height="100" rx="8" fill="white" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="80" y="955" fill="#e65100" font-size="14" font-weight="bold">11号 被合併法人</text>
  <text x="80" y="975" fill="#333" font-size="12">合併によりその有する資産及び負債の</text>
  <text x="80" y="995" fill="#333" font-size="12">移転を行った法人</text>
  <text x="80" y="1015" fill="#666" font-size="10.5">（資産＋負債の双方が移転）</text>

  <rect x="500" y="930" width="400" height="100" rx="8" fill="white" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="520" y="955" fill="#e65100" font-size="14" font-weight="bold">12号 合併法人</text>
  <text x="520" y="975" fill="#333" font-size="12">合併により被合併法人から資産及び</text>
  <text x="520" y="995" fill="#333" font-size="12">負債の移転を受けた法人</text>

  <line x1="460" y1="980" x2="500" y2="980" stroke="#bf360c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="463" y="971" fill="#bf360c" font-size="10">資産・負債移転</text>

  <!-- 分割 -->
  <rect x="60" y="1050" width="400" height="80" rx="8" fill="white" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="80" y="1075" fill="#e65100" font-size="14" font-weight="bold">12号の2 分割法人</text>
  <text x="80" y="1095" fill="#333" font-size="12">分割によりその有する資産又は負債の</text>
  <text x="80" y="1112" fill="#333" font-size="12">移転を行った法人</text>

  <rect x="500" y="1050" width="400" height="80" rx="8" fill="white" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="520" y="1075" fill="#e65100" font-size="14" font-weight="bold">12号の3 分割承継法人</text>
  <text x="520" y="1095" fill="#333" font-size="12">分割により分割法人から資産又は</text>
  <text x="520" y="1112" fill="#333" font-size="12">負債の移転を受けた法人</text>

  <line x1="460" y1="1090" x2="500" y2="1090" stroke="#bf360c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 現物出資 -->
  <rect x="60" y="1150" width="400" height="80" rx="8" fill="white" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="80" y="1175" fill="#e65100" font-size="14" font-weight="bold">12号の4 現物出資法人</text>
  <text x="80" y="1195" fill="#333" font-size="12">現物出資により資産の移転を行い、又は</text>
  <text x="80" y="1212" fill="#333" font-size="12">これと併せて負債の移転を行った法人</text>

  <rect x="500" y="1150" width="400" height="80" rx="8" fill="white" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="520" y="1175" fill="#e65100" font-size="14" font-weight="bold">12号の5 被現物出資法人</text>
  <text x="520" y="1195" fill="#333" font-size="12">現物出資により現物出資法人から</text>
  <text x="520" y="1212" fill="#333" font-size="12">資産の移転を受けた法人等</text>

  <line x1="460" y1="1190" x2="500" y2="1190" stroke="#bf360c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 現物分配 -->
  <rect x="60" y="1250" width="400" height="108" rx="8" fill="white" stroke="#e65100" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="80" y="1273" fill="#e65100" font-size="14" font-weight="bold">12号の5の2 現物分配法人</text>
  <text x="80" y="1293" fill="#333" font-size="11.5">現物分配により資産の移転を行った法人</text>
  <text x="80" y="1313" fill="#333" font-size="11">現物分配＝法人がその株主等に金銭以外の</text>
  <text x="80" y="1330" fill="#333" font-size="11">資産を交付（剰余金配当・残余財産分配・</text>
  <text x="80" y="1345" fill="#333" font-size="11">法24①五〜七号事由）</text>

  <text x="995" y="1027" fill="#333" font-size="11.5">発行済株式等全部を保有している場合等</text>

  <text x="995" y="1340" fill="#333" font-size="11.5">合併法人又は合併親法人のうち一法人の株式又は出資以外の資産が交付されない</text>
  <text x="995" y="1360" fill="#666" font-size="11">（除外：剰余金の配当等として交付される金銭等、反対株主の買取請求対価、</text>
  <text x="1010" y="1377" fill="#666" font-size="11">合併法人が被合併法人の2/3以上保有の場合の少数株主への金銭等）</text>
  <text x="980" y="1400" fill="#333" font-size="12" font-weight="bold">適格分割（12号の11）・適格現物出資（12号の14）も同様の3類型</text>
  <text x="980" y="1418" fill="#333" font-size="11.5">ニ 独立事業（12号の11のみ）＝1法人のみの分割型分割による独立事業分割</text>

  <text x="80" y="1423" fill="#333" font-size="11.5">株式交換完全子法人（12号の6）/ 株式交換完全親法人（12号の6の3）</text>
  <text x="80" y="1443" fill="#333" font-size="11.5">株式移転完全子法人（12号の6の5）/ 株式移転完全親法人（12号の6の6）</text>
  <text x="80" y="1460" fill="#666" font-size="10.5">株式交換等（12号の16）＝株式交換＋全部取得条項付種類株式の取得決議＋株式の併合＋株式売渡請求</text>

  <text x="80" y="1535" fill="#333" font-size="11.5">適格現物分配＝内国法人が現物分配法人で、移転先が完全支配関係のある内国法人（普通法人又は協同組合等）のみ</text>

  <text x="80" y="1572" fill="#666" font-size="10.5">（完全支配関係がある者のみへの分配は株式分配から除く→適格現物分配として処理）</text>

  <text x="80" y="1647" fill="#333" font-size="11.5">支配関係＝発行済株式等の50%超を直接・間接に保有する関係又はその法人相互の関係</text>
  <text x="80" y="1667" fill="#333" font-size="11.5">完全支配関係＝発行済株式等の全部を直接・間接に保有する関係又はその法人相互の関係</text>

  <text x="980" y="1510" fill="#333" font-size="11.5">通算子法人（12号の7）＝法64条の9②の他の内国法人で承認を受けたもの</text>
  <text x="980" y="1530" fill="#333" font-size="11.5">通算法人（12号の7の2）＝通算親法人＋通算子法人</text>
  <text x="980" y="1545" fill="#666" font-size="10.5">投資法人（12号の7の3）＝投信法2⑫の投資法人 ／ 特定目的会社（12号の7の4）＝資産流動化法2③</text>

  <text x="310" y="1915" text-anchor="middle" fill="#333" font-size="14">＝ 益金の額 − 損金の額</text>

  <text x="80" y="2028" fill="#333" font-size="11.5">・資産の販売</text>
  <text x="80" y="2048" fill="#333" font-size="11.5">・有償/無償による資産の譲渡</text>
  <text x="80" y="2068" fill="#333" font-size="11.5">・有償/無償による役務の提供</text>
  <text x="80" y="2088" fill="#333" font-size="11.5">・無償による資産の譲受け</text>
  <text x="80" y="2104" fill="#c62828" font-size="11">（資本等取引以外のもの）</text>

  <rect x="390" y="1960" width="300" height="150" rx="8" fill="white" stroke="#1b5e20" stroke-width="1.5" filter="url(#shadowLight)"/>

  <text x="410" y="2028" fill="#333" font-size="11.5">一号 売上原価・完成工事原価等</text>
  <text x="410" y="2048" fill="#333" font-size="11.5">二号 販売費・一般管理費等</text>
  <text x="425" y="2065" fill="#c62828" font-size="10.5">（償却費以外で債務未確定のもの除く）</text>
  <text x="410" y="2088" fill="#333" font-size="11.5">三号 損失の額</text>
  <text x="425" y="2104" fill="#c62828" font-size="10.5">（資本等取引以外のもの）</text>

  <!-- 公正処理基準 -->
  <rect x="60" y="2130" width="630" height="60" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>

  <text x="80" y="2175" fill="#333" font-size="12">収益の額及び損金の各号の額は一般に公正妥当と認められる会計処理の基準に従って計算</text>

  <!-- 収益認識（法22条の2） -->
  <rect x="60" y="2210" width="630" height="100" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="80" y="2233" fill="#2e7d32" font-size="13" font-weight="bold">法22条の2 収益の認識基準</text>
  <text x="80" y="2253" fill="#333" font-size="11.5">①原則：引渡し日又は役務提供日の属する事業年度で益金算入</text>
  <text x="80" y="2273" fill="#333" font-size="11.5">②例外：近接する日で確定決算にて収益経理した場合も認容</text>
  <text x="80" y="2293" fill="#333" font-size="11.5">④金額：引渡時の価額又は通常得べき対価の額（貸倒・買戻しリスク排除後）</text>

  <rect x="720" y="1860" width="360" height="100" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLight)"/>

  <text x="740" y="1908" fill="#333" font-size="11.5">・資本金等の額の増加又は減少を</text>
  <text x="745" y="1925" fill="#333" font-size="11.5">  生ずる取引</text>
  <text x="740" y="1945" fill="#333" font-size="11.5">・利益又は剰余金の分配</text>
  <text x="740" y="1960" fill="#333" font-size="11.5">（残余財産の分配又は引渡しを含む）</text>

  <!-- 右側：重要定義 -->
  <rect x="960" y="1860" width="380" height="75" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="980" y="1885" fill="#2e7d32" font-size="14" font-weight="bold">14号 株主等</text>
  <text x="980" y="1907" fill="#333" font-size="12">株主又は合名会社・合資会社・合同会社の</text>
  <text x="980" y="1924" fill="#333" font-size="12">社員その他法人の出資者</text>

  <rect x="960" y="1950" width="380" height="90" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="980" y="1975" fill="#2e7d32" font-size="14" font-weight="bold">15号 役員</text>
  <text x="980" y="1997" fill="#333" font-size="12">取締役・執行役・会計参与・監査役・</text>
  <text x="980" y="2014" fill="#333" font-size="12">理事・監事・清算人</text>
  <text x="980" y="2031" fill="#c62828" font-size="11" font-weight="bold">＋法人の経営に従事している者で政令定め</text>

  <rect x="960" y="2055" width="380" height="75" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="980" y="2078" fill="#2e7d32" font-size="14" font-weight="bold">16号 資本金等の額</text>
  <text x="980" y="2098" fill="#333" font-size="12">法人が株主等から出資を受けた金額</text>
  <text x="980" y="2118" fill="#333" font-size="12">として政令（令8条）で定める金額</text>

  <rect x="960" y="2145" width="380" height="75" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="980" y="2168" fill="#2e7d32" font-size="14" font-weight="bold">18号 利益積立金額</text>
  <text x="980" y="2188" fill="#333" font-size="12">法人の所得の金額で留保している金額</text>
  <text x="980" y="2208" fill="#333" font-size="12">として政令（令9条）で定める金額</text>

  <rect x="1370" y="1860" width="370" height="75" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1390" y="1885" fill="#2e7d32" font-size="14" font-weight="bold">19号 欠損金額</text>
  <text x="1390" y="1907" fill="#333" font-size="12">損金の額が益金の額を超える場合の</text>
  <text x="1390" y="1924" fill="#333" font-size="12">その超える部分の金額</text>

  <rect x="1370" y="1950" width="370" height="90" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1390" y="1975" fill="#2e7d32" font-size="14" font-weight="bold">25号 損金経理</text>
  <text x="1390" y="1997" fill="#333" font-size="12">法人がその確定した決算において</text>
  <text x="1390" y="2014" fill="#c62828" font-size="12" font-weight="bold">費用又は損失として経理すること</text>
  <text x="1390" y="2031" fill="#666" font-size="10.5">→ 確定決算主義の核心的概念</text>

  <rect x="1370" y="2055" width="370" height="120" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="1390" y="2078" fill="#2e7d32" font-size="14" font-weight="bold">事業年度（法13条）</text>
  <text x="1390" y="2098" fill="#333" font-size="11.5">法人の財産及び損益の計算の単位と</text>
  <text x="1390" y="2115" fill="#333" font-size="11.5">なる期間（＝会計期間）</text>
  <text x="1390" y="2137" fill="#333" font-size="11.5">法令・定款等で定めるもの</text>
  <text x="1390" y="2157" fill="#c62828" font-size="11" font-weight="bold">1年超の場合は1年ごとに区分</text>
  <text x="1390" y="2172" fill="#666" font-size="10.5">→特例：法14条（解散・合併等）</text>

  <text x="940" y="2567" fill="#333" font-size="12">その他の資産で政令で定めるもの</text>

  <text x="940" y="2647" fill="#333" font-size="11.5">建物・構築物・機械及び装置・船舶・</text>
  <text x="940" y="2665" fill="#333" font-size="11.5">車両及び運搬具・工具器具備品・鉱業権</text>
  <text x="940" y="2685" fill="#333" font-size="11.5">その他の資産で償却をすべきもの（政令）</text>
  <text x="940" y="2700" fill="#666" font-size="10.5">→ 令13条で詳細規定</text>

  <text x="1370" y="2547" fill="#c62828" font-size="12" font-weight="bold">支出の効果がその支出の日以後</text>
  <text x="1370" y="2567" fill="#c62828" font-size="12" font-weight="bold">1年以上に及ぶもので政令で定めるもの</text>

  <!-- 資産分類注記 -->
  <rect x="60" y="2620" width="830" height="110" rx="8" fill="#fce4ec" stroke="#c2185b" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="80" y="2645" fill="#880e4f" font-size="13" font-weight="bold">【資産分類の体系的理解】</text>
  <text x="80" y="2668" fill="#333" font-size="11.5">法人の資産 ＝ ①棚卸資産（20号）＋ ②有価証券（21号）＋ ③固定資産（22号）＋ ④繰延資産（24号）</text>
  <text x="80" y="2688" fill="#333" font-size="11.5">固定資産 ＝ 減価償却資産（23号）＋ 非減価償却資産（土地・電話加入権等）</text>
  <text x="80" y="2710" fill="#333" font-size="11.5">法人税法上の「資産」概念は会計上の資産概念と概ね一致するが、棚卸資産から有価証券等が明示的に除外される点に注意</text>
  <text x="80" y="2725" fill="#666" font-size="10.5">→ 短期売買商品等（法61①）は別区分で時価評価対象</text>

  <rect x="1350" y="2600" width="390" height="130" rx="8" fill="#fce4ec" stroke="#c2185b" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="1370" y="2625" fill="#880e4f" font-size="13" font-weight="bold">【17号 削除】</text>
  <text x="1370" y="2648" fill="#333" font-size="11.5">旧17号は「引当金」の定義</text>
  <text x="1370" y="2668" fill="#333" font-size="11.5">規定であったが削除済み。</text>
  <text x="1370" y="2698" fill="#666" font-size="10.5">現行法では引当金は</text>
  <text x="1370" y="2715" fill="#666" font-size="10.5">法52条（返品調整引当金）のみ残存</text>

  <!-- CATEGORY 5: 信託関係（26号〜29号の2） -->
  <!-- ============================================ -->
  <rect x="30" y="2880" width="1740" height="440" rx="10" fill="url(#catE)" stroke="#6a1b9a" stroke-width="2" filter="url(#shadow)"/>

  <rect x="30" y="2905" width="1740" height="17" fill="#6a1b9a"/>
  <text x="50" y="2908" fill="white" font-size="18" font-weight="bold">■ カテゴリ5：信託関係（26号〜29号の2）</text>

  <rect x="60" y="2940" width="400" height="110" rx="8" fill="white" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="80" y="2965" fill="#6a1b9a" font-size="14" font-weight="bold">26号 合同運用信託</text>
  <text x="80" y="2987" fill="#333" font-size="11.5">信託会社が引き受けた金銭信託で、</text>
  <text x="80" y="3005" fill="#333" font-size="11.5">共同しない多数の委託者の信託財産を</text>
  <text x="80" y="3023" fill="#333" font-size="11.5">合同して運用するもの</text>
  <text x="80" y="3042" fill="#c62828" font-size="10.5">（委託者非指図型投資信託等・実質少数委託者を除く）</text>

  <rect x="490" y="2940" width="400" height="80" rx="8" fill="white" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="510" y="2965" fill="#6a1b9a" font-size="14" font-weight="bold">27号 証券投資信託</text>
  <text x="510" y="2987" fill="#333" font-size="12">投信法2条4項に規定する証券投資信託</text>
  <text x="510" y="3007" fill="#333" font-size="12">及びこれに類する外国投資信託</text>

  <rect x="920" y="2940" width="400" height="100" rx="8" fill="white" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="940" y="2965" fill="#6a1b9a" font-size="14" font-weight="bold">28号 公社債投資信託</text>
  <text x="940" y="2987" fill="#333" font-size="11.5">証券投資信託のうち、信託財産を</text>
  <text x="940" y="3005" fill="#333" font-size="11.5">公債又は社債に対する投資として運用</text>
  <text x="940" y="3023" fill="#c62828" font-size="11" font-weight="bold">株式又は出資に対する投資として運用しない</text>

  <rect x="60" y="3070" width="530" height="110" rx="8" fill="white" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="80" y="3095" fill="#6a1b9a" font-size="14" font-weight="bold">29号 集団投資信託</text>
  <text x="80" y="3117" fill="#333" font-size="12">イ 合同運用信託</text>
  <text x="80" y="3137" fill="#333" font-size="12">ロ 投信法の投資信託（証券投資信託＋公募のもの等）及び外国投資信託</text>
  <text x="80" y="3157" fill="#333" font-size="12">ハ 特定受益証券発行信託（承認受託者＋利益留保割合制限等の要件充足）</text>

  <rect x="620" y="3070" width="700" height="130" rx="8" fill="white" stroke="#6a1b9a" stroke-width="1.5" filter="url(#shadowLight)"/>
  <text x="640" y="3095" fill="#6a1b9a" font-size="14" font-weight="bold">29号の2 法人課税信託</text>
  <text x="640" y="3117" fill="#333" font-size="11.5">（集団投資信託・退職年金等信託・特定公益信託等を除く）</text>
  <text x="640" y="3140" fill="#333" font-size="11.5">イ 受益権を表示する証券を発行する旨の定めのある信託</text>
  <text x="640" y="3160" fill="#333" font-size="11.5">ロ 受益者が存しない信託</text>
  <text x="640" y="3180" fill="#333" font-size="11.5">ハ 法人（公共法人等除く）が委託者となる信託で一定のもの（事業信託等）</text>
  <text x="640" y="3195" fill="#666" font-size="10.5">ニ 投資信託 ／ ホ 特定目的信託</text>

  <!-- 信託の階層関係 -->
  <rect x="1350" y="2940" width="390" height="170" rx="8" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="1370" y="2965" fill="#6a1b9a" font-size="13" font-weight="bold">【信託の課税上の取扱い】</text>
  <text x="1370" y="2990" fill="#333" font-size="11.5">■集団投資信託→受益者段階課税</text>
  <text x="1385" y="3008" fill="#333" font-size="11">（パススルー）</text>
  <text x="1370" y="3030" fill="#333" font-size="11.5">■法人課税信託→信託段階で法人税課税</text>
  <text x="1385" y="3048" fill="#333" font-size="11">（受託者を納税義務者とみなす）</text>
  <text x="1370" y="3070" fill="#333" font-size="11.5">■上記以外→受益者課税</text>
  <text x="1385" y="3088" fill="#333" font-size="11">（法12条・受益者等課税信託）</text>
  <text x="1370" y="3105" fill="#666" font-size="10.5">→ 信託分類により課税体系が異なる</text>

  <text x="1390" y="3975" fill="#558b2f" font-size="13" font-weight="bold">【関連：実質所得者課税（法11条）】</text>

  <text x="1390" y="4018" fill="#333" font-size="11.5">帰属するとみられる者が単なる名義人</text>
  <text x="1390" y="4036" fill="#333" font-size="11.5">であって、その収益を享受せず、</text>
  <text x="1390" y="4054" fill="#333" font-size="11.5">その者以外の法人がその収益を享受</text>
  <text x="1390" y="4072" fill="#333" font-size="11.5">する場合→享受する法人に帰属</text>

  <text x="1390" y="4105" fill="#558b2f" font-size="13" font-weight="bold">【関連：課税標準（法21条）】</text>
  <text x="1390" y="4128" fill="#333" font-size="11.5">各事業年度の所得に対する法人税の</text>
  <text x="1390" y="4146" fill="#333" font-size="11.5">課税標準＝各事業年度の所得の金額</text>

  <text x="1390" y="4180" fill="#558b2f" font-size="13" font-weight="bold">【受取配当（法23条）の株式区分】</text>
  <text x="1390" y="4203" fill="#333" font-size="10.5">完全子法人株式等→100%益金不算入</text>
  <text x="1390" y="4218" fill="#333" font-size="10.5">関連法人株式等(1/3超)→負債利子控除後全額</text>
