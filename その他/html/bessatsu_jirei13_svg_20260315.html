<!-- Section 3: Role of services vs intangible assets -->
<foreignObject x="20" y="435" width="400" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#7c3aed;">役務提供と無形資産の関係</div>
</foreignObject>

<rect x="30" y="457" width="840" height="115" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="462" width="820" height="105">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#334155;line-height:1.7;">
<div style="font-weight:700;color:#7c3aed;margin-bottom:4px;">概念的区別（事務運営指針3-9(1)注書）</div>
<table style="width:100%;border-collapse:collapse;font-size:7px;">
<tr style="background:#f3e8ff;">
<td style="padding:4px 8px;font-weight:700;width:130px;border-right:1px solid #d8b4fe;">役務提供</td>
<td style="padding:4px 8px;font-weight:700;border-right:1px solid #d8b4fe;">無形資産の使用</td>
<td style="padding:4px 8px;font-weight:700;">本事例での態様</td>
</tr>
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:4px 8px;border-right:1px solid #e9d5ff;">経営指導等のサービス</td>
<td style="padding:4px 8px;border-right:1px solid #e9d5ff;">ノウハウ・取引網等の供与</td>
<td style="padding:4px 8px;">従業員の蓄積ノウハウが役務提供に<span style="font-weight:600;color:#7c3aed;">一体的に</span>供与される</td>
</tr>
</table>
<div style="margin-top:6px;font-size:6.5px;color:#64748b;">
&#x26A0; 役務の提供と無形資産の使用は概念的には別のもの → しかし本事例では一体的に供与されている<br/>
&#x26A0; 「どのような無形資産を用いているか」「役務提供がどのような影響を与えているか」を検討する必要
</div>
</div>
</foreignObject>

<!-- Section 4: Income Source Determination -->
<foreignObject x="20" y="585" width="300" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#16a34a;">所得の源泉の判定</div>
</foreignObject>

<rect x="30" y="607" width="840" height="120" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="612" width="820" height="110">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#16a34a;">判定: P社の蓄積ノウハウと情報網・取引網が所得の源泉</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:5px;line-height:1.6;">
<table style="width:100%;border-collapse:collapse;font-size:7px;">
<tr style="border-bottom:1px solid #bbf7d0;">
<td style="padding:4px 8px;font-weight:600;width:130px;">P社側の無形資産</td>
<td style="padding:4px 8px;">事業判断・リスク管理ノウハウ ＋ 情報網 ＋ 交渉手順 ＋ 取引網</td>
</tr>
<tr style="border-bottom:1px solid #bbf7d0;">
<td style="padding:4px 8px;font-weight:600;">有機的結合</td>
<td style="padding:4px 8px;">個々の社員のノウハウと組織的な情報網・取引網が有機的に結びつき、役務提供とともに組織的に供与</td>
</tr>
<tr style="border-bottom:1px solid #bbf7d0;">
<td style="padding:4px 8px;font-weight:600;">S社への影響</td>
<td style="padding:4px 8px;">これらがなければS社単独では事業が成り立たない → S社の事業の収益性を左右する要素</td>
</tr>
<tr>
<td style="padding:4px 8px;font-weight:600;">無形資産の分類</td>
<td style="padding:4px 8px;">
<span style="color:#7c3aed;">&#x2461; 人的資源に関する無形資産</span>（社員の蓄積ノウハウ） ＋ <span style="color:#7c3aed;">&#x2462; 組織に関する無形資産</span>（情報網・交渉手順・取引網）
</td>
</tr>
</table>
</div>
</foreignObject>

<!-- Section 5: Key Distinction -->
<foreignObject x="20" y="740" width="300" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#dc2626;">核心ポイント: 重要無形資産の認定基準</div>
</foreignObject>

<rect x="30" y="762" width="840" height="90" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="40" y="767" width="820" height="80">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;line-height:1.7;">
<div style="font-weight:700;color:#dc2626;margin-bottom:4px;">従業員等の蓄積ノウハウが「重要な無形資産」と認定される条件</div>
<table style="width:100%;border-collapse:collapse;font-size:6.5px;">
<tr style="border-bottom:1px solid #fecaca;">
<td style="padding:3px 8px;font-weight:600;width:30px;">1</td>
<td style="padding:3px 8px;">企業に蓄積されたノウハウ等が、国外関連者に<span style="font-weight:600;">組織的に供与</span>されていること</td>
</tr>
<tr style="border-bottom:1px solid #fecaca;">
<td style="padding:3px 8px;font-weight:600;">2</td>
<td style="padding:3px 8px;">国外関連者の事業活動での<span style="font-weight:600;">重要な要素</span>となっていること</td>
</tr>
<tr>
<td style="padding:3px 8px;font-weight:600;">3</td>
<td style="padding:3px 8px;">基本的活動のみを行う法人との比較において、国外関連取引に係る<span style="font-weight:600;">所得の源泉</span>になっていること</td>
</tr>
</table>
<div style="font-size:6.5px;color:#dc2626;margin-top:4px;font-weight:600;text-align:center;">
3要件全てを満たす場合 → 重要な無形資産と認定
</div>
</div>
</foreignObject>
