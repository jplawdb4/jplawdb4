<!-- ======== SECTION 2: 3つの重要な前提条件 ======== -->
<rect x="10" y="290" width="880" height="250" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="450" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed" font-family="'Noto Sans JP',sans-serif">本事例で設定すべき3つの重要な前提条件（Critical Assumptions）</text>

<!-- 条件1 -->
<rect x="25" y="322" width="270" height="100" rx="7" fill="#fff" stroke="#dc2626" stroke-width="2" filter="url(#sh)"/>
<rect x="25" y="322" width="270" height="26" rx="7" fill="#dc2626"/>
<rect x="25" y="342" width="270" height="6" fill="#dc2626"/>
<foreignObject x="25" y="322" width="270" height="26">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">条件1: 売上高の乖離なし</div>
</foreignObject>
<foreignObject x="25" y="348" width="270" height="74">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:7.5px;color:#475569;">Ｓ社の売上高が現時点の状況から</span>
    <span style="font-size:8px;font-weight:700;color:#dc2626;">大きく乖離しないこと</span>
    <span style="font-size:7px;color:#64748b;">背景: 市場価格の大幅変動リスク</span>
  </div>
</foreignObject>

<!-- 条件2 -->
<rect x="310" y="322" width="275" height="100" rx="7" fill="#fff" stroke="#b45309" stroke-width="2" filter="url(#sh)"/>
<rect x="310" y="322" width="275" height="26" rx="7" fill="#b45309"/>

</foreignObject>
<foreignObject x="310" y="348" width="275" height="74">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">

    <span style="font-size:8px;font-weight:700;color:#b45309;">大きく変化しないこと</span>
    <span style="font-size:7px;color:#64748b;">背景: 売れ筋製品の規格が急に変わる業界</span>
  </div>
</foreignObject>

<!-- 条件3 -->
<rect x="600" y="322" width="275" height="100" rx="7" fill="#fff" stroke="#1e40af" stroke-width="2" filter="url(#sh)"/>

</foreignObject>
<foreignObject x="600" y="348" width="275" height="74">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:7.5px;color:#475569;">Ｘ国の会計制度が</span>
    <span style="font-size:8px;font-weight:700;color:#1e40af;">大きく変更しないこと</span>
    <span style="font-size:7px;color:#64748b;">背景: X国で大規模な会計制度改正が見込まれる</span>
  </div>
</foreignObject>

<!-- 理由説明 -->
<rect x="25" y="432" width="850" height="52" rx="7" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>

    <span style="font-size:8px;font-weight:700;color:#0f172a;">なぜ前提条件が必要か</span>
    <span style="font-size:7px;color:#475569;">市場価格の大幅変動や製品規格変更があると利益率の実績値が大きく変動し、確認時の算定方法をそのまま適用することが妥当でなくなる。</span>
    <span style="font-size:7px;color:#475569;">会計制度変更で利益率の計算方法が変われば、実績値と確認内容に基づく計算結果との間に齟齬が生じ判断不能になる。</span>
  </div>
</foreignObject>

<text x="450" y="768" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af" font-family="'Noto Sans JP',sans-serif">事例31の核心 ── 重要な前提条件の設計</text>

<!-- 核心カード1 -->
<rect x="25" y="780" width="425" height="72" rx="7" fill="#fff" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="780" width="425" height="22" rx="7" fill="#dc2626"/>

<foreignObject x="25" y="780" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">1. 事前に網羅的決定は困難 → 包括的+具体的の組合せ</div>
</foreignObject>
<foreignObject x="25" y="802" width="425" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">影響要因を網羅的に事前決定するのは困難。</span>
    <span style="font-size:7.5px;color:#dc2626;font-weight:600;">一般的条件（包括的）と具体的条件（為替レート幅等）を組合せる。</span>
  </div>
</foreignObject>

<!-- 核心カード2 -->
<rect x="455" y="780" width="420" height="72" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="780" width="420" height="22" rx="7" fill="#7c3aed"/>
<rect x="455" y="796" width="420" height="6" fill="#7c3aed"/>
<foreignObject x="455" y="780" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">2. 事前確認は「過去・現在」を踏まえた「将来」の予測</div>
</foreignObject>
<foreignObject x="455" y="802" width="420" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">予測できない重要な状況変化が生じた場合、</span>
    <span style="font-size:7.5px;color:#7c3aed;font-weight:600;">前提が変わるため確認の継続が適当でなくなる場合がある。</span>
  </div>
</foreignObject>

<!-- 核心カード3 -->
<rect x="25" y="858" width="425" height="72" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="858" width="425" height="22" rx="7" fill="#1e40af"/>

<foreignObject x="25" y="858" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">3. 会計制度変更リスクも前提条件の対象</div>
</foreignObject>
<foreignObject x="25" y="880" width="425" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">利益率の計算方法が変われば実績値と確認内容の</span>
    <span style="font-size:7.5px;color:#1e40af;font-weight:600;">整合性が取れなくなる → 前提条件に含めるべき。</span>
  </div>
</foreignObject>

</foreignObject>
<foreignObject x="455" y="880" width="420" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">改定の申出がなければ発生事業年度以後の事前確認は取消し。</span>
    <span style="font-size:7.5px;color:#16a34a;font-weight:600;">確認法人の能動的対応が不可欠。</span>
  </div>
</foreignObject>
