<text x="450" y="776" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af" font-family="'Noto Sans JP',sans-serif">事例29の核心 ── 2つの類型と実務上の注意点</text>

<!-- 核心カード1 -->
<rect x="25" y="788" width="425" height="72" rx="7" fill="#fff" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="788" width="425" height="22" rx="7" fill="#16a34a"/>
<rect x="25" y="804" width="425" height="6" fill="#16a34a"/>
<foreignObject x="25" y="788" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">1. 非関連者間での同様の実務がある場合は合理的</div>
</foreignObject>
<foreignObject x="25" y="810" width="425" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">事前の取決めがなくても合理的と認められる場合がある。</span>
    <span style="font-size:7.5px;color:#16a34a;font-weight:600;">非関連者間取引で同様の変更が行われていることが裏付け。</span>
  </div>
</foreignObject>

<!-- 核心カード2 -->
<rect x="455" y="788" width="420" height="72" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="788" width="420" height="22" rx="7" fill="#7c3aed"/>
<rect x="455" y="804" width="420" height="6" fill="#7c3aed"/>
<foreignObject x="455" y="788" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">2. 事前の覚書＋法定算定方法なら堅い</div>
</foreignObject>
<foreignObject x="455" y="810" width="420" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">条件・算定方法・計算根拠を事前に文書化。</span>
    <span style="font-size:7.5px;color:#7c3aed;font-weight:600;">TNMMに基づく指標との乖離調整は合理的と認められやすい。</span>
  </div>
</foreignObject>

<!-- 核心カード3 -->
<rect x="25" y="866" width="425" height="72" rx="7" fill="#fff" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="866" width="425" height="22" rx="7" fill="#dc2626"/>
<rect x="25" y="882" width="425" height="6" fill="#dc2626"/>
<foreignObject x="25" y="866" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">3. 財政的支援目的は合理的と認められない</div>
</foreignObject>
<foreignObject x="25" y="888" width="425" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">独立企業間価格に基づかない価格変更は、</span>
    <span style="font-size:7.5px;color:#dc2626;font-weight:600;">寄附金（措法66条の4第3項）の適用が検討される。</span>
  </div>
</foreignObject>

<!-- 核心カード4 -->
<rect x="455" y="866" width="420" height="72" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="866" width="420" height="22" rx="7" fill="#1e40af"/>
<rect x="455" y="882" width="420" height="6" fill="#1e40af"/>
<foreignObject x="455" y="866" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">4. 対価の額に含めて移転価格の検討を行う</div>
</foreignObject>
<foreignObject x="455" y="888" width="420" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">合理的な価格調整金は国外関連取引に係る対価の額に含め</span>
    <span style="font-size:7.5px;color:#1e40af;font-weight:600;">調整後の対価の額に基づき移転価格税制上の適否を判断。</span>
  </div>
</foreignObject>

    <span style="font-size:8px;font-weight:700;color:#0f172a;">2類型の共通点と差異</span>
    <span style="font-size:7px;color:#475569;">共通: いずれも「合理的な理由に基づく取引価格の修正」と認められる → 対価の額に含めて検討</span>
    <span style="font-size:7px;color:#475569;">差異: 前提1は非関連者間の実務による裏付け ／ 前提2は事前の覚書＋法定算定方法による裏付け</span>
