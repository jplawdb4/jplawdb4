別冊 事例10 ── 差異の調整
<span style="font-size:9px;font-weight:400;opacity:.7;display:block;">移転価格税制の適用に当たっての参考事例集 pp.61-63｜比較対象取引との差異を調整してCUPを適用する事例</span>
</div>

<!-- ===== 取引構造図 ===== -->
<rect x="12" y="54" width="876" height="220" rx="8" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
<foreignObject x="20" y="58" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#1e40af;">取引構造図：2つの販売ルート</div>

<!-- 日本エリア -->
<rect x="30" y="80" width="280" height="130" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
<foreignObject x="36" y="82" width="80" height="14"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#1e40af;font-weight:600;">日本</div></foreignObject>
<rect x="60" y="96" width="220" height="44" rx="5" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<foreignObject x="66" y="100" width="208" height="38">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:9px;font-weight:700;color:#1e40af;">P社</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:2px;">製品Aの販売会社</div>
</foreignObject>

<!-- X国エリア -->
<rect x="400" y="80" width="480" height="186" rx="6" fill="#fefce8" stroke="#fcd34d"/>
<foreignObject x="406" y="82" width="80" height="14"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#b45309;font-weight:600;">X国</div></foreignObject>

<!-- ルート1: S社（関連者） -->
<rect x="430" y="96" width="200" height="50" rx="5" fill="#fff" stroke="#b45309" stroke-width="1.5" filter="url(#sh)"/>
<foreignObject x="436" y="98" width="188" height="46">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:9px;font-weight:700;color:#b45309;">S社（国外関連者）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;">製品Aの販売子会社</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6px;color:#dc2626;font-weight:600;">CIF渡し・決済サイト30日</div>
</foreignObject>

<rect x="710" y="96" width="150" height="50" rx="5" fill="#fff" stroke="#64748b" filter="url(#sh)"/>
<foreignObject x="716" y="100" width="138" height="44">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;font-weight:600;color:#64748b;">第三者（小売店約200社）</div>
</foreignObject>

<!-- ルート2: T社（第三者） -->
<rect x="430" y="164" width="200" height="50" rx="5" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#sh)"/>
<foreignObject x="436" y="166" width="188" height="46">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:9px;font-weight:700;color:#64748b;">T社（第三者・代理店）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;">S社設立以前からの販売ルート</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6px;color:#16a34a;font-weight:600;">FOB渡し・決済サイト90日</div>
</foreignObject>

<rect x="710" y="164" width="150" height="50" rx="5" fill="#fff" stroke="#64748b" filter="url(#sh)"/>
<foreignObject x="716" y="168" width="138" height="44">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;font-weight:600;color:#64748b;">第三者（小売店）</div>
</foreignObject>

<!-- 矢印: S社ルート -->
<line x1="280" y1="118" x2="426" y2="118" stroke="#b45309" stroke-width="1.5" marker-end="url(#arwOrange)"/>
<foreignObject x="300" y="104" width="120" height="12"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#b45309;text-align:center;">製品A販売（関連者）</div></foreignObject>

<line x1="630" y1="121" x2="706" y2="121" stroke="#64748b" stroke-width="1.2" marker-end="url(#arw)"/>

<!-- 矢印: T社ルート -->
<line x1="280" y1="126" x2="310" y2="126" stroke="#64748b" stroke-width="1.5"/>
<line x1="310" y1="126" x2="310" y2="189" stroke="#64748b" stroke-width="1.5"/>
<line x1="310" y1="189" x2="426" y2="189" stroke="#64748b" stroke-width="1.5" marker-end="url(#arw)"/>
<foreignObject x="320" y="176" width="100" height="12"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#64748b;text-align:center;">製品A販売（非関連者）</div></foreignObject>

<line x1="630" y1="189" x2="706" y2="189" stroke="#64748b" stroke-width="1.2" marker-end="url(#arw)"/>

<!-- ===== 差異の分析 ===== -->
<rect x="12" y="284" width="876" height="170" rx="8" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
<foreignObject x="20" y="288" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#dc2626;">差異の分析：S社取引 vs T社取引</div>
</foreignObject>

<!-- 共通点 -->
<rect x="30" y="310" width="400" height="44" rx="5" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#sh)"/>
<foreignObject x="36" y="314" width="388" height="38">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#16a34a;">共通点（高い比較可能性）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;line-height:1.4;">
同一の製品A・同一の売手（P社）・取引段階、取引規模、取引条件等はおおむね同様
</div>
</foreignObject>

<!-- 差異テーブル -->
<rect x="30" y="362" width="840" height="80" rx="5" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>

<!-- テーブルヘッダ -->
<rect x="30" y="362" width="840" height="20" rx="5" fill="#1e3a5f"/>
<foreignObject x="36" y="364" width="200" height="16"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#fff;font-weight:700;">差異項目</div></foreignObject>
<foreignObject x="250" y="364" width="280" height="16"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#fff;font-weight:700;">S社取引（国外関連取引）</div></foreignObject>
<foreignObject x="560" y="364" width="280" height="16"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#fff;font-weight:700;">T社取引（比較対象取引候補）</div></foreignObject>

<!-- 行1: 引渡条件 -->
<line x1="30" y1="382" x2="870" y2="382" stroke="#e2e8f0" stroke-width="0.5"/>
<foreignObject x="36" y="384" width="200" height="18"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;font-weight:600;">① 引渡条件</div></foreignObject>
<foreignObject x="250" y="384" width="280" height="18"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#b45309;font-weight:600;">CIF（運賃・保険料込み渡し）</div></foreignObject>
<foreignObject x="560" y="384" width="280" height="18"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#64748b;font-weight:600;">FOB（本船渡し）</div></foreignObject>

<!-- 行2: 決済条件 -->
<line x1="30" y1="402" x2="870" y2="402" stroke="#e2e8f0" stroke-width="0.5"/>
<foreignObject x="36" y="404" width="200" height="30"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;font-weight:600;">② 決済条件<br/><span style="font-weight:400;font-size:6px;">（ユーザンス金利5%）</span></div></foreignObject>
<foreignObject x="250" y="404" width="280" height="18"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#b45309;font-weight:600;">決済サイト30日</div></foreignObject>
<foreignObject x="560" y="404" width="280" height="18"><div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#64748b;font-weight:600;">決済サイト90日</div></foreignObject>

<!-- ===== 差異調整の計算 ===== -->
<rect x="12" y="464" width="876" height="260" rx="8" fill="#faf5ff" stroke="#c4b5fd" filter="url(#sh)"/>
<foreignObject x="20" y="468" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#7c3aed;">差異調整の計算方法</div>
</foreignObject>

<!-- 調整1: 引渡条件 -->
<rect x="30" y="492" width="840" height="80" rx="5" fill="#fff" stroke="#1e40af" filter="url(#sh)"/>
<foreignObject x="36" y="496" width="828" height="74">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#1e40af;">調整① 引渡条件：FOB → CIF への調整</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:4px;">T社取引はFOB（売手の費用負担が小さい）→ S社取引はCIF（運賃・保険料を売手が負担）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:2px;">比較のためT社価格にCIF要素を加算：</div>
</foreignObject>

<rect x="70" y="538" width="760" height="28" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
<foreignObject x="76" y="542" width="748" height="22">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;color:#1e40af;font-weight:700;text-align:center;">
調整後価格① ＝ T社仕入価格 ＋ 運賃 ＋ 保険料
</div>
</foreignObject>

<!-- 調整2: 決済条件 -->
<rect x="30" y="582" width="840" height="100" rx="5" fill="#fff" stroke="#b45309" filter="url(#sh)"/>
<foreignObject x="36" y="586" width="828" height="94">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#b45309;">調整② 決済条件：90日サイト → 30日サイト への調整</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:4px;">T社取引は90日後決済 → 金利分（5%）が価格に含まれている</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:2px;">S社取引の30日条件に合わせるため、T社価格から90日分金利を除き30日分金利を加算：</div>
</foreignObject>

<rect x="70" y="638" width="760" height="36" rx="4" fill="#fef3c7" stroke="#fcd34d"/>
<foreignObject x="76" y="642" width="748" height="30">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;color:#b45309;font-weight:700;text-align:center;">
調整後価格② ＝ T社仕入価格 ÷ {1 + 0.05 x (90/365)} x {1 + 0.05 x (30/365)}
</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;text-align:center;margin-top:1px;">
90日分の金利を一旦除去し、30日分の金利を付加 → S社条件と同等の価格に調整
</div>
</foreignObject>

<!-- 最終結果 -->
<rect x="30" y="690" width="840" height="26" rx="4" fill="#16a34a"/>
<foreignObject x="36" y="694" width="828" height="20">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;color:#fff;font-weight:700;text-align:center;">
独立企業間価格 ＝ 両調整を適用した後のT社取引価格 → CUP（独立価格比準法）で算定
</div>
</foreignObject>

<!-- ===== 核心ポイント ===== -->
<rect x="12" y="734" width="876" height="168" rx="8" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#sh)"/>
<foreignObject x="20" y="738" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#16a34a;">核心ポイント：差異調整の原則</div>
</foreignObject>

<rect x="30" y="760" width="420" height="130" rx="5" fill="#fff" stroke="#16a34a" filter="url(#sh)"/>
<foreignObject x="36" y="764" width="408" height="124">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#16a34a;">差異調整のルール</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:3px;line-height:1.5;">
<span style="font-weight:600;">1.</span> 差異が価格・利益率に影響しても調整可能なら比較対象取引にできる<br/>
<span style="font-weight:600;">2.</span> 対象は「影響を及ぼすことが<span style="font-weight:700;">客観的に明らか</span>」な差異のみ<br/>
　（「対価の額の差」を生じさせ得るもの全てではない）<br/>
<span style="font-weight:600;">3.</span> 影響額を算定できない場合は比較可能性自体に問題<br/>
<span style="font-weight:600;">4.</span> ただし影響が軽微なら<span style="font-weight:600;">中央値</span>による調整が可能<br/>
<span style="font-weight:600;">5.</span> 中央値調整は比較可能性の要件を緩めるものではない
</div>
</foreignObject>

<rect x="460" y="760" width="420" height="130" rx="5" fill="#fff" stroke="#7c3aed" filter="url(#sh)"/>
<foreignObject x="466" y="764" width="408" height="124">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">運転資本に係る差異の調整</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:3px;line-height:1.5;">
<span style="font-weight:600;">対象科目：</span>売掛金、買掛金、棚卸資産<br/>
<span style="font-weight:600;">影響経路：</span>運転資本の多寡 → 資金繰り・余剰資金投資 → 利益指標<br/><br/>
<span style="font-weight:600;">調整方法の例：</span><br/>
(国外関連取引の運転資本/検証対象の売上高<br/>
  − 非関連者間取引の運転資本/非関連者の売上高)<br/>
x 市場金利等の運用利回り<br/>
→ この金額を利益指標に加減算<br/><br/>
<span style="color:#dc2626;font-weight:600;">注意：</span>常時機械的に行うのではなく、影響を十分検討すること
</div>
</foreignObject>

<!-- 根拠法令 -->
<foreignObject x="12" y="910" width="876" height="46">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;line-height:1.5;padding:4px 8px;background:#f1f5f9;border-radius:4px;">
<span style="font-weight:600;">根拠法令：</span>措置法66条の4②一、施行令39条の12⑥⑦⑧、措置法通達66の4(3)-1、事務運営指針4-4<br/>
<span style="font-weight:600;">差異調整方法の例：</span>事務運営指針4-4に4つの例を掲載（引渡条件、決済条件、数量、市場の差異等）<br/>
<span style="font-weight:600;">判例：</span>高松高裁平成18年10月13日判決（最高裁平成19年4月10日上告棄却で確定）
</div>
</foreignObject>

<!-- ===== フロー図: 差異調整の判断 ===== -->
<rect x="12" y="962" width="876" height="50" rx="8" fill="#ede9fe" stroke="#c4b5fd" filter="url(#sh)"/>
<foreignObject x="20" y="966" width="856" height="44">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;line-height:1.5;">
<span style="font-weight:700;color:#7c3aed;">差異調整の判断フロー：</span>
差異が価格に影響？ → <span style="color:#16a34a;font-weight:600;">Yes</span>: 影響額を算定可能？ → <span style="color:#16a34a;font-weight:600;">Yes</span>: <span style="font-weight:700;">調整して比較対象に採用</span>　|　<span style="color:#dc2626;font-weight:600;">No</span>: 影響は軽微？ → <span style="color:#16a34a;font-weight:600;">Yes</span>: 中央値調整　|　<span style="color:#dc2626;font-weight:600;">No</span>: <span style="font-weight:700;color:#dc2626;">比較可能性に問題あり（不採用）</span>
<br/>差異が価格に影響？ → <span style="color:#dc2626;font-weight:600;">No</span>（客観的に明らかでない）: <span style="font-weight:700;">調整不要でそのまま比較対象に採用</span>
</div>
</foreignObject>
