<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="2050" viewBox="0 0 1400 2050" role="img" aria-labelledby="title desc">
  <title id="title">日中租税条約の配当みなし外国税額控除フロー</title>
  <desc id="desc">日中租税条約10条2項、23条2項(a)(b)、23条3項(a)と法人税法69条1項・25項、法人税法施行規則29条の4、実施特例法施行省令10条、別表六(四)・(二の二)・(二)の接続を示すSVGフロー図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#e8f0f7"/>
    </linearGradient>
    <linearGradient id="treatyHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="domesticHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9a3412"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="formsHead" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0ea5a4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#102a43" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#516578"/>
    </marker>
    <style>
      .title{font:800 36px 'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;fill:#16324a}
      .subtitle{font:500 18px 'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;fill:#52667a}
      .sectionTitle{font:800 22px 'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;fill:#fff}
      .legend{font:700 14px 'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;fill:#334e68}
      .boxTitle{font:800 18px 'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;fill:#17324a}
      .boxText{font:500 15px 'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;fill:#2e475d}
      .small{font:500 13px 'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;fill:#577287}
      .tiny{font:500 12px 'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;fill:#5f7287}
      .arrow{stroke:#516578;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .arrowThin{stroke:#6b7f92;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .callout{font:700 13px 'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;fill:#8b4513}
      .em{font-weight:800}
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="2050" fill="url(#bg)"/>
  <rect x="44" y="36" width="1312" height="1978" rx="26" fill="#ffffff" filter="url(#shadow)"/>

  <text x="86" y="96" class="title">日中租税条約の配当みなし外国税額控除</text>
  <text x="86" y="132" class="subtitle">条約 23条3(a) が、日本側の法人税法69条1項・25項、実施特例法施行省令10条、現行の別表六へどう接続するかを一枚で整理</text>

  <rect x="1020" y="70" width="280" height="90" rx="18" fill="#f8fbff" stroke="#d4dde8"/>
  <rect x="1040" y="92" width="20" height="20" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1072" y="107" class="legend">紫: 条約の実体要件</text>
  <rect x="1040" y="119" width="20" height="20" rx="6" fill="#fff7ed" stroke="#d97706"/>
  <text x="1072" y="134" class="legend">橙: 国内法の受皿</text>
  <rect x="1040" y="146" width="20" height="20" rx="6" fill="#ecfeff" stroke="#0f766e"/>
  <text x="1072" y="161" class="legend">青緑: 申告書・別表導線</text>

  <rect x="86" y="180" width="1228" height="54" rx="18" fill="url(#treatyHead)"/>
  <text x="108" y="215" class="sectionTitle">1. 条約レイヤー ─ 配当に対する中国課税と日本のFTC入口</text>

  <rect x="100" y="258" width="560" height="120" rx="18" fill="#f4f0ff" stroke="#c4b5fd" stroke-width="2"/>
  <text x="126" y="291" class="boxTitle">出発点: 日本の内国法人が中国法人から配当を受領</text>
  <text x="126" y="321" class="boxText">前提として、中国法人が支払法人、日本法人が受領者。</text>
  <text x="126" y="346" class="boxText">ここで確認すべき条約ルートは <tspan class="em">10条2項 → 23条2項(a) → 23条3項(a)</tspan>。</text>

  <rect x="690" y="258" width="610" height="120" rx="18" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="2"/>
  <text x="716" y="291" class="boxTitle">脇で確認する分岐: 23条2項(b)</text>
  <text x="716" y="321" class="boxText">日本法人が中国支払法人の議決権株式又は発行済株式の<tspan class="em">25%以上</tspan>を保有する場合、</text>
  <text x="716" y="346" class="boxText">配当支払法人段階の中国税も日本側FTCで考慮され得る。<tspan class="em">ただしこれは23条3(a)のみなし率とは別ルート</tspan>。</text>

  <path d="M380 378 V438" class="arrow"/>

  <rect x="180" y="440" width="400" height="128" rx="18" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="206" y="474" class="boxTitle">第10条2項</text>
  <text x="206" y="505" class="boxText">中国は配当に課税できるが、</text>
  <text x="206" y="530" class="boxText">受益者要件を満たすときは <tspan class="em">10%上限</tspan>。</text>
  <text x="206" y="555" class="small">ここが中国側の実際源泉税率の条約上限。</text>

  <rect x="680" y="440" width="400" height="128" rx="18" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="706" y="474" class="boxTitle">第23条2項(a)</text>
  <text x="706" y="505" class="boxText">日本国以外の国において納付される租税を</text>
  <text x="706" y="530" class="boxText">日本の租税から控除する国内法に従い、</text>
  <text x="706" y="555" class="boxText">中国税を日本側FTCの入口に乗せる。</text>

  <path d="M580 504 H650" class="arrow"/>
  <text x="593" y="493" class="tiny">中国で実際に課税</text>

  <path d="M880 568 V642" class="arrow"/>

  <rect x="540" y="650" width="680" height="128" rx="18" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="566" y="684" class="boxTitle">第23条3項(a) ─ 配当のみなし税率</text>
  <text x="566" y="715" class="boxText">23条2項(a)の適用上、中国の租税は次の率で<tspan class="em">支払われたものとみなす</tspan>。</text>
  <text x="566" y="740" class="boxText">合弁企業配当なら 10%、その他の配当なら 20%。</text>
  <text x="566" y="765" class="small">実際に中国で20%徴収されるという意味ではなく、日本のFTC計算上の「みなし」。</text>

  <path d="M880 778 V844" class="arrow"/>

  <rect x="200" y="850" width="420" height="122" rx="18" fill="#f4f0ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="226" y="884" class="boxTitle">合弁企業が支払う配当</text>
  <text x="226" y="915" class="boxText">23条3(a)前段</text>
  <text x="226" y="940" class="boxText"><tspan class="em">みなし中国税 = 10%</tspan></text>

  <rect x="760" y="850" width="420" height="122" rx="18" fill="#f4f0ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="786" y="884" class="boxTitle">その他の配当</text>
  <text x="786" y="915" class="boxText">23条3(a)後段</text>
  <text x="786" y="940" class="boxText"><tspan class="em">みなし中国税 = 20%</tspan></text>

  <path d="M410 972 V1018 H700" class="arrowThin"/>
  <path d="M970 972 V1018 H700" class="arrowThin"/>

  <rect x="430" y="1024" width="540" height="138" rx="18" fill="#f3f4f6" stroke="#cbd5e1" stroke-width="2"/>
  <text x="456" y="1058" class="boxTitle">条約上の橋渡し結果</text>
  <text x="456" y="1089" class="boxText">日本側では、中国税を <tspan class="em">10%又は20%支払ったものとみなして</tspan></text>
  <text x="456" y="1114" class="boxText">FTC計算の素材に載せる。ここで国内法 69条の受皿につながる。</text>
  <text x="456" y="1139" class="small">23条4の奨励措置ベース spared tax は別ルートであり、本図の主題ではない。</text>

  <rect x="86" y="1202" width="1228" height="54" rx="18" fill="url(#domesticHead)"/>
  <text x="108" y="1237" class="sectionTitle">2. 国内法レイヤー ─ 法人税法69条が条約上のみなし税額を受け止める場所</text>

  <path d="M700 1162 V1288" class="arrow"/>

  <rect x="100" y="1292" width="580" height="146" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="126" y="1326" class="boxTitle">法人税法69条1項</text>
  <text x="126" y="1357" class="boxText">内国法人が各事業年度において納付することとなる <tspan class="em">控除対象外国法人税の額</tspan> を、</text>
  <text x="126" y="1382" class="boxText">控除限度額の範囲で法人税額から控除する本体規定。</text>
  <text x="126" y="1407" class="boxText">日中条約23条3(a)で「支払われたものとみなされた中国税」が、ここで日本側FTCに落ちる。</text>

  <rect x="720" y="1292" width="580" height="146" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="746" y="1326" class="boxTitle">法人税法69条25項 + 規29条の4</text>
  <text x="746" y="1357" class="boxText">一般のFTCについて、申告書等への明細書添付と、</text>
  <text x="746" y="1382" class="boxText">控除対象外国法人税を課されたことを証する書類等の保存を要求。</text>
  <text x="746" y="1407" class="boxText">原則として、明細書記載額が控除額の上限になる。</text>

  <path d="M1010 1438 V1506" class="arrow"/>

  <rect x="430" y="1512" width="540" height="146" rx="18" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="456" y="1546" class="boxTitle">実施特例法施行省令10条</text>
  <text x="456" y="1577" class="boxText">外国法人税額のうちに <tspan class="em">みなし外国税額</tspan> があるときは、</text>
  <text x="456" y="1602" class="boxText">申告書等に添付すべき書類の中へ <tspan class="em">みなし税額の計算明細</tspan> と</text>
  <text x="456" y="1627" class="boxText"><tspan class="em">みなし税額を証明する書類</tspan> を上乗せする。</text>

  <path d="M700 1658 V1718" class="arrow"/>

  <rect x="86" y="1718" width="1228" height="54" rx="18" fill="url(#formsHead)"/>
  <text x="108" y="1753" class="sectionTitle">3. 現行の申告導線 ─ B06(四) → B06(二の二) → B06(二) → B01/B04</text>

  <text x="110" y="1802" class="small">注1: 実務上の現行記載はおおむねこの流れ。古い裁決では旧別表番号が現れる。</text>
  <text x="110" y="1826" class="small">注2: みなし部分を使うなら、B06(四)で条約根拠とみなし税額の明細を外形化しておくことが重要。</text>

  <rect x="110" y="1860" width="240" height="104" rx="18" fill="#ecfeff" stroke="#14b8a6" stroke-width="2"/>
  <text x="136" y="1894" class="boxTitle">B06(四)</text>
  <text x="136" y="1925" class="boxText">国別・税目別に</text>
  <text x="136" y="1950" class="boxText">納付分とみなし分を記録</text>

  <rect x="420" y="1860" width="240" height="104" rx="18" fill="#ecfeff" stroke="#14b8a6" stroke-width="2"/>
  <text x="446" y="1894" class="boxTitle">B06(二の二)</text>
  <text x="446" y="1925" class="boxText">当期の控除対象</text>
  <text x="446" y="1950" class="boxText">外国法人税額を総括</text>

  <rect x="730" y="1860" width="240" height="104" rx="18" fill="#ecfeff" stroke="#14b8a6" stroke-width="2"/>
  <text x="756" y="1894" class="boxTitle">B06(二)</text>
  <text x="756" y="1925" class="boxText">法69条1項の</text>
  <text x="756" y="1950" class="boxText">控除限度額と控除額を計算</text>

  <rect x="1040" y="1860" width="220" height="104" rx="18" fill="#ecfeff" stroke="#14b8a6" stroke-width="2"/>
  <text x="1066" y="1894" class="boxTitle">B01 / B04</text>
  <text x="1066" y="1925" class="boxText">税額控除と</text>
  <text x="1066" y="1950" class="boxText">加算・社外流出③へ</text>

  <path d="M350 1912 H410" class="arrow"/>
  <path d="M660 1912 H720" class="arrow"/>
  <path d="M970 1912 H1030" class="arrow"/>

  <rect x="110" y="1978" width="1150" height="44" rx="16" fill="#f8fbfd" stroke="#d8e1ea"/>
  <text x="132" y="2007" class="tiny">補足: 現行フォームの機能対応としては「個別明細 → 総括 → 本体計算 → 最終転記」。旧裁決の別表番号と一対一で対応させない。</text>
</svg>
