<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFC税制（外国子会社合算税制）条文マップ</title>
<style>
  body { margin: 0; padding: 16px; background: #f5f5f5; display: flex; justify-content: center; }
  .container { max-width: 1860px; width: 100%; }
  .container svg { width: 100%; height: auto; display: block; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  @media print { body { background: #fff; padding: 0; } .container svg { box-shadow: none; } }
</style>
</head>
<body>
<div class="container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2800" font-family="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif">
  <defs>
    <!-- 青系: 本則 (措置法) -->
    <linearGradient id="honzoku" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="honzokuLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1"/>
    </linearGradient>
    <!-- 橙系: 政令 -->
    <linearGradient id="seirei" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BF360C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="seireiLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:1"/>
    </linearGradient>
    <!-- 緑系: 省令 -->
    <linearGradient id="shourei" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shoureiLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1"/>
    </linearGradient>
    <!-- 赤系: 重要判定ポイント -->
    <linearGradient id="hantei" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C62828;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hanteiLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEBEE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFCDD2;stop-opacity:1"/>
    </linearGradient>
    <!-- タイトル背景 -->
    <linearGradient id="titleBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D47A1;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1565C0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1"/>
    </linearGradient>
    <!-- 矢印マーカー -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E65100"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#616161"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1600" height="2800" fill="#FAFAFA"/>
  <!-- 背景パターン -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E0E0E0" stroke-width="0.3"/>
  </pattern>
  <rect width="1600" height="2800" fill="url(#grid)" opacity="0.5"/>

  <!-- ===== タイトルセクション ===== -->
  <rect x="0" y="0" width="1600" height="100" fill="url(#titleBg)"/>
  <text x="800" y="42" text-anchor="middle" fill="white" font-size="28" font-weight="bold">CFC税制（外国子会社合算税制） 条文マップ</text>
  <text x="800" y="72" text-anchor="middle" fill="#BBDEFB" font-size="15">租税特別措置法 第66条の6〜第66条の9の2 ／ 施行令 ／ 施行規則　── 条文の階層構造と制度の判定フロー</text>

  <!-- ===== 凡例 ===== -->
  <g transform="translate(40, 115)">
    <rect x="0" y="0" width="1520" height="48" rx="6" fill="white" stroke="#E0E0E0" filter="url(#shadowLight)"/>
    <rect x="20" y="14" width="20" height="20" rx="3" fill="url(#honzoku)"/>
    <text x="48" y="29" font-size="12.5" fill="#333">本則（措置法）</text>
    <rect x="170" y="14" width="20" height="20" rx="3" fill="url(#seirei)"/>
    <text x="198" y="29" font-size="12.5" fill="#333">政令（施行令）</text>
    <rect x="340" y="14" width="20" height="20" rx="3" fill="url(#shourei)"/>
    <text x="368" y="29" font-size="12.5" fill="#333">省令（施行規則）</text>
    <rect x="520" y="14" width="20" height="20" rx="3" fill="url(#hantei)"/>
    <text x="548" y="29" font-size="12.5" fill="#333">重要判定ポイント</text>
    <line x1="720" y1="24" x2="780" y2="24" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="790" y="29" font-size="12.5" fill="#333">委任・参照関係</text>
    <line x1="920" y1="24" x2="980" y2="24" stroke="#616161" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>
    <text x="990" y="29" font-size="12.5" fill="#333">判定フロー</text>
    <rect x="1120" y="11" width="26" height="26" rx="13" fill="none" stroke="#C62828" stroke-width="2"/>
    <text x="1133" y="29" text-anchor="middle" font-size="11" fill="#C62828" font-weight="bold">!</text>
    <text x="1155" y="29" font-size="12.5" fill="#333">適用免除ポイント</text>
  </g>

  <!-- ============================================================ -->
  <!-- セクション1: 制度の全体構造 — 本則条文の配置 -->
  <!-- ============================================================ -->
  <g transform="translate(0, 180)">
    <!-- セクションヘッダー -->
    <rect x="40" y="0" width="1520" height="36" rx="4" fill="#1565C0" opacity="0.9"/>
    <text x="60" y="24" font-size="15" font-weight="bold" fill="white">SECTION 1 ─ 本則条文の体系（租税特別措置法）</text>

    <!-- 措法66条の6 -->
    <g transform="translate(40, 50)">
      <rect x="0" y="0" width="730" height="370" rx="8" fill="url(#honzokuLight)" stroke="#1565C0" stroke-width="2" filter="url(#shadow)"/>
      <rect x="0" y="0" width="730" height="38" rx="8" fill="url(#honzoku)"/>
      <rect x="0" y="20" width="730" height="18" fill="url(#honzoku)"/>
      <text x="15" y="26" font-size="15" font-weight="bold" fill="white">措法 第66条の6 ─ 内国法人に係る特定外国関係会社等の課税対象金額の益金算入（本則規定）</text>

      <text x="15" y="62" font-size="12.5" font-weight="bold" fill="#0D47A1">第1項</text>
      <text x="65" y="62" font-size="12" fill="#333">課税対象金額の益金算入（会社単位の合算課税の基本規定）</text>
      <text x="15" y="82" font-size="12.5" font-weight="bold" fill="#0D47A1">第2項</text>
      <text x="65" y="82" font-size="12" fill="#333">用語の定義（外国関係会社・特定外国関係会社・対象外国関係会社・適用対象金額 等）</text>
      <text x="80" y="100" font-size="11" fill="#555">─ 2号イ: 特定外国関係会社（ペーパーカンパニー/キャッシュボックス/ブラックリスト国）</text>
      <text x="80" y="116" font-size="11" fill="#555">─ 2号ロ: 対象外国関係会社（経済活動基準を満たさないもの）</text>
      <text x="80" y="132" font-size="11" fill="#555">─ 4号: 適用対象金額の定義　─ 6号: 部分対象外国関係会社の定義</text>
      <text x="15" y="155" font-size="12.5" font-weight="bold" fill="#0D47A1">第3項</text>
      <text x="65" y="155" font-size="12" fill="#333">適用対象金額の計算の委任規定（→ 施行令39条の15へ）</text>
      <text x="15" y="175" font-size="12.5" font-weight="bold" fill="#0D47A1">第4項</text>
      <text x="65" y="175" font-size="12" fill="#333">部分適用対象金額の定義（受動的所得の合算課税の対象となる金額）</text>
      <text x="15" y="195" font-size="12.5" font-weight="bold" fill="#0D47A1">第5項</text>
      <text x="65" y="195" font-size="12" fill="#333">適用免除規定（租税負担割合による免除）</text>
      <text x="80" y="213" font-size="11" fill="#C62828" font-weight="bold">─ 特定外国関係会社: 租税負担割合 30%（※27%）以上 → 適用免除</text>
      <text x="80" y="229" font-size="11" fill="#C62828" font-weight="bold">─ 対象外国関係会社/部分対象外国関係会社: 租税負担割合 20%以上 → 適用免除</text>
      <text x="15" y="252" font-size="12.5" font-weight="bold" fill="#0D47A1">第6項</text>
      <text x="65" y="252" font-size="12" fill="#333">部分課税対象金額の益金算入（部分合算課税の基本規定）</text>
      <text x="15" y="272" font-size="12.5" font-weight="bold" fill="#0D47A1">第7項</text>
      <text x="65" y="272" font-size="12" fill="#333">部分適用対象金額の計算に含まれる特定所得の範囲</text>
      <text x="80" y="290" font-size="11" fill="#555">─ 配当・利子・有価証券譲渡損益・デリバティブ取引損益・使用料・無形資産取引 等</text>
      <text x="15" y="313" font-size="12.5" font-weight="bold" fill="#0D47A1">第8項</text>
      <text x="65" y="313" font-size="12" fill="#333">外国金融子会社等に係る金融子会社等部分課税対象金額の益金算入</text>
      <text x="15" y="333" font-size="12.5" font-weight="bold" fill="#0D47A1">第9〜11項</text>
      <text x="85" y="333" font-size="12" fill="#333">金融子会社等部分適用対象金額の定義・特定所得範囲・確定申告書添付書類</text>
      <text x="15" y="355" font-size="11" fill="#777">※ 令和6年4月1日以降開始事業年度より特定外国関係会社の適用免除基準は30%→27%に変更</text>
    </g>

    <!-- 措法66条の7 -->
    <g transform="translate(810, 50)">
      <rect x="0" y="0" width="350" height="140" rx="8" fill="url(#honzokuLight)" stroke="#1565C0" stroke-width="2" filter="url(#shadow)"/>
      <rect x="0" y="0" width="350" height="34" rx="8" fill="url(#honzoku)"/>
      <rect x="0" y="18" width="350" height="16" fill="url(#honzoku)"/>
      <text x="12" y="23" font-size="14" font-weight="bold" fill="white">措法 第66条の7</text>
      <text x="12" y="58" font-size="12" font-weight="bold" fill="#0D47A1">外国税額控除の特例</text>
      <text x="12" y="78" font-size="11.5" fill="#333">課税対象金額に対応する外国法人税の</text>
      <text x="12" y="94" font-size="11.5" fill="#333">額を内国法人の法人税額から控除</text>
      <text x="12" y="114" font-size="11" fill="#555">第1項: 外国法人税額の控除</text>
      <text x="12" y="130" font-size="11" fill="#555">第2〜4項: 控除限度額の計算方法</text>
    </g>

    <!-- 措法66条の8 -->
    <g transform="translate(810, 210)">
      <rect x="0" y="0" width="350" height="140" rx="8" fill="url(#honzokuLight)" stroke="#1565C0" stroke-width="2" filter="url(#shadow)"/>
      <rect x="0" y="0" width="350" height="34" rx="8" fill="url(#honzoku)"/>
      <rect x="0" y="18" width="350" height="16" fill="url(#honzoku)"/>
      <text x="12" y="23" font-size="14" font-weight="bold" fill="white">措法 第66条の8</text>
      <text x="12" y="58" font-size="12" font-weight="bold" fill="#0D47A1">課税済配当等の益金不算入</text>
      <text x="12" y="78" font-size="11.5" fill="#333">合算課税済みの所得から配当を受けた</text>
      <text x="12" y="94" font-size="11.5" fill="#333">場合の二重課税排除（益金不算入）</text>
      <text x="12" y="114" font-size="11" fill="#555">第1項: 配当等の益金不算入</text>
      <text x="12" y="130" font-size="11" fill="#555">第2〜6項: 特定課税対象金額の計算等</text>
    </g>

    <!-- 措法66条の9 -->
    <g transform="translate(1200, 50)">
      <rect x="0" y="0" width="340" height="120" rx="8" fill="url(#honzokuLight)" stroke="#1565C0" stroke-width="2" filter="url(#shadow)"/>
      <rect x="0" y="0" width="340" height="34" rx="8" fill="url(#honzoku)"/>
      <rect x="0" y="18" width="340" height="16" fill="url(#honzoku)"/>
      <text x="12" y="23" font-size="14" font-weight="bold" fill="white">措法 第66条の9</text>
      <text x="12" y="58" font-size="12" font-weight="bold" fill="#0D47A1">株式譲渡益からの控除</text>
      <text x="12" y="78" font-size="11.5" fill="#333">合算課税済所得に対応する部分を</text>
      <text x="12" y="94" font-size="11.5" fill="#333">外国関係会社株式の譲渡益から控除</text>
      <text x="12" y="112" font-size="11" fill="#555">二重課税排除の株式譲渡益版</text>
    </g>

    <!-- 措法66条の9の2 -->
    <g transform="translate(1200, 190)">
      <rect x="0" y="0" width="340" height="160" rx="8" fill="url(#honzokuLight)" stroke="#1565C0" stroke-width="2" filter="url(#shadow)"/>
      <rect x="0" y="0" width="340" height="34" rx="8" fill="url(#honzoku)"/>
      <rect x="0" y="18" width="340" height="16" fill="url(#honzoku)"/>
      <text x="12" y="23" font-size="14" font-weight="bold" fill="white">措法 第66条の9の2</text>
      <text x="12" y="58" font-size="12" font-weight="bold" fill="#0D47A1">特殊関係株主等である内国法人の</text>
      <text x="12" y="75" font-size="12" font-weight="bold" fill="#0D47A1">外国関係法人に係る所得の課税の特例</text>
      <text x="12" y="98" font-size="11.5" fill="#333">特殊関係株主等が外国関係法人を</text>
      <text x="12" y="114" font-size="11.5" fill="#333">通じて行う租税回避への対処</text>
      <text x="12" y="138" font-size="11" fill="#555">（間接保有構造を通じた合算課税）</text>
      <text x="12" y="152" font-size="11" fill="#555">第66条の6を準用する規定</text>
    </g>

    <!-- 本則条文間の参照関係 矢印 -->
    <line x1="770" y1="170" x2="808" y2="110" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.6"/>
    <line x1="770" y1="240" x2="808" y2="270" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.6"/>
    <text x="778" y="148" font-size="9" fill="#1565C0" transform="rotate(-25,778,148)">参照</text>
    <text x="778" y="262" font-size="9" fill="#1565C0" transform="rotate(20,778,262)">参照</text>
  </g>

  <!-- ============================================================ -->
  <!-- セクション2: 政令（施行令）の構造 -->
  <!-- ============================================================ -->
  <g transform="translate(0, 640)">
    <rect x="40" y="0" width="1520" height="36" rx="4" fill="#E65100" opacity="0.9"/>
    <text x="60" y="24" font-size="15" font-weight="bold" fill="white">SECTION 2 ─ 政令の体系（租税特別措置法施行令）</text>

    <!-- 委任矢印: 本則→政令 -->
    <line x1="400" y1="-20" x2="400" y2="0" stroke="#E65100" stroke-width="2" marker-end="url(#arrowOrange)" stroke-dasharray="5,3"/>
    <text x="410" y="-8" font-size="10" fill="#E65100">委任</text>

    <!-- 施行令39条の14 -->
    <g transform="translate(40, 50)">
      <rect x="0" y="0" width="350" height="130" rx="8" fill="url(#seireiLight)" stroke="#E65100" stroke-width="1.8" filter="url(#shadow)"/>
      <rect x="0" y="0" width="350" height="32" rx="8" fill="url(#seirei)"/>
      <rect x="0" y="16" width="350" height="16" fill="url(#seirei)"/>
      <text x="12" y="22" font-size="13" font-weight="bold" fill="white">施行令 §39の14</text>
      <text x="12" y="54" font-size="12" font-weight="bold" fill="#BF360C">課税対象金額の計算等</text>
      <text x="12" y="74" font-size="11" fill="#333">・請求権等勘案合算割合の計算</text>
      <text x="12" y="90" font-size="11" fill="#333">・課税対象金額＝適用対象金額×合算割合</text>
      <text x="12" y="106" font-size="11" fill="#555">← 措法66条の6 第1項の委任</text>
      <text x="12" y="122" font-size="11" fill="#555">（間接保有割合は掛け算方式）</text>
    </g>

    <!-- 施行令39条の14の2 -->
    <g transform="translate(420, 50)">
      <rect x="0" y="0" width="350" height="130" rx="8" fill="url(#seireiLight)" stroke="#E65100" stroke-width="1.8" filter="url(#shadow)"/>
      <rect x="0" y="0" width="350" height="32" rx="8" fill="url(#seirei)"/>
      <rect x="0" y="16" width="350" height="16" fill="url(#seirei)"/>
      <text x="12" y="22" font-size="13" font-weight="bold" fill="white">施行令 §39の14の2</text>
      <text x="12" y="54" font-size="12" font-weight="bold" fill="#BF360C">外国関係会社の範囲</text>
      <text x="12" y="74" font-size="11" fill="#333">・間接保有割合の計算方法（連鎖方式）</text>
      <text x="12" y="90" font-size="11" fill="#333">・実質支配関係の判定基準</text>
      <text x="12" y="106" font-size="11" fill="#555">← 措法66条の6 第2項1号の委任</text>
      <text x="12" y="122" font-size="11" fill="#555">（50%超保有判定の具体的計算）</text>
    </g>

    <!-- 施行令39条の14の3 -->
    <g transform="translate(800, 50)">
      <rect x="0" y="0" width="370" height="175" rx="8" fill="url(#seireiLight)" stroke="#E65100" stroke-width="2.5" filter="url(#shadow)"/>
      <rect x="0" y="0" width="370" height="32" rx="8" fill="url(#seirei)"/>
      <rect x="0" y="16" width="370" height="16" fill="url(#seirei)"/>
      <text x="12" y="22" font-size="13" font-weight="bold" fill="white">施行令 §39の14の3 ★重要</text>
      <text x="12" y="54" font-size="12" font-weight="bold" fill="#BF360C">特定外国関係会社・対象外国関係会社の範囲</text>
      <text x="12" y="74" font-size="11" fill="#333">・ペーパーカンパニーの具体的判定基準</text>
      <text x="12" y="90" font-size="11" fill="#333">・事実上のキャッシュボックスの判定基準</text>
      <text x="12" y="106" font-size="11" fill="#333">・経済活動基準の4基準の詳細規定</text>
