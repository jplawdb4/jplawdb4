<!-- ======== SECTION 4: 核心ポイント ======== -->
<rect x="10" y="656" width="880" height="170" rx="10" fill="#f0f5ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="450" y="676" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af" font-family="'Noto Sans JP',sans-serif">事例22の核心 ── 3つのポイント</text>

<!-- 核心カード3枚 -->
<rect x="25" y="688" width="275" height="122" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="688" width="275" height="22" rx="7" fill="#1e40af"/>
<rect x="25" y="704" width="275" height="6" fill="#1e40af"/>
<foreignObject x="25" y="688" width="275" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">1. 基本的利益 = 超過利益の「控除前ベース」</div>
</foreignObject>
<foreignObject x="25" y="710" width="275" height="100">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:7.5px;color:#475569;">独自の無形資産を持たない「単純な」企業の利益水準を基準とする。</span>
    <span style="font-size:7px;color:#1e40af;font-weight:600;">この水準を超える利益が残余利益（＝無形資産の寄与分）。</span>
