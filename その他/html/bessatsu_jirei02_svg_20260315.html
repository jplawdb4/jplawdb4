<!-- ===== Section 2: RP法の仕組み ===== -->
<rect x="16" y="380" width="868" height="24" rx="4" fill="#1e40af"/>
<foreignObject x="26" y="382" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">2. RP法の仕組みと比較可能性分析</div>
</foreignObject>

<!-- RP法の図解 -->
<rect x="30" y="416" width="420" height="170" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="40" y="420" width="400" height="164">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#334155;">
    <div style="font-size:8.5px;font-weight:700;color:#1e40af;margin-bottom:6px;">RP法（再販売価格基準法）の算定イメージ</div>
    <div style="background:#eff6ff;border-radius:6px;padding:8px;margin-bottom:6px;">
      <div style="font-size:7px;font-weight:700;color:#1e40af;margin-bottom:4px;">独立企業間価格 = 再販売価格 - 通常の利潤の額</div>
      <div style="display:flex;gap:4px;align-items:center;">
        <div style="background:#fef3c7;border:1px solid #fcd34d;padding:4px 8px;border-radius:4px;font-size:6.5px;text-align:center;">
          <div style="font-weight:700;">S社の再販売価格</div>
          <div>（第三者代理店への売価）</div>
        </div>
        <div style="font-size:10px;color:#1e40af;">-</div>
        <div style="background:#dcfce7;border:1px solid #86efac;padding:4px 8px;border-radius:4px;font-size:6.5px;text-align:center;">
          <div style="font-weight:700;">通常の利潤の額</div>
          <div>（T社の売上総利益率で算定）</div>
        </div>
        <div style="font-size:10px;color:#1e40af;">=</div>
        <div style="background:#dbeafe;border:1px solid #93c5fd;padding:4px 8px;border-radius:4px;font-size:6.5px;text-align:center;">
          <div style="font-weight:700;">独立企業間価格</div>
          <div>（P社→S社の適正価格）</div>
        </div>
      </div>
    </div>
    <div style="font-size:6.5px;color:#64748b;line-height:1.5;">
      &#x25CF; 検証対象の当事者: S社（買手側。販売のみ行い、より単純な機能）<br/>
      &#x25CF; 比較するのは「売上総利益率」（価格ではなく利益率の比較）<br/>
      &#x25CF; RP法はCUP法に次いで直接的な方法（基本三法の一つ）
    </div>
  </div>
</foreignObject>

<!-- 比較可能性チェック -->
<rect x="466" y="416" width="418" height="170" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="476" y="420" width="398" height="164">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#334155;">
    <div style="font-size:8.5px;font-weight:700;color:#1e40af;margin-bottom:6px;">S社 vs T社 比較可能性</div>
    <table style="width:100%;border-collapse:collapse;font-size:7px;">
      <tr style="background:#f8fafc;"><th style="text-align:left;padding:3px 4px;border-bottom:1px solid #e2e8f0;width:30%;">要素</th><th style="text-align:left;padding:3px 4px;border-bottom:1px solid #e2e8f0;width:50%;">比較結果</th><th style="text-align:center;padding:3px 4px;border-bottom:1px solid #e2e8f0;width:20%;">判定</th></tr>
      <tr><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">取扱製品</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">A・Bは同種ではないが類似性が高い</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;text-align:center;color:#16a34a;font-weight:700;">&#x2714;</td></tr>
      <tr><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">事業形態</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">ともに輸入総代理店（再販売のみ）</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;text-align:center;color:#16a34a;font-weight:700;">&#x2714;</td></tr>
      <tr><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">販売機能</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">広告宣伝・販促・AS等おおむね同様</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;text-align:center;color:#16a34a;font-weight:700;">&#x2714;</td></tr>
      <tr><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">売上規模</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">おおむね同様</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;text-align:center;color:#16a34a;font-weight:700;">&#x2714;</td></tr>
      <tr><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">商標使用</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;">いずれも自社商標等不使用</td><td style="padding:3px 4px;border-bottom:1px solid #f1f5f9;text-align:center;color:#16a34a;font-weight:700;">&#x2714;</td></tr>
      <tr><td style="padding:3px 4px;">情報入手</td><td style="padding:3px 4px;">T社: 有価証券報告書閲覧可能</td><td style="padding:3px 4px;text-align:center;color:#16a34a;font-weight:700;">&#x2714;</td></tr>
    </table>
  </div>
</foreignObject>

<!-- ===== Section 3: 判定・結論 ===== -->
<rect x="16" y="600" width="868" height="24" rx="4" fill="#16a34a"/>
<foreignObject x="26" y="602" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">3. 判定・結論</div>
</foreignObject>

<rect x="30" y="636" width="854" height="80" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="640" width="834" height="72">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#166534;">
    <div style="font-size:9px;font-weight:700;margin-bottom:4px;">結論: 再販売価格基準法（RP法）を最も適切な方法として選定</div>
    <div style="line-height:1.6;">
      S社がP社から製品Aを輸入する取引に対し、T社が外国第三者から製品Bを輸入する取引を<span style="font-weight:700;">外部比較対象取引</span>として使用。<br/>
      S社を検証対象の当事者としてRP法を適用し、T社の売上総利益率を基準に独立企業間価格を算定。<br/>
      <span style="font-size:6.5px;color:#15803d;">※ TNMMも適用候補だったが、RP法の比較可能性が十分のため、基本三法優先の原則によりRP法を選定。</span>
    </div>
  </div>
</foreignObject>

<!-- ===== Section 4: 核心ポイント ===== -->
<rect x="16" y="732" width="868" height="24" rx="4" fill="#7c3aed"/>
<foreignObject x="26" y="734" width="848" height="20">
  <div xmlns="http://www.w3.org/1999/xhtml" style="color:#fff;font-size:11px;font-weight:700;">4. 核心ポイント</div>
</foreignObject>

<rect x="30" y="768" width="280" height="86" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="40" y="772" width="260" height="78">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8px;font-weight:700;color:#7c3aed;margin-bottom:4px;">検証対象の選定基準</div>
    <div style="line-height:1.5;">P社（製造販売）よりS社（販売のみ）の方がより単純な機能を果たすため、S社を検証対象に。RP法ではより単純な機能の当事者を検証対象とすることが望ましい。</div>
  </div>
</foreignObject>

<rect x="322" y="768" width="270" height="86" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="332" y="772" width="250" height="78">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8px;font-weight:700;color:#7c3aed;margin-bottom:4px;">外部比較対象取引の活用</div>
    <div style="line-height:1.5;">内部比較対象取引が見出せない場合でも、公開情報（有価証券報告書等）から外部の比較対象取引を見出すことが可能。競合する輸入総代理店5社の情報が入手できた。</div>
  </div>
</foreignObject>

<rect x="604" y="768" width="280" height="86" rx="8" fill="#fff" stroke="#c4b5fd" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="614" y="772" width="260" height="78">
  <div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;">
    <div style="font-size:8px;font-weight:700;color:#7c3aed;margin-bottom:4px;">RP法 vs CUP法の違い</div>
    <div style="line-height:1.5;">CUP法は「価格」の直接比較で同種性が厳格。RP法は「売上総利益率」の比較で機能の類似性が重要。同種でなくとも類似製品で機能が同様なら適用可能。</div>
  </div>
</foreignObject>
