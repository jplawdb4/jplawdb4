<text x="450" y="730" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af" font-family="'Noto Sans JP',sans-serif">事例26の核心 ── 4つのポイント</text>

<!-- 核心カード（2x2） -->
<rect x="25" y="742" width="425" height="112" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="742" width="425" height="22" rx="7" fill="#1e40af"/>
<rect x="25" y="758" width="425" height="6" fill="#1e40af"/>
<foreignObject x="25" y="742" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">1. 判定基準 = S社にとっての経済的・商業的価値</div>
</foreignObject>
<foreignObject x="25" y="764" width="425" height="90">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:7.5px;color:#475569;">P社が活動しなければS社が自ら行う必要があるか?</span>
    <span style="font-size:7px;color:#1e40af;font-weight:600;">非関連者なら対価を支払うか? → Yes なら役務提供。</span>
    <span style="font-size:7px;color:#94a3b8;">「待機」も役務提供に含まれる（ヲの緊急体制維持）。</span>
  </div>
</foreignObject>

<rect x="455" y="742" width="420" height="112" rx="7" fill="#fff" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="742" width="420" height="22" rx="7" fill="#dc2626"/>
<rect x="455" y="758" width="420" height="6" fill="#dc2626"/>
<foreignObject x="455" y="742" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">2. 株主活動 = P社の法的義務・自己のための活動</div>
</foreignObject>
<foreignObject x="455" y="764" width="420" height="90">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:7.5px;color:#475569;">株主総会資料、有価証券報告書、連結監査、CbCR等。</span>
    <span style="font-size:7px;color:#dc2626;font-weight:600;">P社が専ら自らのために行う → 対価の授受は不要。</span>
    <span style="font-size:7px;color:#94a3b8;">ただし、日常経営助言等は株主活動に非該当。</span>
  </div>
</foreignObject>

<rect x="25" y="862" width="425" height="112" rx="7" fill="#fff" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="862" width="425" height="22" rx="7" fill="#16a34a"/>
<rect x="25" y="878" width="425" height="6" fill="#16a34a"/>
<foreignObject x="25" y="862" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">3. 対価 = 総原価 + 5% マークアップ（3-11(1)）</div>
</foreignObject>
<foreignObject x="25" y="884" width="425" height="90">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:7.5px;color:#475569;">支援的性質で中核事業に直接関連しない場合に適用可能。</span>
    <span style="font-size:7px;color:#16a34a;font-weight:600;">総原価 = 直接費 + 間接費を従事割合等で配分。</span>
    <span style="font-size:7px;color:#94a3b8;">6要件（イ～ト）を全て満たし、書類を保存する必要あり。</span>
  </div>
</foreignObject>

<rect x="455" y="862" width="420" height="112" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="862" width="420" height="22" rx="7" fill="#7c3aed"/>
<rect x="455" y="878" width="420" height="6" fill="#7c3aed"/>
<foreignObject x="455" y="862" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">4. 重複活動 = 役務提供に非該当</div>
</foreignObject>
<foreignObject x="455" y="884" width="420" height="90">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:7.5px;color:#475569;">非関連者やS社自身の活動と内容が重複する場合はNG。</span>
    <span style="font-size:7px;color:#7c3aed;font-weight:600;">本事例ではP社の活動は重複なし（注記で明示）。</span>
    <span style="font-size:7px;color:#94a3b8;">一時的重複・ﾘｽｸ軽減目的の重複は除外される。</span>
  </div>
</foreignObject>
