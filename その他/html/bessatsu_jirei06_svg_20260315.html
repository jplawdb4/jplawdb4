<!-- 選定理由 -->
<foreignObject x="36" y="176" width="838" height="56">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;line-height:1.5;background:#fff;border-radius:4px;padding:6px 8px;border-left:3px solid #16a34a;">
<span style="font-weight:700;color:#16a34a;">選定理由：</span> P社（製造+R&D）よりS社（販売のみ）がより単純な機能 → S社を検証対象。CUP適用不可（独自技術製品）。RPM適用不可（売上総利益率調整情報なし）。TNMM外部比較対象あり。S社の機能価値は<span style="font-weight:700;">売上</span>と関係 → <span style="font-weight:700;color:#1e40af;">売上高営業利益率</span>が適切。
</div>
</foreignObject>

<!-- 利益指標の解説ボックス -->
<rect x="30" y="242" width="400" height="84" rx="5" fill="#dbeafe" stroke="#93c5fd" filter="url(#sh)"/>
<foreignObject x="36" y="246" width="388" height="78">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#1e40af;">売上高営業利益率（OPM）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:3px;">営業利益 ÷ 売上高</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#475569;margin-top:2px;line-height:1.4;">
適切な場面：再販売会社（自ら在庫を保有し管理して再販売）<br/>
機能の価値が<span style="font-weight:600;">売上</span>との間に関係がある場合<br/>
X国では原価項目の開示が不要だが営業利益に相当する項目は表示される
</div>
</foreignObject>

<!-- ===== 前提条件2: 棚卸資産売買（営業費用売上総利益率） ===== -->
<rect x="12" y="344" width="876" height="220" rx="8" fill="#f8fafc" stroke="#e2e8f0" filter="url(#sh)"/>
<foreignObject x="20" y="348" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#7c3aed;">前提条件2：棚卸資産の売買取引（営業費用売上総利益率）</div>
</foreignObject>

<!-- 機能比較 -->
<rect x="30" y="372" width="410" height="70" rx="5" fill="#eff6ff" stroke="#bfdbfe" filter="url(#sh)"/>
<foreignObject x="36" y="376" width="398" height="64">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#1e40af;">P社の機能（複雑）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;line-height:1.4;">
・製品Aの製造販売 ・全世界的販売計画の企画立案<br/>
・販売子会社の管理業務 ・研究開発<br/>
→ 販売計画に基づきS社に製品Aを販売
</div>
</foreignObject>

<rect x="460" y="372" width="420" height="70" rx="5" fill="#fefce8" stroke="#fcd34d" filter="url(#sh)"/>
<foreignObject x="466" y="376" width="408" height="64">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#b45309;">S社の機能（単純）★検証対象</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;line-height:1.4;">
・P社の販売計画に従い購入・販売（独自性なし）<br/>
・在庫をほとんど保有しない → <span style="font-weight:700;">実質的な仲介活動</span><br/>
・商流はS社経由だが物流はP社→代理店に直送
</div>
</foreignObject>

<!-- 選定理由 -->
<foreignObject x="30" y="450" width="850" height="42">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;line-height:1.5;background:#fff;border-radius:4px;padding:6px 8px;border-left:3px solid #7c3aed;">
<span style="font-weight:700;color:#7c3aed;">選定理由：</span> S社は実質的仲介者 → 機能の価値は<span style="font-weight:700;">営業費用</span>に反映。売上との関係なし → RPM不適切。<span style="font-weight:700;color:#7c3aed;">営業費用売上総利益率（Berry Ratio）</span>が適切な利益指標。
</div>
</foreignObject>

<rect x="30" y="498" width="400" height="58" rx="5" fill="#ede9fe" stroke="#c4b5fd" filter="url(#sh)"/>
<foreignObject x="36" y="502" width="388" height="52">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">営業費用売上総利益率（Berry Ratio）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:3px;">売上総利益 ÷ 営業費用</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#475569;margin-top:2px;line-height:1.4;">
適切な場面：仲介業者・単純な役務提供業者の検証<br/>
機能の価値が営業費用と関係し、売上・製造機能との関係がない場合
</div>
</foreignObject>

<foreignObject x="20" y="580" width="856" height="18">

<rect x="30" y="604" width="240" height="60" rx="5" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<foreignObject x="36" y="608" width="228" height="54">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:9px;font-weight:700;color:#1e40af;">P社（日本）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;">製品Aの製造販売 + 研究開発</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;">特許権・製造ノウハウの開発元</div>

<rect x="380" y="604" width="240" height="60" rx="5" fill="#fefce8" stroke="#b45309" stroke-width="1.5" filter="url(#sh)"/>

<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:9px;font-weight:700;color:#b45309;">S社（X国）★検証対象</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:2px;">製品Aの製造販売（R&D部門なし）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;">P社の独自技術に基づき製造</div>

</foreignObject>

<!-- 矢印: 使用許諾 -->
<line x1="270" y1="624" x2="376" y2="624" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arw)"/>
<foreignObject x="278" y="606" width="90" height="16">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#dc2626;text-align:center;">特許権・ノウハウ<br/>使用許諾</div>
</foreignObject>

<line x1="270" y1="644" x2="376" y2="644" stroke="#1e40af" stroke-width="1.2" marker-end="url(#arwBlue)" stroke-dasharray="0"/>

<foreignObject x="282" y="646" width="90" height="12">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6px;color:#94a3b8;text-align:center;">※棚卸資産の売買なし</div>
</foreignObject>

<line x1="620" y1="634" x2="706" y2="634" stroke="#64748b" stroke-width="1.2" marker-end="url(#arw)"/>
<foreignObject x="630" y="618" width="70" height="14">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#64748b;text-align:center;">製品A販売</div>
</foreignObject>

<!-- 算定方法の解説 -->
<foreignObject x="30" y="674" width="850" height="66">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;line-height:1.5;background:#fff;border-radius:4px;padding:6px 8px;border-left:3px solid #b45309;">
<span style="font-weight:700;color:#b45309;">算定方法：TNMM<span style="font-size:6px;">に準ずる方法と同等の方法</span></span><br/>
S社の機能に見合う通常の利益（比較対象取引の営業利益率で計算）を超えるS社の<span style="font-weight:700;">残余利益</span> = 特許権・ノウハウ使用許諾の対価<br/>
→ 無形資産の対価を間接的に算定。利益指標は<span style="font-weight:700;color:#b45309;">総費用営業利益率</span>（S社は製造販売会社）
</div>
</foreignObject>

<rect x="30" y="746" width="400" height="58" rx="5" fill="#fef3c7" stroke="#fcd34d" filter="url(#sh)"/>
<foreignObject x="36" y="750" width="388" height="52">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#b45309;">総費用営業利益率（FCM）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:3px;">営業利益 ÷ 総費用（売上原価＋販管費）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#475569;margin-top:2px;line-height:1.4;">
適切な場面：製造販売会社を検証する場合<br/>
営業費用に反映されない機能（製造機能等）を有する場合
</div>
</foreignObject>

<!-- ===== 3つの利益指標比較 ===== -->
<rect x="12" y="848" width="876" height="130" rx="8" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#sh)"/>
<foreignObject x="20" y="852" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#16a34a;">核心ポイント：3つの利益指標の使い分け</div>
</foreignObject>

<!-- 表形式 -->
<rect x="30" y="874" width="280" height="88" rx="4" fill="#fff" stroke="#1e40af" filter="url(#sh)"/>
<foreignObject x="36" y="878" width="268" height="82">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#1e40af;">① 売上高営業利益率（OPM）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:3px;line-height:1.5;">
機能の価値が<span style="font-weight:600;">売上</span>と関係<br/>
典型例：再販売会社（在庫保有・管理）<br/>
施行令39条の12⑧二
</div>
</foreignObject>

<rect x="320" y="874" width="280" height="88" rx="4" fill="#fff" stroke="#b45309" filter="url(#sh)"/>
<foreignObject x="326" y="878" width="268" height="82">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#b45309;">② 総費用営業利益率（FCM）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:3px;line-height:1.5;">
営業費用に反映されない機能（<span style="font-weight:600;">製造</span>等）あり<br/>
典型例：製造販売会社<br/>
施行令39条の12⑧三
</div>
</foreignObject>

<rect x="610" y="874" width="268" height="88" rx="4" fill="#fff" stroke="#7c3aed" filter="url(#sh)"/>
<foreignObject x="616" y="878" width="256" height="82">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">③ 営業費用売上総利益率（Berry Ratio）</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;margin-top:3px;line-height:1.5;">
機能の価値が<span style="font-weight:600;">営業費用</span>と関係<br/>
売上・製造機能との関係なし<br/>
典型例：仲介業者・単純な役務提供業者<br/>
施行令39条の12⑧四・五
</div>
</foreignObject>

<!-- 根拠法令 -->
<foreignObject x="12" y="990" width="876" height="46">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;line-height:1.5;padding:4px 8px;background:#f1f5f9;border-radius:4px;">
<span style="font-weight:600;">根拠法令：</span>措置法66条の4②、施行令39条の12⑧二～五、措置法通達66の4(2)-1, 66の4(3)-1, 66の4(3)-3、事務運営指針4-1, 4-11<br/>
<span style="font-weight:600;">留意点：</span>差異が利益率算定に影響する場合でも、TNMM利益指標の算定では客観的に明らかでない限り調整不要（事務運営指針4-11）。ただし主たる機能が異なる場合は通常影響あり（同(注)）。
</div>
</foreignObject>
