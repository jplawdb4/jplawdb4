<!-- 利息配分の問題 -->
<rect x="30" y="826" width="410" height="50" rx="4" fill="#fef2f2" stroke="#fecaca"/>
<foreignObject x="36" y="830" width="398" height="44">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#dc2626;font-weight:700;">問題点</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;line-height:1.4;margin-top:1px;">
T銀行からの預金利息（1.0%）をXS社が独占。各社個別なら0.5%。<br/>
3社の意図的協調行動による相互作用の共通便益（グループシナジー）が発生。<br/>
XS社の記帳等の対価は総原価+5%で別途算定済。
</div>
</foreignObject>

<rect x="460" y="826" width="410" height="50" rx="4" fill="#f0fdf4" stroke="#bbf7d0"/>
<foreignObject x="466" y="830" width="398" height="44">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#16a34a;font-weight:700;">選定</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;line-height:1.4;margin-top:1px;">
寄与度利益分割法と同等の方法 又は 残余利益分割法に準ずる方法と同等の方法<br/>
預金利息から記帳対価を除いた金額を、資金移動前の口座残高に応じて配分。<br/>
契約全体の条件を考慮し、意図的協調行動の効果を検討する。
</div>
</foreignObject>

<!-- ===== 核心ポイント ===== -->
<rect x="12" y="968" width="876" height="82" rx="8" fill="#faf5ff" stroke="#c4b5fd" filter="url(#sh)"/>
<foreignObject x="20" y="972" width="856" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#7c3aed;">核心ポイント：寄与度利益分割法が適切な場面</div>
</foreignObject>

<foreignObject x="30" y="994" width="420" height="50">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;line-height:1.5;">
<span style="font-weight:600;">① 寡占等で比較対象取引が見つからない場合</span>（前提1）<br/>
<span style="font-weight:600;">② 高度に統合されたグローバルトレーディング</span>（前提2）<br/>
<span style="font-weight:600;">③ 規模の利益でTNMMでは適切な配分不可</span>（前提3）<br/>
<span style="font-weight:600;">④ 意図的協調行動による共通便益の配分</span>（前提4）
</div>
</foreignObject>
<foreignObject x="470" y="994" width="400" height="50">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#334155;line-height:1.5;">
<span style="font-weight:600;">分割要因の例：</span>人件費等の費用、投下資本額、減価償却費など<br/>
<span style="font-weight:600;">分割対象利益：</span>原則として営業利益の合計額（損失含む）<br/>
<span style="font-weight:600;">独自の価値ある寄与なし</span>の場合 → 残余利益分割法は不可<br/>
会計処理・通貨基準の共通化と継続使用が必要
</div>
</foreignObject>

<!-- 根拠法令 -->
