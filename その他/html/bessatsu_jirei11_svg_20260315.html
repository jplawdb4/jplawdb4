<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:5px;line-height:1.6;">
<table style="width:100%;border-collapse:collapse;font-size:7px;">
<tr style="border-bottom:1px solid #e2e8f0;">
<td style="padding:3px 6px;font-weight:600;width:120px;">収益面（販売価格）</td>
<td style="padding:3px 6px;">独自の技術性能 ＋ 高い製品認知度 ＋ 充実した店舗網 → 一定のマーケットシェア ＋ 安定価格</td>
</tr>
<tr style="border-bottom:1px solid #e2e8f0;">
<td style="padding:3px 6px;font-weight:600;">原価面（製造コスト）</td>
<td style="padding:3px 6px;">P社の製造ノウハウ → S社への技術指導 → 低い製造原価の実現</td>
</tr>
<tr>
<td style="padding:3px 6px;font-weight:600;">結論</td>
<td style="padding:3px 6px;">P社・S社は基本的活動のみを行う法人とは異なる <span style="font-weight:600;color:#16a34a;">独自の研究開発・広告宣伝・販売促進活動</span> を行っている</td>
</tr>
</table>

<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:5px;line-height:1.6;">
<table style="width:100%;border-collapse:collapse;font-size:7px;">
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:3px 6px;font-weight:600;width:40px;color:#7c3aed;">&#x2460;</td>
<td style="padding:3px 6px;font-weight:600;">技術革新に関する無形資産</td>
<td style="padding:3px 6px;">特許権、営業秘密等</td>
</tr>

<td style="padding:3px 6px;font-weight:600;color:#7c3aed;">&#x2461;</td>
<td style="padding:3px 6px;font-weight:600;">人的資源に関する無形資産</td>
<td style="padding:3px 6px;">従業員等のノウハウ等</td>
</tr>
<tr>
<td style="padding:3px 6px;font-weight:600;color:#7c3aed;">&#x2462;</td>
<td style="padding:3px 6px;font-weight:600;">組織に関する無形資産</td>
<td style="padding:3px 6px;">取引網、交渉手順等</td>
</tr>

</div>

<rect x="460" y="622" width="410" height="155" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="470" y="627" width="390" height="145">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">基本的活動のみを行う法人の選定手順</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:5px;line-height:1.6;">
<table style="width:100%;border-collapse:collapse;font-size:6.5px;">
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:2px 4px;font-weight:600;width:20px;">1</td>
<td style="padding:2px 4px;">事業区分が同種の法人を把握（業種コード基準）</td>
</tr>
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:2px 4px;font-weight:600;">2</td>
<td style="padding:2px 4px;">非関連者間取引と認められない法人を除外</td>
</tr>
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:2px 4px;font-weight:600;">3</td>
<td style="padding:2px 4px;">異なる市場で活動する法人を除外（所在国・取引段階等）</td>
</tr>
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:2px 4px;font-weight:600;">4</td>
<td style="padding:2px 4px;">事業規模が異なる法人を除外（売上・費用・資産等）</td>
</tr>
<tr>
<td style="padding:2px 4px;font-weight:600;">5</td>
<td style="padding:2px 4px;">独自の機能を果たす可能性のある法人を除外（R&amp;D費等）</td>
</tr>
</table>
</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:6.5px;color:#64748b;margin-top:6px;text-align:center;">

</div>

<!-- Section 5: Important Notes -->
<foreignObject x="20" y="790" width="300" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#dc2626;">留意事項</div>
</foreignObject>

<rect x="30" y="812" width="840" height="70" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="40" y="817" width="820" height="60">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;line-height:1.6;">
<span style="font-weight:600;color:#dc2626;">&#x26A0; 広告宣伝・原価低減等の活動:</span> ほとんどの企業が何らかの形で行っており、単にこうした活動を行っているというのみでは所得の源泉となる無形資産を形成しているとは直ちに認められない<br/>
<span style="font-weight:600;color:#dc2626;">&#x26A0; のれん・継続事業価値:</span> 個々の事案の状況に照らし、非関連者が対価を支払うか等を検討する必要がある<br/>
<span style="font-weight:600;color:#dc2626;">&#x26A0; 市場の特殊性:</span> 法人又は国外関連者により所有・支配されないものは無形資産に該当しない（OECDガイドライン第6章と同義）
</div>
</foreignObject>
