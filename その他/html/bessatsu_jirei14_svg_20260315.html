<!-- Section 3: Key Principle -->
<foreignObject x="20" y="545" width="400" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#16a34a;">判定結果</div>
</foreignObject>

<rect x="30" y="567" width="840" height="75" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="572" width="820" height="65">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7.5px;color:#334155;line-height:1.7;">
<div style="font-weight:700;color:#16a34a;">特許権は両社の研究開発の成果 → 所得の源泉</div>
<div style="margin-top:3px;">
&#x2022; 製品Aの独自の技術性能が、基本的活動のみを行う法人との比較において所得の源泉<br/>
&#x2022; ただし特許権の<span style="font-weight:600;">法的所有関係（P社・S社双方の名義）</span>のみでは貢献度を判断できない<br/>
&#x2022; <span style="font-weight:600;color:#16a34a;">形成・維持・発展のための活動・機能に着目</span>して所得への貢献の程度を勘案することが適当
</div>
</div>
</foreignObject>

<!-- Section 4: Core Insight -->
<foreignObject x="20" y="655" width="400" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#dc2626;">核心ポイント: 法的所有 vs 実質的貢献</div>
</foreignObject>

<rect x="30" y="677" width="405" height="130" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="682" width="385" height="120">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#dc2626;">法的所有だけでは判断不可</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:5px;line-height:1.6;">
本事例では特許権が両社名義で登録されているが、形成・維持・発展における貢献度には大きな差がある。<br/><br/>
<span style="font-weight:600;">法的所有関係のみならず:</span><br/>
&#x2022; 実際の役務提供の状況<br/>
&#x2022; 費用負担の状況<br/>
&#x2022; 意思決定での機能<br/>
&#x2022; リスク管理での機能<br/>
を<span style="font-weight:600;">総合的に勘案</span>する必要がある
</div>
</foreignObject>

<rect x="460" y="677" width="410" height="130" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="470" y="682" width="390" height="120">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">「意思決定」と「リスク管理」の定義</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:5px;line-height:1.6;">
<div style="font-weight:600;color:#7c3aed;margin-bottom:2px;">意思決定とは:</div>
&#x2022; 具体的開発方針の策定・指示<br/>
&#x2022; 意思決定のための情報収集等の準備業務<br/>
&#x2022; 判断の要素全般<br/><br/>
<div style="font-weight:600;color:#7c3aed;margin-bottom:2px;">リスク管理とは:</div>
&#x2022; 無形資産の形成等の活動に内在するリスクの網羅的把握<br/>
&#x2022; 継続的な進捗管理等の管理業務全般<br/>
&#x2022; リスクの一元的管理
</div>
</foreignObject>
