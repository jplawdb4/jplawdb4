<td style="padding:5px 8px;font-weight:700;width:340px;border-right:1px solid #d8b4fe;color:#1e40af;">P社（日本法人）</td>
<td style="padding:5px 8px;font-weight:700;color:#b45309;">S社（X国法人）</td>
</tr>
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:4px 8px;font-weight:600;border-right:1px solid #e9d5ff;">意思決定</td>

<td style="padding:4px 8px;"><span style="color:#dc2626;">&#x2716;</span> 決定に不関与</td>
</tr>
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:4px 8px;font-weight:600;border-right:1px solid #e9d5ff;">役務の提供（R&amp;D機能）</td>
<td style="padding:4px 8px;border-right:1px solid #e9d5ff;"><span style="color:#16a34a;font-weight:700;">&#x25CF;</span> 全ての研究開発活動を実施</td>
<td style="padding:4px 8px;"><span style="color:#dc2626;">&#x2716;</span> R&amp;D部門なし・活動なし</td>
</tr>
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:4px 8px;font-weight:600;border-right:1px solid #e9d5ff;">費用の負担</td>
<td style="padding:4px 8px;border-right:1px solid #e9d5ff;"><span style="color:#16a34a;font-weight:700;">&#x25CF;</span> 大部分を負担</td>
<td style="padding:4px 8px;"><span style="color:#b45309;">&#x25B2;</span> R&amp;D費用の<span style="font-weight:600;">一部のみ</span>負担</td>
</tr>
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:4px 8px;font-weight:600;border-right:1px solid #e9d5ff;">リスクの管理</td>
<td style="padding:4px 8px;border-right:1px solid #e9d5ff;"><span style="color:#16a34a;font-weight:700;">&#x25CF;</span> 全てP社が管理</td>
<td style="padding:4px 8px;"><span style="color:#dc2626;">&#x2716;</span> 関与なし</td>
</tr>
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:4px 8px;font-weight:600;border-right:1px solid #e9d5ff;">特許権等の保有</td>
<td style="padding:4px 8px;border-right:1px solid #e9d5ff;"><span style="color:#16a34a;font-weight:700;">&#x25CF;</span> 全て登録・保有</td>
<td style="padding:4px 8px;"><span style="color:#dc2626;">&#x2716;</span> 未保有</td>
</tr>
<tr>
<td style="padding:5px 8px;font-weight:700;border-right:1px solid #e9d5ff;color:#7c3aed;">形成・維持・発展への貢献</td>
<td style="padding:5px 8px;border-right:1px solid #e9d5ff;font-weight:700;color:#16a34a;">高い（全面的に貢献）</td>
<td style="padding:5px 8px;font-weight:700;color:#dc2626;">低い（費用負担のみ）</td>

<span style="font-weight:700;color:#16a34a;">&#x2714; P社:</span> 研究開発活動は無形資産の形成・維持・発展に貢献していると認められる<br/>
<span style="font-weight:700;color:#dc2626;">&#x2716; S社:</span> 当該無形資産の形成・維持・発展への貢献は<span style="font-weight:700;color:#dc2626;">低い</span>ものと認められる<br/>
<span style="font-size:6.5px;color:#64748b;">→ S社はR&amp;D費用の一部を負担しているが、機能（意思決定・役務提供・リスク管理）を果たしていないため</span>
</div>

<!-- Section 4: Core Rule -->
<foreignObject x="20" y="655" width="400" height="18">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;font-weight:700;color:#dc2626;">核心ポイント: 費用負担だけでは貢献にならない</div>
</foreignObject>

<rect x="30" y="677" width="405" height="150" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="40" y="682" width="385" height="140">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#dc2626;">原則: 費用負担 &#x2260; 貢献</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:5px;line-height:1.6;">
<div style="font-weight:600;margin-bottom:3px;">事務運営指針3-13の要点:</div>
所得の源泉となる見通しが高い無形資産の形成・維持・発展において、<span style="font-weight:700;color:#dc2626;">単にその費用を負担しているのみでは、貢献の程度は低いものとなる</span>。<br/><br/>
<div style="font-weight:600;">貢献度の判断に必要な4要素:</div>
<div style="margin-left:8px;">
1. 意思決定 ── R&amp;D方針の策定・指示<br/>
2. 役務の提供 ── 実際の研究開発機能<br/>
3. 費用の負担 ── 金銭的負担<br/>
4. リスクの管理 ── 進捗管理等
</div>
</div>
</foreignObject>

<rect x="460" y="677" width="410" height="150" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.2" filter="url(#sh)"/>
<foreignObject x="470" y="682" width="390" height="140">
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:8px;font-weight:700;color:#7c3aed;">残余利益分割法との関係</div>
<div xmlns="http://www.w3.org/1999/xhtml" style="font-size:7px;color:#334155;margin-top:5px;line-height:1.6;">
仮にS社が別に重要な無形資産を有しており、残余利益分割法に準ずる方法が適用される場合:<br/><br/>
<table style="width:100%;border-collapse:collapse;font-size:6.5px;">
<tr style="border-bottom:1px solid #e9d5ff;">
<td style="padding:3px 6px;font-weight:600;width:140px;">機能を伴わない費用負担</td>
<td style="padding:3px 6px;"><span style="color:#dc2626;font-weight:600;">残余利益等の分割要因とはならない</span></td>
</tr>
<tr>
<td style="padding:3px 6px;font-weight:600;">取扱い</td>
<td style="padding:3px 6px;">他の一般的な費用と同様に<span style="font-weight:600;">基本的利益の算定の中で考慮</span></td>
</tr>
</table>
<div style="font-size:6.5px;color:#64748b;margin-top:8px;">
→ 残余利益等の分割要因については【事例23】参照
</div>
</div>
</foreignObject>

</td>

</td>
