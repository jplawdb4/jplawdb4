  <text x="80" y="1535" font-size="13" fill="#2D3436" font-weight="bold">定義：会計と税務の認識タイミング差。将来解消される。</text>
  <text x="80" y="1558" font-size="12" fill="#2D3436">令9条1項1号の構造がこれを裏付ける：</text>
  <text x="80" y="1578" font-size="12" fill="#2D3436">  所得金額（イ）から法人税等（カ）を控除 ＝ 留保利益の増減</text>

  <rect x="80" y="1598" width="580" height="195" rx="8" fill="#FFF5F5"/>
  <text x="90" y="1620" font-size="12" fill="#D63031" font-weight="bold">【加算・留保の例】</text>
  <text x="90" y="1640" font-size="11" fill="#2D3436">• 減価償却超過額（法31条）：会計で費用計上済→税務で否認→将来認容</text>
  <text x="90" y="1658" font-size="11" fill="#2D3436">• 貸倒引当金超過額（法52条）：会計で繰入済→税務限度超過分否認</text>
  <text x="90" y="1676" font-size="11" fill="#2D3436">• 損金経理法人税等（法38条）：会計で費用計上→税務で損金不算入</text>
  <text x="90" y="1696" font-size="11" fill="#2D3436">• 納税充当金繰入（法38条）：未払法人税等繰入→損金不算入</text>
  <text x="90" y="1720" font-size="12" fill="#00897B" font-weight="bold">【減算・留保の例】</text>
  <text x="90" y="1740" font-size="11" fill="#2D3436">• 償却超過額の認容（法31条）：前期超過額の当期解消</text>
  <text x="90" y="1758" font-size="11" fill="#2D3436">• 欠損金控除（法57条）：繰越欠損金の当期使用</text>
  <text x="90" y="1776" font-size="11" fill="#2D3436">• 還付法人税等（法26条）：法人税等の還付→益金不算入</text>
