<!-- ======== SECTION 2: 事前確認の構造 ======== -->
<rect x="10" y="262" width="880" height="240" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="450" y="282" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed" font-family="'Noto Sans JP',sans-serif">事前確認（APA）の構造 ── 目標利益率の範囲設定</text>

<!-- 申出内容 -->
<rect x="25" y="294" width="425" height="80" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="294" width="425" height="22" rx="7" fill="#7c3aed"/>
<rect x="25" y="310" width="425" height="6" fill="#7c3aed"/>
<foreignObject x="25" y="294" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8.5px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">申出内容</div>
</foreignObject>
<foreignObject x="25" y="316" width="425" height="58">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">算定方法: Ｓ社を検証対象のTNMM</span>
    <span style="font-size:7.5px;color:#475569;">比較対象: Ｘ国企業4社（単一ｾｸﾞﾒﾝﾄ販売業者）</span>
    <span style="font-size:7.5px;color:#7c3aed;font-weight:600;">範囲: 4社の売上高営業利益率の過去5期平均で構成（全期間固定）</span>
  </div>
</foreignObject>

<!-- 審査結果 -->
<rect x="455" y="294" width="420" height="80" rx="7" fill="#fff" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="294" width="420" height="22" rx="7" fill="#16a34a"/>
<rect x="455" y="310" width="420" height="6" fill="#16a34a"/>
<foreignObject x="455" y="294" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8.5px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">審査結果</div>
</foreignObject>
<foreignObject x="455" y="316" width="420" height="58">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#16a34a;font-weight:600;">TNMM＋比較対象取引は妥当</span>
    <span style="font-size:7.5px;color:#475569;">4社の比較可能性を確認（単一セグメント・販売機能等）</span>
    <span style="font-size:7.5px;color:#b45309;font-weight:600;">ただし需要サイクルの影響を範囲設定に反映すべき</span>
  </div>
</foreignObject>

<!-- 目標利益率の範囲 模式図 -->
<rect x="25" y="384" width="850" height="110" rx="7" fill="#fff" stroke="#c4b5fd" stroke-width="1"/>

<text x="450" y="400" text-anchor="middle" font-size="9" font-weight="700" fill="#7c3aed" font-family="'Noto Sans JP',sans-serif">目標利益率の範囲（模式図）── 2つの設定方法</text>

<!-- 方法1: ローリング更新 -->
<rect x="40" y="410" width="390" height="72" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
<foreignObject x="40" y="410" width="390" height="72">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:8px;font-weight:700;color:#16a34a;">方法1: ローリング更新方式</span>
    <span style="font-size:7px;color:#475569;">各確認対象事業年度で直近期間のﾃﾞｰﾀに更新</span>
    <span style="font-size:7px;color:#16a34a;font-weight:600;">利点: 市況変動を反映 ／ 期間対応が可能</span>
    <span style="font-size:7px;color:#dc2626;">注意: ﾃﾞｰﾀ公開時期まで確定しない、比較企業消滅リスク</span>
  </div>
</foreignObject>

<!-- 方法2: 固定方式 -->
<rect x="450" y="410" width="410" height="72" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5"/>
<foreignObject x="450" y="410" width="410" height="72">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:8px;font-weight:700;color:#1e40af;">方法2: 固定方式（本事例）</span>
    <span style="font-size:7px;color:#475569;">過去の一定期間の平均値で範囲を設定し全期間固定</span>
    <span style="font-size:7px;color:#1e40af;font-weight:600;">利点: あらかじめ範囲が確定（予測可能性の確保）</span>
    <span style="font-size:7px;color:#b45309;">注意: 業況変動があまり大きくない場合に一般的</span>
  </div>
</foreignObject>

<!-- ======== SECTION 3: レンジとポイントの違い ======== -->
<rect x="10" y="512" width="880" height="180" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
<text x="450" y="532" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e" font-family="'Noto Sans JP',sans-serif">事前確認のレンジ vs 調査のポイント ── 本質的な違い</text>

<!-- 事前確認レンジ -->
<rect x="25" y="544" width="420" height="70" rx="7" fill="#fff" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="544" width="420" height="22" rx="7" fill="#16a34a"/>
<rect x="25" y="560" width="420" height="6" fill="#16a34a"/>
<foreignObject x="25" y="544" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8.5px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">事前確認: 一定の範囲（レンジ）</div>
</foreignObject>
<foreignObject x="25" y="566" width="420" height="48">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">将来の取引から生ずる利益を予測するもの</span>
    <span style="font-size:7.5px;color:#16a34a;font-weight:600;">→ 予測可能性確保のため「範囲」で確認が可能</span>
  </div>
</foreignObject>

<!-- 調査ポイント -->
<rect x="455" y="544" width="420" height="70" rx="7" fill="#fff" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="544" width="420" height="22" rx="7" fill="#dc2626"/>
<rect x="455" y="560" width="420" height="6" fill="#dc2626"/>
<foreignObject x="455" y="544" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8.5px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">調査: 特定のポイント</div>
</foreignObject>
<foreignObject x="455" y="566" width="420" height="48">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">過去の事業年度の所得金額を決定するもの</span>
    <span style="font-size:7.5px;color:#dc2626;font-weight:600;">→ 特定のポイントを用いて課税</span>
  </div>
</foreignObject>

<!-- 注記 -->
<rect x="25" y="622" width="850" height="58" rx="7" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
<foreignObject x="25" y="622" width="850" height="58">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 14px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:8px;font-weight:700;color:#0f172a;">レンジの種類</span>
    <span style="font-size:7px;color:#475569;">四分位法によるレンジのほか、比較対象取引の全てから構成されるレンジの使用が適当と認められる場合もある</span>
    <span style="font-size:7px;color:#475569;">相互協議を伴わない場合: 検証対象に応じ範囲の上限又は下限のみで確認</span>
  </div>
</foreignObject>

<!-- ======== SECTION 4: 核心ポイント ======== -->
<rect x="10" y="702" width="880" height="250" rx="10" fill="#f0f5ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="450" y="722" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af" font-family="'Noto Sans JP',sans-serif">事例30の核心 ── 事前確認の要点</text>

<!-- 核心カード1 -->
<rect x="25" y="734" width="425" height="72" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="734" width="425" height="22" rx="7" fill="#7c3aed"/>
<rect x="25" y="750" width="425" height="6" fill="#7c3aed"/>
<foreignObject x="25" y="734" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">1. 事前確認は予測可能性を確保する制度</div>
</foreignObject>
<foreignObject x="25" y="756" width="425" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">昭和62年に世界に先駆けて導入。</span>
    <span style="font-size:7.5px;color:#7c3aed;font-weight:600;">将来年度の利益を予測するため、ポイントではなくレンジで確認可能。</span>
  </div>
</foreignObject>

<!-- 核心カード2 -->
<rect x="455" y="734" width="420" height="72" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="734" width="420" height="22" rx="7" fill="#1e40af"/>
<rect x="455" y="750" width="420" height="6" fill="#1e40af"/>
<foreignObject x="455" y="734" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">2. 需要サイクルをレンジ設定に反映</div>
</foreignObject>
<foreignObject x="455" y="756" width="420" height="50">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:7.5px;color:#475569;">変動の大きなサイクルがある業界では、</span>
    <span style="font-size:7.5px;color:#1e40af;font-weight:600;">サイクルの影響を目標利益率の範囲設定に反映させる。</span>
  </div>
</foreignObject>

<!-- 核心カード3 -->
<rect x="25" y="812" width="425" height="72" rx="7" fill="#fff" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="812" width="425" height="22" rx="7" fill="#16a34a"/>
