<!-- 分割要因の選定理由 -->
<rect x="25" y="520" width="850" height="80" rx="7" fill="#fff" stroke="#475569" stroke-width="1" filter="url(#sh)"/>
<foreignObject x="25" y="520" width="850" height="80">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:6px 14px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:4px;">
    <span style="font-size:8.5px;font-weight:700;color:#0f172a;">なぜ「単年度の支出費用」を分割要因とできるか</span>
    <span style="font-size:7.5px;color:#475569;">1. 個々の特許権・ﾉｳﾊｳの形成費用の個別管理が行われていない</span>
    <span style="font-size:7.5px;color:#475569;">2. 無形資産の形成活動に係る支出費用が毎期おおむね一定している</span>
    <span style="font-size:7px;color:#dc2626;font-weight:600;">→ 単年度ごとの費用額で残余利益等を分割することが妥当と認められる</span>
  </div>
</foreignObject>

    <span style="font-size:7px;color:#475569;">ii ブランド・商標・販売網等: 広告宣伝部門・販売促進部門・ﾏｰｹﾃｨﾝｸﾞ部門の関係費用等</span>
    <span style="font-size:7px;color:#475569;">iii 事業判断・リスク管理等: 企画部門・業務部門・財務部門・営業部門等の関係費用等</span>
  </div>
</foreignObject>

<text x="450" y="726" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af" font-family="'Noto Sans JP',sans-serif">事例23の核心 ── 4つのポイント</text>

<!-- 核心カード（2x2） -->
<rect x="25" y="738" width="425" height="112" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="738" width="425" height="22" rx="7" fill="#1e40af"/>
<rect x="25" y="754" width="425" height="6" fill="#1e40af"/>
<foreignObject x="25" y="738" width="425" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">1. 絶対額不要 ── 相対的な価値の割合で足りる</div>
</foreignObject>
<foreignObject x="25" y="760" width="425" height="90">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:7.5px;color:#475569;">無形資産の価値の絶対額を求める必要はない。</span>
    <span style="font-size:7px;color:#1e40af;font-weight:600;">相対比で按分できれば残余利益分割法は適用可能。</span>
    <span style="font-size:7px;color:#94a3b8;">分割要因の額が残余利益より少額でも問題ない（解説注）。</span>
  </div>
</foreignObject>

<rect x="455" y="738" width="420" height="112" rx="7" fill="#fff" stroke="#b45309" stroke-width="1.5" filter="url(#sh)"/>
<rect x="455" y="738" width="420" height="22" rx="7" fill="#b45309"/>
<rect x="455" y="754" width="420" height="6" fill="#b45309"/>
<foreignObject x="455" y="738" width="420" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">2. 取得原価 vs 各期費用 ── 使い分けの視点</div>
</foreignObject>
<foreignObject x="455" y="760" width="420" height="90">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:7.5px;color:#475569;">取得原価: 個別特定が困難、耐用年数の見積りも必要。</span>
    <span style="font-size:7px;color:#b45309;font-weight:600;">各期費用: 安定した支出なら単年度費用で足りる。</span>
    <span style="font-size:7px;color:#94a3b8;">大きな変動がある場合は合理的期間の平均値を使用。</span>
  </div>
</foreignObject>

<rect x="25" y="858" width="425" height="112" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="858" width="425" height="22" rx="7" fill="#7c3aed"/>
