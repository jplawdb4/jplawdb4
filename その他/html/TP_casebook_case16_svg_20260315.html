    <span style="font-size:8px;color:#475569;">・P社の無形資産を「媒介」する機能を果たしていない</span>

<text x="440" y="498" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e3a5f" font-family="'Noto Sans JP',sans-serif">判定の3段階ロジック</text>

<!-- Step 1 -->
<rect x="40" y="512" width="260" height="70" rx="8" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#c16_shadow)"/>
<rect x="40" y="512" width="260" height="24" rx="8" fill="#1e40af"/>

<foreignObject x="40" y="512" width="260" height="26">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">
    ① 出向者は何を「持って」いるか
  </div>
</foreignObject>
<foreignObject x="40" y="538" width="260" height="44">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:8px;color:#475569;">親会社で形成された高度な知識・経験・</span>
    <span style="font-size:8px;color:#475569;">ノウハウを体現しているか</span>
  </div>
</foreignObject>

<!-- Arrow 1→2 -->
<line x1="300" y1="547" x2="308" y2="547" stroke="#1e40af" stroke-width="2"/>
<polygon points="308,543 318,547 308,551" fill="#1e40af"/>

<!-- Step 2 -->
<rect x="320" y="512" width="260" height="70" rx="8" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#c16_shadow)"/>
<rect x="320" y="512" width="260" height="24" rx="8" fill="#1e40af"/>
<rect x="320" y="530" width="260" height="6" fill="#1e40af"/>
<foreignObject x="320" y="512" width="260" height="26">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">
    ② それがS社に「供与」されたか
  </div>
</foreignObject>
<foreignObject x="320" y="538" width="260" height="44">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:8px;color:#475569;">出向者を「介して」親会社の無形資産が</span>
    <span style="font-size:8px;color:#475569;">子会社の業務に実質的に使用されているか</span>
  </div>
</foreignObject>

<!-- Arrow 2→3 -->
<line x1="580" y1="547" x2="588" y2="547" stroke="#1e40af" stroke-width="2"/>
<polygon points="588,543 598,547 588,551" fill="#1e40af"/>

<!-- Step 3 -->
<rect x="600" y="512" width="240" height="70" rx="8" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#c16_shadow)"/>
<rect x="600" y="512" width="240" height="24" rx="8" fill="#1e40af"/>
<rect x="600" y="530" width="240" height="6" fill="#1e40af"/>
<foreignObject x="600" y="512" width="240" height="26">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">
    ③ 所得の源泉になっているか
  </div>
</foreignObject>
<foreignObject x="600" y="538" width="240" height="44">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:8px;color:#475569;">基本的活動のみ行う法人との比較で</span>
    <span style="font-size:8px;color:#475569;">超過利益の源泉になっているか</span>
  </div>
</foreignObject>

<!-- 判定結果：2段 -->
<!-- 製造技術→YES flow -->
<rect x="40" y="600" width="395" height="55" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#c16_shadow)"/>
<foreignObject x="40" y="600" width="395" height="55">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:6px 12px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:9px;font-weight:700;color:#16a34a;">製造技術担当：① ✓ → ② ✓ → ③ ✓ → 供与認定</span>
    <span style="font-size:8px;color:#475569;">高度技術者が、ノウハウを使い、低製造原価を実現（＝所得の源泉）</span>
    <span style="font-size:7.5px;color:#16a34a;font-weight:600;">→ 貢献はP社側にある → 適正対価の設定が必要</span>
  </div>
</foreignObject>

<!-- 営業企画→NO flow -->
<rect x="445" y="600" width="395" height="55" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" filter="url(#c16_shadow)"/>
<foreignObject x="445" y="600" width="395" height="55">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:6px 12px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:3px;">
    <span style="font-size:9px;font-weight:700;color:#dc2626;">営業企画担当：① ✗ → 判定終了 → 供与否認</span>
    <span style="font-size:8px;color:#475569;">高度な知識を有しておらず、現地社員の指示下で定型業務</span>
    <span style="font-size:7.5px;color:#dc2626;font-weight:600;">→ P社の無形資産の供与はないと認められる</span>
  </div>
</foreignObject>

<!-- ============================================================ -->
<!-- SECTION 4: 核心ポイント（本質） -->
<!-- ============================================================ -->
<text x="440" y="688" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1e3a5f" font-family="'Noto Sans JP',sans-serif">事例16の本質 ── 4つの核心</text>

<!-- Core box -->
<rect x="40" y="700" width="800" height="220" rx="8" fill="#f0f5ff" stroke="#1e40af" stroke-width="1.5" filter="url(#c16_shadow2)"/>
<foreignObject x="40" y="700" width="800" height="220">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:flex-start;height:100%;padding:14px 20px;font-family:'Noto Sans JP',sans-serif;gap:10px;">
    <div style="display:flex;gap:8px;align-items:flex-start;">
      <span style="font-size:9px;font-weight:800;color:#1e40af;white-space:nowrap;min-width:16px;">1.</span>
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span style="font-size:9px;font-weight:700;color:#1e40af;">「出向」の有無ではなく「何を介して供与しているか」が判断基準</span>
        <span style="font-size:8px;color:#475569;">同じ10名の出向でも、製造技術5名は供与あり、営業企画5名は供与なし。出向という形式ではなく、出向者が体現する無形資産の有無と、それが子会社の所得に寄与しているかが決定的。</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:flex-start;">
      <span style="font-size:9px;font-weight:800;color:#1e40af;white-space:nowrap;min-width:16px;">2.</span>
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span style="font-size:9px;font-weight:700;color:#1e40af;">出向者は親会社の「無形資産パイプライン」として機能する</span>
        <span style="font-size:8px;color:#475569;">出向者がP社と頻繁に連絡→資料提供依頼・アドバイス受領。これは出向者個人の能力ではなく、P社の技術開発部門という組織全体の知見がS社に流れ込む「パイプライン」。出向者の交代があっても構造は維持される。</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:flex-start;">
      <span style="font-size:9px;font-weight:800;color:#1e40af;white-space:nowrap;min-width:16px;">3.</span>
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span style="font-size:9px;font-weight:700;color:#1e40af;">「基本的活動のみ行う法人」との比較が判定基準</span>
        <span style="font-size:8px;color:#475569;">S社が単純な製造・販売だけ行う法人と比較して、P社ノウハウによる低製造原価→超過利益が生じている。この差分が「所得の源泉」。営業企画出向者には、この比較で差分を生む要素がない。</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:flex-start;">
      <span style="font-size:9px;font-weight:800;color:#1e40af;white-space:nowrap;min-width:16px;">4.</span>
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span style="font-size:9px;font-weight:700;color:#1e40af;">出向コスト負担 ≠ 無形資産の対価</span>
        <span style="font-size:8px;color:#475569;">出向者の人件費（給与較差補填等）をS社が負担していても、それは労務の対価にすぎない。P社の製造ノウハウという無形資産の使用対価は別途設定が必要（ロイヤルティ、テクニカルフィー等）。</span>
      </div>
    </div>
  </div>
</foreignObject>

<!-- ============================================================ -->
<!-- SECTION 5: 実務上の示唆 -->
<!-- ============================================================ -->
