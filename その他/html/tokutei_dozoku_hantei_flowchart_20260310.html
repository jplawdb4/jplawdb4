<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特定同族会社の判定フロー（法人税法第67条）</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; display: flex; justify-content: center; padding: 24px 12px; min-height: 100vh; }
  .card { background: #fff; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 1020px; width: 100%; overflow: hidden; }
  svg { display: block; width: 100%; height: auto; }
  @media print {
    body { background: #fff; padding: 0; }
    .card { box-shadow: none; border-radius: 0; max-width: 100%; }
  }
</style>
</head>
<body>
<div class="card">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1130" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
  <defs>
    <marker id="ad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9z" fill="#94a3b8"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9z" fill="#ef4444"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9z" fill="#059669"/></marker>
  </defs>

  <!-- ===== タイトル ===== -->
  <text x="480" y="30" text-anchor="middle" font-size="21" font-weight="bold" fill="#1e293b" letter-spacing="1">特定同族会社の判定フロー</text>
  <text x="480" y="52" text-anchor="middle" font-size="12" fill="#64748b">法人税法第67条・同施行令第139条の7</text>
  <line x1="300" y1="64" x2="660" y2="64" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ===== 起点ボックス ===== -->
  <rect x="280" y="80" width="360" height="36" rx="6" fill="#1e3a5f"/>
  <text x="460" y="103" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">対象会社（内国法人である会社）</text>

  <!-- 矢印: 起点→Q1 -->
  <line x1="460" y1="116" x2="460" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ad)"/>

  <!-- ===== STEP 1: 被支配会社の判定 ===== -->
  <g>
    <rect x="248" y="154" width="414" height="82" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="248" y="154" width="5" height="82" rx="2" fill="#2563eb"/>
    <!-- ステップ番号 -->
    <circle cx="270" cy="172" r="11" fill="#2563eb"/>
    <text x="270" y="176" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">1</text>
    <!-- タイトル -->
    <text x="288" y="176" font-size="13.5" font-weight="bold" fill="#1e293b">被支配会社の判定</text>
    <text x="416" y="176" font-size="10.5" fill="#94a3b8">（法67②、令139の7）</text>
    <line x1="260" y1="184" x2="650" y2="184" stroke="#f1f5f9" stroke-width="1"/>
    <!-- 説明文 -->
    <text x="266" y="202" font-size="12.5" fill="#334155">株主等の<tspan font-weight="bold" fill="#1e40af">1人</tspan>＋特殊関係者（親族・内縁・使用人等）の</text>
    <text x="266" y="220" font-size="12.5" fill="#334155">保有する株式が発行済株式総数の<tspan font-weight="bold" fill="#dc2626">50%超</tspan>か？</text>
  </g>

  <!-- 左側パネル: 同族会社との比較 -->
  <g>
    <rect x="12" y="154" width="218" height="82" rx="7" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="22" y="173" font-size="11.5" font-weight="bold" fill="#1e40af">【参考】同族会社との比較</text>
    <line x1="22" y1="180" x2="218" y2="180" stroke="#bfdbfe" stroke-width="0.8"/>
    <text x="22" y="196" font-size="11" fill="#475569">同族会社（法2⑩）:</text>
    <text x="130" y="196" font-size="11" font-weight="bold" fill="#475569">3人以下</text>
    <text x="175" y="196" font-size="11" fill="#475569">で50%超</text>
    <text x="22" y="214" font-size="11" fill="#1e40af">被支配会社（法67②）:</text>
    <text x="149" y="214" font-size="11" font-weight="bold" fill="#dc2626">1人</text>
    <text x="166" y="214" font-size="11" fill="#1e40af">で50%超</text>
    <text x="22" y="230" font-size="10" fill="#94a3b8">→ より厳格な支配基準</text>
  </g>
  <!-- 接続破線 -->
  <line x1="230" y1="195" x2="248" y2="195" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Q1→非該当 (右へ) -->
  <line x1="662" y1="200" x2="706" y2="200" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="676" y="193" font-size="10" font-weight="bold" fill="#ef4444">非該当</text>
  <rect x="712" y="186" width="170" height="30" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="797" y="202" text-anchor="middle" font-size="11" fill="#dc2626">被支配会社でない</text>
  <text x="797" y="213" text-anchor="middle" font-size="9.5" fill="#f87171">→ 留保金課税の適用なし</text>

  <!-- Q1→Q2 (下へ) -->
  <line x1="460" y1="236" x2="460" y2="274" stroke="#059669" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="448" y="260" font-size="10" font-weight="bold" fill="#059669" text-anchor="end">該当</text>

  <!-- ===== STEP 2: 法人除外テスト ===== -->
  <g>
    <rect x="248" y="278" width="414" height="82" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="248" y="278" width="5" height="82" rx="2" fill="#2563eb"/>
    <circle cx="270" cy="296" r="11" fill="#2563eb"/>
    <text x="270" y="300" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">2</text>
    <text x="288" y="300" font-size="13.5" font-weight="bold" fill="#1e293b">法人除外テスト</text>
    <text x="398" y="300" font-size="10.5" fill="#94a3b8">（法67①本文）</text>
    <line x1="260" y1="308" x2="650" y2="308" stroke="#f1f5f9" stroke-width="1"/>
    <text x="266" y="326" font-size="12.5" fill="#334155">判定基礎の株主から「<tspan font-weight="bold" fill="#1e40af">被支配会社でない法人</tspan>」を除外</text>
    <text x="266" y="344" font-size="12.5" fill="#334155">→ 残りの株主グループだけで<tspan font-weight="bold" fill="#dc2626">50%超を維持</tspan>するか？</text>
  </g>

  <!-- Q2→非該当 -->
  <line x1="662" y1="324" x2="706" y2="324" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="676" y="317" font-size="10" font-weight="bold" fill="#ef4444">不合格</text>
  <rect x="712" y="310" width="170" height="30" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="797" y="326" text-anchor="middle" font-size="11" fill="#dc2626">法人除外テスト不合格</text>
  <text x="797" y="337" text-anchor="middle" font-size="9.5" fill="#f87171">→ 留保金課税の適用なし</text>

  <!-- Q2→Q3 -->
  <line x1="460" y1="360" x2="460" y2="398" stroke="#059669" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="448" y="384" font-size="10" font-weight="bold" fill="#059669" text-anchor="end">合格</text>

  <!-- ===== STEP 3: 資本金による適用制限 ===== -->
  <g>
    <rect x="248" y="402" width="414" height="120" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="248" y="402" width="5" height="120" rx="2" fill="#2563eb"/>
    <circle cx="270" cy="420" r="11" fill="#2563eb"/>
    <text x="270" y="424" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">3</text>
    <text x="288" y="424" font-size="13.5" font-weight="bold" fill="#1e293b">資本金による適用制限</text>
    <text x="446" y="424" font-size="10.5" fill="#94a3b8">（法67①括弧書き）</text>
    <line x1="260" y1="432" x2="650" y2="432" stroke="#f1f5f9" stroke-width="1"/>
    <text x="266" y="450" font-size="12.5" fill="#334155">● 資本金 ＞ 1億円 → <tspan fill="#059669" font-weight="bold">制限なし</tspan>（自動通過）</text>
    <text x="266" y="468" font-size="12.5" fill="#334155">● 資本金 ≤ 1億円 → 以下のいずれかに該当が必要:</text>
    <text x="282" y="486" font-size="12" fill="#475569">・大法人の完全子法人等（法66⑤二・三）</text>
    <text x="282" y="502" font-size="12" fill="#475569">・投資法人（同四）/ 特定目的会社（同五）</text>
    <text x="282" y="518" font-size="12" fill="#475569">・大通算法人（法66⑥）</text>
  </g>

  <!-- Q3→非該当 -->
  <line x1="662" y1="468" x2="706" y2="468" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="676" y="461" font-size="10" font-weight="bold" fill="#ef4444">非該当</text>
  <rect x="712" y="454" width="170" height="30" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="797" y="470" text-anchor="middle" font-size="11" fill="#dc2626">独立中小法人は対象外</text>
  <text x="797" y="481" text-anchor="middle" font-size="9.5" fill="#f87171">→ 留保金課税の適用なし</text>

  <!-- Q3→Q4 -->
  <line x1="460" y1="522" x2="460" y2="558" stroke="#059669" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="448" y="544" font-size="10" font-weight="bold" fill="#059669" text-anchor="end">通過</text>

  <!-- ===== STEP 4: 清算中でないこと ===== -->
  <g>
    <rect x="248" y="562" width="414" height="62" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="248" y="562" width="5" height="62" rx="2" fill="#2563eb"/>
    <circle cx="270" cy="580" r="11" fill="#2563eb"/>
    <text x="270" y="584" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">4</text>
    <text x="288" y="584" font-size="13.5" font-weight="bold" fill="#1e293b">清算中でないこと</text>
    <text x="418" y="584" font-size="10.5" fill="#94a3b8">（法67①末尾）</text>
    <line x1="260" y1="592" x2="650" y2="592" stroke="#f1f5f9" stroke-width="1"/>
    <text x="266" y="610" font-size="12.5" fill="#334155">事業年度終了の時の現況で清算中でないか？（法67⑧）</text>
  </g>

  <!-- Q4→非該当 -->
  <line x1="662" y1="593" x2="706" y2="593" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="676" y="586" font-size="10" font-weight="bold" fill="#ef4444">清算中</text>
  <rect x="712" y="579" width="170" height="30" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="797" y="595" text-anchor="middle" font-size="11" fill="#dc2626">清算中は除外</text>
  <text x="797" y="606" text-anchor="middle" font-size="9.5" fill="#f87171">→ 留保金課税の適用なし</text>

  <!-- Q4→結果 -->
  <line x1="460" y1="624" x2="460" y2="660" stroke="#059669" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="448" y="648" font-size="10" font-weight="bold" fill="#059669" text-anchor="end">非清算</text>

  <!-- ===== 判定結果 ===== -->
  <rect x="290" y="664" width="340" height="42" rx="8" fill="#065f46"/>
  <rect x="290" y="664" width="340" height="42" rx="8" fill="none" stroke="#059669" stroke-width="1.5"/>
  <text x="460" y="690" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">特定同族会社に該当</text>

  <!-- 結果→留保金課税 -->
  <line x1="460" y1="706" x2="460" y2="740" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ad)"/>

  <!-- ===== 留保金課税パネル ===== -->
  <rect x="80" y="744" width="800" height="350" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- パネルタイトル -->
  <text x="480" y="772" text-anchor="middle" font-size="16" font-weight="bold" fill="#92400e">留保金課税の適用（法67①）</text>
  <text x="480" y="792" text-anchor="middle" font-size="12" fill="#a16207">留保金額 ＞ 留保控除額 → 超過部分に追加課税</text>
  <line x1="110" y1="802" x2="850" y2="802" stroke="#fcd34d" stroke-width="1"/>

  <!-- 左カラム: 留保控除額 -->
  <rect x="100" y="814" width="370" height="150" rx="8" fill="#fff" stroke="#fde68a" stroke-width="1"/>
  <text x="285" y="837" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">留保控除額（法67⑤）</text>
  <text x="285" y="853" text-anchor="middle" font-size="10.5" fill="#a16207">以下のうち最も多い金額</text>
  <line x1="115" y1="862" x2="455" y2="862" stroke="#fef3c7" stroke-width="1"/>
  <text x="120" y="882" font-size="12.5" fill="#334155"><tspan font-weight="bold" fill="#92400e">①</tspan> 所得等の金額 × 40%</text>
  <text x="120" y="902" font-size="12.5" fill="#334155"><tspan font-weight="bold" fill="#92400e">②</tspan> 年2,000万円</text>
  <text x="120" y="922" font-size="12.5" fill="#334155"><tspan font-weight="bold" fill="#92400e">③</tspan> 資本金 × 25% − 利益積立金額</text>
  <text x="135" y="938" font-size="10.5" fill="#94a3b8">（利益積立金額が25%基準に不足する場合）</text>
  <text x="120" y="956" font-size="10.5" fill="#94a3b8">※ 1年未満の事業年度は月数按分（法67⑥⑦）</text>

  <!-- 右カラム: 追加税率 -->
  <rect x="490" y="814" width="370" height="150" rx="8" fill="#fff" stroke="#fde68a" stroke-width="1"/>
  <text x="675" y="837" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">追加税率（法67①各号）</text>
  <text x="675" y="853" text-anchor="middle" font-size="10.5" fill="#a16207">超過留保金額を区分して適用</text>
  <line x1="505" y1="862" x2="845" y2="862" stroke="#fef3c7" stroke-width="1"/>

  <!-- 税率テーブル -->
  <rect x="510" y="872" width="330" height="30" rx="4" fill="#fef3c7"/>
  <text x="522" y="892" font-size="12" fill="#334155">年 3,000万円以下</text>
  <text x="820" y="892" text-anchor="end" font-size="14" font-weight="bold" fill="#b45309">10%</text>

  <rect x="510" y="906" width="330" height="30" rx="4" fill="#fff"/>
  <text x="522" y="926" font-size="12" fill="#334155">年 3,000万円超 〜 1億円以下</text>
  <text x="820" y="926" text-anchor="end" font-size="14" font-weight="bold" fill="#b45309">15%</text>

  <rect x="510" y="940" width="330" height="30" rx="4" fill="#fef3c7"/>
  <text x="522" y="960" font-size="12" fill="#334155">年 1億円超</text>
  <text x="820" y="960" text-anchor="end" font-size="14" font-weight="bold" fill="#b45309">20%</text>

  <!-- パネル下部: 補足事項 -->
  <line x1="110" y1="978" x2="850" y2="978" stroke="#fcd34d" stroke-width="1"/>
  <text x="120" y="998" font-size="11" fill="#78350f">● 判定時期: 事業年度終了の時の現況による（法67⑧）</text>
  <text x="120" y="1016" font-size="11" fill="#78350f">● 特殊関係個人: 親族、内縁配偶者、使用人、生計維持者、これらと生計一の親族（令139の7①）</text>
  <text x="120" y="1034" font-size="11" fill="#78350f">● 特殊関係法人: 株主等の1人が支配する法人（持株50%超・議決権50%超等で連鎖判定）（令139の7②③）</text>
  <text x="120" y="1052" font-size="11" fill="#78350f">● 議決権の同意行使みなし規定あり（令139の7⑥）</text>
  <text x="120" y="1070" font-size="11" fill="#78350f">● 留保金額 = 所得等の金額のうち留保した金額 − 法人税・地方法人税・住民税の額（法67③）</text>
  <text x="120" y="1088" font-size="11" fill="#78350f">● 期末配当等がある場合は事業年度間で加減算調整（法67④）</text>

  <!-- フッター -->
  <text x="480" y="1118" text-anchor="middle" font-size="9.5" fill="#94a3b8">法人税法第67条の条文構造に基づく判定フロー</text>
</svg>
</div>
</body>
</html>
