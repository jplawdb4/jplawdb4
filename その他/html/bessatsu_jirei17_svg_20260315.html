    <span style="font-size:6.5px;color:#93c5fd;">独自技術＝残余利益の源泉</span>
  </div>
</foreignObject>

<line x1="640" y1="488" x2="688" y2="488" stroke="#1e40af" stroke-width="2" marker-end="url(#arrowBlue)"/>

<rect x="695" y="468" width="140" height="40" rx="6" fill="#7c3aed"/>
<foreignObject x="695" y="468" width="140" height="40">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;font-family:'Noto Sans JP',sans-serif;text-align:center;">
    <span style="font-size:9px;font-weight:700;color:#fff;">ＳＺ社</span>
    <span style="font-size:6.5px;color:#e9d5ff;">販売面で独自寄与</span>
  </div>
</foreignObject>

<!-- 分離理由 -->
<rect x="475" y="516" width="385" height="105" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
<foreignObject x="475" y="516" width="385" height="105">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:flex-start;height:100%;padding:6px 14px;font-family:'Noto Sans JP',sans-serif;gap:4px;">
    <span style="font-size:8px;font-weight:700;color:#1e293b;">残余利益分割法に準ずる方法（2社対象）</span>
    <span style="font-size:7px;color:#475569;">1. 製品Ｂは形状・用途・販路が製品Ａと相違</span>
    <span style="font-size:7px;color:#475569;">2. 製品Ａの連鎖取引とは別個に検討する必要</span>
    <span style="font-size:7px;color:#475569;">3. Ｐ社: 独自技術 → 残余利益の配分あり</span>
    <span style="font-size:7px;color:#475569;">4. ＳＺ社: 販売面の無形資産 → 残余利益の配分あり</span>
    <span style="font-size:6.5px;color:#94a3b8;">一つの製品に係る一連の取引かどうかで分割範囲を判断</span>
  </div>
</foreignObject>

<!-- ======== SECTION 3: 判定のポイント ======== -->
<rect x="10" y="660" width="880" height="200" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
<text x="450" y="680" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e" font-family="'Noto Sans JP',sans-serif">連鎖取引の適用範囲を決める判定フロー</text>

<!-- ステップ1 -->
<rect x="25" y="692" width="270" height="56" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="692" width="270" height="22" rx="7" fill="#1e40af"/>
<rect x="25" y="708" width="270" height="6" fill="#1e40af"/>
<foreignObject x="25" y="692" width="270" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8.5px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">Step 1: 一つの製品に係る一連の取引か</div>
</foreignObject>
<foreignObject x="25" y="714" width="270" height="34">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;padding:2px 8px;font-family:'Noto Sans JP',sans-serif;text-align:center;">
    <span style="font-size:7px;color:#475569;">同一製品の製造に係る連鎖取引 → 一体検討。異なる製品（Ａ≠Ｂ）→ 別個に検討</span>
  </div>
</foreignObject>

<line x1="295" y1="720" x2="313" y2="720" stroke="#1e40af" stroke-width="2" marker-end="url(#arrowBlue)"/>

<!-- ステップ2 -->
<rect x="320" y="692" width="270" height="56" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="320" y="692" width="270" height="22" rx="7" fill="#1e40af"/>
<rect x="320" y="708" width="270" height="6" fill="#1e40af"/>
<foreignObject x="320" y="692" width="270" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8.5px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">Step 2: 関連者間取引は独立企業間価格か</div>
</foreignObject>
<foreignObject x="320" y="714" width="270" height="34">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;padding:2px 8px;font-family:'Noto Sans JP',sans-serif;text-align:center;">
    <span style="font-size:7px;color:#475569;">独立企業間価格でないと分割対象利益等の計算に影響 → 範囲に含める</span>
  </div>
</foreignObject>

<line x1="590" y1="720" x2="608" y2="720" stroke="#1e40af" stroke-width="2" marker-end="url(#arrowBlue)"/>

<!-- ステップ3 -->
<rect x="615" y="692" width="260" height="56" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="615" y="692" width="260" height="22" rx="7" fill="#1e40af"/>
<rect x="615" y="708" width="260" height="6" fill="#1e40af"/>
<foreignObject x="615" y="692" width="260" height="22">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:8.5px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">Step 3: 各者に独自の価値ある寄与は？</div>
</foreignObject>
<foreignObject x="615" y="714" width="260" height="34">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;padding:2px 8px;font-family:'Noto Sans JP',sans-serif;text-align:center;">
    <span style="font-size:7px;color:#475569;">寄与あり→残余利益配分。寄与なし→基本的利益のみ</span>
  </div>
</foreignObject>

<!-- 結論ボックス -->
<rect x="25" y="760" width="850" height="86" rx="7" fill="#fff" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
<foreignObject x="25" y="760" width="850" height="86">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:flex-start;height:100%;padding:8px 18px;font-family:'Noto Sans JP',sans-serif;gap:4px;">
    <span style="font-size:8.5px;font-weight:700;color:#16a34a;">本事例での結論</span>
    <span style="font-size:7.5px;color:#1e293b;"><b>製品Ａ:</b> P社・SX社・SY社の3社を対象 → SY社は基本的利益のみ（独自寄与なし）</span>
    <span style="font-size:7.5px;color:#1e293b;"><b>製品Ｂ:</b> P社・SZ社の2社を対象 → 両社とも残余利益の配分あり</span>
    <span style="font-size:7px;color:#64748b;">製品Ａ≠製品Ｂ（形状・用途・販路が相違）→ 別個のグループとして分割法を適用</span>
  </div>
</foreignObject>

<!-- ======== SECTION 4: 核心ポイント ======== -->
<rect x="10" y="875" width="880" height="130" rx="10" fill="#f0f5ff" stroke="#93c5fd" stroke-width="1.5"/>
<text x="450" y="895" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af" font-family="'Noto Sans JP',sans-serif">核心ポイント</text>

<rect x="25" y="906" width="425" height="44" rx="6" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<foreignObject x="25" y="906" width="425" height="44">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:8px;font-weight:700;color:#1e40af;">連鎖取引は「製品単位」で範囲を決定</span>
    <span style="font-size:7px;color:#475569;">同一製品の連鎖→一体検討、異製品→別グループ</span>
  </div>
</foreignObject>

<rect x="455" y="906" width="420" height="44" rx="6" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<foreignObject x="455" y="906" width="420" height="44">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:8px;font-weight:700;color:#1e40af;">独自寄与のない者にも基本的利益は配分</span>
    <span style="font-size:7px;color:#475569;">SY社：範囲に含まれるが残余利益の配分は受けない</span>
  </div>
</foreignObject>

<rect x="25" y="956" width="850" height="36" rx="6" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
<foreignObject x="25" y="956" width="850" height="36">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:3px 10px;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">
    <span style="font-size:8px;font-weight:700;color:#7c3aed;">原則: 非関連者間取引に挟まれる関連取引全体を検討対象にする</span>
    <span style="font-size:7px;color:#475569;">例外（事例18）: TP上問題ない関連者間取引や少額取引は除外可能</span>
  </div>
</foreignObject>
