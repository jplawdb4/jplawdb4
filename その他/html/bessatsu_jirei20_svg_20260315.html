</foreignObject>

<!-- After: P社 -->
<rect x="475" y="100" width="185" height="52" rx="7" fill="#1e40af" filter="url(#sh)"/>
<foreignObject x="475" y="100" width="185" height="52">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;font-family:'Noto Sans JP',sans-serif;text-align:center;gap:2px;">

</foreignObject>

<!-- After 損益 -->
<rect x="475" y="192" width="400" height="95" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
<foreignObject x="475" y="192" width="400" height="95">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:flex-start;height:100%;padding:8px 16px;font-family:'Noto Sans JP',sans-serif;gap:3px;">
    <span style="font-size:8px;font-weight:700;color:#92400e;">移管後の損益構造</span>
    <div style="display:flex;gap:20px;width:100%;">
      <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
        <span style="font-size:7px;color:#1e293b;">販売価格: <b>100</b>（不変）</span>

      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
        <span style="font-size:7px;color:#16a34a;font-weight:600;">合算利益: <b>55</b></span>

    <span style="font-size:7px;color:#dc2626;font-weight:600;">利益増加 = 55 - 20 = <b>35</b>（人件費較差等の効果）</span>

</foreignObject>

<!-- 中央の変化矢印 -->

<foreignObject x="430" y="135" width="35" height="20">

<!-- ======== SECTION 2: 利益増加の要因分析 ======== -->
<rect x="10" y="316" width="880" height="195" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
<text x="450" y="336" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed" font-family="'Noto Sans JP',sans-serif">利益増加（+35）の要因分析 ── なぜ分離できないか</text>

<!-- 要因の棒グラフ風 -->
<rect x="25" y="350" width="850" height="50" rx="7" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>

<!-- 移管前利益 -->
<rect x="35" y="358" width="180" height="34" rx="4" fill="#94a3b8"/>
<foreignObject x="35" y="358" width="180" height="34">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;font-family:'Noto Sans JP',sans-serif;text-align:center;">
    <span style="font-size:8px;font-weight:700;color:#fff;">移管前利益 = 20</span>
    <span style="font-size:6px;color:#e2e8f0;">基本部分</span>
  </div>
</foreignObject>

<!-- 増加分: 内部要因 -->
<rect x="220" y="358" width="300" height="34" rx="4" fill="#1e40af"/>
<foreignObject x="220" y="358" width="300" height="34">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;font-family:'Noto Sans JP',sans-serif;text-align:center;">
    <span style="font-size:7.5px;font-weight:700;color:#fff;">内部要因: 品質維持・ﾌﾞﾗﾝﾄﾞ維持・生産効率向上のﾉｳﾊｳ</span>
    <span style="font-size:6px;color:#93c5fd;">P社の独自技術＋S社の販売ﾉｳﾊｳ</span>
  </div>
</foreignObject>

<!-- 増加分: 外部要因 -->
<rect x="525" y="358" width="350" height="34" rx="4" fill="#16a34a"/>
<foreignObject x="525" y="358" width="350" height="34">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;font-family:'Noto Sans JP',sans-serif;text-align:center;">
    <span style="font-size:7.5px;font-weight:700;color:#fff;">外部要因（外生的）: X国の低い人件費水準</span>
    <span style="font-size:6px;color:#dcfce7;">P社の事業判断の結果としてｸﾞﾙｰﾌﾟにもたらされたもの</span>
  </div>
</foreignObject>

<!-- 合計ラベル -->
<foreignObject x="25" y="402" width="850" height="18">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:7px;color:#64748b;font-family:'Noto Sans JP',sans-serif;">
    合算利益 = 55　　（内部要因と外部要因が複合的に絡み合っており、分離は困難）
  </div>
</foreignObject>

<!-- 解説ボックス -->
<rect x="25" y="424" width="850" height="75" rx="7" fill="#fff" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
<foreignObject x="25" y="424" width="850" height="75">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:flex-start;height:100%;padding:8px 16px;font-family:'Noto Sans JP',sans-serif;gap:3px;">
    <span style="font-size:8px;font-weight:700;color:#dc2626;">人件費較差による利益を分割対象利益等から区分することは困難</span>
    <span style="font-size:7px;color:#475569;">1. 品質・ﾌﾞﾗﾝﾄﾞ・販売価格・数量の維持 → 内部の企業努力（無形資産）が不可欠</span>
    <span style="font-size:7px;color:#475569;">2. 生産効率向上のためのﾉｳﾊｳの使用 → 内部要因として作用</span>
    <span style="font-size:7px;color:#475569;">3. これらの内部要因と人件費較差（外生的要因）が<b>複合的に絡み合って</b>利益を生む</span>
  </div>
</foreignObject>

<!-- ======== SECTION 3: 残余利益分割法での処理 ======== -->
<rect x="10" y="525" width="880" height="295" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
<text x="450" y="545" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e" font-family="'Noto Sans JP',sans-serif">残余利益分割法での人件費較差の処理方法</text>

<!-- Step 1: 基本的利益 -->
<rect x="25" y="558" width="420" height="120" rx="7" fill="#fff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
<rect x="25" y="558" width="420" height="24" rx="7" fill="#1e40af"/>
<rect x="25" y="576" width="420" height="6" fill="#1e40af"/>
<foreignObject x="25" y="558" width="420" height="24">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">Step 1: Ｓ社の基本的利益の計算で反映</div>
</foreignObject>
<foreignObject x="25" y="582" width="420" height="96">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:flex-start;height:100%;padding:6px 14px;font-family:'Noto Sans JP',sans-serif;gap:4px;">
    <span style="font-size:7.5px;color:#1e293b;font-weight:600;">基本的取引の選定にX国法人の財務情報を使用</span>
    <span style="font-size:7px;color:#475569;">S社と同様に低い人件費水準の恩恵を受けている</span>
    <span style="font-size:7px;color:#475569;">X国法人の財務情報等に基づき基本的取引を選定</span>
    <span style="font-size:7px;color:#16a34a;font-weight:600;">→ 低い人件費の効果は基本的利益の中に自動的に反映</span>
    <span style="font-size:6.5px;color:#94a3b8;">同じ市場・同じ経済状況下の非関連者も同水準の人件費を享受</span>
  </div>
</foreignObject>

<!-- Step 2: 残余利益 -->
<rect x="460" y="558" width="415" height="120" rx="7" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
<rect x="460" y="558" width="415" height="24" rx="7" fill="#7c3aed"/>
<rect x="460" y="576" width="415" height="6" fill="#7c3aed"/>
<foreignObject x="460" y="558" width="415" height="24">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;font-weight:700;color:#fff;font-family:'Noto Sans JP',sans-serif;">Step 2: 残余利益等の配分</div>
</foreignObject>
<foreignObject x="460" y="582" width="415" height="96">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:flex-start;height:100%;padding:6px 14px;font-family:'Noto Sans JP',sans-serif;gap:4px;">
    <span style="font-size:7.5px;color:#1e293b;font-weight:600;">分割対象利益 - 基本的利益 = 残余利益等</span>
    <span style="font-size:7px;color:#475569;">残余利益等は独自の価値ある寄与の程度に応じて配分</span>
    <span style="font-size:7px;color:#475569;">P社: 技術力に基づく独自の技術性能</span>
    <span style="font-size:7px;color:#475569;">S社: 広告宣伝・販促活動による認知度・販売網</span>
    <span style="font-size:6.5px;color:#94a3b8;">無形資産による寄与の程度で配分</span>
  </div>
</foreignObject>

<!-- 計算フロー図 -->
<rect x="25" y="690" width="850" height="116" rx="7" fill="#fff" stroke="#16a34a" stroke-width="2" filter="url(#sh)"/>
<foreignObject x="25" y="690" width="850" height="116">
  <div xmlns="http://www.w3.org/1999/xhtml" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:8px 20px;font-family:'Noto Sans JP',sans-serif;gap:5px;">
    <span style="font-size:9px;font-weight:700;color:#16a34a;">処理の流れ（イメージ）</span>
    <div style="display:flex;align-items:center;gap:8px;width:100%;">
      <div style="flex:1;background:#f1f5f9;border-radius:6px;padding:6px 8px;text-align:center;">
        <div style="font-size:7.5px;font-weight:600;color:#1e293b;">分割対象利益 = 55</div>
        <div style="font-size:6.5px;color:#94a3b8;">P社+S社の合算営業利益</div>
      </div>
      <span style="font-size:10px;color:#16a34a;font-weight:700;">→</span>
      <div style="flex:1;background:#eff6ff;border-radius:6px;padding:6px 8px;text-align:center;">
        <div style="font-size:7.5px;font-weight:600;color:#1e40af;">基本的利益の計算</div>
        <div style="font-size:6.5px;color:#475569;">S社はX国法人の財務情報で</div>
        <div style="font-size:6.5px;color:#16a34a;font-weight:600;">人件費較差が反映される</div>
      </div>
      <span style="font-size:10px;color:#16a34a;font-weight:700;">→</span>
      <div style="flex:1;background:#faf5ff;border-radius:6px;padding:6px 8px;text-align:center;">
        <div style="font-size:7.5px;font-weight:600;color:#7c3aed;">残余利益等</div>
        <div style="font-size:6.5px;color:#475569;">独自の価値ある寄与</div>
        <div style="font-size:6.5px;color:#475569;">（無形資産）で配分</div>
      </div>
    </div>
    <span style="font-size:7px;color:#64748b;">基本的製造活動に見合う利益は、同様の製造機能を同様の経済状況下で果たす非関連者と同水準</span>
  </div>
</foreignObject>
