<h1>みなし外国税額控除 ― 書類添付要件の構造と救済の限界</h1>
<p class="sub">省令10条 × 法人税法69条25項 × 更正の請求 ｜ 2026-03-10</p>

<!-- ===== Panel 1: 3層構造 ===== -->
<div class="svg-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 340" font-family="'Noto Sans JP','Helvetica Neue',sans-serif">
  <defs>
    <filter id="sh1"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/></filter>
    <linearGradient id="hdr1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2c5f8a"/>
    </linearGradient>
  </defs>

  <!-- Title bar -->
  <rect x="0" y="0" width="1050" height="46" rx="8" fill="url(#hdr1)"/>
  <text x="525" y="30" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">図1：書類要件の3層構造</text>

  <!-- Layer 1 -->
  <rect x="40" y="70" width="280" height="120" rx="10" fill="#e8f4fd" stroke="#2c5f8a" stroke-width="2" filter="url(#sh1)"/>
  <text x="180" y="96" text-anchor="middle" font-size="12" fill="#2c5f8a" font-weight="bold">第1層</text>
  <text x="180" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a3a5c">法人税法69条25項</text>
  <text x="180" y="142" text-anchor="middle" font-size="12" fill="#34495e">外国税額控除の</text>
  <text x="180" y="160" text-anchor="middle" font-size="12" fill="#34495e">一般的書類要件</text>
  <text x="180" y="182" text-anchor="middle" font-size="11" fill="#2c5f8a">明細書＝添付 / 証明書類＝保存</text>

  <!-- Arrow 1→2 -->
  <path d="M325,130 L370,130" stroke="#2c5f8a" stroke-width="2.5" marker-end="url(#arw1)"/>
  <defs><marker id="arw1" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#2c5f8a"/></marker></defs>

  <!-- Layer 2 -->
  <rect x="380" y="70" width="280" height="120" rx="10" fill="#e8f4fd" stroke="#2c5f8a" stroke-width="2" filter="url(#sh1)"/>
  <text x="520" y="96" text-anchor="middle" font-size="12" fill="#2c5f8a" font-weight="bold">第2層</text>
  <text x="520" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a3a5c">法人税法施行規則</text>
  <text x="520" y="142" text-anchor="middle" font-size="12" fill="#34495e">29条の3等</text>
  <text x="520" y="160" text-anchor="middle" font-size="12" fill="#34495e">具体的書類の特定</text>
  <text x="520" y="182" text-anchor="middle" font-size="11" fill="#2c5f8a">課税証明・申告書写し等</text>

  <!-- Arrow 2→3 -->
  <path d="M665,130 L710,130" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arw2)"/>
  <defs><marker id="arw2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#c0392b"/></marker></defs>

  <!-- Layer 3 (highlighted) -->
  <rect x="720" y="60" width="290" height="140" rx="10" fill="#fce4ec" stroke="#c0392b" stroke-width="3" filter="url(#sh1)"/>
  <text x="865" y="88" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="bold">第3層（本件の争点）</text>
  <text x="865" y="112" text-anchor="middle" font-size="15" font-weight="bold" fill="#b71c1c">実施特例法省令10条</text>
  <text x="865" y="136" text-anchor="middle" font-size="12" fill="#34495e">みなし外国税額控除</text>
  <text x="865" y="154" text-anchor="middle" font-size="12" fill="#34495e">固有の追加書類</text>
  <text x="865" y="178" text-anchor="middle" font-size="11.5" fill="#c0392b" font-weight="bold">→ 計算明細＋証明書類</text>
  <text x="865" y="194" text-anchor="middle" font-size="11.5" fill="#c0392b" font-weight="bold">→ ともに「添付」が必要</text>

  <!-- 注記 -->
  <rect x="40" y="220" width="970" height="100" rx="8" fill="#fff3cd" stroke="#f0c040" stroke-width="1.5"/>

  <text x="60" y="272" font-size="13" fill="#5d4e01">第1層・第2層（別表6関係）：✅ 全て添付済み → 実際の源泉徴収税10%の控除は問題なし</text>
  <text x="60" y="296" font-size="13" fill="#b71c1c" font-weight="bold">第3層（省令10条の書類）：❌ 未添付 → みなし税額の追加10%の控除が否認リスク</text>

<!-- ===== Panel 2: 省令10条の論理構造 ===== -->
<div class="svg-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 520" font-family="'Noto Sans JP','Helvetica Neue',sans-serif">
  <defs>
    <filter id="sh2"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/></filter>
    <linearGradient id="hdr2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2c5f8a"/>
    </linearGradient>
    <marker id="arwB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#1a3a5c"/></marker>
    <marker id="arwR" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#c0392b"/></marker>
  </defs>

  <rect x="0" y="0" width="1050" height="46" rx="8" fill="url(#hdr2)"/>
  <text x="525" y="30" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">図2：省令10条の「含む」の三段論法 ― なぜ添付義務になるか</text>

  <!-- 大前提 -->
  <rect x="40" y="70" width="970" height="70" rx="10" fill="#e8f4fd" stroke="#2c5f8a" stroke-width="2" filter="url(#sh2)"/>
  <text x="60" y="95" font-size="13" fill="#2c5f8a" font-weight="bold">大前提：法人税法69条25項</text>
  <text x="60" y="120" font-size="14" fill="#1a3a5c">「申告書等に明細書の<tspan font-weight="bold" fill="#c0392b">添付</tspan>があり…<tspan font-weight="bold" fill="#c0392b">場合に限り</tspan>、適用する」 → 添付がなければFTCは適用されない</text>

  <!-- Arrow down -->
  <path d="M525,145 L525,170" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arwB)"/>
  <text x="540" y="162" font-size="11" fill="#5d6d7e">＋</text>

  <!-- 小前提 -->
  <rect x="40" y="175" width="970" height="90" rx="10" fill="#fce4ec" stroke="#c0392b" stroke-width="2" filter="url(#sh2)"/>
  <text x="60" y="200" font-size="13" fill="#c0392b" font-weight="bold">小前提：省令10条</text>
  <text x="60" y="224" font-size="14" fill="#1a3a5c">「次に掲げる書類（＝69条25項の<tspan font-weight="bold">添付すべき書類</tspan>）には、</text>
  <text x="60" y="248" font-size="14" fill="#1a3a5c">　(A) みなし外国税額の<tspan font-weight="bold" fill="#c0392b">計算明細</tspan> 及び (B) みなし外国税額の<tspan font-weight="bold" fill="#c0392b">証明書類</tspan> を<tspan font-weight="bold" fill="#c0392b">含むものとする</tspan>」</text>

  <!-- Arrow down -->
  <path d="M525,270 L525,298" stroke="#c0392b" stroke-width="3" marker-end="url(#arwR)"/>
  <text x="540" y="290" font-size="12" fill="#c0392b" font-weight="bold">∴</text>

  <!-- 結論 -->
  <rect x="100" y="305" width="850" height="65" rx="10" fill="#c0392b" filter="url(#sh2)"/>
  <text x="525" y="335" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">結論：(A)計算明細も(B)証明書類も「添付すべき書類」に含まれる</text>
  <text x="525" y="358" text-anchor="middle" font-size="14" fill="#ffe0e0">→ 両方とも「添付」が必要。保存では足りない。</text>

  <!-- 比較ボックス -->
  <rect x="40" y="400" width="460" height="100" rx="10" fill="#d4edda" stroke="#28a745" stroke-width="2" filter="url(#sh2)"/>
  <text x="270" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#155724">一般の外国税額控除（69条25項のみ）</text>
  <text x="270" y="450" text-anchor="middle" font-size="13" fill="#155724">明細書 → <tspan font-weight="bold">添付</tspan></text>
  <text x="270" y="472" text-anchor="middle" font-size="13" fill="#155724">証明書類 → <tspan font-weight="bold">保存でOK</tspan>（添付不要）</text>
  <text x="270" y="492" text-anchor="middle" font-size="11" fill="#5d8a6d">28項の「やむを得ない事情」で保存要件は救済可能</text>

  <text x="525" y="453" text-anchor="middle" font-size="22" fill="#5d6d7e">vs</text>

  <rect x="550" y="400" width="460" height="100" rx="10" fill="#f8d7da" stroke="#c0392b" stroke-width="2" filter="url(#sh2)"/>
  <text x="780" y="425" text-anchor="middle" font-size="13" font-weight="bold" fill="#721c24">みなし外国税額控除（+省令10条）</text>
  <text x="780" y="450" text-anchor="middle" font-size="13" fill="#721c24">計算明細 → <tspan font-weight="bold">添付</tspan></text>
  <text x="780" y="472" text-anchor="middle" font-size="13" fill="#721c24">証明書類 → <tspan font-weight="bold">添付が必要</tspan>（保存では不足）</text>
  <text x="780" y="492" text-anchor="middle" font-size="11" fill="#a04050">28項は「保存」の救済 → 添付要件には適用されない</text>
</svg>
</div>

<!-- ===== Panel 3: 裁決の対比 ===== -->
<div class="svg-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 400" font-family="'Noto Sans JP','Helvetica Neue',sans-serif">
  <defs>
    <filter id="sh3"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/></filter>
    <linearGradient id="hdr3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2c5f8a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1050" height="46" rx="8" fill="url(#hdr3)"/>
  <text x="525" y="30" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">図3：裁決例の対比 ― No.77-21（認容）vs No.77-22（否認）</text>

  <!-- 左: 認容 -->
  <rect x="40" y="65" width="460" height="310" rx="12" fill="#d4edda" stroke="#28a745" stroke-width="2.5" filter="url(#sh3)"/>
  <rect x="40" y="65" width="460" height="42" rx="12" fill="#28a745"/>
  <rect x="40" y="95" width="460" height="12" fill="#28a745"/>
  <text x="270" y="92" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">✅ No.77-21 ― 認容</text>

  <text x="60" y="135" font-size="13" font-weight="bold" fill="#155724">事実：</text>
  <text x="60" y="158" font-size="13" fill="#1e5631">・FTCを申告し、必要書類を<tspan font-weight="bold">全て添付済み</tspan></text>
  <text x="60" y="180" font-size="13" fill="#1e5631">・為替レート・転記・条約解釈に<tspan font-weight="bold">計算誤り</tspan></text>

  <text x="60" y="210" font-size="13" font-weight="bold" fill="#155724">性質：</text>
  <text x="60" y="232" font-size="14" fill="#1e5631">「<tspan font-weight="bold">計算</tspan>」の問題</text>
  <text x="60" y="254" font-size="13" fill="#1e5631">（選択した範囲内での数値の訂正）</text>

  <text x="60" y="284" font-size="13" font-weight="bold" fill="#155724">結果：</text>
  <text x="60" y="306" font-size="14" fill="#155724" font-weight="bold">更正の請求を認容</text>
  <text x="60" y="328" font-size="12" fill="#1e5631">→ 書類が揃っていれば事後の修正は可能</text>

  <rect x="80" y="340" width="400" height="24" rx="6" fill="#c8e6c9"/>
  <text x="280" y="357" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">キーワード：書類○ 計算× → 更正の請求○</text>

  <!-- 右: 否認 -->
  <rect x="550" y="65" width="460" height="310" rx="12" fill="#f8d7da" stroke="#c0392b" stroke-width="2.5" filter="url(#sh3)"/>
  <rect x="550" y="65" width="460" height="42" rx="12" fill="#c0392b"/>
  <rect x="550" y="95" width="460" height="12" fill="#c0392b"/>
  <text x="780" y="92" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">❌ No.77-22 ― 否認</text>

  <text x="570" y="135" font-size="13" font-weight="bold" fill="#721c24">事実：</text>
  <text x="570" y="158" font-size="13" fill="#5a1a1a">・みなし外国税額の<tspan font-weight="bold">書類を添付せず</tspan></text>
  <text x="570" y="180" font-size="13" fill="#5a1a1a">・別表六(五の三)も<tspan font-weight="bold">未提出</tspan></text>

  <text x="570" y="210" font-size="13" font-weight="bold" fill="#721c24">性質：</text>
  <text x="570" y="232" font-size="14" fill="#5a1a1a">「<tspan font-weight="bold">手続要件</tspan>」の不充足</text>
  <text x="570" y="254" font-size="13" fill="#5a1a1a">（適用要件そのものが欠落）</text>

  <text x="570" y="284" font-size="13" font-weight="bold" fill="#721c24">結果：</text>
  <text x="570" y="306" font-size="14" fill="#c0392b" font-weight="bold">更正の請求を否認・FTC否認</text>
  <text x="570" y="328" font-size="12" fill="#5a1a1a">→ 失念≠やむを得ない事情</text>

  <rect x="590" y="340" width="400" height="24" rx="6" fill="#f5c6cb"/>
  <text x="790" y="357" text-anchor="middle" font-size="12" font-weight="bold" fill="#a71d2a">キーワード：書類× ＝ 適用要件× → 更正の請求×</text>
</svg>
</div>

<!-- ===== Panel 4: 更正の請求の壁 ===== -->
<div class="svg-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 530" font-family="'Noto Sans JP','Helvetica Neue',sans-serif">
  <defs>
    <filter id="sh4"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/></filter>
    <linearGradient id="hdr4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2c5f8a"/>
    </linearGradient>
    <marker id="arwD" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#34495e"/></marker>
    <marker id="arwRd" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#c0392b"/></marker>
  </defs>

  <rect x="0" y="0" width="1050" height="46" rx="8" fill="url(#hdr4)"/>
  <text x="525" y="30" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">図4：更正の請求はなぜ使えないか ― 3つの壁</text>

  <!-- 起点 -->
  <rect x="360" y="65" width="330" height="50" rx="10" fill="#e8f4fd" stroke="#2c5f8a" stroke-width="2" filter="url(#sh4)"/>
  <text x="525" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a3a5c">更正の請求（国税通則法23条1項）</text>

  <!-- 3つの要件 -->
  <path d="M525,115 L525,145" stroke="#34495e" stroke-width="2" marker-end="url(#arwD)"/>
  <path d="M525,145 L200,170" stroke="#34495e" stroke-width="1.5"/>
  <path d="M525,145 L525,170" stroke="#34495e" stroke-width="1.5"/>
  <path d="M525,145 L850,170" stroke="#34495e" stroke-width="1.5"/>

  <!-- 壁1 -->
  <rect x="40" y="170" width="310" height="180" rx="10" fill="#fff" stroke="#c0392b" stroke-width="2.5" filter="url(#sh4)"/>
  <rect x="40" y="170" width="310" height="36" rx="10" fill="#c0392b"/>
  <rect x="40" y="196" width="310" height="10" fill="#c0392b"/>
  <text x="195" y="194" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">壁1：「税額が過大」ではない</text>

  <text x="60" y="230" font-size="12" fill="#34495e">申告書は既に20%FTCを適用した</text>
  <text x="60" y="250" font-size="12" fill="#34495e">税額で提出済み。</text>
  <text x="60" y="278" font-size="12" fill="#c0392b" font-weight="bold">→ 税額は「過大」ではない</text>
  <text x="60" y="298" font-size="12" fill="#c0392b" font-weight="bold">→ むしろ「過少」の可能性</text>
  <text x="60" y="324" font-size="11" fill="#5d6d7e">（省令10条不備でFTCが否認</text>
  <text x="60" y="340" font-size="11" fill="#5d6d7e">　されるなら税額はもっと大きい）</text>

  <!-- 壁2 -->
  <rect x="370" y="170" width="310" height="180" rx="10" fill="#fff" stroke="#c0392b" stroke-width="2.5" filter="url(#sh4)"/>
  <rect x="370" y="170" width="310" height="36" rx="10" fill="#c0392b"/>
  <rect x="370" y="196" width="310" height="10" fill="#c0392b"/>
  <text x="525" y="194" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">壁2：「計算の誤り」ではない</text>

  <text x="390" y="230" font-size="12" fill="#34495e">通則法23条1項は「計算が法律の</text>
  <text x="390" y="250" font-size="12" fill="#34495e">規定に従っていなかった」ことを要求。</text>
  <text x="390" y="278" font-size="12" fill="#c0392b" font-weight="bold">→ 書類の未添付は「計算」の</text>
  <text x="390" y="298" font-size="12" fill="#c0392b" font-weight="bold">　問題ではなく「手続」の問題</text>
  <text x="390" y="324" font-size="11" fill="#5d6d7e">裁決No.77-22が明確に区別：</text>
  <text x="390" y="340" font-size="11" fill="#5d6d7e">「計算誤り ≠ 適用要件の不充足」</text>

  <!-- 壁3 -->
  <rect x="700" y="170" width="310" height="180" rx="10" fill="#fff" stroke="#c0392b" stroke-width="2.5" filter="url(#sh4)"/>
  <rect x="700" y="170" width="310" height="36" rx="10" fill="#c0392b"/>
  <rect x="700" y="196" width="310" height="10" fill="#c0392b"/>
  <text x="855" y="194" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">壁3：書類の事後補完の不可</text>

  <text x="720" y="230" font-size="12" fill="#34495e">更正処分後に更正請求書へ</text>
  <text x="720" y="250" font-size="12" fill="#34495e">省令10条の書類を添付する迂回策も：</text>
  <text x="720" y="278" font-size="12" fill="#c0392b" font-weight="bold">→ H23改正は「FTC未申告の</text>
  <text x="720" y="298" font-size="12" fill="#c0392b" font-weight="bold">　新規主張」が目的</text>
  <text x="720" y="324" font-size="11" fill="#5d6d7e">「書類の事後的補完」を認める</text>
